<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>심연 로그 - 웹 로그라이크</title>
<style>
  :root{
    --bg:#090b10; --panel:#141925; --panel2:#1c2433; --line:#2f3b52;
    --text:#eef3ff; --muted:#9ba9c5; --good:#6ee7a8; --bad:#ff7070;
    --warn:#ffd166; --rare:#66d9ff; --epic:#c084fc; --legend:#fbbf24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;touch-action:manipulation;caret-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;background:radial-gradient(circle at top,#172036,#080a0f 60%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-text-size-adjust:100%}
  button,input{font-family:inherit;color:inherit;-webkit-appearance:none;appearance:none;outline:none}button:focus,input:focus{outline:none}canvas,button,.controls,.skill{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  #app{height:100dvh;display:flex;flex-direction:column;gap:6px;padding:8px;max-width:920px;margin:0 auto}
  .topbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;align-items:center}
  .pill{background:rgba(20,25,37,.92);border:1px solid var(--line);border-radius:10px;padding:7px 8px;font-size:12px;line-height:1.15;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .pill b{font-size:15px;color:white}
  .bars{display:grid;grid-template-columns:1fr;gap:4px}
  .bar{height:13px;background:#0b0f19;border:1px solid #253047;border-radius:999px;overflow:hidden;position:relative}
  .fill{height:100%;width:50%;transition:width .18s linear}
  .hpfill{background:linear-gradient(90deg,#ef4444,#fb7185)}
  .xpfill{background:linear-gradient(90deg,#22c55e,#86efac)}
  .mpfill{background:linear-gradient(90deg,#60a5fa,#a78bfa)}
  .bar span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;text-shadow:0 1px 2px #000}
  .main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:7px}
  .gameWrap{display:flex;flex-direction:column;min-height:0;gap:6px}
  #gamePanel{position:relative;flex:1;min-height:0;background:#0b0f19;border:1px solid var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 8px 30px rgba(0,0,0,.35)}
  #game{width:min(100%, calc(100dvh - 260px));max-height:100%;aspect-ratio:1/1;image-rendering:pixelated}
  .side{display:flex;flex-direction:column;min-height:0;gap:7px}
  .box{background:rgba(20,25,37,.93);border:1px solid var(--line);border-radius:12px;padding:9px;box-shadow:0 6px 18px rgba(0,0,0,.22)}
  .box h3{margin:0 0 7px;font-size:13px;color:#dbe7ff;display:flex;justify-content:space-between;align-items:center}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;color:var(--muted)}
  .stats b{color:#fff;font-weight:700}
  .equip{font-size:12px;color:var(--muted);line-height:1.45;max-height:90px;overflow:auto}
  .relics{display:flex;gap:4px;flex-wrap:wrap;max-height:70px;overflow:auto}
  .tag{font-size:11px;padding:3px 6px;border:1px solid #33415e;background:#111827;border-radius:999px;color:#d7e2ff;white-space:nowrap}
  .log{font-size:12px;line-height:1.35;color:#c8d3ea;overflow:auto;min-height:95px;max-height:160px;padding-right:3px}
  .log p{margin:0 0 4px}
  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .btn{background:linear-gradient(#26334b,#172033);border:1px solid #40506f;border-radius:10px;padding:9px 6px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.35)}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)}
  .btn.good{border-color:#2f7656;background:linear-gradient(#236146,#173b2e)}
  .btn.warn{border-color:#8a6920;background:linear-gradient(#6b511b,#342812)}
  .btn.bad{border-color:#8a3838;background:linear-gradient(#703238,#35171a)}
  .controls{position:relative;width:160px;height:160px;margin:0;justify-self:start;align-self:start;border-radius:50%;background:radial-gradient(circle at 50% 50%,#1f2937 0 21%,#111827 22% 50%,#080d16 51% 100%);border:2px solid #52627a;box-shadow:inset 0 10px 24px rgba(255,255,255,.05),inset 0 -18px 30px rgba(0,0,0,.55),0 10px 26px rgba(0,0,0,.42);overflow:hidden}
  .controls:before{content:"";position:absolute;inset:13px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(148,163,184,.12) 0 33%,transparent 34% 100%);border:1px solid rgba(148,163,184,.2);box-shadow:inset 0 0 26px rgba(0,0,0,.45)}
  .controls:after{content:"";position:absolute;left:50%;top:50%;width:76px;height:76px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle at 34% 28%,#7b8da8,#3b475d 48%,#151d2b 100%);border:1px solid #94a3b8;box-shadow:0 7px 16px rgba(0,0,0,.5),inset 0 4px 7px rgba(255,255,255,.12);pointer-events:none;transition:transform .08s linear;z-index:3}
  .controls.active:after{transform:translate(calc(-50% + var(--stick-x,0px)),calc(-50% + var(--stick-y,0px)))}
  .controls .pad-line{position:absolute;left:50%;top:50%;width:116px;height:2px;background:rgba(148,163,184,.16);transform:translate(-50%,-50%);pointer-events:none}.controls .pad-line.v{width:2px;height:116px}
  .controls button{position:absolute;z-index:4;margin:0;padding:0;border:0;background:transparent;box-shadow:none;color:transparent;font-size:0;cursor:pointer;touch-action:none}
  .controls .up{left:50%;top:0;transform:translateX(-50%);width:76px;height:48px;border-radius:42px 42px 12px 12px}
  .controls .down{left:50%;bottom:0;transform:translateX(-50%);width:76px;height:48px;border-radius:12px 12px 42px 42px}
  .controls .left{left:0;top:50%;transform:translateY(-50%);width:48px;height:76px;border-radius:42px 12px 12px 42px}
  .controls .right{right:0;top:50%;transform:translateY(-50%);width:48px;height:76px;border-radius:12px 42px 42px 12px}
  .controls .wait{left:50%;top:50%;width:62px;height:62px;transform:translate(-50%,-50%);border-radius:50%;z-index:5}
  .footer{display:grid;grid-template-columns:170px minmax(0,1fr);gap:10px;align-items:start}
  .rightui{display:grid;grid-template-rows:auto auto;gap:7px;min-width:0}
  .skillbar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .menubar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .menuBtn{min-height:38px;padding:8px 4px;background:linear-gradient(180deg,#202a3b,#0f1725);border:1px solid #3d4c66;border-radius:13px;font-size:12px;font-weight:800;letter-spacing:-.2px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 0 rgba(0,0,0,.33),0 8px 18px rgba(0,0,0,.22);cursor:pointer;touch-action:none}
  .menuBtn:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.33),0 5px 12px rgba(0,0,0,.18)}
  .menuBtn b{display:block;font-size:12px;white-space:nowrap}.menuGhost{visibility:hidden;pointer-events:none}
  .skill{position:relative;min-height:64px;padding:12px 7px 7px;background:linear-gradient(180deg,#25324a,#101827);border:1px solid #475569;border-radius:17px;font-size:11px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 0 rgba(0,0,0,.38),0 10px 20px rgba(0,0,0,.24);cursor:pointer;touch-action:none}
  .skill:before{content:"";position:absolute;left:9px;right:9px;top:6px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);pointer-events:none}.skill:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,0) 45%);pointer-events:none}
  .skill:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.38),0 7px 14px rgba(0,0,0,.22)}
  .skill b{display:block;font-size:13px;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.skill small{display:block;margin-top:5px;color:#aebbd6;font-size:10px;line-height:1.15}.skill .cd{position:absolute;inset:0;background:rgba(5,8,14,.76);display:none;align-items:center;justify-content:center;font-size:20px;font-weight:900;z-index:4}.skill.cool .cd{display:flex}
  #skill1{border-color:#8b5cf6;background:linear-gradient(180deg,#422f75,#17172b)}#skill1:before{background:#a78bfa}#skill2{border-color:#f59e0b;background:linear-gradient(180deg,#684114,#18130b)}#skill2:before{background:#fbbf24}#skill3{border-color:#38bdf8;background:linear-gradient(180deg,#16556b,#111827)}#skill3:before{background:#67e8f9}#potionBtn{border-color:#22c55e;background:linear-gradient(180deg,#14532d,#0b1f18)}#potionBtn:before{background:#6ee7a8}#attackBtn{border-color:#ef4444;background:linear-gradient(180deg,#7f1d1d,#24100f)}#attackBtn:before{background:#fca5a5}#autoBtn.menuBtn.good{border-color:#2f7656;background:linear-gradient(#236146,#173b2e)}#autoBtn.menuBtn.full{border-color:#8a3838;background:linear-gradient(#703238,#35171a)}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:14px}
  .modal.show{display:flex}
  .card{position:relative;width:min(620px,100%);max-height:92dvh;overflow:auto;background:linear-gradient(180deg,rgba(27,36,54,.80),rgba(16,22,34,.68));border:1px solid rgba(148,163,184,.45);border-radius:18px;padding:16px;box-shadow:0 20px 70px rgba(0,0,0,.55);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}
  .card h1,.card h2{margin:0 0 9px}.card h1{font-size:24px}.card h2{font-size:20px}
  .modalCloseX{position:absolute;right:10px;top:10px;width:32px;height:32px;border-radius:6px;border:1px solid rgba(148,163,184,.45);background:rgba(11,15,25,.58);color:#dbe7ff;font-size:20px;line-height:1;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35);z-index:3;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}.modalCloseX:active{transform:translateY(1px)}
  .muted{color:var(--muted);font-size:13px;line-height:1.45}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .choice{background:rgba(20,28,43,.56);border:1px solid rgba(122,146,184,.42);border-radius:13px;padding:11px;text-align:left;cursor:pointer;min-height:96px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .choice:hover{border-color:rgba(122,162,255,.9)}.choice h4{margin:0 0 6px;font-size:15px}.choice p{margin:0;color:#c8d3ea;font-size:12px;line-height:1.35}.choice .rarity{font-size:11px;margin-top:7px;display:inline-block;padding:2px 6px;border-radius:999px;background:rgba(11,15,25,.45);border:1px solid rgba(122,146,184,.42)}
  .modal .choice,.modal .btn,.modal input,.modal select,.modal .tag,.modal .metaRow{background-color:rgba(20,28,43,.48)}
  .bagItemCard{background:var(--bag-bg,rgba(20,28,43,.52))!important;border-color:var(--bag-line,rgba(122,146,184,.55))!important;color:var(--bag-text,#eef3ff);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 8px 18px rgba(0,0,0,.20)}
  .bagItemCard h4{color:var(--bag-text,#eef3ff)}.bagItemCard .muted,.bagItemCard p{color:var(--bag-muted,#d7e2ff)!important}
  .bagGrade0{--bag-bg:rgba(255,255,255,.72);--bag-line:rgba(255,255,255,.95);--bag-text:#111827;--bag-muted:#243244}
  .bagGrade1{--bag-bg:rgba(34,197,94,.58);--bag-line:rgba(134,239,172,.95);--bag-text:#ecfdf5;--bag-muted:#dcfce7}
  .bagGrade2{--bag-bg:rgba(59,130,246,.60);--bag-line:rgba(147,197,253,.95);--bag-text:#eff6ff;--bag-muted:#dbeafe}
  .bagGrade3{--bag-bg:rgba(168,85,247,.62);--bag-line:rgba(216,180,254,.95);--bag-text:#faf5ff;--bag-muted:#f3e8ff}
  .bagGrade4{--bag-bg:rgba(250,204,21,.72);--bag-line:rgba(253,224,71,.98);--bag-text:#1f2937;--bag-muted:#374151}
  .skillChoice{position:relative;padding-bottom:46px}.skillEnhanceBtn{position:absolute;left:10px;bottom:10px;min-width:68px;padding:6px 9px;font-size:12px;border-radius:9px}
  .rare{color:var(--rare)}.epic{color:var(--epic)}.legend{color:var(--legend)}.goodtxt{color:var(--good)}.badtxt{color:var(--bad)}.warntxt{color:var(--warn)}
  .metaRow{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;border-top:1px solid #2d3850;padding-top:8px;margin-top:8px}.metaRow p{margin:2px 0 0;color:#aebbd6;font-size:12px}.metaRow h4{margin:0;font-size:14px}.smallbtn{padding:6px 8px;font-size:12px;border-radius:8px}
  .toast{position:absolute;top:8px;left:10px;right:10px;transform:none;z-index:12;background:rgba(16,24,39,.58);border:1px solid rgba(82,100,130,.72);border-radius:10px;padding:7px 10px;box-shadow:0 6px 18px rgba(0,0,0,.28);display:none;font-size:12px;text-align:center;backdrop-filter:blur(5px);pointer-events:none}
  .mapLogPanel{position:absolute;left:10px;right:10px;bottom:8px;z-index:11;min-height:58px;max-height:116px;background:rgba(8,13,22,.46);border:1px solid rgba(82,100,130,.56);border-radius:12px;padding:6px 8px;box-shadow:0 -6px 20px rgba(0,0,0,.22);backdrop-filter:blur(4px);pointer-events:auto;overflow:hidden}
  .mapLogTitle{font-size:10px;font-weight:900;color:#dbeafe;margin-bottom:3px;letter-spacing:.3px}
  .mapLogBox{font-size:11px;line-height:1.28;color:#dbe7ff;max-height:82px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-right:3px;scroll-behavior:smooth}.mapLogBox p{margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mapLogPanel.off{display:none}
  .mapLogPanel.chat{min-height:92px;max-height:128px}
  .mapLogPanel.chat .mapLogBox{max-height:104px;overflow:visible}
  .mapChatMessages{max-height:64px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;margin-bottom:5px;font-size:11px;line-height:1.28;color:#dbe7ff;padding-right:3px;scroll-behavior:smooth}
  .mapChatMessages p{margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mapChatLine{font-family:inherit;font-size:11px;font-weight:400;line-height:1.28;letter-spacing:normal;color:#dbe7ff}
  .mapChatMeta{font-family:inherit;font-weight:400;color:inherit;letter-spacing:normal}
  .mapChatNick{font-family:inherit;font-weight:400;color:inherit}
  .mapChatText{font-family:inherit;font-weight:400;color:inherit}
  .mapChatEmpty{color:#94a3b8;font-size:11px;font-weight:400;margin-bottom:5px}
  .mapChatInputRow{display:grid;grid-template-columns:minmax(0,1fr) 48px;gap:5px}
  #mapChatInput{width:100%;height:25px;padding:4px 7px;border-radius:8px;border:1px solid rgba(148,163,184,.50);background:rgba(8,13,22,.42);color:#eef3ff;font-size:11px;caret-color:auto;-webkit-user-select:text;user-select:text;touch-action:manipulation}
  #mapChatSend{height:25px;padding:3px 5px;border-radius:8px;border:1px solid rgba(148,163,184,.50);background:rgba(30,41,59,.55);font-size:11px;font-weight:800;touch-action:manipulation}
  #logChatBtn.chat{border-color:rgba(96,165,250,.78)!important;background:rgba(37,99,235,.42)!important}
  .miniMapOverlay{position:absolute;right:8px;top:46px;z-index:10;display:none;background:rgba(8,13,22,.46);border:1px solid rgba(148,163,184,.56);border-radius:8px;padding:4px;box-shadow:0 6px 16px rgba(0,0,0,.24);backdrop-filter:blur(4px);pointer-events:none}
  .miniMapOverlay.show{display:block}
  .miniMapTitle{font-size:9px;font-weight:900;color:#dbeafe;margin-bottom:3px;text-align:left;line-height:1}
  .miniMapGrid{display:grid;grid-template-columns:repeat(54,1px);gap:0}
  .miniMapGrid .miniCell{width:1px;height:1px;background:rgba(15,23,42,.68);border-radius:0}
  .miniMapGrid .miniCell.wall{background:rgba(71,85,105,.82)}
  .miniMapGrid .miniCell.floor{background:rgba(203,213,225,.62)}
  .miniMapGrid .miniCell.player{background:#60a5fa;box-shadow:0 0 4px #60a5fa}
  .miniMapGrid .miniCell.enemy{background:#ef4444}
  .miniMapGrid .miniCell.item{background:#22c55e}
  .miniMapGrid .miniCell.merchant{background:#c084fc}
  .miniMapGrid .miniCell.exit{background:#facc15}

  .worldMap{display:grid;grid-template-columns:repeat(54,7px);gap:1px;justify-content:center;background:#07101d;border:1px solid #34415a;border-radius:10px;padding:8px;overflow:auto;max-width:100%}
  .mapCell{width:7px;height:7px;background:#030712;border-radius:1px}.mapCell.wall{background:#1f2937}.mapCell.floor{background:#475569}.mapCell.player{background:#60a5fa}.mapCell.enemy{background:#ef4444}.mapCell.item{background:#22c55e}.mapCell.merchant{background:#c084fc}.mapCell.exit{background:#facc15}.mapLegend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;color:#aebbd6;font-size:12px}.mapLegend span{display:inline-flex;align-items:center;gap:4px}.mapDot{width:9px;height:9px;border-radius:2px;display:inline-block}
  .codexFilters{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0}.codexFilters select,.codexFilters input{width:100%;background:#0b0f19;border:1px solid #3a4b6d;border-radius:10px;color:#dbe7ff;padding:8px 9px;font-size:12px}.codexFilters .wide{grid-column:span 2}.codexSummary{font-size:12px;color:#aebbd6;margin:6px 0 8px}.codexUnknown{opacity:.68}
  .codexEntry{display:grid;grid-template-columns:108px 1fr;gap:12px;align-items:center}.codexSpriteWrap{width:108px;height:92px;border-radius:12px;background:transparent;border:0;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}.codexSpriteWrap img{width:96px;height:88px;max-width:96px;max-height:88px;object-fit:contain;object-position:center center;image-rendering:pixelated;display:block}.codexBoss .codexSpriteWrap img{transform:none;}.codexUnknown .codexSpriteWrap img{filter:brightness(0) saturate(0) opacity(.5)}
  .compareTable{width:100%;border-collapse:collapse;margin-top:7px;font-size:11px}.compareTable th,.compareTable td{border-top:1px solid #2d3850;padding:3px 2px;text-align:right}.compareTable th:first-child,.compareTable td:first-child{text-align:left;color:#cbd5e1}.compareTable .plus{color:#6ee7a8}.compareTable .minus{color:#ff7070}.compareTable .zero{color:#9ba9c5}
  .toast.show{display:block;animation:fade 1.8s forwards}@keyframes fade{0%{opacity:0;transform:translateY(-6px)}12%,80%{opacity:1;transform:translateY(0)}100%{opacity:0}}


  /* 모든 메뉴 팝업 반투명 처리: 스탯/가방/스킬/도감/메뉴/장비/지도 공통 */
  .modal{background:rgba(0,0,0,.54)!important;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  .modal .card{
    background:linear-gradient(180deg,rgba(27,36,54,.46),rgba(16,22,34,.34))!important;
    border-color:rgba(148,163,184,.32)!important;
    box-shadow:0 20px 70px rgba(0,0,0,.46)!important;
    backdrop-filter:blur(9px)!important;-webkit-backdrop-filter:blur(9px)!important;
  }
  .modal .choice,.modal .metaRow,.modal .stats>div,.modal .log,.modal .relics,.modal .compareTable,.modal .codexSummary{
    background:rgba(15,23,42,.24)!important;
    border-color:rgba(148,163,184,.26)!important;
    backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  }
  .modal .stats>div{border:1px solid rgba(148,163,184,.20);border-radius:10px;padding:7px 8px}
  .modal .stats{gap:6px}
  .modal .btn,.modal .smallbtn,.modal button.btn{
    background:rgba(15,23,42,.30)!important;
    background-image:none!important;
    border-color:rgba(148,163,184,.36)!important;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 12px rgba(0,0,0,.20)!important;
    backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  }
  .modal .btn.good{background:rgba(22,101,52,.28)!important;border-color:rgba(110,231,168,.44)!important}
  .modal .btn.warn{background:rgba(107,81,27,.28)!important;border-color:rgba(251,191,36,.42)!important}
  .modal .btn.bad{background:rgba(112,50,56,.28)!important;border-color:rgba(248,113,113,.42)!important}
  .modal input,.modal select,.modal textarea,.modal .codexFilters select,.modal .codexFilters input{
    background:rgba(11,15,25,.28)!important;
    border-color:rgba(148,163,184,.32)!important;
    backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  }

const ITEM_ICONS = Object.fromEntries(Object.entries(ITEM_ICON_URLS).map(([key,src])=>{ const img=new Image(); img.src=src; return [key,img]; }));

function setPlayerDirByDelta(dx,dy){
  if(!S || !S.player) return;
  if(Math.abs(dx)>Math.abs(dy)) S.player.dir = dx<0 ? 'left' : 'right';
  else if(dy<0) S.player.dir = 'up';
  else if(dy>0) S.player.dir = 'down';
}
function faceToward(tx,ty){
  if(!S || !S.player) return;
  setPlayerDirByDelta(tx-S.player.x, ty-S.player.y);
}
function drawHeroImage(id,px,py){
  const row = HERO_CLASS_ROW[id];
  if(row===undefined) return false;
  const dir = (S && S.player && S.player.classId===id && S.player.dir) ? S.player.dir : 'down';
  const col = HERO_DIR_COL[dir] ?? 0;
  const img = HERO_SPRITES[row]?.[col] || HERO_SPRITES[row]?.[0];
  if(!(img && img.complete && img.naturalWidth)) return false;
  ctx.drawImage(img, px+3, py+3, TILE-6, TILE-6);
  return true;
}

function drawSpriteImage(id,px,py){
  const key=(id||'').replace(/^elite_/, '');
  let img=null;
  if(/^m\d+$/.test(key)) img=MONSTER_ICONS[parseInt(key.slice(1),10)]||null;
  else if(/^boss\d+$/.test(key)) img=BOSS_ICONS[parseInt(key.slice(4),10)]||null;
  else if(ITEM_ICONS[key]) img=ITEM_ICONS[key];
  if(!(img && img.complete && img.naturalWidth)) return false;
  const pad = ITEM_ICONS[key] ? 2 : 3;
  ctx.drawImage(img, px+pad, py+pad, TILE-pad*2, TILE-pad*2);
  return true;
}
function drawCoverImage(img,x,y,w,h){
  const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
  if(!iw || !ih) return false;
  const s=Math.max(w/iw,h/ih);
  const dw=iw*s, dh=ih*s;
  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  return true;
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

let fxLoopActive = false;
function nowMs(){ return (typeof performance!=='undefined' && performance.now) ? performance.now() : Date.now(); }
function ensureFxState(){ if(S && !S.fx) S.fx=[]; }
function addFx(fx){
  if(!S) return;
  ensureFxState();
  const t = nowMs();
  S.fx.push(Object.assign({start:t, dur:360, end:t+(fx.dur||360)}, fx));
  startFxLoop();
}
function pruneFx(){
  if(!S || !S.fx) return;
  const t = nowMs();
  S.fx = S.fx.filter(f=>t < f.end);
}
function startFxLoop(){
  if(fxLoopActive) return;
  fxLoopActive = true;
  const tick = ()=>{
    pruneFx();
    render();
    if(S && S.fx && S.fx.length){ requestAnimationFrame(tick); }
    else { fxLoopActive = false; render(); }
  };
  requestAnimationFrame(tick);
}

function loadCloudConfig(){
  try{
    const raw = localStorage.getItem(CLOUD_CONFIG_KEY);
    const cfg = raw ? JSON.parse(raw) : {};
    return {
      url: String(cfg.url || DEFAULT_SUPABASE_URL || '').trim(),
      key: String(cfg.key || DEFAULT_SUPABASE_ANON_KEY || '').trim()
    };
  }catch(e){
    return {
      url: String(DEFAULT_SUPABASE_URL || '').trim(),
      key: String(DEFAULT_SUPABASE_ANON_KEY || '').trim()
    };
  }

function saveCloudConfig(cfg){
  cloudConfig = {url:String(cfg.url||'').trim(), key:String(cfg.key||'').trim()};
  if(cloudConfig.url && cloudConfig.key) localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
  else localStorage.removeItem(CLOUD_CONFIG_KEY);
  cloudClient = null;
  cloudClientSignature = '';
}
function cloudConfigured(){ return !!(cloudConfig.url && cloudConfig.key); }
function cloudStatusText(){ return cloudConfigured() ? 'Supabase 설정됨' : 'Supabase 미설정'; }
function getCloudClient(){
  if(!cloudConfigured() || !window.supabase || !window.supabase.createClient) return null;
  const sig = cloudConfig.url + '|' + cloudConfig.key;
  if(!cloudClient || cloudClientSignature !== sig){
    cloudClient = window.supabase.createClient(cloudConfig.url, cloudConfig.key, {
      auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}
    });
    cloudClientSignature = sig;
  }
  return cloudClient;
}
async function currentCloudUser(){
  const client = getCloudClient();
  if(!client) return null;
  const {data} = await client.auth.getUser();
  return data && data.user ? data.user : null;
}
async function ensureCloudUser(opts={}){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 설정이 필요하다.');
  let user = await currentCloudUser();
  if(user) return user;
  if(opts.anonymous){
    const {data,error} = await client.auth.signInAnonymously();
    if(error) throw error;
    return data.user;
  }
  return null;
}
async function signInCloud(email, password){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 설정이 필요하다.');
  const {data,error} = await client.auth.signInWithPassword({email, password});
  if(error) throw error;
  return data.user;
}
async function signUpCloud(email, password){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 설정이 필요하다.');
  const {data,error} = await client.auth.signUp({email, password});

}
async function signOutCloud(){

function hydrateLoadedRun(message){

async function saveCloud(){
  if(!cloudConfigured()) return false;
  const client = getCloudClient();
  if(!client) return false;
  const user = await ensureCloudUser({anonymous:true});
  const saveData = readLocalRunForCloud();
  const {error} = await client.from('game_saves').upsert({
    user_id:user.id,
    nickname:(S && S.player && (S.player.name || S.player.className)) || null,
    save_data:saveData || {},
    meta_data:meta || {},
    updated_at:new Date().toISOString()
  });
  if(error) throw error;
  return true;
}
async function loadCloud(){
  if(!cloudConfigured()) return false;
  const client = getCloudClient();
  if(!client) return false;
  const user = await ensureCloudUser({anonymous:true});
  const {data,error} = await client.from('game_saves').select('save_data, meta_data, updated_at').eq('user_id', user.id).maybeSingle();
  if(error) throw error;
  if(!data) return false;
  if(data.meta_data){
    meta = normalizeMeta(data.meta_data || {});
    localStorage.setItem(META_KEY, JSON.stringify(meta));
  }
  if(data.save_data && data.save_data.player){
    S = data.save_data;
    localStorage.setItem(SAVE_KEY, JSON.stringify(S));
    return hydrateLoadedRun('Supabase 저장 데이터를 불러왔다.');
  }
  S = null;
  startMenuResumeClassId = null;
  showStart();
  toast('Supabase 영혼 강화 데이터만 불러왔다.');
  return true;
}

function normalizeEquipSlots(equip, clsId='warrior'){

function recordInventory(type, name, qty=1, detail='', data=null){

  const inv=S.player.inventory;
  const key=`${type}|${name}|${detail}`;
  const safeData=safeInventoryData(data);
  let row=inv.entries.find(x=>x.key===key);
  if(row){
    row.qty += qty; row.floor=S.player.floor; row.turn=S.player.turn;
    if(safeData) row.data=safeData;
  }
  else { row={key,type,name,qty,detail,floor:S.player.floor,turn:S.player.turn}; if(safeData) row.data=safeData; inv.entries.push(row); }
  const recent={type,name,qty,detail,floor:S.player.floor,turn:S.player.turn}; if(safeData) recent.data=safeData;

function itemRarityIndex(item){

  if(raw!==null) return clamp(Math.floor(raw),0,4);
  const text = `${item.name||''} ${item.detail||''} ${d.rarity||''}`;
  for(let i=RARITY.length-1;i>=0;i--){ if(text.includes(RARITY[i])) return i; }
  if(item.type==='relic') return 3;
  if(item.type==='skillgem') return 2;

}
function findInventoryEntryForEquip(it){
  if(!S || !S.player || !it) return null;
  ensureRunFields();
  const entries = S.player.inventory.entries || [];
  const same = entries.filter(row=>row.type==='equip' && row.data && row.data.equip && row.data.equip.name===it.name && row.data.equip.slot===it.slot);
  if(same.length) return same.sort((a,b)=>(b.floor-a.floor)||(b.turn-a.turn))[0];
  const byName = entries.filter(row=>row.type==='equip' && row.name===it.name);
  return byName.length ? byName.sort((a,b)=>(b.floor-a.floor)||(b.turn-a.turn))[0] : null;
}
function findInventoryEntryForRelic(r){
  if(!S || !S.player || !r) return null;
  ensureRunFields();
  const entries = S.player.inventory.entries || [];
  const same = entries.filter(row=>row.type==='relic' && row.name===r.name && row.data && row.data.relic);
  if(same.length) return same.sort((a,b)=>(b.floor-a.floor)||(b.turn-a.turn))[0];

function currentInventoryRows(typeFilter='all'){
  if(!S || !S.player) return [];
  ensureRunFields();
  const p=S.player;
  const rows=[];
  const push=row=>{ if(typeFilter==='all' || row.type===typeFilter) rows.push(row); };
  Object.entries(p.equip||{}).forEach(([slot,it])=>{
    if(!it) return;
    const found=findInventoryEntryForEquip(it);
    const detail=`${SLOT_KO[it.slot||slot]||SLOT_KO[slot]||'장비'} · ${it.jobName||p.className||'직업 전용'} · ${RARITY[it.rarity]||'일반'} · 전투력 ${Math.round(itemScore(it))} · ${statLine(it)}`;
    push({
      key:`current|equip|${slot}`,
      type:'equip', name:it.name, qty:1, detail,
      floor:found ? found.floor : p.floor,
      turn:found ? found.turn : p.turn,
      data:{equip:safeInventoryData(it)}
    });
  });
  (p.relics||[]).forEach((r,idx)=>{
    if(!r) return;
    const found=findInventoryEntryForRelic(r);
    push({
      key:`current|relic|${idx}|${r.id||r.name}`,
      type:'relic', name:r.name, qty:1, detail:r.desc||'보유 중인 유물',
      floor:found ? found.floor : p.floor,
      turn:found ? found.turn : p.turn,
      data:{relic:safeInventoryData(r)}
    });
  });
  if((p.potions||0)>0) push({key:'current|potion', type:'potion', name:'물약', qty:p.potions, detail:'현재 보유 중인 물약', floor:p.floor, turn:p.turn, data:{source:'current'}});
  if((p.gold||0)>0) push({key:'current|gold', type:'gold', name:'골드', qty:p.gold, detail:'현재 보유 중인 골드', floor:p.floor, turn:p.turn, data:{source:'current', amount:p.gold}});
  if((p.soulsRun||0)>0) push({key:'current|soul', type:'soul', name:'영혼 조각', qty:p.soulsRun, detail:'현재 원정에서 보유 중인 영혼', floor:p.floor, turn:p.turn, data:{amount:p.soulsRun}});
  rows.sort((a,b)=>String(inventoryLabel(a.type)).localeCompare(String(inventoryLabel(b.type))) || a.name.localeCompare(b.name));
  return rows;
}

function formatStatObject(stats){

  const rows=Object.entries(stats).filter(([,v])=>v!==0 && v!==null && v!==undefined).map(([k,v])=>{

function generateFloor(floor, first=false){
  const p = S.player;
  p.floor = floor;
  S.map = Array.from({length:MAPH},()=>Array(MAPW).fill('#'));
  S.seen = Array.from({length:MAPH},()=>Array(MAPW).fill(false));
  S.rooms = []; S.enemies = []; S.items = []; S.merchants = []; S.fx = []; S.bounty = null; S.floorMod = chooseFloorMod(floor);
  const roomCount = clamp(9 + Math.floor(floor/2), 9, 18);
  for(let i=0;i<roomCount*8 && S.rooms.length<roomCount;i++){
    const w = 5 + rand(7), h = 5 + rand(7);
    const x = 2 + rand(MAPW-w-4), y = 2 + rand(MAPH-h-4);
    const room = {x,y,w,h,cx:Math.floor(x+w/2),cy:Math.floor(y+h/2)};
    if(S.rooms.some(r=> x<r.x+r.w+2 && x+w+2>r.x && y<r.y+r.h+2 && y+h+2>r.y)) continue;
    carveRoom(room); S.rooms.push(room);
  }
  for(let i=1;i<S.rooms.length;i++) connectRooms(S.rooms[i-1], S.rooms[i]);
  const start = S.rooms[0]; const end = S.rooms[S.rooms.length-1];
  p.x = start.cx; p.y = start.cy;
  S.exit = {x:end.cx,y:end.cy};
  S.map[S.exit.y][S.exit.x] = '>';
  spawnContent(floor);
  maybeStartBounty();
  reveal();
  if(!first){
    p.hp = clamp(p.hp + Math.ceil(calcStats().maxHp*.10), 1, calcStats().maxHp);
    p.mp = clamp(p.mp + 3, 0, calcStats().maxMp);
    Object.keys(p.cd).forEach(k=>p.cd[k]=Math.max(0,p.cd[k]-(hasRelic('clock')?2:1)));
    addLog(`<span class="warntxt">${floor}층</span>으로 내려왔다. ${S.floorMod.name}: ${S.floorMod.desc}`);
  }
}
function carveRoom(r){
  for(let y=r.y;y<r.y+r.h;y++) for(let x=r.x;x<r.x+r.w;x++) S.map[y][x]='.';
}
function carveLine(x1,y1,x2,y2){
  let x=x1,y=y1;
  while(x!==x2){S.map[y][x]='.'; x += x<x2?1:-1;}
  while(y!==y2){S.map[y][x]='.'; y += y<y2?1:-1;}
  S.map[y][x]='.';
}
function connectRooms(a,b){
  if(chance(.5)){carveLine(a.cx,a.cy,b.cx,a.cy); carveLine(b.cx,a.cy,b.cx,b.cy);} else {carveLine(a.cx,a.cy,a.cx,b.cy); carveLine(a.cx,b.cy,b.cx,b.cy);}
}

function spawnContent(floor){
  const rooms = S.rooms.slice(1);
  let enemyCount = clamp(12 + Math.floor(floor*2.8), 14, 72);
  for(let i=0;i<enemyCount;i++){
    const r = one(rooms); const pos = randomFloorInRoom(r);
    if(blocked(pos.x,pos.y)) continue;
    S.enemies.push(makeEnemy(pos.x,pos.y,floor, false));
  }
  if(floor%5===0){
    const r = S.rooms[S.rooms.length-1];
    const pos = freeNear(r.cx,r.cy) || {x:r.cx,y:r.cy};
    S.enemies.push(makeEnemy(pos.x,pos.y,floor,true));
    addLog(`<span class="badtxt">보스 기척</span>이 이 층을 누르고 있다.`);
  }
  const goldCount = 6 + rand(4) + Math.floor(floor/3);
  for(let i=0;i<goldCount;i++) placeItem('gold', {amount: Math.floor((6+rand(12)+floor*2) * goldRate())});
  for(let i=0;i<1+rand(2);i++) placeItem('potion', {});
  for(let i=0;i<2+Math.floor(floor/5);i++) placeItem('chest', {});
  if(chance(.52) || floor%4===0) placeItem('relic', {});
  if(chance(.18)) placeItem('shrine', {});
  if(chance(.16)) placeItem('merchant', {});
  if(chance(.20) || S.floorMod?.id==='treasure') placeItem('camp', {});
  if(chance(.15) || S.floorMod?.id==='treasure') placeItem('vault', {});
  if(chance(.13)) placeItem('oracle', {});
  if(chance(.18)) placeItem('skillgem', {});
  if(chance(.22) || S.floorMod?.id==='curse') placeItem('soul', {amount:1+Math.floor(floor/6)});
  if(S.floorMod?.extraGold) for(let i=0;i<S.floorMod.extraGold;i++) placeItem('gold',{amount:Math.floor((12+rand(22)+floor*3)*goldRate())});
  if(S.floorMod?.extraChest) for(let i=0;i<S.floorMod.extraChest;i++) placeItem('chest',{});
  if(S.floorMod?.extraRelic && chance(S.floorMod.extraRelic)) placeItem('relic',{});
}
function randomFloorInRoom(r){return {x:r.x+1+rand(Math.max(1,r.w-2)), y:r.y+1+rand(Math.max(1,r.h-2))};}
function freeNear(x,y){
  for(let rad=0;rad<5;rad++){
    for(let yy=y-rad;yy<=y+rad;yy++) for(let xx=x-rad;xx<=x+rad;xx++){
      if(inMap(xx,yy) && S.map[yy][xx]!== '#' && !blocked(xx,yy)) return {x:xx,y:yy};
    }
  }
  return null;
}
function placeItem(type, data){
  for(let tries=0;tries<120;tries++){
    const r = one(S.rooms.slice(1)); const pos = randomFloorInRoom(r);
    if(pos.x===S.exit.x && pos.y===S.exit.y) continue;
    if(blocked(pos.x,pos.y) || S.items.some(i=>i.x===pos.x&&i.y===pos.y)) continue;
    S.items.push(Object.assign({x:pos.x,y:pos.y,type},data)); return;
  }
}

function makeEnemy(x,y,floor,boss){
  let t;
  if(boss){
    const idx = (Math.max(1, Math.floor(floor/5)) - 1) % BOSS_POOL.length;
    t = deepClone(BOSS_POOL[idx]);
  } else {
    const tier = clamp(Math.ceil(floor/2),1,18);
    const candidates = MONSTER_POOL.filter(m=>m.tier>=Math.max(1,tier-2) && m.tier<=Math.min(18,tier+1));
    t = deepClone(one(candidates.length ? candidates : MONSTER_POOL));
  }
  const scale = t.boss ? (1 + floor*0.10) : (1 + floor*0.06);
  const mod=S?.floorMod||{};
  const bossHpMul = t.boss ? 2.15 : 1.05;
  // 중간 층수 체력 보정: 높은 층에서 일반/정예 몬스터 체감 난이도를 더 확실히 올림
  const normalFloorHpMul = t.boss ? 1 : (1 + Math.min(0.90, floor * 0.018));
  const enemyMaxHp = Math.floor(t.hp*scale*bossHpMul*normalFloorHpMul*(mod.enemyHp||1));
  const e = {
    x,y,
    id:t.id,
    name:t.name,
    sprite:t.sprite,
    maxHp:enemyMaxHp,
    hp:enemyMaxHp,
    atk:Math.floor(t.atk*scale*1.08*(mod.enemyAtk||1)),
    def:Math.floor(t.def + floor/5 + (mod.enemyDef||0)),
    xp:Math.floor(t.xp*scale*(mod.xp||1)),
    gold:Math.floor(t.gold*scale*(mod.gold||1)),
    fast:!!t.fast,
    ranged:!!t.ranged,
    attackType:t.attackType || (t.ranged ? 'ranged' : 'melee'),
    boss:!!t.boss,
    burn:0,
    tier:t.tier,
    autoUid:'ae'+(autoEnemySeq++)
  };
  if(t.boss){
    e.maxHp = Math.floor(e.maxHp*1.18); e.hp=e.maxHp; e.atk=Math.floor(e.atk*1.14); e.def+=3; e.xp=Math.floor(e.xp*1.35); e.gold=Math.floor(e.gold*1.45);
  } else if(chance(.15 + floor*.006 + (mod.eliteBonus||0))){
    const eliteFloorHpMul = 1 + Math.min(0.75, floor * 0.012);
    e.name = '정예 ' + e.name; e.sprite='elite_' + e.sprite; e.maxHp=Math.floor(e.maxHp*2.05*eliteFloorHpMul); e.hp=e.maxHp; e.atk=Math.floor(e.atk*1.5); e.def+=3; e.xp*=2; e.gold*=3; e.elite=true;
  }
  if(S) S.discovered = Object.assign(S.discovered||{}, {[t.id]:true});
  return e;
}

function inMap(x,y){return x>=0&&y>=0&&x<MAPW&&y<MAPH;}
function enemyAt(x,y){return S.enemies.find(e=>e.hp>0&&e.x===x&&e.y===y);}
function itemAt(x,y){return S.items.find(i=>i.x===x&&i.y===y);}
function blocked(x,y){return !inMap(x,y) || S.map[y][x]==='#' || enemyAt(x,y) || (S.player && S.player.x===x&&S.player.y===y);}
function passable(x,y){return inMap(x,y) && S.map[y][x] !== '#';}

function calcStats(){
  const p = S.player;
  let st = {maxHp:p.maxHpBase, maxMp:p.maxMpBase, atk:p.baseAtk, def:p.baseDef, crit:p.crit, eva:p.eva, taken:0, flatReduce:0, goldRate:0, xpRate:0, potionPower:0, potionCap:0, dashCd:0};
  Object.values(p.equip).forEach(it=>{
    if(!it) return; ['maxHp','maxMp','atk','def','crit','eva'].forEach(k=>st[k]=(st[k]||0)+(it[k]||0));
  });
  p.relics.forEach(r=>{ if(r.stats){Object.entries(r.stats).forEach(([k,v])=>st[k]=(st[k]||0)+v);} });
  st.xpRate += meta.upgrades.xp*.04;
  st.goldRate += meta.upgrades.gold*.05;
  if(p.classId==='hunter') st.goldRate += .15;
  if(p.effects){
    if(p.effects.guard>0) st.def += 2;
    if(p.effects.fury>0) st.atk += 3;
    if(p.effects.smoke>0) st.eva += 25;
    if(p.effects.shadow>0) st.eva += 8;
    if(p.effects.focus>0) st.crit += 8;
  }
  st.maxHp = Math.max(1, Math.floor(st.maxHp)); st.maxMp = Math.max(1, Math.floor(st.maxMp));
  st.crit = clamp(st.crit,0,75); st.eva = clamp(st.eva,0,65);
  return st;
}
function goldRate(){return 1 + calcStats().goldRate;}
function xpRate(){return 1 + calcStats().xpRate;}
function hasRelic(id){return S.player.relics.some(r=>r.id===id);}

function bindMapChatInput(){

function reveal(){

  for(let y=p.y-radius;y<=p.y+radius;y++) for(let x=p.x-radius;x<=p.x+radius;x++){
    if(inMap(x,y) && Math.hypot(x-p.x,y-p.y)<=radius+.3) S.seen[y][x]=true;
  }
}

function playerMove(dx,dy){
  if(!canAct()) return;
  setPlayerDirByDelta(dx,dy);
  const p=S.player; const nx=p.x+dx, ny=p.y+dy;
  const e=enemyAt(nx,ny);
  if(e){ toast('적이 가로막고 있다. 공격 버튼을 눌러 공격.'); renderAll(); return; }
  if(!passable(nx,ny)){addLog('벽에 막혔다.'); renderAll(); return;}
  p.x=nx; p.y=ny;
  if(S.map[ny][nx]==='>'){
    if(canUseExitToNextFloor(true)) nextFloor();
  } else {
    pickupCheck();
  }
  afterPlayerAction();
}
function waitTurn(){ if(!canAct()) return; addLog('숨을 고른다.'); regenTick(true); afterPlayerAction(true); }

function isPlainBasicAttack(strong, opts={}){
  if(strong) return false;
  if(opts.basicRanged) return true;
  return Object.keys(opts||{}).every(k=>!opts[k]);
}
function addBasicAttackFx(e, strong, opts={}){
  if(!e || !S || !S.player || !isPlainBasicAttack(strong, opts)) return;
  const p=S.player;
  if(p.classId==='warrior' || p.classId==='rogue'){
    const color = p.classId==='rogue' ? '#c084fc' : '#dbeafe';
    const spark = p.classId==='rogue' ? '#f0abfc' : '#93c5fd';
    addFx({kind:'stab', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color, spark, dur:170});
    addFx({kind:'slash', x:e.x, y:e.y, color, dur:210, angle:Math.atan2(e.y-p.y, e.x-p.x)});
    return;
  }
  if(p.classId==='mage'){
    addFx({kind:'projectile', shape:'magicOrb', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color:'#8b5cf6', spark:'#e9d5ff', core:'#f5d0fe', dur:340});
    return;
  }
  if(p.classId==='hunter'){
    addFx({kind:'projectile', shape:'arrow', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color:'#bef264', spark:'#ecfccb', dur:180});
  }
}
function playerAttack(e, strong, opts={}){
  const p=S.player; const st=calcStats();
  addBasicAttackFx(e, strong, opts);
  let base = st.atk + rand(4) + (opts.bonusBase||0);
  if(strong) base = Math.floor(base*1.85 + 3);
  if(hasRelic('huntermark') && e.hp <= e.maxHp*.4) base = Math.floor(base*1.35);
  if(p.classId==='rogue' && p.effects?.shadow>0){ base = Math.floor(base*1.35 + 2); opts.critBonus = (opts.critBonus||0) + 20; p.effects.shadow=0; addLog('그림자 기습이 발동했다.'); }
  if(p.classId==='hunter' && p.effects?.focus>0 && opts.ranged){ base = Math.floor(base*1.3 + 2); p.effects.focus=0; addLog('집중 사격이 강화되었다.'); }
  let critChance = st.crit + (p.classId==='rogue' && p.turn<6 ? 15 : 0) + (opts.critBonus||0);
  let crit = opts.forceCrit || chance(critChance/100);
  let effectiveDef = Math.max(0, e.def*(opts.ignoreDef!=null ? (1-opts.ignoreDef) : .65));
  let dmg = Math.max(1, Math.floor(base - effectiveDef));
  if(crit) dmg = Math.floor(dmg * (opts.critMult || p.critDmg || 1.8));
  if(strong && p.classId==='warrior') dmg = Math.floor(dmg*1.25);
  if(opts.mult) dmg = Math.floor(dmg*opts.mult);
  e.hp -= dmg;
  addLog(`${crit?'<span class="warntxt">치명!</span> ':''}${e.name}에게 <b>${dmg}</b> 피해.`);
  const burnTurns = opts.burnTurns || ((crit && hasRelic('ember')) ? 2 : 0);
  if(burnTurns){ e.burn = Math.max(e.burn||0, burnTurns); addLog(`${e.name}에게 화상이 붙었다.`); }
  if(hasRelic('storm') && chance(.18)) chainDamage(e, Math.max(2,Math.floor(dmg*.45)));
  if(p.hitHeal && chance(p.hitHeal)){ p.hp=clamp(p.hp+2,1,st.maxHp); addLog('흡혈 훈련으로 HP 2 회복.'); }
  if(e.hp<=0) killEnemy(e);
  return dmg;
}
function chainDamage(origin, dmg){
  const victims = S.enemies.filter(e=>e.hp>0 && e!==origin && Math.abs(e.x-origin.x)+Math.abs(e.y-origin.y)<=3).slice(0,3);
  victims.forEach(v=>{v.hp-=dmg; addLog(`폭풍이 ${v.name}에게 ${dmg} 연쇄 피해.`); if(v.hp<=0) killEnemy(v);});
}
function killEnemy(e){
  if(e.dead) return; e.dead=true; e.hp=0;
  const p=S.player; p.kills++; meta.totalKills++; saveMeta();
  const xp = Math.floor(e.xp*xpRate()*floorModRewardMult('xp')); const gold = Math.floor(e.gold*goldRate()*floorModRewardMult('gold'));
  normalizeLevelCap(p);
  const gainedXp = isMaxLevel(p) ? 0 : xp;
  p.xp += gainedXp; p.gold += gold;
  p.soulsRun += e.boss ? 4 + Math.floor(p.floor/2) : (e.elite ? 1 : 0);
  addLog(`<span class="goodtxt">${e.name} 처치</span> +${gainedXp}XP +${gold}G${e.boss?' +영혼':''}`);
  if(hasRelic('bloodfang')){ const heal=Math.ceil(calcStats().maxHp*.08); p.hp=clamp(p.hp+heal,1,calcStats().maxHp); addLog(`피의 송곳니로 HP ${heal} 회복.`); }
  updateBounty(e);
  const chestChance = e.boss ? .80 : (e.elite ? .18 : .08);
  if(chance(chestChance)) S.items.push({x:e.x,y:e.y,type:'chest',source:e.boss?'boss':(e.elite?'elite':'normal')});
  if(chance(.12)) S.items.push({x:e.x,y:e.y,type:'potion'});
  if(chance(.035)) S.items.push({x:e.x,y:e.y,type:'skillgem'});
  if(chance(.045)) S.items.push({x:e.x,y:e.y,type:'soul',amount:1});
}

function enemyTurn(){
  const p=S.player; const st=calcStats();
  for(const e of S.enemies){
    if(e.hp<=0) continue;
    if(e.burn){ e.burn--; const bd=3+Math.floor(p.floor/3); e.hp-=bd; addLog(`${e.name} 화상 ${bd} 피해.`); if(e.hp<=0){killEnemy(e); continue;} }
    const acts = e.fast && chance(.55) ? 2 : 1;
    for(let a=0;a<acts;a++){
      if(e.hp<=0 || S.dead) break;
      const d=dist(e,p);
      if(d===1 || (e.ranged && d<=5 && clearLine(e.x,e.y,p.x,p.y))){ enemyAttack(e, st); }
      else if(d<=12){ moveEnemyToward(e,p.x,p.y); }
      else if(chance(.16)){ const [dx,dy]=one(DIRS); if(passable(e.x+dx,e.y+dy)&&!enemyAt(e.x+dx,e.y+dy)&&(p.x!==e.x+dx||p.y!==e.y+dy)){e.x+=dx;e.y+=dy;} }
    }
  }
}
function enemyAttack(e, st){
  const p=S.player;
  if(chance(st.eva/100)){ addLog(`${e.name}의 공격을 회피.`); return; }
  let dmg = Math.max(1, Math.floor(e.atk - st.def*.55 + rand(4) + Math.floor(S.player.floor/6) + st.taken - st.flatReduce));
  p.hp -= dmg;
  addLog(`<span class="badtxt">${e.name}</span>에게 ${dmg} 피해를 받음.`);
  if(hasRelic('thorn')){ const rd=Math.max(1,Math.floor(dmg*.35)); e.hp-=rd; addLog(`가시 반사 ${rd} 피해.`); if(e.hp<=0) killEnemy(e); }
  if(p.hp<=0) gameOver(false);
}
function clearLine(x1,y1,x2,y2){
  if(x1!==x2 && y1!==y2) return false;
  const dx=Math.sign(x2-x1), dy=Math.sign(y2-y1); let x=x1+dx,y=y1+dy;
  while(x!==x2 || y!==y2){ if(S.map[y][x]==='#') return false; x+=dx; y+=dy; }
  return true;
}
function moveEnemyToward(e,tx,ty){
  const opts = DIRS.map(([dx,dy])=>({dx,dy,d:Math.abs(e.x+dx-tx)+Math.abs(e.y+dy-ty)})).sort((a,b)=>a.d-b.d);
  for(const o of opts){
    const nx=e.x+o.dx, ny=e.y+o.dy;
    if(passable(nx,ny) && !enemyAt(nx,ny) && !(S.player.x===nx&&S.player.y===ny)){ e.x=nx;e.y=ny; return; }
  }
}
function cleanup(){S.enemies=S.enemies.filter(e=>e.hp>0);}

function pickupCheck(){
  const p=S.player;
  const it = itemAt(p.x,p.y);
  if(!it) return;
  S.items = S.items.filter(x=>x!==it);
  if(it.type==='gold'){ p.gold += it.amount; recordInventory('gold','골드',it.amount,`${it.amount}G`, {source:'dungeon', amount:it.amount}); addLog(`골드 ${it.amount} 획득.`); }

function nextFloor(){

  const p=S.player;
  p.soulsRun += 1 + Math.floor(p.floor/4);
  meta.bestFloor = Math.max(meta.bestFloor, p.floor+1); meta.bestLevel=Math.max(meta.bestLevel,p.level); saveMeta();

function checkLevelUp(){
  const p=S.player;
  normalizeLevelCap(p);
  const st=calcStats();
  if(p.hp>st.maxHp) p.hp=st.maxHp;
  if(p.mp>st.maxMp) p.mp=st.maxMp;
  if(isMaxLevel(p)){
    p.xp = 0;
    p.nextXp = 0;
    return;
  }
  if(p.xp >= p.nextXp && !modalOpen){
    p.xp -= p.nextXp;
    p.level++;
    if(p.level >= MAX_LEVEL){
      p.level = MAX_LEVEL;
      p.xp = 0;
      p.nextXp = 0;
      addLog('<span class="warntxt">최대 레벨 100에 도달했다.</span>');
    }else{
      p.nextXp = Math.floor(p.nextXp*1.28 + 14);
    }
    p.hp=st.maxHp; p.mp=st.maxMp;
    meta.bestLevel = Math.min(MAX_LEVEL, Math.max(meta.bestLevel, p.level)); saveMeta();
    showLevelChoice();
  }
}

function normalizeEquipDropSource(source){
  if(source && typeof source === 'object') source = source.source || source.dropSource || source.kind;
  source = String(source || 'dungeon').toLowerCase();
  if(source === 'boss' || source === 'elite') return source;
  return 'normal';
}
function rollWeightedRarity(weights){
  const total = weights.reduce((a,b)=>a+b,0);
  let n = Math.random() * total;
  for(let i=0;i<weights.length;i++){
    n -= weights[i];
    if(n <= 0) return i;
  }
  return 0;
}
function rollEquipRarity(source){
  const s = normalizeEquipDropSource(source);
  const luck = Math.max(0, (S?.player?.lootLuck||0) + Math.floor((S?.player?.floor||1)/10));
  let weights;
  if(s === 'boss'){
    // 보스: 전설 낮은 확률, 정예보다 조금 높음
    weights = [24, 33, 27, 13, 3];
  }else if(s === 'elite'){
    // 정예: 전설 낮은 확률
    weights = [32, 33, 23, 10, 2];
  }else{
    // 일반 상자/일반 몬스터: 전설 없음, 일반~영웅 차등
    weights = [52, 29, 14, 5, 0];
  }
  if(luck > 0){
    const shift = Math.min(weights[0]-12, luck * 1.1);
    if(shift > 0){
      weights[0] -= shift;
      weights[1] += shift * .45;
      weights[2] += shift * .35;
      weights[3] += shift * .20;
    }
  }
  if(s === 'normal') weights[4] = 0;
  return clamp(rollWeightedRarity(weights),0,4);
}
function equipDropSourceName(source){
  const s = normalizeEquipDropSource(source);
  if(s === 'boss') return '보스 보상';
  if(s === 'elite') return '정예 보상';
  return '일반 보상';
}

  showModal(`<h2>장비 상자</h2>
    <p class="muted">${sourceNote} 왼쪽은 기존 장비, 오른쪽은 새 장비다. 새 장비를 선택한 뒤 <b>선택한다</b> 버튼으로 확정한다.</p>
    <div class="equipChoiceGrid">${choices.map((it,i)=>equipChoiceHtml(it,i)).join('')}</div>
    <div class="grid2" style="margin-top:10px"><button class="btn good" id="confirmEquipBtn" disabled>선택한다</button><button class="btn" id="skipEquipBtn">선택안함</button></div>`, false);

  const cards=[...modalCard.querySelectorAll('.equipChoiceCard')];
  const confirm=$('confirmEquipBtn');
  const selectCard=(i)=>{
    selectedIndex=i;
    cards.forEach((el,idx)=>el.classList.toggle('selected', idx===i));
    if(confirm) confirm.disabled = selectedIndex < 0;
  };
  cards.forEach((el,i)=>el.onclick=()=>selectCard(i));

}

function equipCompareHtml(old,it){
  const rows=[['공격','atk',''],['방어','def',''],['HP','maxHp',''],['MP','maxMp',''],['치명','crit','%'],['회피','eva','%']]
    .map(([name,k,suf])=>{ const a=old?(old[k]||0):0, b=it[k]||0; if(a===0 && b===0) return ''; const d=b-a; const cls=d>0?'plus':d<0?'minus':'zero'; const sign=d>0?'+':''; return `<tr><td>${name}</td><td>${old?`${a}${suf}`:'-'}</td><td>${b}${suf}</td><td class="${cls}">${sign}${d}${suf}</td></tr>`; })
    .filter(Boolean).join('');
  if(!rows) return '';

}
function classEquipPool(cls, slot){
  const pools={
    warrior:{
      weapon:['대검','전투도끼','장검'], armor:['판금방어구','수호갑주','전투흉갑'], gloves:['완력장갑','철갑건틀릿','전투장갑'], boots:['강철군화','돌격장화','수호군화'], accessory:['수호휘장','힘의인장','강철부적']
    },
    rogue:{
      weapon:['단검','쌍검','암살검'], armor:['그림자방어구','가죽전투복','은신복'], gloves:['암살장갑','독니손싸개','그림자장갑'], boots:['은신장화','기습신발','그림자부츠'], accessory:['암살부적','그림자인장','민첩부적']
    },
    mage:{
      weapon:['지팡이','마도서','수정봉'], armor:['마법로브','현자로브','비전망토'], gloves:['마력장갑','주문매듭','비전손싸개'], boots:['마도사의신발','현자샌들','비전장화'], accessory:['마력부적','현자의인장','비전보석']
    },
    hunter:{
      weapon:['장궁','석궁','사냥활'], armor:['가죽방어구','추적자복','사냥망토'], gloves:['궁수장갑','조준손싸개','추적장갑'], boots:['추적장화','사냥신발','바람부츠'], accessory:['매눈부적','사냥꾼휘장','정밀인장']
    }
  };
  return ((pools[cls]||pools.warrior)[slot] || pools.warrior[slot] || pools.warrior.weapon);
}
function makeEquip(source='normal'){
  ensureRunFields();
  const floor=S.player.floor; const cls=S.player.classId;
  const slot=one(EQUIP_SLOTS);
  const dropSource = normalizeEquipDropSource(source);
  let r = rollEquipRarity(dropSource);
  const mult = RARITY_MULT[r];
  const tier = Math.floor(floor/2)+1;
  const prefix = ['낡은','단단한','빛나는','심연의','고대의'][r];
  const baseType = one(classEquipPool(cls,slot));
  const it = {slot, baseType, job:cls, jobName:(classes[cls]||classes.warrior).name, rarity:r, dropSource, atk:0, def:0, maxHp:0, maxMp:0, crit:0, eva:0, value:Math.floor((8+tier*4)*mult)};
  it.name = `${prefix} ${baseType} +${tier}`;

  const addStat=(k,v)=>{ it[k] = Math.max(0, Math.floor((it[k]||0) + v)); };
  const baseStatBySlot={weapon:'atk', armor:'def', gloves:'atk', boots:'eva'};
  const accessoryBaseByClass={warrior:'maxHp', rogue:'crit', mage:'maxMp', hunter:'crit'};
  const baseStat = slot==='accessory' ? (accessoryBaseByClass[cls]||'maxHp') : (baseStatBySlot[slot]||'atk');
  const baseValue=(k)=>{
    if(k==='atk') return Math.max(1, Math.floor((3+tier*1.35)*mult));
    if(k==='def') return Math.max(1, Math.floor((2+tier*.85)*mult));
    if(k==='maxHp') return Math.max(4, Math.floor((10+tier*3.2)*mult));
    if(k==='maxMp') return Math.max(4, Math.floor((9+tier*3.0)*mult));
    if(k==='crit') return Math.max(1, Math.floor((3+tier*.45)*mult));
    if(k==='eva') return Math.max(1, Math.floor((2+tier*.38)*mult));
    return 1;
  };
  const optionValue=(k)=>{
    const gradeBoost = 1 + r*.10;
    if(k==='atk') return Math.max(1, Math.floor((1+tier*.50)*gradeBoost));
    if(k==='def') return Math.max(1, Math.floor((1+tier*.38)*gradeBoost));
    if(k==='maxHp') return Math.max(3, Math.floor((5+tier*1.75)*gradeBoost));
    if(k==='maxMp') return Math.max(3, Math.floor((4+tier*1.65)*gradeBoost));
    if(k==='crit') return Math.max(1, Math.floor((1+tier*.18+r*.55)*gradeBoost));
    if(k==='eva') return Math.max(1, Math.floor((1+tier*.16+r*.50)*gradeBoost));
    return 1;
  };
  const classPools={
    warrior:['maxHp','def','atk','crit','eva','maxMp'],
    rogue:['crit','eva','atk','maxHp','def','maxMp'],
    mage:['maxMp','crit','atk','eva','def','maxHp'],
    hunter:['crit','eva','atk','maxHp','maxMp','def']
  };

  // 등급별 수치 구조: 일반=기본, 고급=기본+옵션1, 희귀=기본+옵션2, 영웅=기본+옵션3, 전설=기본+옵션4
  addStat(baseStat, baseValue(baseStat));
  const used = new Set([baseStat]);
  const pool = (classPools[cls]||classPools.warrior).filter(k=>!used.has(k));
  for(let i=0;i<r;i++){
    if(!pool.length) break;
    const idx=rand(pool.length);
    const k=pool.splice(idx,1)[0];
    used.add(k);
    addStat(k, optionValue(k));
  }

  Object.keys(it).forEach(k=>{if(typeof it[k]==='number') it[k]=Math.floor(it[k]);});
  return it;
}

function equipBaseKey(it){ return (it&&it.baseType) || (it&&it.name ? it.name.replace(/^(낡은|단단한|빛나는|심연의|고대의) /,'').replace(/ \+\d+$/,'') : ''); }
function isSameEquipLine(a,b){ return !!a && !!b && a.slot===b.slot && equipBaseKey(a)===equipBaseKey(b); }
function itemScore(it){ return (it.atk||0)*4 + (it.def||0)*5 + (it.maxHp||0)*.55 + (it.maxMp||0)*.35 + (it.crit||0)*1.6 + (it.eva||0)*1.8 + (it.rarity||0)*4; }
function statLine(it){
  return ([['공격',it.atk],['방어',it.def],['HP',it.maxHp],['MP',it.maxMp],['치명',it.crit?'+'+it.crit+'%':0],['회피',it.eva?'+'+it.eva+'%':0]].filter(x=>x[1]).map(x=>`${x[0]} ${x[1]}`).join(' · ') || '특수 효과 없음');
}
function equipItem(it){
  ensureRunFields();
  const p=S.player; const old=p.equip[it.slot];
  if(old){ const sale = Math.floor((old.value||5)*.55); p.gold+=sale; addLog(`${old.name} 판매 +${sale}G.`); }
  delete it.enhance;
  p.equip[it.slot]=it;
  recordInventory('equip', it.name, 1, `${SLOT_KO[it.slot]} · ${it.jobName||p.className||'직업 전용'} · ${RARITY[it.rarity]} · 전투력 ${Math.round(itemScore(it))} · ${statLine(it)}`, {equip:it});
  addLog(`<span class="goodtxt">${it.name}</span> 장착.`);
  const st=calcStats(); p.hp=clamp(p.hp,1,st.maxHp); p.mp=clamp(p.mp,0,st.maxMp);
}

function mapCellClass(x,y){
  const p=S?.player;
  if(!S || !S.seen || !S.seen[y] || !S.seen[y][x]) return '';
  if(p && p.x===x && p.y===y) return 'player';
  if(S.enemies && S.enemies.some(e=>e.hp>0&&e.x===x&&e.y===y)) return 'enemy';
  if(S.items && S.items.some(i=>i.x===x&&i.y===y&&i.type==='merchant')) return 'merchant';
  if(S.items && S.items.some(i=>i.x===x&&i.y===y)) return 'item';
  if(S.exit && S.exit.x===x && S.exit.y===y) return 'exit';
  return S.map[y][x]==='#' ? 'wall' : 'floor';
}

function showCodexMenu(filter={}){
  pauseAutoForChoice();
  const f = Object.assign({type:'all', status:'all', tier:'all', search:''}, filter||{});
  const discovered = (id)=> !S || !S.discovered ? true : !!S.discovered[id];
  const tiers = [...new Set(MONSTER_BOOK.map(m=>m.tier))].sort((a,b)=>a-b);
  const q = String(f.search||'').trim().toLowerCase();
  let list = MONSTER_BOOK.filter(m=>{
    const seen = discovered(m.id);
    if(f.type==='normal' && m.boss) return false;
    if(f.type==='boss' && !m.boss) return false;
    if(f.status==='seen' && !seen) return false;
    if(f.status==='unknown' && seen) return false;
    if(f.tier!=='all' && String(m.tier)!==String(f.tier)) return false;
    if(q){
      const hay = `${m.name} ${m.desc} ${m.boss?'보스':'일반'} 티어 ${m.tier} ${monsterAttackTypeLabel(m)} 공격`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const rows=list.map(m=>{
    const seen = discovered(m.id);
    const img = getSpriteImageUrl(m.id);
    return `<div class="choice ${seen?'':'codexUnknown'} ${m.boss?'codexBoss':''}"><div class="codexEntry"><div class="codexSpriteWrap">${img?`<img src="${img}" alt="${escHtml(m.name)}">`:''}</div><div><h4>${seen?escHtml(m.name):'????'}</h4><p>${seen?escHtml(m.desc):'아직 조우하지 못한 몬스터다.'}</p><p class="muted">${m.boss?'보스':'일반'} · 티어 ${m.tier} · ${monsterAttackTypeLabel(m)} 공격</p></div></div></div>`;
  }).join('') || '<p class="muted">조건에 맞는 몬스터가 없다.</p>';
  const tierOptions = ['<option value="all">전체 티어</option>'].concat(tiers.map(t=>`<option value="${t}" ${String(f.tier)===String(t)?'selected':''}>티어 ${t}</option>`)).join('');
  showModal(`<h2>도감</h2><p class="muted">총 ${MONSTER_BOOK.length}종의 몬스터 정보.</p>
    <div class="codexFilters">
      <select id="codexTypeFilter"><option value="all" ${f.type==='all'?'selected':''}>전체 종류</option><option value="normal" ${f.type==='normal'?'selected':''}>일반만</option><option value="boss" ${f.type==='boss'?'selected':''}>보스만</option></select>
      <select id="codexStatusFilter"><option value="all" ${f.status==='all'?'selected':''}>전체 상태</option><option value="seen" ${f.status==='seen'?'selected':''}>발견만</option><option value="unknown" ${f.status==='unknown'?'selected':''}>미발견만</option></select>
      <select id="codexTierFilter">${tierOptions}</select>
      <button class="btn" id="codexResetFilter">초기화</button>
      <input id="codexSearchFilter" class="wide" value="${escHtml(f.search||'')}" placeholder="이름/설명 검색">
      <button class="btn good" id="codexApplyFilter">적용</button>
    </div>
    <div class="codexSummary">표시 ${list.length} / 전체 ${MONSTER_BOOK.length}</div>
    <div class="grid3" style="grid-template-columns:1fr; margin-top:10px">${rows}</div>`,false);
  const readFilter=()=>({
    type:$('codexTypeFilter')?.value||'all',
    status:$('codexStatusFilter')?.value||'all',
    tier:$('codexTierFilter')?.value||'all',
    search:$('codexSearchFilter')?.value||''
  });
  ['codexTypeFilter','codexStatusFilter','codexTierFilter'].forEach(id=>{ const el=$(id); if(el) el.onchange=()=>showCodexMenu(readFilter()); });
  const apply=$('codexApplyFilter'); if(apply) apply.onclick=()=>showCodexMenu(readFilter());
  const input=$('codexSearchFilter'); if(input) input.onkeydown=(e)=>{ if(e.key==='Enter') showCodexMenu(readFilter()); };
  const reset=$('codexResetFilter'); if(reset) reset.onclick=()=>showCodexMenu({type:'all',status:'all',tier:'all',search:''});

function skillNameByKey(k){
  const p=S.player;
  const map={warrior:{smash:'강타',dash:'방패돌진',heal:'전투함성'},rogue:{smash:'급소찌르기',dash:'그림자도약',heal:'연막'},mage:{smash:'마력탄',dash:'화염폭발',heal:'재생술'},hunter:{smash:'정밀사격',dash:'구르기',heal:'다발 사격'}};
  return map[p.classId][k];
}
function skillEnhanceDesc(k){
  const lv=skillLv(k); const info=skillCostInfo(lv);
  if(lv>=20) return 'MAX 강화 완료';
  return `비용 ${formatGold(info.cost)} · 성공 ${info.s}% · 유지 ${info.k}% · 하락 ${info.d}% · ${lv>=15?'벽 관통 활성':' +15 벽 관통'}`;
}
function showSkillEnhanceMenu(){
  if(!S) return; pauseAutoForChoice(); ensureRunFields();
  const keys=['smash','dash','heal'];
  const cards=keys.map(k=>{ const lv=skillLv(k); return `<div class="choice"><h4>${skillNameByKey(k)} <span class="legend">+${lv}</span></h4><p>${skillEnhanceDesc(k)}</p><button class="btn good smallbtn" data-skill-enhance="${k}" ${lv>=20?'disabled':''}>강화</button></div>`; }).join('');
  showModal(`<h2>스킬 강화</h2><p class="muted">골드로 강화한다. 실패 시 표에 따라 유지 또는 하락한다. 최대 +20.</p><div class="grid3" style="grid-template-columns:1fr; margin-top:10px">${cards}</div>`, false);
  modalCard.querySelectorAll('[data-skill-enhance]').forEach(btn=>btn.onclick=()=>enhanceSkill(btn.dataset.skillEnhance));
}
function enhanceSkill(k){
  ensureRunFields(); const p=S.player; const lv=skillLv(k);
  if(lv>=20){ toast('이미 최대 강화다.'); return; }
  const info=skillCostInfo(lv);
  if(p.gold<info.cost){ toast('골드가 부족하다.'); return; }
  p.gold-=info.cost;
  const roll=rand(100)+1;
  let result='유지';
  if(roll<=info.s){ p.skillEnhance[k]=lv+1; result='성공'; }
  else if(roll>info.s+info.k){ p.skillEnhance[k]=Math.max(0,lv-1); result='하락'; }
  addLog(`${skillNameByKey(k)} 강화 ${result}. 현재 +${p.skillEnhance[k]}.`);
  renderAll(); saveRun(); showSkillMenu();
}

function cloudEscape(v){
  return String(v||'').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
async function refreshCloudStatusLine(){
  const el = $('cloudStatusLine');
  if(!el) return;
  if(!cloudConfigured()){ el.innerHTML = 'Supabase 미설정'; return; }
  if(!getCloudClient()){ el.innerHTML = 'Supabase SDK 로드 실패'; return; }
  try{
    const user = await currentCloudUser();
    el.innerHTML = user ? `로그인됨: <b>${cloudEscape(user.email || user.id)}</b>` : '설정됨 · 로그인 안 됨';
  }catch(e){ el.textContent = '상태 확인 실패: ' + e.message; }

    if(confirm('영혼과 영혼 강화 수치를 모두 0으로 초기화하시겠습니까?')){

  };

function modalTitleText(html){
  const m = String(html||'').match(/<h[12][^>]*>([\s\S]*?)<\/h[12]>/i);
  if(!m) return '';
  return m[1].replace(/<[^>]+>/g,'').replace(/&[^;]+;/g,'').trim();
}
function modalAllowsX(html, locked){
  if(locked) return false;
  const title = modalTitleText(html);
  if(/^레벨 \d+$/.test(title)) return false;
  return !['심연 로그','영혼 강화','원정 종료','귀환 완료','장비 상자','유물 선택','심연 제단'].includes(title);
}
function showModal(html, locked){
  modal.classList.remove('startPage');
  modal.removeAttribute('data-start-mode');
  const x = modalAllowsX(html, locked) ? '<button class="modalCloseX" id="modalCloseX" aria-label="닫기">×</button>' : '';
  modalCard.innerHTML = x + html;
  const xb=$('modalCloseX'); if(xb) xb.onclick=()=>{ hideModal(); renderAll(); };
  modal.classList.add('show');
  modalOpen = true;
  if(!locked){ modal.onclick = e=>{ if(e.target===modal){} }; }
}
function hideModal(){ modal.classList.remove('show','startPage'); modal.removeAttribute('data-start-mode'); modalOpen=false; modal.onclick=null; setTimeout(resumeAutoIfPaused,0); }

const PROC_SPRITE_CACHE = {};
function cloneRows(rows){ return rows.map(r=>r.split('')); }
function buildProcSprite(id){
  if(PROC_SPRITE_CACHE[id]) return PROC_SPRITE_CACHE[id];
  let sprite=null;
  if(/^m\d+$/.test(id)){
    const idx=parseInt(id.slice(1),10);
    const fam=MONSTER_FAMILY_DEFS[Math.floor(idx/9)%MONSTER_FAMILY_DEFS.length];
    const rows=UNIQUE_MONSTER_PATTERNS[idx] || UNIQUE_MONSTER_PATTERNS[0];
    sprite={palette:{b:fam.colors[0],c:fam.colors[1],d:fam.colors[2]}, rows:rows.slice()};
  } else if(/^boss\d+$/.test(id)){
    const idx=parseInt(id.slice(4),10)%BOSS_DEFS.length;
    const b=BOSS_DEFS[idx];
    const rows=cloneRows(BOSS_PATTERNS[idx]);
    sprite={palette:{b:b.colors[0],c:b.colors[1],d:b.colors[2],f:'#ffffff',e:'#fde68a'}, rows:rows.map(r=>r.join(''))};
  }
  if(sprite) PROC_SPRITE_CACHE[id]=sprite;
  return sprite;
}
function getSpriteDef(id){
  const key=(id||'').replace(/^elite_/, '');
  return SPRITES[key] || buildProcSprite(key) || SPRITES.slime;
}

/* 스킬 범위 미리보기 복구 */
function skillPreviewNow(){
  return (typeof nowMs === 'function') ? nowMs() : Date.now();
}
function setSkillRangePreview(key, dur=1100){
  if(!S || !S.player) return;
  S.player.skillPreview = {key, until:skillPreviewNow()+dur};
  renderAll();
  setTimeout(()=>{
    if(!S || !S.player || !S.player.skillPreview) return;
    if(skillPreviewNow() >= (S.player.skillPreview.until||0) && !S.player.awaitAim){
      S.player.skillPreview = null;
      renderAll();
    }
  }, dur+60);
}
function activeSkillPreviewKey(){
  if(!S || !S.player) return null;
  if(S.player.awaitAim) return 'dash';
  const pr = S.player.skillPreview;
  if(pr && skillPreviewNow() < (pr.until||0)) return pr.key;
  return null;
}
function addPreviewCell(cells,x,y,kind='range'){
  if(!inMap(x,y)) return;
  if(S.map[y][x]==='#') return;
  cells.push({x,y,kind});
}
function previewHasPath(x,y,key){
  try{
    if(x===S.player.x && y===S.player.y) return true;
    if(typeof hasRangedPath === 'function') return hasRangedPath(S.player.x,S.player.y,x,y, typeof canPierceWalls === 'function' ? canPierceWalls(key) : false);
  }catch(e){}
  return true;
}
function linePreviewCells(range){
  const p=S.player, cells=[];
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
    for(let i=1;i<=range;i++){
      const x=p.x+dx*i, y=p.y+dy*i;
      if(!inMap(x,y) || S.map[y][x]==='#') break;
      cells.push({x,y,kind:'line'});
    }
  });
  return cells;
}
function radiusPreviewCells(range,key,includeSelf=false){
  const p=S.player, cells=[];
  for(let y=p.y-range;y<=p.y+range;y++){
    for(let x=p.x-range;x<=p.x+range;x++){
      if(!inMap(x,y) || S.map[y][x]==='#') continue;
      const d=Math.abs(x-p.x)+Math.abs(y-p.y);
      if(d>range || (!includeSelf && d===0)) continue;
      if(previewHasPath(x,y,key)) cells.push({x,y,kind:'range'});
    }
  }
  return cells;
}
function adjacentPreviewCells(){
  const p=S.player, cells=[];
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>addPreviewCell(cells,p.x+dx,p.y+dy,'melee'));
  return cells;
}
function dashPreviewCells(){
  const p=S.player, cells=[];
  [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy])=>{
    for(let i=1;i<=2;i++){
      const x=p.x+dx*i, y=p.y+dy*i;
      if(!inMap(x,y) || S.map[y][x]==='#') break;
      cells.push({x,y,kind:'dash'});
      if(enemyAt(x,y)) break;
    }
  });
  return cells;
}
function skillPreviewCells(key){
  if(!S || !S.player) return [];
  const p=S.player, cls=p.classId;
  if(key==='smash'){
    if(cls==='warrior' || cls==='rogue') return adjacentPreviewCells();
    if(cls==='mage') return radiusPreviewCells(3+skillRangeBonus('smash'),'smash');
    if(cls==='hunter') return linePreviewCells(4+skillRangeBonus('smash'));
  }
  if(key==='dash'){
    if(cls==='mage') return radiusPreviewCells(2,'dash');
    return dashPreviewCells();
  }
  if(key==='heal'){
    if(cls==='warrior' || cls==='rogue' || cls==='mage') return [{x:p.x,y:p.y,kind:'self'}];
    if(cls==='hunter') return radiusPreviewCells(3+skillRangeBonus('heal'),'heal');
  }
  return [];
}
function renderSkillRangePreview(ox,oy){
  const key = activeSkillPreviewKey();
  if(!key) return;
  const cells = skillPreviewCells(key);
  if(!cells.length) return;
  ctx.save();
  for(const c of cells){
    if(!inView(c.x,c.y,ox,oy)) continue;
    if(S.seen && S.seen[c.y] && !S.seen[c.y][c.x]) continue;
    const px=(c.x-ox)*TILE, py=(c.y-oy)*TILE;
    let fill='rgba(96,165,250,.22)', stroke='rgba(147,197,253,.72)';
    if(c.kind==='melee') { fill='rgba(248,113,113,.22)'; stroke='rgba(248,113,113,.86)'; }
    if(c.kind==='line') { fill='rgba(163,230,53,.22)'; stroke='rgba(190,242,100,.86)'; }
    if(c.kind==='dash') { fill='rgba(251,191,36,.22)'; stroke='rgba(251,191,36,.86)'; }
    if(c.kind==='self') { fill='rgba(52,211,153,.24)'; stroke='rgba(110,231,183,.9)'; }
    ctx.fillStyle=fill;
    ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
    ctx.strokeStyle=stroke;
    ctx.lineWidth=2;
    ctx.strokeRect(px+3,py+3,TILE-6,TILE-6);
  }
  // 실제 사거리 안 몬스터는 한 번 더 표시
  for(const e of S.enemies||[]){
    if(e.hp<=0 || !inView(e.x,e.y,ox,oy)) continue;
    if(!cells.some(c=>c.x===e.x && c.y===e.y)) continue;
    const px=(e.x-ox)*TILE, py=(e.y-oy)*TILE;
    ctx.strokeStyle='rgba(255,255,255,.92)';
    ctx.lineWidth=2;
    ctx.strokeRect(px+6,py+6,TILE-12,TILE-12);
  }
  ctx.restore();
}


function render(){
  if(!S){ drawTitle(); return; }
  const p=S.player;
  const ox = p.x - Math.floor(VIEW/2), oy = p.y - Math.floor(VIEW/2);
  ctx.fillStyle='#05070b'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let vy=0;vy<VIEW;vy++) for(let vx=0;vx<VIEW;vx++){
    const x=ox+vx,y=oy+vy, px=vx*TILE, py=vy*TILE;
    if(!inMap(x,y)){ drawTile(px,py,'void'); continue; }
    const seen=S.seen[y][x];
    if(!seen){ drawTile(px,py,'unknown'); continue; }
    drawTile(px,py,S.map[y][x]==='#'?'wall':'floor');
    if(S.map[y][x]==='>') drawSprite('exit',px,py);
  }
  renderSkillRangePreview(ox,oy);
  for(const it of S.items){
    if(!inView(it.x,it.y,ox,oy) || !S.seen[it.y][it.x]) continue;
    drawSprite(it.type,(it.x-ox)*TILE,(it.y-oy)*TILE);
  }
  for(const e of S.enemies){
    if(e.hp<=0 || !inView(e.x,e.y,ox,oy) || !S.seen[e.y][e.x]) continue;
    const px=(e.x-ox)*TILE, py=(e.y-oy)*TILE;
    drawSprite(e.sprite,px,py);
    if(e.boss || e.elite){
      const label = e.boss ? 'BOSS' : 'ELITE';
      const labelColor = e.boss ? '#ef4444' : '#facc15';
      // 머리 위 라벨은 캐릭터/몬스터 몸체와 겹치지 않게 타일 위쪽 바깥에 배치
      const labelY = Math.max(8, py - 4);
      ctx.save();
      ctx.font = 'bold 8px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.lineWidth = 2.6;
      ctx.strokeStyle = 'rgba(0,0,0,.94)';
      ctx.strokeText(label, px + TILE/2, labelY);
      ctx.fillStyle = labelColor;
      ctx.fillText(label, px + TILE/2, labelY);
      ctx.restore();
    }
    ctx.fillStyle='#1f2937'; ctx.fillRect(px+4,py+27,24,3);
    ctx.fillStyle=e.boss?'#ef4444':'#f97316'; ctx.fillRect(px+4,py+27,Math.max(1,24*e.hp/e.maxHp),3);
  }
  const ppx=(p.x-ox)*TILE, ppy=(p.y-oy)*TILE;
  // 캐릭터 주변 네모 박스/타일 경계 제거: 캐릭터 도트만 표시
  drawSprite(p.classId,ppx,ppy);
  renderEffects(ox,oy);
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,120,canvas.width/2,canvas.height/2,360);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
}
function drawTitle(){
  if(startBgImage.complete && startBgImage.naturalWidth){
    drawCoverImage(startBgImage,0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(2,6,23,.18)';ctx.fillRect(0,0,canvas.width,canvas.height);
    return;
  }
  ctx.fillStyle='#080a0f';ctx.fillRect(0,0,canvas.width,canvas.height);
}
function drawTile(px,py,type){
  if(type==='unknown'){ctx.fillStyle='#05070b';ctx.fillRect(px,py,TILE,TILE);return;}
  if(type==='void'){ctx.fillStyle='#030407';ctx.fillRect(px,py,TILE,TILE);return;}
  if(type==='wall'){
    ctx.fillStyle='#182033'; ctx.fillRect(px,py,TILE,TILE);
    for(let y=0;y<4;y++) for(let x=0;x<4;x++){ ctx.fillStyle=(x+y)%2===0?'#27344a':'#202b40'; ctx.fillRect(px+2+x*7,py+2+y*7,6,6); }
    ctx.strokeStyle='#0b1020'; ctx.strokeRect(px+.5,py+.5,TILE-1,TILE-1);
  } else {
    ctx.fillStyle='#101827'; ctx.fillRect(px,py,TILE,TILE);
    for(let y=0;y<4;y++) for(let x=0;x<4;x++){ ctx.fillStyle=(x+y)%2===0?'#0f1725':'#132033'; ctx.fillRect(px+1+x*8,py+1+y*8,7,7); }
  }
}
function drawSprite(id,px,py){
  if(drawHeroImage(id, px, py)) return;
  if(drawSpriteImage(id, px, py)) return;
  const s=getSpriteDef(id);
  const h=s.rows.length, w=Math.max(...s.rows.map(r=>r.length));
  const scale=Math.max(2, Math.min(3, Math.floor(24/Math.max(w,h)) || 2));
  const ox=px+Math.floor((TILE-w*scale)/2), oy=py+Math.floor((TILE-h*scale)/2);
  for(let y=0;y<s.rows.length;y++) for(let x=0;x<s.rows[y].length;x++){
    const ch=s.rows[y][x]; if(ch==='0') continue;
    const key2 = ch==='1' ? 'b' : ch==='2' ? 'c' : ch==='3' ? 'd' : ch;
    const col=s.palette[key2]; if(!col) continue;
    ctx.fillStyle=col; ctx.fillRect(ox+x*scale,oy+y*scale,scale,scale);
  }
}
function effectPosCell(x,y,ox,oy){ return {x:(x-ox)*TILE + TILE/2, y:(y-oy)*TILE + TILE/2}; }
function drawFxCircle(cx,cy,r,color,alpha,fill=true){
  ctx.save(); ctx.globalAlpha=alpha; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  if(fill){ ctx.fillStyle=color; ctx.fill(); } else { ctx.lineWidth=3; ctx.strokeStyle=color; ctx.stroke(); }
  ctx.restore();
}
function renderEffects(ox,oy){
  if(!S || !S.fx || !S.fx.length) return;
  const t = nowMs();
  for(const fx of S.fx){
    const p = clamp((t - fx.start) / fx.dur, 0, 1);
    const fade = 1 - p;
    if(fx.kind==='slash'){
      const c=effectPosCell(fx.x,fx.y,ox,oy); if(!inView(fx.x,fx.y,ox,oy)) continue;
      ctx.save(); ctx.globalAlpha=.95*fade; ctx.translate(c.x,c.y); ctx.rotate((fx.angle||0)+(p*.55));
      ctx.strokeStyle=fx.color||'#f8fafc'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(-14,-10); ctx.lineTo(14,10); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-8,-15); ctx.lineTo(10,3); ctx.stroke();
      ctx.restore();
    } else if(fx.kind==='stab'){
      if(!inView(fx.x1,fx.y1,ox,oy) && !inView(fx.x2,fx.y2,ox,oy)) continue;
      const a=effectPosCell(fx.x1,fx.y1,ox,oy), b=effectPosCell(fx.x2,fx.y2,ox,oy);
      const tx=a.x+(b.x-a.x)*(0.25+p*.75), ty=a.y+(b.y-a.y)*(0.25+p*.75);
      const ang=Math.atan2(b.y-a.y,b.x-a.x);
      ctx.save();
      ctx.globalAlpha=.9*fade;
      ctx.strokeStyle=fx.color||'#dbeafe'; ctx.lineWidth=5;
      ctx.beginPath(); ctx.moveTo(a.x+(b.x-a.x)*.15,a.y+(b.y-a.y)*.15); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.75)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(a.x+(b.x-a.x)*.32,a.y+(b.y-a.y)*.32); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.translate(tx,ty); ctx.rotate(ang);
      ctx.fillStyle=fx.spark||'#ffffff';
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-3,-5); ctx.lineTo(-3,5); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if(fx.kind==='projectile'){
      if(!inView(fx.x1,fx.y1,ox,oy) && !inView(fx.x2,fx.y2,ox,oy)) continue;
      const a=effectPosCell(fx.x1,fx.y1,ox,oy), b=effectPosCell(fx.x2,fx.y2,ox,oy);
      const x=a.x+(b.x-a.x)*p, y=a.y+(b.y-a.y)*p;
      const ang=Math.atan2(b.y-a.y,b.x-a.x);
      ctx.save();
      ctx.globalAlpha=.95;
      if(fx.shape==='arrow'){
        ctx.strokeStyle=fx.color||'#bef264'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(x-Math.cos(ang)*14, y-Math.sin(ang)*14);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.translate(x,y); ctx.rotate(ang);
        ctx.strokeStyle=fx.color||'#bef264'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(4,0); ctx.stroke();
        ctx.fillStyle=fx.spark||'#ecfccb';
        ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(1,-4); ctx.lineTo(1,4); ctx.closePath(); ctx.fill();
      } else if(fx.shape==='magicOrb'){
        const ease = 1 - Math.pow(1-p, 2.2);
        const oxb=a.x+(b.x-a.x)*ease, oyb=a.y+(b.y-a.y)*ease;
        const trailSteps=4;
        for(let i=trailSteps;i>=1;i--){
          const q=clamp(ease - i*.045, 0, 1);
          const tx=a.x+(b.x-a.x)*q, ty=a.y+(b.y-a.y)*q;
          drawFxCircle(tx,ty,4+i*.7,fx.color||'#8b5cf6',(.12*i)*fade,true);
        }
        drawFxCircle(oxb,oyb,10,fx.color||'#8b5cf6',.24,true);
        drawFxCircle(oxb,oyb,6,fx.core||'#f5d0fe',.92,true);
        drawFxCircle(oxb,oyb,13,fx.spark||'#e9d5ff',.20,false);
        ctx.save();
        ctx.globalAlpha=.55*fade;
        ctx.strokeStyle=fx.spark||'#e9d5ff'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(oxb,oyb,8,Math.PI*1.15 + p*5,Math.PI*1.65 + p*5);
        ctx.stroke();
        ctx.restore();
        if(p>.78){
          const ip=(p-.78)/.22;
          drawFxCircle(b.x,b.y,6+ip*12,fx.color||'#8b5cf6',.28*(1-ip),false);
          drawFxCircle(b.x,b.y,3+ip*7,fx.spark||'#e9d5ff',.22*(1-ip),true);
        }
      } else {
        ctx.strokeStyle=fx.color||'#a78bfa'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(a.x+(x-a.x)*.55,a.y+(y-a.y)*.55); ctx.lineTo(x,y); ctx.stroke();
        drawFxCircle(x,y,7,fx.color||'#a78bfa',.9*fade,true);
        drawFxCircle(x,y,11,fx.spark||'#ddd6fe',.22*fade,false);
      }
      ctx.restore();
    } else if(fx.kind==='burst'){
      const c=effectPosCell(fx.x,fx.y,ox,oy); if(!inView(fx.x,fx.y,ox,oy)) continue;
      drawFxCircle(c.x,c.y,8+p*18,fx.color||'#fb7185',.25*fade,true);
      drawFxCircle(c.x,c.y,6+p*14,fx.color||'#fb7185',.9*fade,false);
      for(let i=0;i<6;i++){
        const ang=(Math.PI*2/6)*i + p*1.4;
        const px=c.x+Math.cos(ang)*(10+p*12), py=c.y+Math.sin(ang)*(10+p*12);
        drawFxCircle(px,py,2.5,fx.spark||'#fff7ed',.9*fade,true);
      }
    } else if(fx.kind==='smoke'){
      const c=effectPosCell(fx.x,fx.y,ox,oy); if(!inView(fx.x,fx.y,ox,oy)) continue;
      for(let i=0;i<5;i++){
        const ang=(Math.PI*2/5)*i + .5;
        const px=c.x+Math.cos(ang)*(p*13), py=c.y+Math.sin(ang)*(p*13);
        drawFxCircle(px,py,7+p*6,fx.color||'#94a3b8',.18*fade,true);
      }
    } else if(fx.kind==='heal'){
      const c=effectPosCell(fx.x,fx.y,ox,oy); if(!inView(fx.x,fx.y,ox,oy)) continue;
      drawFxCircle(c.x,c.y,10+p*18,fx.color||'#34d399',.10*fade,true);
      ctx.save(); ctx.globalAlpha=.95*fade; ctx.fillStyle=fx.color||'#6ee7b7';
      ctx.fillRect(c.x-3,c.y-12-p*4,6,24); ctx.fillRect(c.x-12,c.y-3-p*4,24,6);
      ctx.restore();
    } else if(fx.kind==='line'){
      if(!inView(fx.x1,fx.y1,ox,oy) && !inView(fx.x2,fx.y2,ox,oy)) continue;
      const a=effectPosCell(fx.x1,fx.y1,ox,oy), b=effectPosCell(fx.x2,fx.y2,ox,oy);
      ctx.save(); ctx.globalAlpha=.95*fade; ctx.strokeStyle=fx.color||'#60a5fa'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.75)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(a.x+(b.x-a.x)*(1-p*.25), a.y+(b.y-a.y)*(1-p*.25)); ctx.stroke();
      ctx.restore();
    } else if(fx.kind==='trail'){
      if(!inView(fx.x1,fx.y1,ox,oy) && !inView(fx.x2,fx.y2,ox,oy)) continue;
      const a=effectPosCell(fx.x1,fx.y1,ox,oy), b=effectPosCell(fx.x2,fx.y2,ox,oy);
      ctx.save(); ctx.globalAlpha=.4*fade; ctx.strokeStyle=fx.color||'#c084fc'; ctx.lineWidth=10;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      ctx.restore();
      drawFxCircle(b.x,b.y,8+p*6,fx.color||'#c084fc',.4*fade,false);
    } else if(fx.kind==='ring'){
      const c=effectPosCell(fx.x,fx.y,ox,oy); if(!inView(fx.x,fx.y,ox,oy)) continue;
      drawFxCircle(c.x,c.y,12+p*16,fx.color||'#fbbf24',.8*fade,false);
    }
  }
}
function inView(x,y,ox,oy){return x>=ox&&y>=oy&&x<ox+VIEW&&y<oy+VIEW;}
function updateSkillButtons(){
