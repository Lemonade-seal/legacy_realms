function autoEnemyUid(e){
  if(!e) return '';
  if(!e.autoUid) e.autoUid = 'ae' + (autoEnemySeq++);
  return e.autoUid;
}
function clearAutoTargetIfInvalid(enemies){
  if(!S) return;
  const list = enemies || (S.enemies||[]).filter(e=>e.hp>0);
  if(!list.length){ S.autoTargetUid = null; S.autoGoal = null; return; }
  if(S.autoTargetUid && !list.some(e=>autoEnemyUid(e)===S.autoTargetUid)){ S.autoTargetUid = null; S.autoGoal = null; }
}
function autoSelectEnemy(enemies, opts={}){
  if(!S || !S.player) return null;
  const p = S.player;
  const list = (enemies || S.enemies || []).filter(e=>e.hp>0);
  if(!list.length){ S.autoTargetUid = null; S.autoGoal = null; return null; }
  list.forEach(autoEnemyUid);

  const current = S.autoTargetUid ? list.find(e=>autoEnemyUid(e)===S.autoTargetUid) : null;
  const scored = list.slice().sort((a,b)=>{
    const ad = dist(a,p), bd = dist(b,p);
    const av = S.seen?.[a.y]?.[a.x] ? 0 : 1;
    const bv = S.seen?.[b.y]?.[b.x] ? 0 : 1;
    return ad-bd || av-bv || a.hp-b.hp || String(autoEnemyUid(a)).localeCompare(String(autoEnemyUid(b)));
  });
  const best = scored[0];
  if(current){
    const cd = dist(current,p), bd = dist(best,p);
    const currentVisible = !!S.seen?.[current.y]?.[current.x];
    // 와리가리 방지: 기존 타깃이 죽거나 과도하게 멀어진 경우가 아니면 바꾸지 않는다.
    if(cd <= bd + 5 && (currentVisible || cd <= 12 || opts.keepCurrent)) return current;
  }
  const nextUid = autoEnemyUid(best);
  if(S.autoTargetUid !== nextUid) S.autoGoal = null;
  S.autoTargetUid = nextUid;
  return best;
}
function autoSelectAdjacentEnemy(enemies){
  if(!S || !S.player) return null;
  const p = S.player;
  const adjacent = (enemies || S.enemies || []).filter(e=>e.hp>0 && dist(e,p)<=1);
  if(!adjacent.length) return null;
  const locked = S.autoTargetUid ? adjacent.find(e=>autoEnemyUid(e)===S.autoTargetUid) : null;
  if(locked) return locked;
  const picked = adjacent.slice().sort((a,b)=>a.hp-b.hp || String(autoEnemyUid(a)).localeCompare(String(autoEnemyUid(b))))[0];
  S.autoTargetUid = autoEnemyUid(picked);
  S.autoGoal = null;
  return picked;
}
function isAutoReverseStep(step){
  if(!S || !S.player || !step) return false;
  return S.autoPrevX === S.player.x + step.dx && S.autoPrevY === S.player.y + step.dy;
}
function autoMove(step){
  if(!step || !S || !S.player) return false;
  S.autoPrevX = S.player.x;
  S.autoPrevY = S.player.y;
  S.autoLastDx = step.dx;
  S.autoLastDy = step.dy;
  const beforeX = S.player.x, beforeY = S.player.y;
  playerMove(step.dx, step.dy);
  registerAutoPosition(beforeX, beforeY, S.player.x, S.player.y);
  return true;
}

function registerAutoPosition(beforeX, beforeY, afterX, afterY){
  if(!S || !S.player) return;
  if(!Array.isArray(S.autoPathLog)) S.autoPathLog = [];
  S.autoPathLog.push({x:afterX, y:afterY});
  if(S.autoPathLog.length > 10) S.autoPathLog.shift();

  const log = S.autoPathLog;
  const n = log.length;
  const wasReverse = n>=3 && log[n-1].x===log[n-3].x && log[n-1].y===log[n-3].y;
  const repeatedHere = log.slice(Math.max(0,n-6)).filter(pos=>pos.x===afterX && pos.y===afterY).length >= 3;
  if(wasReverse || repeatedHere) S.autoStuckScore = (S.autoStuckScore||0) + 1;
  else S.autoStuckScore = Math.max(0, (S.autoStuckScore||0) - 1);

  if(S.autoStuckScore >= 3) enterAutoRoam('zigzag');
}

function enterAutoRoam(reason='stuck'){
  if(!S) return;
  S.autoRoamTicks = Math.max(S.autoRoamTicks||0, 8);
  S.autoRoamReason = reason;
  S.autoTargetUid = null;
  S.autoGoal = null;
  S.autoStuckScore = 0;
  S.autoPathLog = [];
}

function clearAutoRoam(){
  if(!S) return;
  S.autoRoamTicks = 0;
  S.autoRoamReason = '';
}

function autoRandomRoamStep(){
  if(!S || !S.player) return null;
  const p=S.player;
  const cand=DIRS.map(([dx,dy])=>({dx,dy,nx:p.x+dx,ny:p.y+dy}))
    .filter(c=>passable(c.nx,c.ny)&&!enemyAt(c.nx,c.ny));
  if(!cand.length) return null;

  const nonReverse = cand.filter(c=>!(S.autoPrevX===c.nx && S.autoPrevY===c.ny));
  const pool = nonReverse.length ? nonReverse : cand;
  const scored = pool.map(c=>{
    const frontier = frontierScore(c.nx,c.ny);
    const unseenAround = frontier > 0 ? 0 : 1;
    const reverse = (S.autoPrevX===c.nx && S.autoPrevY===c.ny) ? 1 : 0;
    const wall = adjacentWallCount(c.nx,c.ny);
    const drift = ((c.nx*31 + c.ny*17 + (S.player.turn||0)*7) % 100) / 100;
    return {c, score:unseenAround*80 + reverse*50 + wall*3 + drift};
  }).sort((a,b)=>a.score-b.score);
  return {dx:scored[0].c.dx, dy:scored[0].c.dy};
}

function autoTryRoamMove(){
  if(!S || !S.player) return false;
  const step = autoRandomRoamStep();
  if(step){
    S.autoRoamTicks = Math.max(0, (S.autoRoamTicks||0)-1);
    autoMove(step);
    return true;
  }
  waitTurn();
  return true;
}
function validAutoGoal(goal, uid, tx, ty){
  if(!goal || goal.uid !== uid) return false;
  if(Math.abs(goal.x-tx)+Math.abs(goal.y-ty)!==1) return false;
  if(!passable(goal.x,goal.y) || enemyAt(goal.x,goal.y)) return false;
  return true;
}

function autoResolveAwaitAim(enemies){
  const p=S.player;
  if(!p.awaitAim) return false;
  const t = autoSelectEnemy(enemies||S.enemies.filter(e=>e.hp>0), {keepCurrent:true});
  if(t){
    const dx=Math.sign(t.x-p.x), dy=Math.sign(t.y-p.y);
    resolveAimedSkill(Math.abs(dx)>=Math.abs(dy)?dx:0, Math.abs(dy)>Math.abs(dx)?dy:0);
  } else {
    p.awaitAim=''; renderAll(); saveRun();
  }
  return true;
}
function autoBasicAttack(){
  const p=S.player;
  const close = autoSelectAdjacentEnemy(S.enemies);
  if(close){ faceToward(close.x, close.y); playerAttack(close,false); addLog('기본공격.'); afterPlayerAction(); return true; }
  const rangedBasic = basicRangedEnemy();
  if(rangedBasic){ basicRangedAttack(rangedBasic); addLog(`${p.className} 원거리 기본공격.`); afterPlayerAction(); return true; }
  return false;
}
function tryAutoSkillPriority(opts={}){
  const p=S.player, st=calcStats();
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(!enemies.length) return false;
  const allowGapClose = !!opts.allowGapClose;
  const nearest=autoSelectEnemy(enemies, {keepCurrent:true});
  const nearestDist=nearest?dist(nearest,p):999;
  const danger=enemies.filter(e=>dist(e,p)<=3).length;
  const lowHp=p.hp<=st.maxHp*.65;

  // 1번 공격 스킬: 쿨타임이 없고 타깃이 있으면 기본공격보다 먼저 사용한다.
  if(p.cd.smash<=0){
    if((p.classId==='warrior'||p.classId==='rogue') && enemies.some(e=>dist(e,p)<=1)){ skillSmash(); return true; }
    if(p.classId==='mage' && p.mp>=5 && rangedEnemy(3+skillRangeBonus('smash'),'smash')){ skillMage1(); return true; }
    if(p.classId==='hunter' && lineEnemy(4+skillRangeBonus('smash'),'smash')){ skillHunter1(); return true; }
  }

  // 2번 스킬: 공격/접근 가능한 상황이면 기본공격보다 먼저 사용한다.
  if(p.cd.dash<=0){
    if(p.classId==='mage' && p.mp>=10 && enemies.some(e=>dist(e,p)<=2&&hasRangedPath(p.x,p.y,e.x,e.y,canPierceWalls('dash')))){ skillMage2(); return true; }
    if(allowGapClose && nearestDist>1 && nearestDist<=3 && (p.classId==='warrior'||p.classId==='rogue'||p.classId==='hunter')){ skillDash(); return true; }
  }

  // 3번 스킬: 공격형은 우선 사용하고, 회복/버프형은 전투 중 필요한 경우에만 사용한다.
  if(p.cd.heal<=0){
    if(p.classId==='hunter' && p.mp>=10 && enemies.some(e=>dist(e,p)<=3+skillRangeBonus('heal')&&hasRangedPath(p.x,p.y,e.x,e.y,canPierceWalls('heal')))){ skillHunter3(); return true; }
    if(p.classId==='warrior' && p.mp>=8 && danger>=1 && ((!p.effects.fury || p.effects.fury<=0) || lowHp)){ skillWarrior3(); return true; }
    if(p.classId==='rogue' && p.mp>=8 && danger>=1 && (!p.effects.smoke || p.effects.smoke<=0)){ skillRogue3(); return true; }
    if(p.classId==='mage' && p.mp>=12 && p.hp<=st.maxHp*.72){ skillMage3(); return true; }
  }

  return false;
}
function autoExplore(){
  if(!canAct()) return;
  const p=S.player;
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(autoResolveAwaitAim(enemies)) return;
  if(enemies.length && tryAutoSkillPriority({allowGapClose:false})) return;
  if(autoBasicAttack()) return;
  if(enemies.some(e=>e.hp>0&&dist(e,p)<=4)){ stopAuto(); toast('근처에 적이 있어 안전오토 정지.'); return; }
  const target = nearestTarget();
  if(!target){ stopAuto(); toast('탐험할 목표가 없습니다.'); return; }
  const step = autoStepToward(target.x,target.y);
  if(step){ autoMove(step); return; }
  waitTurn();
}
function autoFullExplore(){
  if(!canAct()) return;
  ensureRunFields();
  const p=S.player;
  const st=calcStats();
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(autoResolveAwaitAim(enemies)) return;
  if(p.potions>0 && p.cd.potion<=0 && p.hp <= st.maxHp*.42){ clearAutoRoam(); usePotion(); return; }

  // 오브젝트/전투가 보이면 무작위 배회보다 항상 해당 행동을 우선 처리한다.
  if(enemies.length && tryAutoSkillPriority({allowGapClose:true})){ clearAutoRoam(); return; }
  if(autoBasicAttack()){ clearAutoRoam(); return; }

  // 보스층에서는 보스가 살아 있으면 보스 추적을 최우선으로 유지한다.
  const bossTarget = livingBossEnemy();
  if(isBossFloor() && bossTarget){
    clearAutoRoam();
    S.autoTargetUid = autoEnemyUid(bossTarget);
    const step = autoStepToAdjacent(bossTarget.x, bossTarget.y);
    if(step){ autoMove(step); return; }
    enterAutoRoam('bossBlocked');
    waitTurn();
    return;
  }

  // 시야 안 가까운 적은 먼저 추적한다. 길이 안 잡히면 한 턴 멈춘 뒤 무작위 길따라 배회로 전환한다.
  const nearbyEnemy = autoSelectEnemy(enemies.filter(e=>dist(e,p)<=7 || S.seen[e.y]?.[e.x]), {keepCurrent:true});
  if(nearbyEnemy){
    const step = autoStepToAdjacent(nearbyEnemy.x, nearbyEnemy.y);
    if(step){ clearAutoRoam(); autoMove(step); return; }
    enterAutoRoam('enemyBlocked');
    waitTurn();
    return;
  }

  const itemTarget = S.items.slice().sort((a,b)=>dist(a,p)-dist(b,p))[0];
  if(itemTarget){
    const step=autoStepToward(itemTarget.x,itemTarget.y);
    if(step){ clearAutoRoam(); autoMove(step); return; }
    enterAutoRoam('itemBlocked');
    waitTurn();
    return;
  }

  const enemyTarget = autoSelectEnemy(enemies, {keepCurrent:true});
  if(enemyTarget){
    const step = autoStepToAdjacent(enemyTarget.x, enemyTarget.y);
    if(step){ clearAutoRoam(); autoMove(step); return; }
    enterAutoRoam('enemyBlocked');
    waitTurn();
    return;
  }

  if(S.exit && ((isBossFloor() && !livingBossEnemy()) || (!isBossFloor() && !S.enemies.some(e=>e.hp>0) && !S.items.length))){
    const step=autoStepToward(S.exit.x,S.exit.y);
    if(step){ clearAutoRoam(); autoMove(step); return; }
    if(p.x===S.exit.x && p.y===S.exit.y){ clearAutoRoam(); nextFloor(); return; }
    enterAutoRoam('exitBlocked');
    waitTurn();
    return;
  }

  // 버벅임 감지 후에는 다음 플랜에서 목표를 억지로 재계산하지 않고 길을 따라 무작위로 이동한다.
  if(S.autoRoamTicks && S.autoRoamTicks > 0){
    if(autoTryRoamMove()) return;
  }

  const target = nearestTarget();
  if(target){
    const step=autoStepToward(target.x,target.y);
    if(step){ autoMove(step); return; }
    enterAutoRoam('exploreBlocked');
    waitTurn();
    return;
  }

  enterAutoRoam('noTarget');
  if(autoTryRoamMove()) return;
  waitTurn();
}
function tryFullAutoSkill(){
  return tryAutoSkillPriority({allowGapClose:true});
}
function nextStepToAdjacent(tx,ty){
  const p=S.player;
  if(Math.abs(p.x-tx)+Math.abs(p.y-ty)<=1) return null;
  const targetEnemy = enemyAt(tx,ty);
  const uid = targetEnemy ? autoEnemyUid(targetEnemy) : (S.autoTargetUid || key(tx,ty));

  // 같은 타깃을 추적 중이면, 이전에 고른 인접 목적칸을 유지한다.
  if(validAutoGoal(S.autoGoal, uid, tx, ty)){
    const lockedStep = nextStepToward(S.autoGoal.x, S.autoGoal.y);
    if(lockedStep) return lockedStep;
    S.autoGoal = null;
  }

  const candidates=DIRS.map(([dx,dy])=>({x:tx+dx,y:ty+dy})).filter(c=>passable(c.x,c.y)&&!enemyAt(c.x,c.y));
  const scored=[];
  for(const c of candidates){
    const step=nextStepToward(c.x,c.y);
    if(!step) continue;
    const reverse = isAutoReverseStep(step) ? 1 : 0;
    const d = Math.abs(c.x-p.x)+Math.abs(c.y-p.y);
    const approach = Math.abs((p.x+step.dx)-tx)+Math.abs((p.y+step.dy)-ty);
    scored.push({c,step,score:d*10 + approach + reverse*100});
  }
  scored.sort((a,b)=>a.score-b.score || a.c.y-b.c.y || a.c.x-b.c.x);
  if(scored.length){
    S.autoGoal = {uid, x:scored[0].c.x, y:scored[0].c.y};
    return scored[0].step;
  }
  return null;
}
function nearestTarget(){
  const p=S.player;
  const visibleItems = S.items.filter(i=>S.seen[i.y][i.x]).sort((a,b)=>dist(a,p)-dist(b,p));
  if(visibleItems.length) return visibleItems[0];
  if(S.seen[S.exit.y][S.exit.x] && !S.enemies.some(e=>e.hp>0) && !S.items.length) return S.exit;
  let best=null,bd=999;
  for(let y=0;y<MAPH;y++) for(let x=0;x<MAPW;x++){
    if(S.map[y][x]==='#') continue;
    const nearUnseen = DIRS.some(([dx,dy])=>inMap(x+dx,y+dy)&&!S.seen[y+dy][x+dx]);
    if(nearUnseen){ const d=Math.abs(x-p.x)+Math.abs(y-p.y); if(d<bd){bd=d;best={x,y};} }
  }
  return best;
}
function nextStepToward(tx,ty){
  const p=S.player;
  const orderedDirs=DIRS.slice().sort((a,b)=>{
    const ar=(S.autoPrevX===p.x+a[0] && S.autoPrevY===p.y+a[1])?1:0;
    const br=(S.autoPrevX===p.x+b[0] && S.autoPrevY===p.y+b[1])?1:0;
    const ad=Math.abs(p.x+a[0]-tx)+Math.abs(p.y+a[1]-ty);
    const bd=Math.abs(p.x+b[0]-tx)+Math.abs(p.y+b[1]-ty);
    return ar-br || ad-bd;
  });
  const q=[{x:p.x,y:p.y,first:null}], seen=new Set([key(p.x,p.y)]);
  for(let qi=0;qi<q.length && qi<1800;qi++){
    const cur=q[qi];
    if(cur.x===tx&&cur.y===ty) return cur.first;
    for(const [dx,dy] of orderedDirs){
      const nx=cur.x+dx, ny=cur.y+dy, k=key(nx,ny);
      if(seen.has(k)||!passable(nx,ny)||enemyAt(nx,ny)) continue;
      seen.add(k); q.push({x:nx,y:ny,first:cur.first||{dx,dy}});
    }
  }
  return null;
}
function adjacentWallCount(x,y){ let n=0; for(const [dx,dy] of DIRS){ const nx=x+dx, ny=y+dy; if(!inMap(nx,ny) || S.map[ny][nx]==='#') n++; } return n; }
function frontierScore(x,y){ let n=0; for(const [dx,dy] of DIRS){ const nx=x+dx, ny=y+dy; if(inMap(nx,ny) && !S.seen[ny][nx]) n++; } return n; }
function unstickStep(target=null){
  const p=S.player;
  const cand=DIRS.map(([dx,dy])=>({dx,dy,nx:p.x+dx,ny:p.y+dy})).filter(c=>passable(c.nx,c.ny)&&!enemyAt(c.nx,c.ny));
  if(!cand.length) return null;
  cand.sort((a,b)=>{
    const ar=(S.autoPrevX===a.nx && S.autoPrevY===a.ny)?1:0;
    const br=(S.autoPrevX===b.nx && S.autoPrevY===b.ny)?1:0;
    const ad=target?Math.abs(a.nx-target.x)+Math.abs(a.ny-target.y):999;
    const bd=target?Math.abs(b.nx-target.x)+Math.abs(b.ny-target.y):999;

function analogDirectionFromEvent(e){
  const pad=$('analogPad'); const r=pad.getBoundingClientRect();
  const x=e.clientX-(r.left+r.width/2), y=e.clientY-(r.top+r.height/2);
  const mag=Math.hypot(x,y);
  if(mag<22) return {dx:0,dy:0,wait:true,sx:0,sy:0};
  const sx=clamp(x,-34,34), sy=clamp(y,-34,34);
  if(Math.abs(x)>Math.abs(y)) return {dx:x>0?1:-1,dy:0,sx,sy};
  return {dx:0,dy:y>0?1:-1,sx,sy};
}
let analogHold=null, analogPointer=null, analogLast={dx:0,dy:0,wait:true,sx:0,sy:0};

function analogSetVisual(d){

function analogStop(){

  const pad=$('analogPad'); if(pad){pad.classList.remove('active'); pad.style.setProperty('--stick-x','0px'); pad.style.setProperty('--stick-y','0px');}
  analogPointer=null;
}
const analogPad=$('analogPad');
if(analogPad){

    e.preventDefault(); analogPointer=e.pointerId; analogPad.setPointerCapture?.(e.pointerId);
    analogLast=analogDirectionFromEvent(e); analogSetVisual(analogLast); analogAct();
    if(analogHold) clearInterval(analogHold); analogHold=setInterval(analogAct, 165);
  });
  analogPad.addEventListener('pointermove',e=>{ if(analogPointer!==e.pointerId) return; e.preventDefault(); analogLast=analogDirectionFromEvent(e); analogSetVisual(analogLast); });
  analogPad.addEventListener('pointerup',e=>{ if(analogPointer===e.pointerId) analogStop(); });

}
function bindShortLongPress(btn, shortFn, longFn, holdMs=520){

function normalizeCharacterSlots(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length<count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    if(ch.run && ch.run.player){
      const p = ch.run.player;
      return {
        nickname: ch.nickname || p.name || p.className || '이름 없음',
        classId: ch.classId || p.classId || 'warrior',
        className: ch.className || p.className || (classes[ch.classId||p.classId]||classes.warrior).name,
        level: Number(ch.level || p.level || 1),
        floor: Number(ch.floor || p.floor || 1),
        updatedAt: ch.updatedAt || new Date().toISOString(),
        run: ch.run
      };
    }
    return null;
  });
}
function currentSlotLimit(mode){
  return isCloudLoginMode(mode) ? 3 : 1;
}
function getSlotsForMode(mode){
  return isCloudLoginMode(mode) ? cloudCharacterSlots : guestCharacterSlots;

function compactDate(v){
  if(!v) return '-';

async function loadCloudCharacterProfile(){

  if(!client) throw new Error('Supabase 연결 정보가 필요하다.');
  const user = await currentCloudUser();

  const {data,error} = await client.from('game_saves').select('save_data, meta_data, updated_at').eq('user_id', user.id).maybeSingle();
  if(error) throw error;

  if(data && data.meta_data){
    meta = normalizeMeta(data.meta_data || {});
  }else{
    meta = normalizeMeta({souls:0,bestFloor:1,bestLevel:1,totalKills:0,runs:0,upgrades:{hp:0,atk:0,def:0,crit:0,xp:0,gold:0}});
  }

    cloudCharacterSlots = normalizeCharacterSlots(data.save_data.characters, 3);
  }else if(data && data.save_data && data.save_data.player){
    const p = data.save_data.player;
    cloudCharacterSlots = normalizeCharacterSlots([{
      nickname:p.name || p.className || '이전 캐릭터',

      floor:p.floor || 1,
      updatedAt:data.updated_at || new Date().toISOString(),

}
async function saveCloudCharacterProfile(){
  if(!isCloudLoginMode(activeLoginMode)) return false;
  const client = getCloudClient();
  if(!client) return false;
  const user = await currentCloudUser();

  const slots = normalizeCharacterSlots(cloudCharacterSlots, 3);
  const active = activeCharacterSlot != null ? slots[activeCharacterSlot] : slots.find(Boolean);
  const {error} = await client.from('game_saves').upsert({
    user_id:user.id,
    nickname:active ? active.nickname : null,
    save_data:{version:2, characters:slots},

    updated_at:new Date().toISOString()
  }, {onConflict:'user_id'});
  if(error) throw error;
  return true;
}

/* 요청 반영: 캐릭터 슬롯별 보유 영혼을 영혼 강화에서 통합 사용 */
function currentSoulPoolMode(mode){
  return mode || activeLoginMode || (S && S.loginMode) || 'guest';
}
function slotSoulTotal(mode){
  const safeMode = currentSoulPoolMode(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  return slots.reduce((sum,ch)=>{
    const p = ch && ch.run && ch.run.player ? ch.run.player : null;
    if(!p || ch.run.dead) return sum;
    return sum + Math.max(0, Number(p.soulsRun || 0));
  }, 0);
}
function totalSoulAvailable(mode){
  return Math.max(0, Number(meta && meta.souls || 0)) + slotSoulTotal(mode);
}
function writeBackSoulSlots(mode, slots){
  const safeMode = currentSoulPoolMode(mode);
  setSlotsForMode(safeMode, slots);
  if(S && S.player && activeLoginMode === safeMode && activeCharacterSlot != null){
    const active = slots[activeCharacterSlot];
    if(active && active.run && active.run.player){
      S.player.soulsRun = Math.max(0, Number(active.run.player.soulsRun || 0));
      syncActiveCharacterFromRun();
    }
  }
  if(isCloudLoginMode(safeMode)) queueCharacterCloudSave();
}
function spendPooledSouls(cost, mode){
  const safeMode = currentSoulPoolMode(mode);
  cost = Math.max(0, Number(cost || 0));
  if(totalSoulAvailable(safeMode) < cost) return false;
  let remain = cost;
  const metaUse = Math.min(Math.max(0, Number(meta.souls || 0)), remain);
  meta.souls = Math.max(0, Number(meta.souls || 0) - metaUse);
  remain -= metaUse;
  if(remain > 0){
    const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
    for(const ch of slots){
      if(remain <= 0) break;
      const p = ch && ch.run && ch.run.player ? ch.run.player : null;
      if(!p || ch.run.dead) continue;
      const have = Math.max(0, Number(p.soulsRun || 0));
      if(have <= 0) continue;
      const use = Math.min(have, remain);
      p.soulsRun = have - use;
      ch.run.player.soulsRun = p.soulsRun;
      ch.updatedAt = new Date().toISOString();
      remain -= use;
    }
    writeBackSoulSlots(safeMode, slots);
  }
  saveMeta();
  return true;
}
function clearPooledSlotSouls(mode){
  const safeMode = currentSoulPoolMode(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  slots.forEach(ch=>{
    const p = ch && ch.run && ch.run.player ? ch.run.player : null;
    if(p) p.soulsRun = 0;
  });
  writeBackSoulSlots(safeMode, slots);
}
function markActiveSlotSoulsCollected(){
  const safeMode = currentSoulPoolMode();
  if(activeCharacterSlot == null) return;
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  const ch = slots[activeCharacterSlot];
  if(ch && ch.run && ch.run.player){
    ch.run.player.soulsRun = 0;
    ch.updatedAt = new Date().toISOString();
    setSlotsForMode(safeMode, slots);
    if(isCloudLoginMode(safeMode)) queueCharacterCloudSave();
  }
}

async function deleteSupabaseAccountPermanently(){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 없습니다.');
  const user = await currentCloudUser();
  if(!user) throw new Error('로그인된 Supabase 계정이 없습니다.');

  clearTimeout(cloudSaveTimer);
  clearTimeout(cloudCharacterSaveTimer);

  let rpcError = null;
  if(typeof client.rpc === 'function'){
    const {error} = await client.rpc('delete_current_user');
    rpcError = error || null;
    if(!rpcError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  let functionError = null;
  if(client.functions && typeof client.functions.invoke === 'function'){
    const {error} = await client.functions.invoke('delete-account', {body:{confirm:'회원탈퇴'}});
    functionError = error || null;
    if(!functionError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  const detail = rpcError ? rpcError.message : (functionError ? functionError.message : '삭제 함수를 찾을 수 없습니다.');
  throw new Error(`Supabase 계정 삭제 함수가 필요합니다. delete_current_user RPC 또는 delete-account Edge Function을 설정하세요. (${detail})`);
}

/* ===== 요청 반영: 닉네임 HUD + 전투력/랭킹 + 게스트 닉네임 제한 + 스킬 글자 이동 ===== */
function playerNickname(p){
  if(!p) return '-';
  return String(p.name || p.nickname || p.className || '이름 없음');
}
function calcStatsForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  const m = normalizeMeta(metaObj || meta || {});
  if(!p) return {maxHp:1,maxMp:0,atk:0,def:0,crit:0,eva:0,goldRate:0,xpRate:0,potionCap:0};
  let st = {maxHp:p.maxHpBase||1, maxMp:p.maxMpBase||0, atk:p.baseAtk||0, def:p.baseDef||0, crit:p.crit||0, eva:p.eva||0, taken:0, flatReduce:0, goldRate:0, xpRate:0, potionPower:0, potionCap:0, dashCd:0};
  Object.values(p.equip||{}).forEach(it=>{
    if(!it) return;
    ['maxHp','maxMp','atk','def','crit','eva'].forEach(k=>st[k]=(st[k]||0)+(it[k]||0));
  });
  (p.relics||[]).forEach(r=>{
    if(r && r.stats) Object.entries(r.stats).forEach(([k,v])=>st[k]=(st[k]||0)+v);
  });
  st.xpRate += (m.upgrades?.xp||0)*.04;
  st.goldRate += (m.upgrades?.gold||0)*.05;
  if(p.classId==='hunter') st.goldRate += .15;
  if(p.effects){
    if(p.effects.guard>0) st.def += 2;
    if(p.effects.fury>0) st.atk += 3;
    if(p.effects.smoke>0) st.eva += 25;
    if(p.effects.shadow>0) st.eva += 8;
    if(p.effects.focus>0) st.crit += 8;
  }
  st.maxHp = Math.max(1, Math.floor(st.maxHp));
  st.maxMp = Math.max(0, Math.floor(st.maxMp));
  st.crit = clamp(st.crit,0,75);
  st.eva = clamp(st.eva,0,65);
  return st;
}
function combatPowerForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const st = calcStatsForRun(run, metaObj);
  return Math.max(0, Math.floor(
    (p.level||1)*95 +
    (p.floor||1)*130 +
    st.maxHp*1.8 +
    st.maxMp*1.1 +
    st.atk*18 +
    st.def*15 +
    st.crit*9 +
    st.eva*7 +
    (p.relics?.length||0)*65 +
    Object.values(p.skillLv||{}).reduce((a,b)=>a+(Number(b)||0),0)*22
  ));
}
function rankingScoreForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const power = combatPowerForRun(run, metaObj);
  return Math.max(0, Math.floor(
    power +
    (p.floor||1)*900 +
    (p.level||1)*160 +
    (p.kills||0)*24 +
    (p.soulsRun||0)*35 +
    (p.opened||0)*18
  ));
}
function currentCombatPower(){
  return S && S.player ? combatPowerForRun(S, meta) : 0;
}
function currentRankingScore(){
  return S && S.player ? rankingScoreForRun(S, meta) : 0;
}
function buildRankRecordFromCharacter(ch, metaObj, fallbackNick){
  if(!ch || !ch.run || !ch.run.player) return null;
  const p = ch.run.player;
  const nick = ch.nickname || fallbackNick || p.name || p.className || '이름 없음';
  return {
    nickname:nick,
    className:ch.className || p.className || (classes[p.classId]||classes.warrior).name,
    level:Number(p.level || ch.level || 1),
    floor:Number(p.floor || ch.floor || 1),
    combatPower:Number(ch.combatPower || combatPowerForRun(ch.run, metaObj)),
    score:Number(ch.score || rankingScoreForRun(ch.run, metaObj)),
    updatedAt:ch.updatedAt || new Date().toISOString()
  };
}

syncActiveCharacterFromRun = function(){
  if(!S || !S.player || activeCharacterSlot == null) return;
  const mode = S.loginMode || activeLoginMode || 'guest';
  const limit = currentSlotLimit(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(mode), limit);
  const p = S.player;
  const power = combatPowerForRun(S, meta);
  const score = rankingScoreForRun(S, meta);
  slots[activeCharacterSlot] = {
    nickname: mode === 'guest' ? '게스트' : (p.name || S.characterNickname || p.className || '이름 없음'),
    classId: p.classId || S.characterClassId || 'warrior',
    className: p.className || (classes[p.classId]||classes.warrior).name,
    level: Number(p.level || 1),
    floor: Number(p.floor || 1),
    combatPower: power,
    score: score,
    updatedAt: new Date().toISOString(),
    run: deepClone(S)
  };
  setSlotsForMode(mode, slots);
};
normalizeCharacterSlots = function(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length<count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    if(ch.run && ch.run.player){
      const p = ch.run.player;
      const metaForPower = meta || {};
      return {
        nickname: ch.nickname || p.name || p.className || '이름 없음',
        classId: ch.classId || p.classId || 'warrior',
        className: ch.className || p.className || (classes[ch.classId||p.classId]||classes.warrior).name,
        level: Number(ch.level || p.level || 1),
        floor: Number(ch.floor || p.floor || 1),
        combatPower: Number(ch.combatPower || combatPowerForRun(ch.run, metaForPower)),
        score: Number(ch.score || rankingScoreForRun(ch.run, metaForPower)),
        updatedAt: ch.updatedAt || new Date().toISOString(),
        run: ch.run
      };
    }
    return null;
  });
};
saveCloudCharacterProfile = async function(){
  if(!isCloudLoginMode(activeLoginMode)) return false;

  if(!client) return false;

  const slots = normalizeCharacterSlots(cloudCharacterSlots, 3);

    updated_at:new Date().toISOString()
  }, {onConflict:'user_id'});
  if(error) throw error;
  return true;
};


/* 요청 반영: 닉네임 중복 방지 */
function normalizeNicknameForCheck(nick){
  return String(nick || '').trim().replace(/\s+/g, ' ').toLowerCase();
}
function nicknameMatchesForCheck(a, b){
  return !!a && !!b && normalizeNicknameForCheck(a) === normalizeNicknameForCheck(b);
}
function characterNicknameListFromSaveRow(row){
  const names = [];
  const save = row && row.save_data ? row.save_data : {};
  if(row && row.nickname) names.push(row.nickname);
  if(save && save.player){
    if(save.player.name) names.push(save.player.name);
    if(save.player.nickname) names.push(save.player.nickname);
    if(save.player.nick) names.push(save.player.nick);
  }
  if(save && Array.isArray(save.characters)){
    save.characters.forEach(ch=>{
      if(!ch || typeof ch !== 'object') return;
      if(ch.nickname) names.push(ch.nickname);
      if(ch.name) names.push(ch.name);
      if(ch.run && ch.run.player){
        if(ch.run.player.name) names.push(ch.run.player.name);
        if(ch.run.player.nickname) names.push(ch.run.player.nickname);
        if(ch.run.player.nick) names.push(ch.run.player.nick);
      }
    });
  }
  return names;
}
async function isNicknameAlreadyUsed(nickname, mode, slotIndex){
  const key = normalizeNicknameForCheck(nickname);
  if(!key) return false;
  if(key === normalizeNicknameForCheck('게스트')) return true;

  const localSlots = normalizeCharacterSlots(getSlotsForMode(mode), currentSlotLimit(mode));
  for(let i=0;i<localSlots.length;i++){
    if(i === slotIndex) continue;
    const ch = localSlots[i];
    if(ch && nicknameMatchesForCheck(ch.nickname, key)) return true;
  }

  if(!isCloudLoginMode(mode)) return false;
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 필요합니다.');

  const {data,error} = await client
    .from('game_saves')
    .select('nickname, save_data')
    .limit(1000);
  if(error) throw error;

  return (data || []).some(row=>characterNicknameListFromSaveRow(row).some(name=>nicknameMatchesForCheck(name, key)));
}
async function assertNicknameAvailable(nickname, mode, slotIndex){
  const clean = String(nickname || '').trim().replace(/\s+/g, ' ');
  if(!clean) throw new Error('닉네임을 입력하세요.');
  if(clean.length > 12) throw new Error('닉네임은 12자 이하로 입력하세요.');
  if(await isNicknameAlreadyUsed(clean, mode, slotIndex)){
    throw new Error('이미 닉네임이 존재합니다.');
  }
  return clean;
}

async function collectRankingRecords(){
  const records = [];
  if(isCloudLoginMode(activeLoginMode)){
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(client && user){
      const {data,error} = await client.from('game_saves').select('nickname, save_data, meta_data, updated_at').limit(100);
      if(!error && Array.isArray(data)){
        data.forEach(row=>{
          const metaRow = normalizeMeta(row.meta_data || {});
          const save = row.save_data || {};
          if(Array.isArray(save.characters)){
            save.characters.forEach(ch=>{
              const rec = buildRankRecordFromCharacter(ch, metaRow, row.nickname);
              if(rec) records.push(rec);
            });
          }else if(save.player){
            const p = save.player;
            const rec = buildRankRecordFromCharacter({
              nickname:row.nickname || p.name || p.className,
              classId:p.classId,
              className:p.className,
              level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
              floor:p.floor,
              updatedAt:row.updated_at,
              run:save
            }, metaRow, row.nickname);
            if(rec) records.push(rec);
          }
        });
      }
    }
  }
  if(isCloudLoginMode(activeLoginMode)){
    normalizeCharacterSlots(cloudCharacterSlots,3).forEach(ch=>{
      const rec = buildRankRecordFromCharacter(ch, meta);
      if(rec) records.push(rec);
    });
  }
  const dedup = new Map();
  records.forEach(r=>{
    const key = `${r.nickname}|${r.className}|${r.level}|${r.floor}`;
    const prev = dedup.get(key);
    if(!prev || r.score > prev.score) dedup.set(key, r);
  });
  return Array.from(dedup.values()).sort((a,b)=>(b.score-a.score)||(b.combatPower-a.combatPower)||(b.floor-a.floor)||(b.level-a.level)).slice(0,50);
}

function normalizeOnlineList(){

  try{

  }catch(e){}
  const byId = new Map();

    (Array.isArray(arr) ? arr : []).forEach(v=>{
      if(!v) return;
      const id = String(v.id || v.onlineId || v.presence_ref || Math.random());
      const old = byId.get(id);
      if(!old || Number(v.updatedAt||0) >= Number(old.updatedAt||0)) byId.set(id, v);

  if(!byId.size){

async function syncOnlinePresence(force=false){
  bindOnlineBadge();
  const now = Date.now();
  if(!force && now - onlineLastTrackAt < 12000) return;
  onlineLastTrackAt = now;
  const self = onlineSelfInfo();
  onlinePresenceStateCache = onlinePresenceStateCache || {};
  onlinePresenceStateCache[ONLINE_CLIENT_ID] = [self];
  updateOnlineBadge();
  const client = getCloudClient && getCloudClient();
  if(!client || typeof client.channel !== 'function') return;
  const sig = (cloudClientSignature || '') + '|' + ONLINE_CLIENT_ID;
  try{
    if(!onlineChannel || onlinePresenceSignature !== sig){
      if(onlineChannel && typeof client.removeChannel === 'function'){
        try{ await client.removeChannel(onlineChannel); }catch(e){}
      }
      onlinePresenceSignature = sig;
      onlineChannel = client.channel(ONLINE_PRESENCE_CHANNEL, {config:{presence:{key:ONLINE_CLIENT_ID}}});
      onlineChannel.on('presence', {event:'sync'}, ()=>{
        try{ onlinePresenceStateCache = onlineChannel.presenceState() || onlinePresenceStateCache; }catch(e){}
        updateOnlineBadge();
      });
      onlineChannel.subscribe(async status=>{
        if(status === 'SUBSCRIBED'){
          try{ await onlineChannel.track(onlineSelfInfo()); }catch(e){}
          try{ onlinePresenceStateCache = onlineChannel.presenceState() || onlinePresenceStateCache; }catch(e){}
          updateOnlineBadge();
        }
      });
    }else if(onlineChannel && typeof onlineChannel.track === 'function'){
      await onlineChannel.track(self);
    }
  }catch(e){
    updateOnlineBadge();
  }
}

/* 요청 반영: 랭킹은 온라인 상태가 아니라 슬롯별 최고기록 기준으로 고정 */
function normalizeStoredRankRecord(rec, fallbackNick){
  if(!rec || typeof rec !== 'object') return null;
  const nick = rec.nickname || fallbackNick || '이름 없음';
  const cls = rec.className || '-';
  const level = Number(rec.level || 1);
  const floor = Number(rec.floor || 1);
  const combatPower = Number(rec.combatPower || 0);
  const score = Number(rec.score || 0);
  if(!score && !combatPower && floor <= 1 && level <= 1) return null;
  return {
    nickname:String(nick),
    className:String(cls),
    level:clamp(Math.max(1, level), 1, MAX_LEVEL),
    floor:Math.max(1, floor),
    combatPower:Math.max(0, combatPower),
    score:Math.max(0, score),
    updatedAt:rec.updatedAt || new Date().toISOString()
  };
}
function compareRankRecords(a,b){
  const ar = normalizeStoredRankRecord(a) || {score:0,combatPower:0,floor:0,level:0};
  const br = normalizeStoredRankRecord(b) || {score:0,combatPower:0,floor:0,level:0};
  return (ar.score-br.score) || (ar.combatPower-br.combatPower) || (ar.floor-br.floor) || (ar.level-br.level);
}
function rankRecordFromRun(run, metaObj, fallbackNick){
  const p = run && run.player ? run.player : null;
  if(!p) return null;
  return {
    nickname:String(fallbackNick || p.name || p.className || '이름 없음'),
    className:String(p.className || (classes[p.classId]||classes.warrior).name),
    level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
    floor:Number(p.floor || 1),
    combatPower:Number(combatPowerForRun(run, metaObj || meta || {})),
    score:Number(rankingScoreForRun(run, metaObj || meta || {})),
    updatedAt:new Date().toISOString()
  };
}
function chooseBestRankRecord(prev, current){
  const p = normalizeStoredRankRecord(prev);
  const c = normalizeStoredRankRecord(current);
  if(!p) return c;
  if(!c) return p;
  return compareRankRecords(c,p) > 0 ? c : p;
}
buildRankRecordFromCharacter = function(ch, metaObj, fallbackNick){
  if(!ch || typeof ch !== 'object') return null;
  const savedBest = normalizeStoredRankRecord(ch.bestRank || ch.rankRecord, ch.nickname || fallbackNick);
  const current = ch.run && ch.run.player ? rankRecordFromRun(ch.run, metaObj, ch.nickname || fallbackNick) : null;
  return chooseBestRankRecord(savedBest, current);
};
normalizeCharacterSlots = function(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length < count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    const run = ch.run || null;
    const p = run && run.player ? run.player : null;
    if(!p && !(ch.bestRank || ch.rankRecord)) return null;
    const clsId = ch.classId || (p && p.classId) || 'warrior';
    const cls = classes[clsId] || classes.warrior;
    const nickname = ch.nickname || (p && p.name) || (ch.bestRank && ch.bestRank.nickname) || cls.name || '이름 없음';
    const current = p ? rankRecordFromRun(run, meta || {}, nickname) : null;
    const bestRank = chooseBestRankRecord(ch.bestRank || ch.rankRecord, current);
    return {
      nickname,
      classId:clsId,
      className:ch.className || (p && p.className) || cls.name,
      level:Number((p && p.level) || ch.level || 1),
      floor:Number((p && p.floor) || ch.floor || 1),
      combatPower:Number((current && current.combatPower) || ch.combatPower || 0),
      score:Number((current && current.score) || ch.score || 0),
      updatedAt:ch.updatedAt || (bestRank && bestRank.updatedAt) || new Date().toISOString(),
      bestRank,
      run
    };
  });
};
syncActiveCharacterFromRun = function(){
  if(!S || !S.player || activeCharacterSlot == null) return;
  const mode = S.loginMode || activeLoginMode || 'guest';
  const limit = currentSlotLimit(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(mode), limit);

  const currentRank = rankRecordFromRun(S, meta || {}, mode === 'guest' ? '게스트' : (p.name || S.characterNickname || p.className || '이름 없음'));
  const bestRank = chooseBestRankRecord(prev && prev.bestRank, currentRank);
  slots[activeCharacterSlot] = {
    nickname: mode === 'guest' ? '게스트' : (p.name || S.characterNickname || p.className || '이름 없음'),
    classId: p.classId || S.characterClassId || 'warrior',

collectRankingRecords = async function(){
  const records = [];
  if(isCloudLoginMode(activeLoginMode)){
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(client && user){
      const {data,error} = await client.from('game_saves').select('nickname, save_data, meta_data, updated_at').limit(1000);

        data.forEach(row=>{

            save.characters.forEach(ch=>{
              const rec = buildRankRecordFromCharacter(ch, metaRow, row.nickname);
              if(rec) records.push(rec);
            });
          }else if(Array.isArray(save.rankings)){
            save.rankings.forEach(r=>{
              const rec = normalizeStoredRankRecord(r, row.nickname);
              if(rec) records.push(rec);
            });
          }else if(save.player){
            const rec = rankRecordFromRun(save, metaRow, row.nickname || save.player.name || save.player.className);
            if(rec) records.push(rec);
          }
        });
      }
    }
    normalizeCharacterSlots(cloudCharacterSlots,3).forEach(ch=>{
      const rec = buildRankRecordFromCharacter(ch, meta);
      if(rec) records.push(rec);
    });
  }
  const dedup = new Map();
  records.forEach(r=>{
    const key = `${r.nickname}|${r.className}`;
    const prev = dedup.get(key);
    if(!prev || compareRankRecords(r, prev) > 0) dedup.set(key, r);
  });
  return Array.from(dedup.values())
    .sort((a,b)=>(b.score-a.score)||(b.combatPower-a.combatPower)||(b.floor-a.floor)||(b.level-a.level))
    .slice(0,50);
};

/* 랭킹 안정화: 온라인 presence가 아니라 공개 최고기록 테이블(game_rankings) 기준으로 조회 */
const PUBLIC_RANKING_TABLE = 'game_rankings';
function publicRankIdFor(userId, slotIndex){ return `${userId}_${slotIndex}`; }
function rankRecordFromPublicRow(row){
  if(!row) return null;
  return normalizeStoredRankRecord({
    nickname:row.nickname || '이름 없음',
    className:row.class_name || row.className || '-',
    level:row.level || 1,
    floor:row.floor || 1,
    combatPower:row.combat_power || row.combatPower || 0,
    score:row.score || 0,
    updatedAt:row.updated_at || row.updatedAt || new Date().toISOString()
  }, row.nickname || '이름 없음');
}
async function syncPublicRankingRowsForCurrentUser(){
  if(!isCloudLoginMode(activeLoginMode)) return false;
  const client = getCloudClient();
  const user = await currentCloudUser();
  if(!client || !user) return false;
  const slots = normalizeCharacterSlots(cloudCharacterSlots, 3);
  const rows = [];
  slots.forEach((ch, i)=>{
    const rec = buildRankRecordFromCharacter(ch, meta);
    if(!rec) return;
    rows.push({
      rank_id:publicRankIdFor(user.id, i),
      user_id:user.id,
      slot_index:i,
      nickname:String(rec.nickname || '이름 없음'),
      class_name:String(rec.className || '-'),
      level:Number(rec.level || 1),
      floor:Number(rec.floor || 1),
      combat_power:Number(rec.combatPower || 0),
      score:Number(rec.score || 0),
      updated_at:rec.updatedAt || new Date().toISOString()
    });
  });
  try{
    if(rows.length){
      const {error} = await client.from(PUBLIC_RANKING_TABLE).upsert(rows, {onConflict:'rank_id'});
      if(error) throw error;
    }
    for(let i=0;i<3;i++){
      if(!rows.some(r=>r.slot_index===i)){
        await client.from(PUBLIC_RANKING_TABLE).delete().eq('rank_id', publicRankIdFor(user.id, i));
      }
    }
    return true;
  }catch(e){
    console.warn('public ranking sync skipped:', e && e.message ? e.message : e);
    return false;
  }
}
const previousSaveCloudCharacterProfileForPublicRank = saveCloudCharacterProfile;
saveCloudCharacterProfile = async function(){
  const result = await previousSaveCloudCharacterProfileForPublicRank();
  await syncPublicRankingRowsForCurrentUser();
  return result;
};
const previousCollectRankingRecordsForPublicRank = collectRankingRecords;
collectRankingRecords = async function(){
  const records = [];
  let usedPublicTable = false;
  if(isCloudLoginMode(activeLoginMode)){
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(client && user){
      try{
        const {data,error} = await client
          .from(PUBLIC_RANKING_TABLE)
          .select('rank_id,user_id,slot_index,nickname,class_name,level,floor,combat_power,score,updated_at')
          .order('score', {ascending:false})
          .limit(1000);
        if(error) throw error;
        if(Array.isArray(data)){
          usedPublicTable = true;
          data.forEach(row=>{
            const rec = rankRecordFromPublicRow(row);
            if(rec) records.push(rec);
          });
        }
      }catch(e){
        console.warn('public ranking table unavailable, fallback to game_saves:', e && e.message ? e.message : e);
      }
    }
  }
  if(!records.length){
    const fallback = await previousCollectRankingRecordsForPublicRank();
    fallback.forEach(r=>records.push(r));
  }
  const dedup = new Map();
  records.forEach(r=>{
    const key = `${r.nickname}|${r.className}`;
    const prev = dedup.get(key);
    if(!prev || compareRankRecords(r, prev) > 0) dedup.set(key, r);
  });
  const result = Array.from(dedup.values())
    .sort((a,b)=>(b.score-a.score)||(b.combatPower-a.combatPower)||(b.floor-a.floor)||(b.level-a.level))
    .slice(0,50);
  result._usedPublicTable = usedPublicTable;
  return result;
};

/* 요청 반영: 영혼 강화 초기화는 사용 영혼의 1/2 환급, 스탯창에 영혼 보정 표시 */
function soulUpgradeZeroState(){
  return {hp:0, atk:0, def:0, crit:0, xp:0, gold:0};
}
function soulUpgradeSpentFor(id, lv){
  const d = metaDefs.find(x=>x.id===id);
  const n = Math.max(0, Number(lv || 0));
  if(!d) return 0;
  let total = 0;
  for(let i=0;i<n;i++) total += Math.floor(d.base * Math.pow(1.55, i));
  return total;
}
function totalSoulSpentForUpgrades(upgrades){
  const u = upgrades || (meta && meta.upgrades) || {};
  return metaDefs.reduce((sum,d)=>sum + soulUpgradeSpentFor(d.id, u[d.id] || 0), 0);
}
function soulUpgradeRefundAmount(upgrades){
  return Math.floor(totalSoulSpentForUpgrades(upgrades) / 2);
}
function soulUpgradeBonusInfo(upgrades){
  const u = upgrades || (meta && meta.upgrades) || {};
  const hp = Number(u.hp || 0) * 5;
  const atk = Number(u.atk || 0);
  const def = Number(u.def || 0);
  const crit = Number(u.crit || 0) * 2;
  const xp = Number(u.xp || 0) * 4;
  const gold = Number(u.gold || 0) * 5;
  return {hp, atk, def, crit, xp, gold};
}
function soulUpgradeBonusShortText(){
  const b = soulUpgradeBonusInfo();
  return `HP +${b.hp} / 공격 +${b.atk} / 방어 +${b.def} / 치명 +${b.crit}% / 경험치 +${b.xp}% / 골드 +${b.gold}%`;
}
function soulUpgradeBonusStatsHtml(){
  const b = soulUpgradeBonusInfo();
  return `<h3 style="margin:12px 0 6px">영혼 강화 보정</h3>
  <div class="stats">
    <div>최대 HP <b>+${b.hp}</b></div><div>공격 <b>+${b.atk}</b></div>

}
function resetSoulUpgradesWithHalfRefund(){
  const spent = totalSoulSpentForUpgrades(meta.upgrades);
  const refund = Math.floor(spent / 2);
  if(spent <= 0){
    toast('초기화할 영혼 강화가 없습니다.');
    return false;
  }
  if(!confirm(`영혼 강화 스탯을 초기화하고 사용한 영혼 ${spent.toLocaleString()}개의 절반인 ${refund.toLocaleString()}개를 돌려받겠습니까?`)) return false;
  meta.upgrades = soulUpgradeZeroState();
  meta.souls = Math.max(0, Number(meta.souls || 0)) + refund;
  saveMeta();
  toast(`영혼 강화 초기화 완료. 영혼 ${refund.toLocaleString()}개를 돌려받았습니다.`);
  return true;
}

/* 설정 메뉴 / 키맵핑 / 게임 화면 핀치 확대축소 */
const CONTROL_LAYOUT_KEY = 'abyss_control_layout_v3';
const GAME_ZOOM_KEY = 'abyss_game_zoom_v1';
const DEFAULT_ACTION_ORDER = ['skill1','skill2','skill3','potionBtn','attackBtn'];
const DEFAULT_MENU_ORDER = ['statMenuBtn','equipMenuBtn','bagMenuBtn','skillMenuBtn','autoBtn','mapMenuBtn','codexMenuBtn','logChatBtn','rankingMenuBtn','menuMenuBtn'];

function clampGameZoom(v){
  return Math.max(0.85, Math.min(1.85, Number(v)||1));
}
let gameZoomValue = clampGameZoom(localStorage.getItem(GAME_ZOOM_KEY) || 1);
function applyGameZoom(){
  document.documentElement.style.setProperty('--gameZoom', String(clampGameZoom(gameZoomValue).toFixed(2)));
}
function setGameZoom(v){
  gameZoomValue = clampGameZoom(v);
  localStorage.setItem(GAME_ZOOM_KEY, String(gameZoomValue.toFixed(2)));
  applyGameZoom();
}
function normalizedOrder(saved, defaults){
  const arr = Array.isArray(saved) ? saved.filter(id=>defaults.includes(id)) : [];
  defaults.forEach(id=>{ if(!arr.includes(id)) arr.push(id); });
  return arr;
}
function loadControlLayout(){
  let data = null;
  try{ data = JSON.parse(localStorage.getItem(CONTROL_LAYOUT_KEY) || 'null'); }catch(e){}
  if(!data){
    try{ data = JSON.parse(localStorage.getItem('abyss_control_layout_v2') || 'null'); }catch(e){}
  }
  return {
    analog: data?.analog === 'right' ? 'right' : 'left',
    actionOrder: normalizedOrder(data?.actionOrder, DEFAULT_ACTION_ORDER),
    menuOrder: normalizedOrder(data?.menuOrder, DEFAULT_MENU_ORDER)
  };
}
function saveControlLayout(layout){
  localStorage.setItem(CONTROL_LAYOUT_KEY, JSON.stringify({
    analog: layout.analog === 'right' ? 'right' : 'left',
    actionOrder: normalizedOrder(layout.actionOrder, DEFAULT_ACTION_ORDER),
    menuOrder: normalizedOrder(layout.menuOrder, DEFAULT_MENU_ORDER)
  }));
}
function applyControlLayout(){
  const layout = loadControlLayout();
  const app = $('app');
  if(app) app.classList.toggle('layoutAnalogRight', layout.analog === 'right');
  const skillBar = document.querySelector('.skillbar');
  if(skillBar){
    layout.actionOrder.forEach(id=>{
      const el = $(id);
      if(el && el.parentElement === skillBar) skillBar.appendChild(el);
    });
  }
  const menuBar = document.querySelector('.menubar');
  if(menuBar){
    layout.menuOrder.forEach(id=>{
      const el = $(id);
      if(el && el.parentElement === menuBar) menuBar.appendChild(el);
    });
  }
  const menuBtn = $('menuMenuBtn');
  if(menuBtn){
    const b = menuBtn.querySelector('b');
    if(b) b.textContent = '설정';
  }
}
function getKeymapButtonLabel(id){
  const el = $(id);
  const main = el?.querySelector('b')?.textContent?.trim();
  const sub = el?.querySelector('small')?.textContent?.trim();
  const fallback = {
    skill1:'스킬1',skill2:'스킬2',skill3:'스킬3',potionBtn:'물약',attackBtn:'공격',
    statMenuBtn:'스탯',equipMenuBtn:'장비',bagMenuBtn:'가방',skillMenuBtn:'스킬',autoBtn:'오토',
    mapMenuBtn:'미니맵',codexMenuBtn:'도감',logChatBtn:'로그',rankingMenuBtn:'랭킹',menuMenuBtn:'설정'
  }[id] || id;
  return main || sub || fallback;
}
function renderKeymapItems(order){
  return order.map(id=>`<div class="keymapBtnItem" data-keymap-btn="${id}">${escapeText(getKeymapButtonLabel(id))}</div>`).join('');
}

  showModal(`<h2>키맵핑</h2>${renderKeymapPreview(layout)}`, false);

}
function bindKeymapModalHandlers(){
  const getLayout = () => loadControlLayout();
  const setSide = side => {
    const layout = getLayout();
    layout.analog = side === 'right' ? 'right' : 'left';
    saveControlLayout(layout);
    applyControlLayout();
    showKeymapMenu();
  };
  const leftBtn = $('keymapAnalogLeftBtn');
  const rightBtn = $('keymapAnalogRightBtn');
  const resetBtn = $('keymapResetBtn');
  const doneBtn = $('keymapDoneBtn');
  if(leftBtn) leftBtn.onclick = () => setSide('left');
  if(rightBtn) rightBtn.onclick = () => setSide('right');
  if(resetBtn) resetBtn.onclick = () => {
    saveControlLayout({analog:'left', actionOrder:[...DEFAULT_ACTION_ORDER], menuOrder:[...DEFAULT_MENU_ORDER]});
    applyControlLayout();
    showKeymapMenu();
  };
  if(doneBtn) doneBtn.onclick = () => { hideModal(); renderAll(); };

  const analog = $('keymapAnalogPreview');
  if(analog){
    let startX=0, startY=0, pid=null;
    analog.addEventListener('pointerdown', e=>{
      pid=e.pointerId; startX=e.clientX; startY=e.clientY;
      analog.setPointerCapture?.(pid);
      analog.classList.add('dragging');
      analog.style.transition='none';
      e.preventDefault();
    });
    analog.addEventListener('pointermove', e=>{
      if(pid!==e.pointerId) return;
      const dx=e.clientX-startX, dy=e.clientY-startY;
      analog.style.transform=`translate(${dx}px,${dy}px) scale(1.04)`;
    });
    const finish=e=>{
      if(pid!==e.pointerId) return;
      const side = e.clientX > window.innerWidth/2 ? 'right' : 'left';
      analog.style.transition='transform .18s ease';
      analog.style.transform='';
      analog.classList.remove('dragging');
      pid=null;
      setTimeout(()=>setSide(side), 80);
    };
    analog.addEventListener('pointerup', finish);
    analog.addEventListener('pointercancel', ()=>{ analog.style.transition=''; analog.style.transform=''; analog.classList.remove('dragging'); pid=null; });
  }

  function bindSortableList(listId, orderKey){
    const list = $(listId);
    if(!list) return;

    const animateReflow = (mutate)=>{
      const moving = [...list.querySelectorAll('.keymapBtnItem:not(.dragging)')];
      const first = new Map(moving.map(el=>[el, el.getBoundingClientRect()]));
      mutate();
      requestAnimationFrame(()=>{
        moving.forEach(el=>{
          const a = first.get(el);
          if(!a || !el.isConnected) return;
          const b = el.getBoundingClientRect();
          const dx = a.left - b.left;
          const dy = a.top - b.top;
          if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
          el.classList.add('moving');
          el.style.transition = 'none';
          el.style.transform = `translate(${dx}px,${dy}px)`;
          requestAnimationFrame(()=>{
            el.style.transition = 'transform .16s ease';
            el.style.transform = '';
            setTimeout(()=>{ el.classList.remove('moving'); el.style.transition=''; }, 180);
          });
        });
      });
    };

    let dragId=null, dragEl=null, placeholder=null, pid=null, grabX=0, grabY=0;
    const defaults = orderKey === 'menuOrder' ? DEFAULT_MENU_ORDER : DEFAULT_ACTION_ORDER;
    const clearDrop = ()=>list.querySelectorAll('.keymapBtnItem').forEach(x=>x.classList.remove('dropTarget'));
    const cleanupDrag = ()=>{
      if(dragEl){
        dragEl.classList.remove('dragging');
        dragEl.style.left=''; dragEl.style.top=''; dragEl.style.width=''; dragEl.style.height='';
        dragEl.style.setProperty('--drag-w',''); dragEl.style.setProperty('--drag-h','');
        dragEl.style.zIndex=''; dragEl.style.pointerEvents=''; dragEl.style.transform=''; dragEl.style.transition='';
      }
      if(placeholder && placeholder.parentNode) placeholder.remove();
      clearDrop();
      dragId=null; dragEl=null; placeholder=null; pid=null;
    };
    const readOrderFromDom = ()=>{
      const order=[];
      [...list.children].forEach(el=>{
        if(el === placeholder){ if(dragId) order.push(dragId); return; }
        if(el === dragEl) return;
        const id = el.dataset?.keymapBtn;
        if(id && defaults.includes(id) && !order.includes(id)) order.push(id);
      });
      defaults.forEach(id=>{ if(!order.includes(id)) order.push(id); });
      return order;
    };
    const movePlaceholderNear = (target, clientX, clientY)=>{
      if(!target || target === dragEl || target === placeholder || target.closest(`#${listId}`) !== list) return;
      const r = target.getBoundingClientRect();
      const horizontal = getComputedStyle(list).gridTemplateColumns.split(' ').length > 1;
      const before = horizontal ? clientX < r.left + r.width/2 : clientY < r.top + r.height/2;
      const nextNode = before ? target : target.nextSibling;
      if(nextNode === placeholder) return;
      animateReflow(()=>list.insertBefore(placeholder, nextNode));
    };

    list.querySelectorAll('.keymapBtnItem').forEach(item=>{
      item.addEventListener('pointerdown', e=>{
        dragId = item.dataset.keymapBtn;
        if(!dragId) return;
        dragEl = item;
        pid = e.pointerId;
        const rect = item.getBoundingClientRect();
        grabX = e.clientX - rect.left;
        grabY = e.clientY - rect.top;
        placeholder = document.createElement('div');
        placeholder.className = 'keymapBtnItem keymapPlaceholder';
        placeholder.textContent = '빈자리';
        placeholder.style.minHeight = rect.height + 'px';
        list.insertBefore(placeholder, item.nextSibling);
        item.setPointerCapture?.(pid);
        item.style.setProperty('--drag-w', rect.width + 'px');
        item.style.setProperty('--drag-h', rect.height + 'px');
        item.style.left = rect.left + 'px';
        item.style.top = rect.top + 'px';
        item.classList.add('dragging');
        e.preventDefault();
        e.stopPropagation();
      });

      item.addEventListener('pointermove', e=>{
        if(!dragId || dragEl!==item || pid!==e.pointerId) return;
        item.style.left = (e.clientX - grabX) + 'px';
        item.style.top = (e.clientY - grabY) + 'px';
        const under = document.elementFromPoint(e.clientX, e.clientY)?.closest?.('.keymapBtnItem');
        clearDrop();
        if(under && under !== item && under !== placeholder && under.closest(`#${listId}`) === list){
          under.classList.add('dropTarget');
          movePlaceholderNear(under, e.clientX, e.clientY);
        }
        e.preventDefault();
      });

      const finish = e=>{
        if(!dragId || dragEl!==item || pid!==e.pointerId) return;
        const layout = getLayout();
        layout[orderKey] = normalizedOrder(readOrderFromDom(), defaults);
        saveControlLayout(layout);
        applyControlLayout();
        cleanupDrag();
        setTimeout(showKeymapMenu, 70);
        e.preventDefault();
        e.stopPropagation();
      };

      item.addEventListener('pointerup', finish);
      item.addEventListener('pointercancel', cleanupDrag);
      item.addEventListener('lostpointercapture', ()=>{
        if(dragEl === item) cleanupDrag();
      });
    });
  }
  bindSortableList('keymapActionList', 'actionOrder');
  bindSortableList('keymapMenuList', 'menuOrder');
}

/* 게임 화면 핀치 확대/축소 */
function bindGamePinchZoom(){
  applyGameZoom();
  const panel = $('gamePanel');
  if(!panel || panel.dataset.pinchBound === '1') return;
  panel.dataset.pinchBound = '1';
  const points = new Map();
  let startDist = 0;
  let startZoom = gameZoomValue;
  const dist = (a,b)=>Math.hypot(a.x-b.x, a.y-b.y);
  const resetStart = ()=>{
    const arr=[...points.values()];
    if(arr.length>=2){
      startDist = dist(arr[0], arr[1]) || 1;
      startZoom = gameZoomValue;
    }
  };
  panel.addEventListener('pointerdown', e=>{
    if(modal && modal.classList.contains('show')) return;
    points.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(points.size===2) resetStart();
  }, {passive:false});
  panel.addEventListener('pointermove', e=>{
    if(!points.has(e.pointerId)) return;
    points.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(points.size>=2){
      e.preventDefault();
      const arr=[...points.values()];
      const d = dist(arr[0],arr[1]) || startDist || 1;
      setGameZoom(startZoom * (d / (startDist || d || 1)));
    }
  }, {passive:false});
  ['pointerup','pointercancel','pointerleave'].forEach(type=>{
    panel.addEventListener(type, e=>{
      points.delete(e.pointerId);
      if(points.size<2){ startDist=0; startZoom=gameZoomValue; }
      else resetStart();
    }, {passive:false});
  });
  window.addEventListener('blur', ()=>points.clear());
}
applyControlLayout();
bindGamePinchZoom();



/* 요청 반영: 확대 축소 최소값 100%, 실제 게임화면 키맵핑 모드 */
try{
  clampGameZoom = function(v){
    return Math.max(1, Math.min(1.85, Number(v)||1));
  };
  if(typeof gameZoomValue !== 'undefined'){
    gameZoomValue = clampGameZoom(gameZoomValue);
    localStorage.setItem(GAME_ZOOM_KEY, String(gameZoomValue.toFixed(2)));
    applyGameZoom();
  }
}catch(e){}

  return [
    $('analogPad'),

    document.querySelector('.footer')

function animateKeymapLiveReflow(mutate){
  const els = keymapLiveElements().filter(el=>el.isConnected);
  const first = new Map(els.map(el=>[el, el.getBoundingClientRect()]));
  mutate();
  requestAnimationFrame(()=>{
    els.forEach(el=>{
      if(!el.isConnected) return;
      const a=first.get(el);
      if(!a) return;
      const b=el.getBoundingClientRect();
      const dx=a.left-b.left;
      const dy=a.top-b.top;
      if(Math.abs(dx)<1 && Math.abs(dy)<1) return;
      el.classList.add('keymapLiveMoving');
      const prevTransition=el.style.transition;
      const prevTransform=el.style.transform;
      el.style.transition='none';
      el.style.transform=`translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition='transform .18s ease';
        el.style.transform=prevTransform || '';
        setTimeout(()=>{
          el.classList.remove('keymapLiveMoving');
          el.style.transition=prevTransition || '';
        }, 210);
      });
    });
  });
}

let keymapLiveSession = null;

function endLiveKeymapMode(mode){
  if(!keymapLiveSession) return;
  const sess=keymapLiveSession;
  try{ sess.abort?.abort(); }catch(e){}
  document.body.classList.remove('liveKeymapMode');
  removeKeymapLiveBar();
  document.querySelectorAll('.keymapLiveTarget,.keymapLiveDragging,.keymapLivePlaceholder,.keymapLiveMoving').forEach(el=>{
    el.classList.remove('keymapLiveTarget','keymapLiveDragging','keymapLivePlaceholder','keymapLiveMoving');
    el.style.left=''; el.style.top=''; el.style.width=''; el.style.height='';
    el.style.minWidth=''; el.style.minHeight=''; el.style.maxWidth=''; el.style.maxHeight='';
    el.style.transform=''; el.style.transition=''; el.style.pointerEvents='';
    el.style.removeProperty('--live-drag-w');
    el.style.removeProperty('--live-drag-h');
  });
  if(mode === 'apply'){
    saveControlLayout(sess.working);
    applyControlLayout();
    toast('키맵핑 적용 완료.');
  }else{
    applyControlLayoutLive(sess.original);
    toast(mode === 'default' ? '기본 배치로 되돌렸다.' : '키맵핑 취소.');
  }
  keymapLiveSession=null;
  renderAll();
}
function updateKeymapLiveWorkingFromDom(){
  if(!keymapLiveSession) return;
  const read = (selector, defaults)=>{
    const list=document.querySelector(selector);
    const arr=[];
    if(list){
      [...list.children].forEach(el=>{
        const id=el.id || el.dataset?.keymapBtn;
        if(id && defaults.includes(id) && !arr.includes(id)) arr.push(id);
      });
    }
    defaults.forEach(id=>{ if(!arr.includes(id)) arr.push(id); });
    return arr;
  };
  keymapLiveSession.working.actionOrder = read('.skillbar', DEFAULT_ACTION_ORDER);
  keymapLiveSession.working.menuOrder = read('.menubar', DEFAULT_MENU_ORDER);
  keymapLiveSession.working.analog = $('app')?.classList.contains('layoutAnalogRight') ? 'right' : 'left';
}
function moveLivePlaceholder(list, placeholder, dragged, clientX, clientY){
  const target = document.elementFromPoint(clientX, clientY)?.closest?.('.skill,.menuBtn');
  list.querySelectorAll('.keymapLiveTarget').forEach(el=>el.classList.remove('keymapLiveTarget'));
  if(!target || target===dragged || target===placeholder || target.parentElement!==list) return;
  target.classList.add('keymapLiveTarget');
  const r=target.getBoundingClientRect();
  const cols = getComputedStyle(list).gridTemplateColumns.split(' ').filter(Boolean).length;
  const before = cols > 1 ? clientX < r.left + r.width/2 : clientY < r.top + r.height/2;
  const nextNode = before ? target : target.nextSibling;
  if(nextNode === placeholder) return;
  animateKeymapLiveReflow(()=>list.insertBefore(placeholder, nextNode));
}
function startLiveButtonDrag(el, e){
  if(!keymapLiveSession || !el || !(el.classList.contains('skill') || el.classList.contains('menuBtn'))) return;
  const list = el.parentElement;
  if(!(list && (list.classList.contains('skillbar') || list.classList.contains('menubar')))) return;
  const defaults = list.classList.contains('menubar') ? DEFAULT_MENU_ORDER : DEFAULT_ACTION_ORDER;
  if(!defaults.includes(el.id)) return;

  const rect=el.getBoundingClientRect();
  const grabX=e.clientX-rect.left;
  const grabY=e.clientY-rect.top;
  const placeholder=document.createElement(el.tagName.toLowerCase());
  placeholder.type='button';
  placeholder.disabled=true;
  placeholder.className=el.className + ' keymapLivePlaceholder';
  placeholder.innerHTML='<b>빈자리</b>';
  placeholder.style.width=rect.width+'px';
  placeholder.style.height=rect.height+'px';
  placeholder.style.minHeight=rect.height+'px';

  const next=el.nextSibling;
  list.insertBefore(placeholder, next);
  document.body.appendChild(el);

  el.classList.add('keymapLiveDragging');
  el.style.setProperty('--live-drag-w', rect.width+'px');
  el.style.setProperty('--live-drag-h', rect.height+'px');
  el.style.left=rect.left+'px';
  el.style.top=rect.top+'px';

  let pid=e.pointerId;
  try{ el.setPointerCapture?.(pid); }catch(err){}
  const move=ev=>{
    if(ev.pointerId!==pid) return;
    el.style.left=(ev.clientX-grabX)+'px';
    el.style.top=(ev.clientY-grabY)+'px';
    moveLivePlaceholder(list, placeholder, el, ev.clientX, ev.clientY);
    ev.preventDefault();
  };
  const finish=ev=>{
    if(ev.pointerId!==pid) return;
    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
    list.insertBefore(el, placeholder);
    placeholder.remove();
    el.classList.remove('keymapLiveDragging');
    el.style.left=''; el.style.top='';
    el.style.removeProperty('--live-drag-w');
    el.style.removeProperty('--live-drag-h');
    list.querySelectorAll('.keymapLiveTarget').forEach(x=>x.classList.remove('keymapLiveTarget'));
    updateKeymapLiveWorkingFromDom();
    ev.preventDefault();
    ev.stopPropagation();
  };
  const cancel=ev=>{

function startLiveAnalogDrag(e){
  if(!keymapLiveSession) return;
  const pad=$('analogPad');
  if(!pad) return;
  const startX=e.clientX, startY=e.clientY;
  let pid=e.pointerId;
  let candidate=keymapLiveSession.working.analog;
  pad.classList.add('keymapLiveTarget');
  pad.style.transition='none';
  try{ pad.setPointerCapture?.(pid); }catch(err){}
  const move=ev=>{
    if(ev.pointerId!==pid) return;
    const dx=ev.clientX-startX;
    const dy=ev.clientY-startY;
    pad.style.transform=`translate(${dx}px,${dy}px) scale(1.02)`;
    candidate = ev.clientX > window.innerWidth/2 ? 'right' : 'left';
    ev.preventDefault();
  };
  const finish=ev=>{
    if(ev.pointerId!==pid) return;
    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
    pad.style.transition='transform .14s ease';
    pad.style.transform='';
    pad.classList.remove('keymapLiveTarget');
    setTimeout(()=>{ pad.style.transition=''; }, 160);
    if(candidate !== keymapLiveSession.working.analog){

      animateKeymapLiveReflow(()=>applyControlLayoutLive(keymapLiveSession.working));

    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
    pad.style.transition='';
    pad.style.transform='';
    pad.classList.remove('keymapLiveTarget');
  };
  document.addEventListener('pointermove', move, true);
  document.addEventListener('pointerup', finish, true);
  document.addEventListener('pointercancel', cancel, true);
  e.preventDefault();
  e.stopPropagation();
}

function bindGameZoomResetTouch(){
  const panel=$('gamePanel');
  if(!panel || panel.dataset.zoomResetBound==='1') return;
  panel.dataset.zoomResetBound='1';
  let started=false, startAt=0, lastResetTap=0, sx=0, sy=0;
  panel.addEventListener('touchstart', e=>{
    if(e.touches && e.touches.length===2){
      started=true;
      startAt=Date.now();
      sx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      sy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    }else{
      started=false;
    }
  }, {passive:true});
  panel.addEventListener('touchend', e=>{
    if(!started) return;
    const dt=Date.now()-startAt;
    started=false;
    if(dt>280) return;
    const now=Date.now();
    if(now-lastResetTap<520){
      setGameZoom(1);
      toast('화면 배율 100%');
      lastResetTap=0;
    }else{
      lastResetTap=now;
    }
  }, {passive:true});
}

function positionKeymapLiveBarAtLog(){

  if(logBoxOuter){

    const r = logBoxOuter.getBoundingClientRect();
    if(st.display !== 'none' && r.width > 120 && r.height > 40){
      const w = Math.min(Math.max(218, r.width - 14), 310);
      bar.classList.add('keymapAtLog');
      bar.style.width = w + 'px';
      bar.style.left = Math.round(r.left + (r.width - w) / 2) + 'px';
      bar.style.top = Math.round(r.top + 8) + 'px';
      bar.style.bottom = 'auto';
      bar.style.transform = 'none';
      placed = true;
    }
  }
  if(!placed){
    bar.classList.remove('keymapAtLog');
    bar.style.width = '';
    bar.style.left = '50%';
    bar.style.top = 'calc(env(safe-area-inset-top, 0px) + 82px)';
    bar.style.bottom = 'auto';
    bar.style.transform = 'translateX(-50%)';
  }
}

  const rightRect = rightui ? rightui.getBoundingClientRect() : null;
  if(rightui && rightRect && rightRect.width > 0){
    rightui.style.setProperty('--keymap-bundle-w', Math.round(rightRect.width) + 'px');
    rightui.classList.add('keymapBundleLocked');
  }
  mutate();
  requestAnimationFrame(()=>{
    els.forEach(el=>{
      if(!el.isConnected) return;
      const a = first.get(el);
      if(!a) return;
      const b = el.getBoundingClientRect();
      const dx = a.left - b.left;
      const dy = a.top - b.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      const prevTransition = el.style.transition;
      const prevTransform = el.style.transform;
      el.classList.add('keymapLiveMoving');
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition = 'transform .18s ease';
        el.style.transform = prevTransform || '';
        setTimeout(()=>{
          el.classList.remove('keymapLiveMoving');
          el.style.transition = prevTransition || '';
        }, 210);
      });
    });
    setTimeout(()=>{
      if(rightui){
        rightui.classList.remove('keymapBundleLocked');
        rightui.style.removeProperty('--keymap-bundle-w');
      }
    }, 240);
  });
}

startLiveButtonDrag = function(el, e){
  if(!keymapLiveSession || !el || !(el.classList.contains('skill') || el.classList.contains('menuBtn'))) return;
  const list = el.parentElement;
  if(!(list && (list.classList.contains('skillbar') || list.classList.contains('menubar')))) return;
  const defaults = list.classList.contains('menubar') ? DEFAULT_MENU_ORDER : DEFAULT_ACTION_ORDER;
  if(!defaults.includes(el.id)) return;

  const rect = el.getBoundingClientRect();
  const size = keymapActualRectSize(el);
  const grabX = e.clientX - rect.left;
  const grabY = e.clientY - rect.top;

  const placeholder = document.createElement(el.tagName.toLowerCase());
  placeholder.type = 'button';
  placeholder.disabled = true;
  placeholder.className = el.className.replace(/\bkeymapLiveDragging\b/g,'').trim() + ' keymapLivePlaceholder';
  placeholder.innerHTML = '<b>빈자리</b>';
  lockLiveDragBox(placeholder, size.w, size.h);

  const next = el.nextSibling;
  list.insertBefore(placeholder, next);
  document.body.appendChild(el);

  el.classList.add('keymapLiveDragging');
  lockLiveDragBox(el, size.w, size.h);
  el.style.left = Math.round(rect.left) + 'px';
  el.style.top = Math.round(rect.top) + 'px';
  el.style.pointerEvents = 'none';

  const pid = e.pointerId;
  try{ el.setPointerCapture?.(pid); }catch(err){}

  const move = ev=>{
    if(ev.pointerId !== pid) return;
    el.style.left = Math.round(ev.clientX - grabX) + 'px';
    el.style.top = Math.round(ev.clientY - grabY) + 'px';
    moveLivePlaceholder(list, placeholder, el, ev.clientX, ev.clientY);
    ev.preventDefault();
  };
  const cleanup = ()=>{
    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
    list.querySelectorAll('.keymapLiveTarget').forEach(x=>x.classList.remove('keymapLiveTarget'));
  };
  const finish = ev=>{
    if(ev.pointerId !== pid) return;
    cleanup();
    animateKeymapLiveReflow(()=>{
      list.insertBefore(el, placeholder);
      placeholder.remove();
      el.classList.remove('keymapLiveDragging');
      clearLiveDragBox(el);
    });
    updateKeymapLiveWorkingFromDom();
    ev.preventDefault();
    ev.stopPropagation();
  };
  const cancel = ev=>{
    cleanup();
    list.insertBefore(el, placeholder);
    placeholder.remove();
    el.classList.remove('keymapLiveDragging');
    clearLiveDragBox(el);
  };

  document.addEventListener('pointermove', move, true);
  document.addEventListener('pointerup', finish, true);
  document.addEventListener('pointercancel', cancel, true);
  e.preventDefault();
  e.stopPropagation();
};

startLiveAnalogDrag = function(e){
  if(!keymapLiveSession) return;
  const pad = $('analogPad');
  if(!pad) return;
  const parent = pad.parentElement;
  if(!parent) return;

  const rect = pad.getBoundingClientRect();
  const size = keymapActualRectSize(pad);
  const grabX = e.clientX - rect.left;
  const grabY = e.clientY - rect.top;
  const startX = e.clientX;
  const startSide = keymapLiveSession.working.analog;
  let candidate = startSide;

  const placeholder = document.createElement('div');
  placeholder.className = 'controls keymapLivePlaceholder keymapAnalogPlaceholder';
  placeholder.setAttribute('aria-hidden','true');
  lockLiveDragBox(placeholder, size.w, size.h);
  placeholder.style.flex = '0 0 ' + size.w + 'px';

  const next = pad.nextSibling;
  parent.insertBefore(placeholder, next);
  document.body.appendChild(pad);

  pad.classList.add('keymapLiveDragging','keymapLiveTarget');
  lockLiveDragBox(pad, size.w, size.h);
  pad.style.left = Math.round(rect.left) + 'px';
  pad.style.top = Math.round(rect.top) + 'px';
  pad.style.pointerEvents = 'none';

  const pid = e.pointerId;
  try{ pad.setPointerCapture?.(pid); }catch(err){}

  const decideSide = ev=>{
    const dx = ev.clientX - startX;
    if(startSide === 'left'){
      return (dx > 45 || ev.clientX > window.innerWidth * 0.53) ? 'right' : 'left';
    }
    return (dx < -45 || ev.clientX < window.innerWidth * 0.47) ? 'left' : 'right';
  };
  const move = ev=>{
    if(ev.pointerId !== pid) return;
    pad.style.left = Math.round(ev.clientX - grabX) + 'px';
    pad.style.top = Math.round(ev.clientY - grabY) + 'px';
    candidate = decideSide(ev);
    ev.preventDefault();
  };
  const cleanup = ()=>{
    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
  };
  const restorePad = ()=>{
    pad.classList.remove('keymapLiveDragging','keymapLiveTarget');
    clearLiveDragBox(pad);
  };
  const finish = ev=>{
    if(ev.pointerId !== pid) return;
    cleanup();
    parent.insertBefore(pad, placeholder);
    placeholder.remove();
    restorePad();
    animateKeymapSwapAsBundle(()=>{
      keymapLiveSession.working.analog = candidate;
      applyControlLayoutLive(keymapLiveSession.working);
    });
    updateKeymapLiveWorkingFromDom();
    positionKeymapLiveBarAtLog();
    ev.preventDefault();
    ev.stopPropagation();
  };
  const cancel = ev=>{
    cleanup();
    parent.insertBefore(pad, placeholder);
    placeholder.remove();
    restorePad();
    animateKeymapSwapAsBundle(()=>applyControlLayoutLive(keymapLiveSession.working));
    positionKeymapLiveBarAtLog();
  };

  document.addEventListener('pointermove', move, true);
  document.addEventListener('pointerup', finish, true);
  document.addEventListener('pointercancel', cancel, true);
  e.preventDefault();
  e.stopPropagation();
};

/* 최종 요청 패치: 기본값/적용/취소 버튼을 아날로그 패드 위쪽으로 배치 */
function positionKeymapLiveBarAboveAnalog(){
  const bar = $('keymapLiveBar');
  if(!bar) return;
  const pad = $('analogPad');
  bar.classList.remove('keymapAtLog');
  bar.style.setProperty('left','50%','important');
  bar.style.setProperty('right','auto','important');
  bar.style.setProperty('bottom','auto','important');
  bar.style.setProperty('transform','translateX(-50%)','important');
  bar.style.width = '';

  const barRect = bar.getBoundingClientRect();
  const barH = Math.max(32, Math.round(barRect.height || 44));
  let top = Math.round(window.innerHeight * 0.5);
  if(pad){
    const padRect = pad.getBoundingClientRect();
    if(padRect.width > 0 && padRect.height > 0){
      const gap = Math.max(16, Math.min(24, Math.round(window.innerHeight * 0.025)));
      const minTop = Math.round(8 + (window.visualViewport ? Math.max(0, window.visualViewport.offsetTop || 0) : 0));
      top = Math.max(minTop, Math.round(padRect.top - barH - gap));
    }
  }
  bar.style.setProperty('--keymap-livebar-top', top + 'px');
  bar.style.setProperty('top', top + 'px', 'important');
}
positionKeymapLiveBarAtLog = positionKeymapLiveBarAboveAnalog;
const previousEnsureKeymapLiveBarAboveAnalog = ensureKeymapLiveBar;
ensureKeymapLiveBar = function(){
  const bar = previousEnsureKeymapLiveBarAboveAnalog();
  positionKeymapLiveBarAboveAnalog();
  requestAnimationFrame(positionKeymapLiveBarAboveAnalog);
  return bar;
};


/* 최종 요청 패치: 키맵핑 자동 이동 애니메이션 스무스 처리 */
(function(){
  const KEYMAP_SMOOTH_MS = 340;
  const KEYMAP_SMOOTH_EASING = 'cubic-bezier(.22,1,.36,1)';
  const activeFlipAnims = new WeakMap();

  function cancelFlip(el){
    const prev = activeFlipAnims.get(el);
    if(prev){
      try{ prev.cancel(); }catch(e){}
      activeFlipAnims.delete(el);
    }
  }

  function smoothFlipElement(el, firstRect, duration){
    if(!el || !el.isConnected || !firstRect) return;
    const lastRect = el.getBoundingClientRect();
    const dx = firstRect.left - lastRect.left;
    const dy = firstRect.top - lastRect.top;
    if(Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;

    cancelFlip(el);
    el.classList.add('keymapLiveMoving');
    el.style.willChange = 'transform';

    if(typeof el.animate === 'function'){
      const anim = el.animate(
        [
          { transform:`translate3d(${dx}px,${dy}px,0)` },
          { transform:'translate3d(0,0,0)' }
        ],
        { duration, easing:KEYMAP_SMOOTH_EASING, fill:'none' }
      );
      activeFlipAnims.set(el, anim);
      anim.onfinish = anim.oncancel = ()=>{
        if(activeFlipAnims.get(el) === anim) activeFlipAnims.delete(el);
        el.classList.remove('keymapLiveMoving');
        el.style.willChange = '';
      };
      return;
    }

    const prevTransition = el.style.transition;
    const prevTransform = el.style.transform;
    el.style.transition = 'none';
    el.style.transform = `translate3d(${dx}px,${dy}px,0)`;
    requestAnimationFrame(()=>{
      el.style.transition = `transform ${duration}ms ${KEYMAP_SMOOTH_EASING}`;
      el.style.transform = prevTransform || '';
      setTimeout(()=>{
        el.classList.remove('keymapLiveMoving');
        el.style.transition = prevTransition || '';
        el.style.willChange = '';
      }, duration + 30);
    });
  }

  function collectLiveRects(elements){
    return new Map(elements.filter(el=>el && el.isConnected).map(el=>[el, el.getBoundingClientRect()]));
  }

  animateKeymapLiveReflow = function(mutate){
    const els = keymapLiveElements().filter(el=>el && el.isConnected && !el.classList.contains('keymapLiveDragging'));
    const first = collectLiveRects(els);
    mutate();
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        els.forEach(el=>smoothFlipElement(el, first.get(el), KEYMAP_SMOOTH_MS));
      });
    });
  };

  animateKeymapSwapAsBundle = function(mutate){
    const pad = $('analogPad');
    const rightui = document.querySelector('.rightui');
    const footer = document.querySelector('.footer');
    const els = [pad, rightui, footer].filter(el=>el && el.isConnected && !el.classList.contains('keymapLiveDragging'));
    const first = collectLiveRects(els);
    const rightRect = rightui ? rightui.getBoundingClientRect() : null;

    if(rightui && rightRect && rightRect.width > 0){
      rightui.style.setProperty('--keymap-bundle-w', Math.round(rightRect.width) + 'px');
      rightui.classList.add('keymapBundleLocked');
    }

    mutate();

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        els.forEach(el=>smoothFlipElement(el, first.get(el), 380));
        setTimeout(()=>{
          if(rightui){
            rightui.classList.remove('keymapBundleLocked');
            rightui.style.removeProperty('--keymap-bundle-w');
          }
          if(typeof positionKeymapLiveBarAboveAnalog === 'function') positionKeymapLiveBarAboveAnalog();
        }, 430);
      });
    });
  };

  const keymapSmoothStyle = document.createElement('style');
  keymapSmoothStyle.textContent = `
    body.liveKeymapMode .footer,
    body.liveKeymapMode .rightui,
    body.liveKeymapMode #analogPad,
    body.liveKeymapMode .skillbar,
    body.liveKeymapMode .menubar,
    body.liveKeymapMode .skill,
    body.liveKeymapMode .menuBtn{
      transition:transform 340ms cubic-bezier(.22,1,.36,1), order 340ms cubic-bezier(.22,1,.36,1), opacity 180ms ease, box-shadow 180ms ease!important;
    }
    body.liveKeymapMode .keymapLiveMoving{
      will-change:transform!important;
    }
    body.liveKeymapMode .keymapLiveDragging{
      transition:none!important;
    }
  `;
  document.head.appendChild(keymapSmoothStyle);
})();

function handleDesktopShortcut(e){
  if(e.target && ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return false;
  if(e.repeat) return false;
  const k = e.key.toLowerCase();
  const block = ()=>{ e.preventDefault(); e.stopImmediatePropagation(); return true; };
  if(k==='e' && e.shiftKey){
    block();
    if(autoMode==='full') stopAuto(); else startFullAuto();
    return true;
  }
  if(k==='escape'){
    if(modalOpen && !document.body.classList.contains('startScreen')){ block(); hideModal(); renderAll(); return true; }
    return false;
  }
  if(modalOpen || !S) return false;
  if(k==='m' && e.shiftKey){ block(); showMapMenu(); return true; }
  if(k==='m'){ block(); toggleMiniMap(); return true; }
  if(k==='i' || k==='b'){ block(); showBagMenu(); return true; }
  if(k==='k'){ block(); showSkillMenu(); return true; }
  if(k==='c'){ block(); showStatsMenu(); return true; }
  if(k==='l'){ block(); toggleLogChatPanel(); return true; }
  if(k==='r'){ block(); showRankingMenu(); return true; }
  if(k==='o'){ block(); showSystemMenu(); return true; }
  if(k==='h'){ block(); showHelpMenu(); return true; }
  return false;
}
document.addEventListener('keydown', handleDesktopShortcut, true);

function canvasTileFromMouseEvent(e){
  const rect = canvas.getBoundingClientRect();
  if(!rect.width || !rect.height) return null;
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  if(x<0 || y<0 || x>1 || y>1) return null;
  return {tx:Math.floor(x*VIEW), ty:Math.floor(y*VIEW)};
}
function handlePcCanvasPointer(e){
  if(e.pointerType && e.pointerType !== 'mouse') return;
  if(isPhoneTabletLandscapeBlocked()) return;
  if(e.button===2){
    e.preventDefault();
    basicAttackButton();
    return;
  }
  if(e.button!==0 || !S || modalOpen) return;
  const tile = canvasTileFromMouseEvent(e);
  if(!tile) return;
  const center = Math.floor(VIEW/2);
  const rawDx = tile.tx - center;
  const rawDy = tile.ty - center;
  e.preventDefault();
  if(rawDx===0 && rawDy===0){ waitTurn(); return; }
  let dx=0, dy=0;
  if(Math.abs(rawDx) >= Math.abs(rawDy)) dx = rawDx>0 ? 1 : -1;
  else dy = rawDy>0 ? 1 : -1;
  if(S.player.awaitAim){ handleMove(dx,dy); return; }
  const targetX=S.player.x+dx, targetY=S.player.y+dy;
  const eTarget = enemyAt(targetX,targetY);
  if(eTarget){
    faceToward(eTarget.x,eTarget.y);
    playerAttack(eTarget,false);
    addLog('마우스 기본공격.');
    afterPlayerAction();
    return;
  }
  handleMove(dx,dy);
}

}
