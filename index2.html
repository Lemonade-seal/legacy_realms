
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>크림슨 월드 RPG</title>
<style>
:root{
  --bg:#060b15; --panel:#0f172a; --line:#334155; --text:#e5e7eb; --sub:#94a3b8;
  --safe-bottom:max(12px, env(safe-area-inset-bottom)); --safe-top:max(10px, env(safe-area-inset-top));
  --hud-clearance:92px;
  --shadow:0 16px 38px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; overflow:hidden; color:var(--text);
  background:radial-gradient(circle at top,#16264a 0%,#09111f 38%,#060b15 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  user-select:none; -webkit-user-select:none; touch-action:none;
}
button{font:inherit}
#gameCanvas{position:fixed; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; touch-action:none}
.hud{
  position:fixed; z-index:5; left:10px; right:10px; top:var(--safe-top);
  display:flex; justify-content:space-between; gap:10px; pointer-events:none;
}
.box{
  background:rgba(15,23,42,.82); border:1px solid rgba(148,163,184,.18); border-radius:16px;
  box-shadow:var(--shadow); padding:10px 12px; backdrop-filter:blur(10px); pointer-events:auto;
}
#heroHud{min-width:min(340px, 62vw)}
#questHud{max-width:min(380px, 62vw)}
.bar{height:10px; background:#091120; border-radius:999px; overflow:hidden; margin:6px 0; border:1px solid rgba(148,163,184,.12)}
.fill{height:100%}
.hp{background:linear-gradient(90deg,#ef4444,#fb7185)}
.mp{background:linear-gradient(90deg,#2563eb,#38bdf8)}
.xp{background:linear-gradient(90deg,#eab308,#facc15)}
.row{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap}
.small{font-size:12px; color:var(--sub)}
.title{font-size:14px; font-weight:800}
.controls{
  position:fixed; left:0; right:0; bottom:0; z-index:6; padding:8px 10px calc(var(--safe-bottom) + 8px);
  background:linear-gradient(180deg,rgba(6,11,21,0),rgba(6,11,21,.88) 45%);
}
.controls-inner{
  max-width:1060px; margin:0 auto; display:grid; gap:12px;
  grid-template-columns:minmax(180px,1fr) minmax(200px,.9fr);
}
.card{
  background:rgba(15,23,42,.88); border:1px solid rgba(148,163,184,.18); border-radius:22px;
  box-shadow:var(--shadow); padding:12px; backdrop-filter:blur(10px);
}
.dpad{width:min(248px,100%); margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,68px); gap:8px}
.actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.menu{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px}
.ctrl{
  border:none; border-radius:18px; color:#fff; font-weight:800; cursor:pointer; touch-action:none;
  background:linear-gradient(180deg,#1e293b,#0f172a); box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 18px rgba(0,0,0,.28);
}
.ctrl:active,.ctrl.on{transform:translateY(1px) scale(.985); filter:brightness(1.08)}
.dpad .ctrl:active,.dpad .ctrl.on{transform:none!important; filter:none!important}
.dpad .ctrl{font-size:26px}
.actions .ctrl{min-height:74px; font-size:18px}
.actions .attack{background:linear-gradient(180deg,#7f1d1d,#450a0a)}
.actions .skill{background:linear-gradient(180deg,#312e81,#1e1b4b)}
.actions .interact{background:linear-gradient(180deg,#14532d,#052e16)}
.actions .dash{background:linear-gradient(180deg,#78350f,#451a03)}
.menu .ctrl{min-height:46px; font-size:14px; background:linear-gradient(180deg,#1f2937,#111827)}
.toast{
  position:fixed; left:50%; top:18%; transform:translateX(-50%) translateY(-8px) scale(.97); z-index:20;
  min-width:240px; max-width:min(84vw,560px); padding:0; border-radius:22px; overflow:hidden;
  background:linear-gradient(180deg,rgba(8,15,30,.68),rgba(2,6,23,.68));
  border:1px solid rgba(148,163,184,.18); box-shadow:0 22px 42px rgba(2,6,23,.30),0 0 0 1px rgba(255,255,255,.04) inset;
  text-align:center; opacity:0; transition:opacity .14s ease, transform .16s ease, filter .14s ease; pointer-events:none; filter:saturate(.9);
}
.toast::before{
  content:''; position:absolute; inset:1px; border-radius:21px; pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0) 30%,rgba(255,255,255,.04) 100%);
}
.toast::after{
  content:''; position:absolute; left:-28%; top:-55%; width:56%; height:210%; pointer-events:none; opacity:0;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.18),rgba(255,255,255,0)); transform:rotate(18deg);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1); filter:saturate(1)}
.toast.skill{
  border-color:rgba(167,139,250,.36);
  background:linear-gradient(180deg,rgba(34,22,70,.68),rgba(14,10,32,.68));
  box-shadow:0 24px 48px rgba(34,12,84,.26),0 0 0 1px rgba(196,181,253,.08) inset,0 0 28px rgba(129,140,248,.16);
}
.toast.skill::after{opacity:1; animation:toastSheen 1.4s ease forwards}
.toast.skill{
  left:0; top:0;
  min-width:0;
  max-width:min(72vw,520px);
  width:max-content;
  transform:none;
  transition:opacity .14s ease, filter .14s ease;
  will-change:transform,left,top,opacity;
  --skill-start-x:0px;
  --skill-end-x:0px;
}
.toast.skill.show{
  opacity:1;
  filter:saturate(1);
  animation:skillToastBoxSlide 1.7s cubic-bezier(.2,.72,.18,1) forwards;
}
.toast-inner{position:relative; z-index:1; padding:13px 18px 14px}
.toast-kicker{display:none; margin-bottom:4px; font-size:10px; font-weight:900; letter-spacing:.24em; color:#c4b5fd; text-transform:uppercase}
.toast-main{display:block; font-size:15px; font-weight:900; letter-spacing:-.02em; color:#f8fafc; text-shadow:0 2px 12px rgba(15,23,42,.26)}
.toast.skill .toast-kicker{display:none!important}
.toast.skill .toast-inner{padding:10px 16px 11px}
.toast.skill .toast-main{
  font-size:17px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  background:linear-gradient(180deg,#ffffff,#ddd6fe 55%,#bfdbfe); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:none;
}
@keyframes skillToastBoxSlide{
  0%{opacity:0; transform:translate3d(var(--skill-start-x),0,0) scale(.98)}
  12%{opacity:1; transform:translate3d(var(--skill-start-x),0,0) scale(1)}
  36%{opacity:1; transform:translate3d(0,0,0) scale(1)}
  58%{opacity:1; transform:translate3d(0,0,0) scale(1)}
  100%{opacity:0; transform:translate3d(var(--skill-end-x),0,0) scale(.98)}
}
@keyframes toastSheen{
  0%{transform:translateX(-140%) rotate(18deg)}
  100%{transform:translateX(300%) rotate(18deg)}
}
.overlay{
  position:fixed; inset:0; z-index:30; background:rgba(2,6,23,.64); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center; padding:16px;
}
.overlay.show{display:flex}
.panel{
  width:min(780px,100%); max-height:min(84vh,900px); overflow:auto; padding:18px;
  background:linear-gradient(180deg,#111827,#0f172a); border:1px solid rgba(148,163,184,.2);
  border-radius:24px; box-shadow:var(--shadow);
}
.panel h2,.dialog h2{margin:0 0 8px}
.list{display:grid; gap:10px}
.item{
  background:#0a1220; border:1px solid rgba(148,163,184,.14); border-radius:16px; padding:12px;
}
.grid2{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px}
.stats{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px}
.stat{background:#0a1220; border:1px solid rgba(148,163,184,.14); border-radius:14px; padding:10px 12px}
.panel[data-panel="bag"],
.panel[data-panel="quest"],
.panel[data-panel="save"],
.panel[data-panel="stats"]{
  background:rgba(9,14,27,.14)!important;
  border:1px solid rgba(148,163,184,.10)!important;
  box-shadow:none!important;
  backdrop-filter:blur(10px);
}
.panel[data-panel="stats"]{
  width:min(640px,100%);
}
.panel[data-panel="stats"] h2,
.panel[data-panel="stats"] > p{display:none}
.stats-shell{display:grid; gap:6px}
.stats-headerbar,
.stats-hero,
.stats-section{
  background:#0a1220;
  border:1px solid rgba(148,163,184,.14);
  border-radius:16px;
  box-shadow:none;
  backdrop-filter:none;
}
.stats-headerbar{
  position:relative;
  display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap;
  padding:7px 8px 7px 9px;
}
.stats-headerbar::before,
.stats-section::before{display:none}
.stats-header-main{display:grid; gap:2px; min-width:0; padding-left:5px}
.stats-header-main strong{font-size:16px; color:#f8fafc; letter-spacing:-.02em; line-height:1.02}
.stats-roadmap{font-size:9px; color:#cbd5e1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.stats-points{
  display:inline-flex; align-items:center; gap:5px; padding:3px 7px; border-radius:999px;
  background:#172554; border:1px solid rgba(96,165,250,.20); color:#bfdbfe; font-size:9px;
}
.stats-points .value{font-size:12px; font-weight:900; color:#fff}
.stats-panel{display:grid; gap:6px}
.stats-hero{
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px;
  padding:4px;
}
.stats-hero .stat,
.stats-grid .stat,
.stats-jobbox{
  background:linear-gradient(180deg,#101827,#0a1220);
  border:1px solid rgba(148,163,184,.14);
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
}
.stats-hero .stat{
  padding:5px 4px;
}
.stats-hero .stat strong{display:block; font-size:8px; color:#93c5fd; margin-bottom:1px}
.stats-hero .stat .value{font-size:11px; font-weight:900; color:#f8fafc; line-height:1.04}
.stats-section{
  position:relative;
  display:grid; gap:4px; padding:6px 6px 6px 7px;
}
.stats-section-title{display:flex; justify-content:space-between; align-items:center; gap:4px; flex-wrap:wrap; padding-left:2px}
.stats-section-title strong{font-size:10px; color:#f8fafc}
.stats-note{display:none}
.stats-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
.stats-grid .stat,
.stats-jobbox{
  padding:5px 4px;
}
.stats-grid .stat strong{display:block; margin-bottom:1px; color:#93c5fd; font-size:8px}
.stats-grid .stat .value{font-size:10px; font-weight:900; color:#f8fafc; line-height:1.02}
.stats-grid .stat .subvalue{display:none}
.stat-attr{display:grid; gap:3px}
.stat-attr-top{display:flex; justify-content:space-between; align-items:center; gap:4px}
.stat-attr .value{font-size:11px}
.stat-attr .btn{
  width:100%; padding:4px 3px; border-radius:9px; font-size:8px;
}
.stats-jobbox{display:grid; gap:4px}
.stats-jobline{display:flex; justify-content:space-between; gap:6px; flex-wrap:wrap}
.stats-jobline strong{font-size:8px; color:#93c5fd}
.stats-jobline span{font-size:8px; color:#e5e7eb; text-align:right; line-height:1.15}
.stats-jobbox .buttons{margin-top:0}
@media (max-width:560px){
  .class-grid{grid-template-columns:1fr}
}
@media (max-width:680px){
  #panelOverlay{padding:10px}
  .panel[data-panel="stats"]{
    width:min(100%, 390px); max-height:calc(100svh - 20px); padding:7px; overflow:hidden;
    background:rgba(9,14,27,.12)!important;
    border:1px solid rgba(148,163,184,.08)!important;
    box-shadow:none!important;
    backdrop-filter:blur(12px);
  }
  .stats-shell{gap:5px}
  .stats-headerbar{padding:6px 7px 6px 8px; gap:5px}
  .stats-headerbar::before,
  .stats-section::before{top:8px; bottom:8px; width:2px}
  .stats-header-main{padding-left:4px}
  .stats-header-main strong{font-size:13px}
  .stats-roadmap{font-size:8px}
  .stats-points{padding:3px 5px; font-size:8px}
  .stats-points .value{font-size:11px}
  .stats-panel{gap:5px}
  .stats-hero{grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px; padding:4px}
  .stats-hero .stat{padding:4px}
  .stats-hero .stat strong{font-size:7px; margin-bottom:1px}
  .stats-hero .stat .value{font-size:10px}
  .stats-section{gap:4px; padding:5px}
  .stats-section-title{gap:4px; padding-left:2px}
  .stats-section-title strong{font-size:9px}
  .stats-note{display:none}
  .stats-combat-grid{grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
  .stats-attr-grid{grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
  .stats-grid .stat,.stats-jobbox{padding:4px}
  .stats-grid .stat strong{font-size:7px; margin-bottom:1px}
  .stats-grid .stat .value{font-size:10px}
  .stats-grid .stat .subvalue{display:none}
  .stat-attr{grid-template-columns:minmax(0,1fr); gap:3px; align-items:stretch}
  .stat-attr-top{align-items:center; min-width:0}
  .stat-attr .value{font-size:10px}
  .stat-attr .btn{width:100%; min-width:0; padding:4px 2px; font-size:8px; white-space:nowrap}
  .stats-jobline strong{font-size:7px}
  .stats-jobline span{font-size:8px; line-height:1.15}
  .panel[data-panel="stats"] .buttons{margin-top:4px; gap:4px}
  .panel[data-panel="stats"] .btn{padding:5px 6px; border-radius:9px; font-size:9px}
}
@media (max-width:400px){
  .panel[data-panel="bag"] .item{padding:6px 7px}
  .panel[data-panel="bag"] .equip-grid{gap:4px}
  .panel[data-panel="bag"] .equip-slot{padding:6px 5px}
  .panel[data-panel="bag"] .equip-slot strong{font-size:8px}
  .panel[data-panel="bag"] .equip-slot .small{font-size:8px}
  .inventory-grid{grid-template-columns:repeat(5,minmax(0,1fr)); gap:4px}
  .inventory-slot{min-height:56px; padding:5px 3px; gap:3px; border-radius:11px}
  .inventory-type{min-width:22px; height:15px; font-size:6px}
  .inventory-qty{font-size:7px}
  .inventory-name{font-size:7px; line-height:1.05}

  .panel[data-panel="stats"]{padding:6px}
  .stats-headerbar{padding:5px 6px 5px 7px}
  .stats-header-main strong{font-size:12px}
  .stats-hero{gap:3px; padding:3px}
  .stats-hero .stat{padding:3px}
  .stats-hero .stat .value{font-size:9px}
  .stats-combat-grid,.stats-attr-grid{gap:3px}
  .stats-grid .stat,.stats-jobbox{padding:3px}
  .stats-grid .stat strong{font-size:6px}
  .stats-grid .stat .value{font-size:9px}
  .stat-attr .value{font-size:9px}
  .stat-attr .btn{min-width:0; padding:3px 2px; font-size:7px}
}
.btn{
  border:none; border-radius:14px; padding:11px 14px; cursor:pointer; color:#fff; font-weight:800;
  background:linear-gradient(180deg,#0ea5e9,#0284c7)
}
.btn.secondary{background:linear-gradient(180deg,#1f2937,#111827); border:1px solid rgba(148,163,184,.18)}
.btn.good{background:linear-gradient(180deg,#22c55e,#16a34a)}
.btn.warn{background:linear-gradient(180deg,#f59e0b,#d97706)}
.buttons{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
.dialog{
  width:min(720px,100%); padding:18px; background:rgba(15,23,42,.96);
  border:1px solid rgba(148,163,184,.2); border-radius:24px; box-shadow:var(--shadow)
}
body.title-active{overflow:auto; touch-action:pan-y pinch-zoom}
#titleScreen{
  position:fixed; inset:0; z-index:40; display:flex; align-items:flex-start; justify-content:center; padding:16px; overflow-y:auto;
  -webkit-overflow-scrolling:touch; touch-action:pan-y pinch-zoom; overscroll-behavior:contain;
  background:radial-gradient(circle at top,#1f3c7a 0%,#0f172a 38%,#060b15 100%)
}
.title-card{
  width:min(860px,100%); max-height:calc(100svh - 32px); overflow-y:auto; padding:18px; background:rgba(15,23,42,.9); border:1px solid rgba(148,163,184,.2);
  border-radius:24px; box-shadow:var(--shadow); backdrop-filter:blur(10px); margin:auto 0
}
.big{font-size:34px; font-weight:900; letter-spacing:-.02em; margin:0 0 6px}
.class-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px}
.class-card{cursor:pointer; transition:.18s ease; padding:10px 10px 9px!important; border-radius:16px; min-height:0}
.class-card .tag{padding:3px 6px; font-size:10px; margin:0 3px 3px 0}
.class-card.selected,.class-card:hover{
  transform:translateY(-2px); border-color:rgba(34,211,238,.72); box-shadow:0 0 0 3px rgba(34,211,238,.14)
}
.tag{display:inline-flex; padding:5px 9px; border-radius:999px; background:#172554; color:#bfdbfe; font-size:12px; margin:0 4px 6px 0}
#hint{
  position:fixed; right:12px; bottom:calc(var(--safe-bottom) + 150px); z-index:5; max-width:min(340px,84vw);
  background:rgba(15,23,42,.82); border:1px solid rgba(148,163,184,.16); border-radius:16px;
  padding:10px 12px; box-shadow:var(--shadow); font-size:13px; color:#dbeafe;
}
@media (max-width:900px){
  .hud{flex-direction:column}
  #heroHud,#questHud{max-width:none; min-width:0}
  .class-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid2,.stats{grid-template-columns:1fr}
  .big{font-size:29px}
  .class-card{padding:9px 9px 8px!important}
}
@media (max-width:680px){
  .controls-inner{grid-template-columns:1fr; gap:10px}
  .dpad{grid-template-rows:repeat(3,60px); width:min(228px,100%)}
  .actions .ctrl{min-height:68px; font-size:17px}
  #hint{left:10px; right:10px; bottom:calc(var(--safe-bottom) + 228px); max-width:none}
}

/* ==== UI overhaul ==== */
#hint{display:none!important}
.hud{
  left:8px; right:8px; top:calc(var(--safe-top) + 4px);
  display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:start;
}
#heroHud.box{
  min-width:0; width:auto; max-width:min(920px, calc(100vw - 120px));
  padding:8px 12px; border-radius:18px;
  background:linear-gradient(180deg,rgba(2,6,23,.72),rgba(15,23,42,.42));
  border:1px solid rgba(148,163,184,.12);
  box-shadow:0 10px 22px rgba(0,0,0,.16);
}
#questHud.box{
  grid-column:1;
  justify-self:start;
  padding:0; max-width:min(360px,42vw);
  background:none; border:none; box-shadow:none; backdrop-filter:none;
  color:#f8fafc; text-shadow:0 2px 12px rgba(2,6,23,.8);
}
.hero-strip{display:flex; flex-direction:column; gap:8px}
.hero-topline{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap}
.hero-name{font-size:15px; font-weight:900; letter-spacing:-.02em}
.hero-meta{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; color:#cbd5e1; font-size:12px}
.hero-bars{display:grid; grid-template-columns:repeat(3,minmax(110px,1fr)); gap:8px}
.hero-meter{min-width:0}
.meter-label{display:flex; justify-content:space-between; gap:8px; font-size:11px; color:#cbd5e1; margin-bottom:4px}
.hero-bottomline{display:flex; align-items:center; justify-content:space-between; gap:8px}
.hero-skillline{min-width:0; flex:1 1 auto; font-size:11px; color:#93c5fd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.hero-inline-menu{display:flex; align-items:center; gap:6px; flex:0 0 auto}
.hero-inline-menu .ctrl{
  min-height:28px;
  padding:5px 8px;
  font-size:11px;
  border-radius:12px;
  background:linear-gradient(180deg,rgba(15,23,42,.40),rgba(15,23,42,.18))!important;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 4px 10px rgba(0,0,0,.10);
}
.quest-plain{display:flex; flex-direction:column; align-items:flex-start; text-align:left; gap:4px}
.quest-plain .quest-name{font-size:13px; font-weight:800}
.quest-plain .quest-body,.quest-plain .quest-progress,.quest-plain .quest-zone{font-size:12px; color:#e2e8f0}
.quest-plain .quest-progress{color:#bfdbfe}
.quest-plain.done .quest-name{color:#93c5fd}
.action-card{
  --action-pad:0px;
  --action-gap:9px;
  --action-left-col:72px;
  --action-right-col:72px;
  --action-row-h:56px;
  width:calc(var(--action-left-col) + var(--action-right-col) + var(--action-gap) + (var(--action-pad) * 2));
  padding:var(--action-pad)!important;
  background:transparent!important;
  border:none!important;
  box-shadow:none!important;
  backdrop-filter:none!important;
  clip-path:none!important;
}
.actions{
  grid-template-columns:var(--action-left-col) var(--action-right-col)!important;
  grid-template-rows:repeat(4,var(--action-row-h));

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}
function deep(o){return JSON.parse(JSON.stringify(o))}
function tileCenter(tx,ty){return {x:tx*TILE+TILE/2,y:ty*TILE+TILE/2}}
function legacyClassId(id){return id==='rogue'?'archer':id}
function cls(){return Classes[legacyClassId(S.hero.baseClass)]}
function branchData(baseClass,idx=0){
  const c=Classes[legacyClassId(baseClass)];
  if(!c||!c.branches||!c.branches.length) return null;
  return c.branches[clamp(idx,0,c.branches.length-1)] || c.branches[0];
}
function selectedPath(baseClass){
  const id=legacyClassId(baseClass);
  if(S.hero && legacyClassId(S.hero.baseClass)===id && typeof S.hero.jobPath==='number') return clamp(S.hero.jobPath,0,1);
  if(S.classPaths && typeof S.classPaths[id]==='number') return clamp(S.classPaths[id],0,1);
  return 0;
}
function currentBranch(){ return S.hero ? branchData(S.hero.baseClass, selectedPath(S.hero.baseClass)) : null; }
function hasChosenJobPath(hero=S.hero){ return !!hero && typeof hero.jobPath==='number'; }
function tierName(baseClass,tier,pathIdx=0){
  const c=Classes[legacyClassId(baseClass)];
  const b=branchData(baseClass,pathIdx);
  if(!c) return '';
  if(tier>=3) return b?.tier3 || b?.tier2 || c.name;
  if(tier>=2) return b?.tier2 || c.name;
  return c.name;
}
function heroTitle(){return tierName(S.hero.baseClass,S.hero.jobTier,selectedPath(S.hero.baseClass))}
function nextAdvanceName(){

}

function updateSkillButtons(){
  const btns=[document.getElementById('skillBtn1'),document.getElementById('skillBtn2'),document.getElementById('skillBtn3')];
  const list=skillList();
  btns.forEach((btn,i)=>{
    if(!btn) return;

      btn.hidden=false;
      btn.disabled=false;
      setActionButtonLabel(btn, meta.name.length>6 ? meta.name.slice(0,6) : meta.name);
      btn.title=meta.name;
      btn.classList.remove('empty-slot');
      btn.removeAttribute('aria-hidden');
    }else{
      btn.hidden=false;
      btn.disabled=true;
      setActionButtonLabel(btn, '');
      btn.title='';
      btn.classList.add('empty-slot');
      btn.setAttribute('aria-hidden','true');
    }
  });
}
function cooldownProgress(remaining,total){
  if(!(remaining>0)) return 1;
  if(!(total>0)) return 0;
  return clamp(1-(remaining/total),0,1);
}
function formatCooldownTime(sec){
  if(!(sec>0)) return '';
  return `${sec.toFixed(1)}s`;
}
function applyCooldownState(btn,remaining,total){
  if(!btn) return;
  const active=remaining>0 && total>0 && !btn.disabled && !btn.classList.contains('empty-slot');
  const progress=active?cooldownProgress(remaining,total):1;
  btn.style.setProperty('--cooldown-progress', String(progress));
  btn.classList.toggle('is-cooling', !!active);
  btn.setAttribute('aria-busy', active?'true':'false');
  const cdEl=btn.querySelector('.ctrl-cd');
  if(cdEl) cdEl.textContent=active ? formatCooldownTime(remaining) : '';
}
function updateActionCooldowns(){
  const attackBtn=document.getElementById('attackBtn');
  const dashBtn=document.getElementById('dashBtn');
  const skillBtns=[document.getElementById('skillBtn1'),document.getElementById('skillBtn2'),document.getElementById('skillBtn3')];
  if(!S.hero){
    applyCooldownState(attackBtn,0,0);
    applyCooldownState(dashBtn,0,0);
    skillBtns.forEach(btn=>applyCooldownState(btn,0,0));
    return;
  }
  applyCooldownState(attackBtn,S.hero.atkCd,S.hero.atkCdMax||0);
  applyCooldownState(dashBtn,S.hero.dashCd,S.hero.dashCdMax||0);
  skillBtns.forEach(btn=>applyCooldownState(btn,S.hero.skillCd,S.hero.skillCdMax||0));
}
function normalizeHeroState(hero){
  if(!hero) return hero;
  hero.baseClass=legacyClassId(hero.baseClass||'warrior');
  hero.jobTier=clamp(hero.jobTier||1,1,3);
  hero.jobPath=typeof hero.jobPath==='number'?clamp(hero.jobPath,0,1):(hero.jobTier>1?selectedPath(hero.baseClass):null);
  if(typeof hero.jobPath==='number') S.classPaths[hero.baseClass]=hero.jobPath;
  const base=Classes[hero.baseClass];
  hero.stats=Object.assign({}, deep((base&&base.stats)||{str:5,vit:5,int:5,agi:5,rch:5,luk:5}), hero.stats||{});
  if(!hero.balancePatchV2 && (hero.baseClass==='warrior' || hero.baseClass==='brawler')){
    hero.stats.rch=Math.max((base&&base.stats&&base.stats.rch)||2, (hero.stats.rch||0)-2);
    hero.balancePatchV2=true;
  }
  hero.quests=hero.quests||{};
  hero.quests.training=hero.quests.training||{state:'active',kills:{}};
  hero.quests.cave=hero.quests.cave||{state:'locked',kills:{}};
  hero.quests.dragon=hero.quests.dragon||{state:'locked',kills:{}};
  hero.equip=hero.equip||{weapon:null,armor:null,accessory:null};
  hero.inv=Array.isArray(hero.inv)?hero.inv:[];
  hero.atkCdMax=hero.atkCdMax||0;
  hero.skillCdMax=hero.skillCdMax||0;
  hero.dashCdMax=hero.dashCdMax||0;
  hero.facing=angleFromFacing(hero.facing, Math.PI/2);
  return hero;
}

function positionSkillToast(){
  if(!S.hero||!S.vw||!S.vh) return;
  const rect=toast.getBoundingClientRect();
  const width=Math.max(88, Math.ceil(rect.width||toast.offsetWidth||0));
  const height=Math.max(40, Math.ceil(rect.height||toast.offsetHeight||0));
  const pad=12;
  const sx=S.hero.x-S.cam.x;
  const sy=S.hero.y-S.cam.y;
  let left=sx-width/2;
  let top=sy+32;
  left=clamp(left,pad,Math.max(pad,S.vw-width-pad));
  top=clamp(top,pad,Math.max(pad,S.vh-height-pad));
  const startX=Math.max(0, Math.ceil(S.vw-left+width+pad));
  const endX=-Math.max(0, Math.ceil(left+width+pad));
  toast.style.left=`${left}px`;
  toast.style.top=`${top}px`;
  toast.style.setProperty('--skill-start-x', `${startX}px`);
  toast.style.setProperty('--skill-end-x', `${endX}px`);
}
function showToast(t,type='default',kicker=''){
  const main=toast.querySelector('.toast-main');
  const sub=toast.querySelector('.toast-kicker');
  if(main) main.textContent=t||'';
  if(sub) sub.textContent=type==='skill' ? '' : (kicker||'');
  toast.classList.remove('show','skill');
  toast.style.animation='none';
  if(type==='skill'){
    toast.classList.add('skill');
    positionSkillToast();
  }else{
    toast.style.left='';
    toast.style.top='';
    toast.style.removeProperty('--skill-start-x');
    toast.style.removeProperty('--skill-end-x');
  }
  void toast.offsetWidth;
  toast.style.animation='';
  if(type==='skill') positionSkillToast();
  toast.classList.add('show');
  S.toastType=type;
  S.toast=type==='skill'?1.7:1.2;
}

function safeGet(k){try{return localStorage.getItem(k)}catch(e){return null}}

function setMoveInput(up,down,left,right){
  S.input.up=up?1:0; S.input.down=down?1:0; S.input.left=left?1:0; S.input.right=right?1:0;
  S.input.ax=(S.input.right?1:0)-(S.input.left?1:0);
  S.input.ay=(S.input.down?1:0)-(S.input.up?1:0);
  S.input.analog=false;
}
function setMoveVector(x,y){
  const len=Math.hypot(x,y);
  if(len<0.001){
    S.input.ax=0; S.input.ay=0; S.input.analog=false;
    S.input.up=0; S.input.down=0; S.input.left=0; S.input.right=0;
    return;
  }
  const scale=len>1?1/len:1;
  const nx=x*scale, ny=y*scale;
  S.input.ax=nx; S.input.ay=ny; S.input.analog=true;
  S.input.up=ny<-0.18?1:0; S.input.down=ny>0.18?1:0;
  S.input.left=nx<-0.18?1:0; S.input.right=nx>0.18?1:0;
}
function isTouchPadMode(){
  return window.matchMedia('(max-width: 680px)').matches || (navigator.maxTouchPoints||0)>0;
}
function hidePad(){
  if(padCard){
    padCard.classList.remove('show');
    padCard.style.setProperty('--stick-x','0px');
    padCard.style.setProperty('--stick-y','0px');
  }
  S.padTouch.active=false; S.padTouch.id=null;
  setMoveInput(0,0,0,0);
}
function positionPad(clientX,clientY){
  if(!padCard) return;
  const sens=clamp(S.settings.controlSensitivity||.72,.4,1);
  const size=Math.min(window.innerWidth*(0.26+sens*0.12),86+sens*64);
  const half=size/2, margin=14;
  const x=clamp(clientX, half+margin, window.innerWidth-half-margin);
  const y=clamp(clientY, half+margin, window.innerHeight-half-margin);
  padCard.style.setProperty('--pad-x', x+'px');
  padCard.style.setProperty('--pad-y', y+'px');
  padCard.classList.add('show');
}
function updatePadFromPoint(clientX,clientY){
  if(!padCard) return;
  const rect=padCard.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const rawX=clientX-cx, rawY=clientY-cy;
  const sens=clamp(S.settings.controlSensitivity||.72,.4,1);
  const maxR=Math.min(rect.width,rect.height)*0.5;
  const dead=maxR*(0.2-(sens*.04));
  const distLen=Math.hypot(rawX,rawY);
  if(distLen<=dead){
    padCard.style.setProperty('--stick-x','0px');
    padCard.style.setProperty('--stick-y','0px');
    setMoveVector(0,0);
    return;
  }
  const travel=Math.max(1,maxR*(0.44+sens*0.22));
  const active=Math.min(travel, Math.max(0, distLen-dead));
  const nx=distLen?rawX/distLen:0, ny=distLen?rawY/distLen:0;
  const px=nx*active, py=ny*active;
  const normalized=clamp(active/travel,0,1);
  const curved=Math.pow(normalized,1.4+(1-sens)*0.9);
  padCard.style.setProperty('--stick-x', px+'px');
  padCard.style.setProperty('--stick-y', py+'px');
  setMoveVector(nx*curved, ny*curved);
}
function initTouchPad(){
  if(!padCard) return;
  hidePad();
  const point=e=>{
    if(e.touches && e.touches.length) return e.touches[0];
    if(e.changedTouches && e.changedTouches.length) return e.changedTouches[0];
    return e;
  };
  const canUse=()=> (
    S.mode==='play' &&
    isTouchPadMode() &&
    (!titleScreen || getComputedStyle(titleScreen).display==='none') &&
    !panelOverlay.classList.contains('show') &&
    !dialogOverlay.classList.contains('show')
  );
  const start=e=>{
    if(!canUse()) return;
    const p=point(e);
    if(e.cancelable) e.preventDefault();
    S.padTouch.active=true;
    S.padTouch.id=e.pointerId ?? p.identifier ?? null;
    padCard.classList.add('show');
    updatePadFromPoint(p.clientX,p.clientY);
  };
  const move=e=>{
    if(!S.padTouch.active) return;
    const p=point(e);
    const currentId=e.pointerId ?? p.identifier ?? null;
    if(S.padTouch.id!==null && currentId!==null && currentId!==S.padTouch.id) return;
    if(e.cancelable) e.preventDefault();
    updatePadFromPoint(p.clientX,p.clientY);
  };
  const end=e=>{
    if(!S.padTouch.active) return;
    const p=point(e);
    const currentId=e.pointerId ?? p.identifier ?? null;
    if(S.padTouch.id!==null && currentId!==null && currentId!==S.padTouch.id) return;
    if(e.cancelable) e.preventDefault();
    hidePad();
  };

  if(window.PointerEvent){
    padCard.addEventListener('pointerdown',start,{passive:false});
    addEventListener('pointermove',move,{passive:false});
    addEventListener('pointerup',end,{passive:false});
    addEventListener('pointercancel',end,{passive:false});
  }else{
    padCard.addEventListener('touchstart',start,{passive:false});
    addEventListener('touchmove',move,{passive:false});
    addEventListener('touchend',end,{passive:false});
    addEventListener('touchcancel',end,{passive:false});
  }
  addEventListener('resize',hidePad);
}

function deriveHero(){
  const h=S.hero, st=h.stats, fam=legacyClassId(h.baseClass);
  let b={atk:0,def:0,hp:0,mp:0,str:0,vit:0,int:0,agi:0,rch:0,luk:0,crit:0};
  Object.values(h.equip).forEach(id=>{
    const it=Items[id]; if(!it) return;
    b.atk+=(it.atk||0); b.def+=(it.def||0); b.hp+=(it.hp||0); b.mp+=(it.mp||0);
    b.str+=(it.str||0); b.vit+=(it.vit||0); b.int+=(it.int||0); b.agi+=(it.agi||0); b.rch+=(it.rch||0); b.luk+=(it.luk||0); b.crit+=(it.crit||0);
  });
  const baseStats=(Classes[fam]&&Classes[fam].stats)||{str:5,vit:5,int:5,agi:5,rch:5,luk:5};
  const spentRch=Math.max(0,(st.rch||0)-(baseStats.rch||0));
  const meleeRchBonus={str:0,vit:0,agi:0};
  if(fam==='warrior'){
    const bonus=Math.floor(spentRch/2);
    meleeRchBonus.str=bonus;
    meleeRchBonus.vit=bonus;
  }else if(fam==='brawler'){
    const bonus=Math.floor(spentRch/2);
    meleeRchBonus.str=bonus;
    meleeRchBonus.agi=bonus;
  }else if(fam==='thief'){
    const bonus=Math.floor(spentRch/2);
    meleeRchBonus.agi=bonus;
  }
  const STR=st.str+b.str+meleeRchBonus.str, VIT=st.vit+b.vit+meleeRchBonus.vit, INT=st.int+b.int, AGI=st.agi+b.agi+meleeRchBonus.agi, RCH=st.rch+b.rch, LUK=st.luk+b.luk;
  h.maxHp=Math.round(110+h.level*18+VIT*12+STR*2+b.hp);
  h.maxMp=Math.round(40+h.level*8+INT*10+b.mp);
  h.attack=Math.round(8+h.level*3+STR*2+INT*.7+b.atk);
  h.defense=Math.round(3+h.level*1.4+VIT*1.5+b.def);
  h.speed=Math.round(132+AGI*3.4+(h.speedBuff>0?34:0));
  h.crit=clamp(.05+LUK*.006+b.crit,0,.82);
  h.attackSpeedRate=clamp(.62+AGI*.008+LUK*.002,.62,1.18);
  h.attackSpeed=Math.round(h.attackSpeedRate*100);
  const rangeBonus=Math.max(0,RCH-(baseStats.rch||0));
  const rangeStep=(fam==='warrior'||fam==='brawler'||fam==='thief')?6:7;
  h.attackRange=Math.round(clamp(0+rangeBonus*rangeStep,0,190));
  h.rangeRate=clamp(.18+h.attackRange*.0068,.18,1.65);
  h.evasion=clamp(.02+AGI*.007+LUK*.002,0,.42);
  h.evasionRate=Math.round(h.evasion*100);
  h.meleeRchBonus=meleeRchBonus;
  h.rchInvested=spentRch;
  h.hp=clamp(h.hp,0,h.maxHp); h.mp=clamp(h.mp,0,h.maxMp);
}
function xpNeed(lv){return Math.round(90+lv*lv*24)}
function addXp(n){
  const h=S.hero; h.xp+=n; let up=0;
  while(h.xp>=h.xpNeed){h.xp-=h.xpNeed; h.level++; h.xpNeed=xpNeed(h.level); h.statPoints+=3; up++}
  deriveHero();
  if(up){h.hp=h.maxHp; h.mp=h.maxMp; showToast(`레벨 업! Lv.${h.level} / 스탯 포인트 +${up*3}`); if(h.level>=5&&h.jobTier===1)setHint('레벨 5 달성! 성소에서 전직할 수 있습니다.')}
}

  else { for(let i=0;i<qty;i++) S.hero.inv.push({id,qty:1}) }
}
function removeItem(id,qty=1){

}

function weaponRewardFor(baseClass,tier){
  const map={
    warrior:{2:'knightBlade',3:'paladinBlade'}, mage:{2:'sageStaff',3:'archmageStaff'}, archer:{2:'rangerBow',3:'tempestBow'}, thief:{2:'thiefDaggers',3:'shadowKunai'},

  };
  return map[legacyClassId(baseClass)]?.[tier] || null;

function equipItem(id){
  const it=Items[id]; if(!it) return;
  if(!['weapon','armor','accessory'].includes(it.type)) return;
  if(it.classes && !it.classes.includes(S.hero.baseClass)) return showToast('현재 직업으로 착용할 수 없습니다.');
  if(it.tier && S.hero.jobTier<it.tier) return showToast('전직 후 사용 가능합니다.');
  const slot=it.type, prev=S.hero.equip[slot];
  S.hero.equip[slot]=id; removeItem(id,1); if(prev)addItem(prev,1); deriveHero(); S.bagDescItem=`equip:${slot}`; showToast(it.name+' 장착'); renderPanel();
}
function unequipItem(slot){
  const id=S.hero.equip?.[slot];
  if(!id||!Items[id]) return;
  S.hero.equip[slot]=null; addItem(id,1); deriveHero(); S.bagDescItem=id; showToast(Items[id].name+' 해제'); renderPanel();
}
function useItem(id){
  const it=Items[id]; if(!it) return;
  if(it.hp){ if(S.hero.hp>=S.hero.maxHp) return showToast('HP가 이미 가득합니다.'); S.hero.hp=clamp(S.hero.hp+it.hp,0,S.hero.maxHp) }
  if(it.mp){ if(S.hero.mp>=S.hero.maxMp) return showToast('MP가 이미 가득합니다.'); S.hero.mp=clamp(S.hero.mp+it.mp,0,S.hero.maxMp) }
  if(it.field){
    const es=mapNow().enemies.filter(e=>e.alive&&dist(e.x,e.y,S.hero.x,S.hero.y)<130);
    if(!es.length) return showToast('주변에 적이 없습니다.');
    es.forEach(e=>damageEnemy(e,it.field,false));
  }
  removeItem(id,1);
  if(!S.hero.inv.some(e=>e.id===id)) S.bagDescItem=null;
  showToast(it.name+' 사용'); renderPanel();
}

function newEnemy(type,tx,ty){

}
function makeMap(id,name,w,h,floor){
  return {id,name,w,h,tiles:Array.from({length:h},()=>Array.from({length:w},()=>floor)),npcs:[],portals:[],enemies:[],chests:[],doors:[],healers:[],signs:[]}

function fillRect(m,x,y,w,h,t){for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)if(yy>=0&&yy<m.h&&xx>=0&&xx<m.w)m.tiles[yy][xx]=t}
function border(m,t){for(let x=0;x<m.w;x++){m.tiles[0][x]=t;m.tiles[m.h-1][x]=t}for(let y=0;y<m.h;y++){m.tiles[y][0]=t;m.tiles[y][m.w-1]=t}}

function currentQuest(){
  for(const id of ['training','cave','dragon']){
    const q=S.hero.quests[id]; if(q.state==='active'||q.state==='ready') return {id,meta:Quests[id],state:q};
  } return null;
}
function activateQuest(id){const q=S.hero.quests[id]; if(q.state==='locked'){q.state='active'; showToast('퀘스트 시작: '+Quests[id].name)}}
function questDone(id){const q=S.hero.quests[id], meta=Quests[id]; return Object.entries(meta.kills).every(([k,n])=>(q.kills[k]||0)>=n)}
function recordKill(type){
  Object.keys(S.hero.quests).forEach(id=>{
    const q=S.hero.quests[id], need=Quests[id].kills[type];
    if(q.state!=='active'||!need) return;
    q.kills[type]=(q.kills[type]||0)+1;
    if(questDone(id)){q.state='ready'; showToast('퀘스트 완료 가능: '+Quests[id].name)}
  });
}
function claimQuest(id){
  const q=S.hero.quests[id]; if(q.state!=='ready') return false;
  const r=Quests[id].reward; S.hero.gold+=(r.gold||0); if(r.xp)addXp(r.xp);
  if(r.items)Object.entries(r.items).forEach(([k,v])=>addItem(k,v)); q.state='turnedIn';
  showToast('퀘스트 보상 획득!');
  if(id==='training') activateQuest('cave');
  if(id==='cave'){
    if(S.hero.level>=5) showToast('2차 전직 가능! 성소로 가보세요.');
    if(S.hero.quests.dragon.state==='locked') activateQuest('dragon');
    setHint('성소에서 2차 전직하고, 균열 지대에서 월드보스에 도전하세요.');
  }
  if(id==='dragon' && S.hero.level>=10) showToast('3차 전직 가능! 성소로 가보세요.');
  return true;
}

function npcPos(n){return tileCenter(n.tx,n.ty)}
function nearestObj(){
  const m=mapNow(); let best=null, bestD=1e9;
  const check=(kind,obj,tx,ty,limit)=>{const p=tileCenter(tx,ty), d=dist(S.hero.x,S.hero.y,p.x,p.y); if(d<limit&&d<bestD){best={kind,obj}; bestD=d}}
  m.npcs.forEach(n=>check('npc',n,n.tx,n.ty,72));
  m.chests.forEach(c=>!c.opened&&check('chest',c,c.tx,c.ty,60));
  m.healers.forEach(h=>check('healer',h,h.tx,h.ty,64));
  m.doors.forEach(d=>!d.opened&&check('door',d,d.tx,d.ty,64));
  m.portals.forEach(p=>check('portal',p,p.tx,p.ty,60));
  return best;
}
function interact(){
  if(S.mode==='dialog') return closeDialog();
  if(S.mode==='panel') return closePanel();
  if(S.mode!=='play') return;
  const o=nearestObj(); if(!o) return showToast('상호작용할 대상이 없습니다.');
  if(o.kind==='npc') return talkNpc(o.obj);
  if(o.kind==='chest') return openChest(o.obj);
  if(o.kind==='healer'){S.hero.hp=S.hero.maxHp; S.hero.mp=S.hero.maxMp; return showToast('완전히 회복되었습니다.')}
  if(o.kind==='door') return openDoor(o.obj);
  if(o.kind==='portal') return warp(o.obj);
}
function openChest(c){
  c.opened=true; if(c.reward.gold)S.hero.gold+=c.reward.gold; if(c.reward.items)Object.entries(c.reward.items).forEach(([k,v])=>addItem(k,v));
  openDialog('상자',c.text,[{label:'획득',fn:closeDialog}]);
}
function openDoor(d){
  if(d.key&&hasItem(d.key)){removeItem(d.key,1); d.opened=true; showToast('문을 열었습니다.')}
  else openDialog('석문',d.text+'\n열쇠가 필요합니다.',[{label:'닫기',fn:closeDialog}]);
}
function portalOK(p){return !p.cond || p.cond(S.hero)}
function warp(p){
  if(S.warpCd>0) return;
  if(!portalOK(p)) return showToast(p.deny||'아직 갈 수 없습니다.');
  S.map=p.to; setHeroPos(p.spawn.tx,p.spawn.ty); S.warpCd=.8; S.projectiles=[]; S.effects=[]; showToast(mapNow().name);
}

    if(S.hero.quests.dragon.state==='ready'){claimQuest('dragon'); return openDialog('사냥꾼','정말 대단하군. 드레이크의 비늘을 챙겨둬.',[{label:'확인',fn:closeDialog}])}
    return openDialog('사냥꾼','월드보스는 시간이 지나면 다시 나타난다.',[{label:'확인',fn:closeDialog}]);
  }
  if(n.role==='shrine'){
    if(S.hero.jobTier>=3) return openDialog('성소 관리자','이미 3차 전직까지 마쳤습니다.',[{label:'확인',fn:closeDialog}]);

function chooseAdvancePath(){
  const c=cls();
  const branches=(c&&c.branches)||[];
  if(!branches.length) return advanceJob(0);
  return openDialog('성소 관리자','원하는 2차 전직 계열을 선택하세요.',[
    ...branches.map((b,idx)=>({label:`${b.tier2} · ${b.tier3}`,fn:()=>{closeDialog(); advanceJob(idx)}})),
    {label:'나중에',fn:closeDialog,cls:'secondary'}
  ]);
}

function advanceJob(pathOverride){
  const reward=(tier)=>weaponRewardFor(S.hero.baseClass,tier);
  if(S.hero.jobTier===1){
    if(S.hero.level<5) return showToast('레벨 5 이상이어야 합니다.');
    if(S.hero.quests.cave.state!=='turnedIn') return showToast('어둠 동굴 퀘스트를 완료해야 합니다.');
    const chosenPath=typeof pathOverride==='number'?clamp(pathOverride,0,1):(hasChosenJobPath()?S.hero.jobPath:null);
    if(typeof chosenPath!=='number') return chooseAdvancePath();
    S.hero.jobPath=chosenPath;
    S.classPaths[S.hero.baseClass]=chosenPath;
    S.hero.jobTier=2;
    const rewardId=reward(2); if(rewardId) addItem(rewardId,1);
    deriveHero(); updateSkillButtons(); updateHud(); renderPanel();
    showToast(tierName(S.hero.baseClass,2,chosenPath)+' 전직 완료!');
    return;
  }
  if(S.hero.jobTier===2){
    if(S.hero.level<10) return showToast('레벨 10 이상이어야 합니다.');
    if(S.hero.quests.dragon.state!=='turnedIn') return showToast('썬더 드레이크 퀘스트를 완료해야 합니다.');
    S.hero.jobTier=3;
    const rewardId=reward(3); if(rewardId) addItem(rewardId,1);
    deriveHero(); updateSkillButtons(); updateHud(); renderPanel();
    showToast(tierName(S.hero.baseClass,3,selectedPath(S.hero.baseClass))+' 전직 완료!');
    return;
  }
  showToast('이미 최종 전직을 마쳤습니다.');
}

function openDialog(title,text,buttons=[{label:'확인',fn:closeDialog}]){
  S.mode='dialog'; dialogTitle.textContent=title; dialogText.textContent=text; dialogButtons.innerHTML='';
  buttons.forEach(b=>{
    const el=document.createElement('button');
    el.className='btn'+(b.cls?' '+b.cls:'');
    el.textContent=b.label;
    bindTap(el,()=>{ if(typeof b.fn==='function') b.fn(); });
    dialogButtons.appendChild(el);
  });
  dialogOverlay.classList.add('show');
}
function closeDialog(){
  dialogOverlay.classList.remove('show');
  if(S.mode==='dialog') S.mode='play';
  if(S.hero) S.hero.interactCd=Math.max(S.hero.interactCd||0,.24);
  S.once.interact=0;
}
function openPanel(type){
  S.mode='panel';
  S.panel=type;
  if(type==='bag') ensureBagSelection();
  renderPanel();
  panelOverlay.classList.add('show');
}
function closePanel(){panelOverlay.classList.remove('show'); delete panelBox.dataset.panel; S.panel=null; S.mode='play'}
function shopItems(type){return type==='shop2'?['megaPotion','bomb','knightBlade','sageStaff','rangerBow','thiefDaggers','saintMace','qiGauntlet','spiritBell','ironArmor','archRobe','windCloak','holyVestment','fighterWrap','spiritMantle','guardianRing']:['potion','ether','leatherArmor','mageRobe','rogueVest','priestRobe','wolfCharm']}
function buyItem(id){
  const it=Items[id]; if(!it) return;
  if(S.hero.gold<(it.price||0)) return showToast('골드가 부족합니다.');
  if(it.classes&&!it.classes.includes(S.hero.baseClass)) return showToast('현재 직업에 맞지 않습니다.');
  if(it.tier&&S.hero.jobTier<it.tier) return showToast('전직 후 구매 가능합니다.');
  S.hero.gold-=it.price||0; addItem(id,1); showToast(it.name+' 구매'); renderPanel();
}
function buildPanelShell(title, desc, body, shellClass='', actions=''){
  const descRow=(desc||actions)
    ? `<div class="panel-desc-row">${desc?`<div class="panel-desc panel-desc-text">${desc}</div>`:''}${actions?`<div class="panel-header-actions">${actions}</div>`:''}</div>`
    : '';
  return `<div class="panel-shell ${shellClass}">
    <div class="panel-header">
      <div class="panel-header-main">
        <strong>${title}</strong>
        ${descRow}
      </div>
      <button class="btn secondary sheet-close" data-close>닫기</button>
    </div>
    <div class="panel-scroll">${body}</div>
  </div>`;
}

function ensureBagSelection(){
  if(!S.hero) return;
  const validInventory=typeof S.bagDescItem==='string' && S.hero.inv?.some(e=>e.id===S.bagDescItem);
  const validEquip=typeof S.bagDescItem==='string' && S.bagDescItem.startsWith('equip:') && !!S.hero.equip?.[S.bagDescItem.split(':')[1]];
  if(validInventory||validEquip) return;
  if(S.hero.inv?.length){
    S.bagDescItem=S.hero.inv[0].id;
    return;
  }
  const equipSlot=['weapon','armor','accessory'].find(slot=>S.hero.equip?.[slot]);
  S.bagDescItem=equipSlot?`equip:${equipSlot}`:null;
}

function getBagSelection(){
  if(!S.hero) return null;
  if(typeof S.bagDescItem==='string' && S.bagDescItem.startsWith('equip:')){
    const slot=S.bagDescItem.split(':')[1];
    const id=S.hero.equip?.[slot];
    const item=id?Items[id]:null;
    return item?{id,item,slot,location:'equip'}:null;
  }
  const entry=S.hero.inv?.find(e=>e.id===S.bagDescItem);
  const item=entry?Items[entry.id]:null;
  return item?{id:entry.id,item,slot:item.type,location:'inventory'}:null;
}
function getBagPanelDescText(){
  const selected=getBagSelection();
  return selected?`${selected.item.name} · ${selected.item.desc}`:'아이템을 터치하면 설명이 표시됩니다.';
}
function getBagPanelActions(){
  const selected=getBagSelection();
  if(!selected) return '';
  const {id,item,slot,location}=selected;
  if(item.type==='consumable') return `<button class="btn good bag-action-btn" data-use="${id}">사용</button>`;
  if(['weapon','armor','accessory'].includes(item.type)){
    if(location==='equip') return `<button class="btn warn bag-action-btn" data-unequip="${slot}">해제</button>`;
    return `<button class="btn bag-action-btn" data-equip="${id}">장착</button>`;
  }
  return '';
}
function updateBagPanelDesc(){
  const descEl=panelBox.querySelector('.panel-desc-text')||panelBox.querySelector('.panel-desc');
  if(descEl) descEl.textContent=getBagPanelDescText();
  const actionEl=panelBox.querySelector('.panel-header-actions');
  if(actionEl) actionEl.innerHTML=getBagPanelActions();
  panelBox.querySelectorAll('.inventory-slot[data-item]').forEach(slot=>{
    slot.classList.toggle('selected', slot.dataset.item===S.bagDescItem);
  });
  panelBox.querySelectorAll('.equip-slot[data-equip-slot]').forEach(slot=>{
    slot.classList.toggle('selected', `equip:${slot.dataset.equipSlot}`===S.bagDescItem);
  });
  const useBtn=panelBox.querySelector('[data-use]');
  if(useBtn) bindTap(useBtn,()=>{S.bagDescItem=useBtn.dataset.use; useItem(useBtn.dataset.use);});
  const equipBtn=panelBox.querySelector('[data-equip]');
  if(equipBtn) bindTap(equipBtn,()=>{S.bagDescItem=equipBtn.dataset.equip; equipItem(equipBtn.dataset.equip);});
  const unequipBtn=panelBox.querySelector('[data-unequip]');
  if(unequipBtn) bindTap(unequipBtn,()=>{unequipItem(unequipBtn.dataset.unequip);});
}

function saveGame(){
  if(!S.hero) return;
  const data={hero:S.hero,maps:S.maps,map:S.map,settings:S.settings};
  saveSettings();
  if(safeSet(SAVE_KEY,JSON.stringify(data))) showToast('저장했습니다.'); else showToast('저장 실패');
  renderPanel();
}
function loadGame(){
  const raw=safeGet(SAVE_KEY); if(!raw) return showToast('저장 데이터가 없습니다.');
  try{
    const data=JSON.parse(raw);
    if(data&&data.settings&&Number.isFinite(Number(data.settings.controlSensitivity))){
      S.settings.controlSensitivity=clamp(Number(data.settings.controlSensitivity),.4,1);
      saveSettings();
    }
    S.hero=normalizeHeroState(data.hero); S.maps=data.maps; S.map=data.map; S.selected=S.hero.baseClass; S.classPaths[S.hero.baseClass]=S.hero.jobPath||0; S.projectiles=[]; S.effects=[]; S.particles=[];
    titleScreen.style.display='none'; document.body.classList.remove('title-active'); S.mode='play'; deriveHero(); updateHud(); showToast('저장 데이터를 불러왔습니다.'); closePanel();
  }catch(e){showToast('저장 데이터를 불러오지 못했습니다.')}
}

function normalizeAngle(a){
  if(!Number.isFinite(a)) return Math.PI/2;
  let out=a%(Math.PI*2);
  if(out<=-Math.PI) out+=Math.PI*2;
  if(out>Math.PI) out-=Math.PI*2;
  return out;
}
function angleFromFacing(f,prev=Math.PI/2){
  if(typeof f==='number' && Number.isFinite(f)) return normalizeAngle(f);
  const map={
    up:-Math.PI/2, down:Math.PI/2, left:Math.PI, right:0,
    upLeft:-Math.PI*3/4, upRight:-Math.PI/4,
    downLeft:Math.PI*3/4, downRight:Math.PI/4
  };
  return Object.prototype.hasOwnProperty.call(map,f)?map[f]:prev;
}
function faceVec(f){
  const ang=angleFromFacing(f);
  return {x:Math.cos(ang), y:Math.sin(ang)};
}
function facingFromInput(dx,dy,prev=Math.PI/2){
  if(!dx&&!dy) return angleFromFacing(prev);
  return normalizeAngle(Math.atan2(dy,dx));
}
function spawnProjectile(o){
  const baseAng=typeof o.ang==='number' ? o.ang : angleFromFacing(o.dir,0);
  const ang=normalizeAngle(baseAng+(o.off||0));
  S.projectiles.push({team:o.team,x:o.x,y:o.y,vx:Math.cos(ang)*o.spd,vy:Math.sin(ang)*o.spd,r:o.r,dmg:o.dmg,color:o.color,life:o.life||1,explode:o.explode||0,pierce:o.pierce||0});
}
function hitCircle(x,y,r,dmg){ mapNow().enemies.forEach(e=>{if(e.alive&&dist(x,y,e.x,e.y)<=r+e.r) damageEnemy(e,dmg,Math.random()<S.hero.crit)}) }
function hitNearestInCircle(x,y,r,dmg){
  const enemy=mapNow().enemies.filter(e=>e.alive&&dist(x,y,e.x,e.y)<=r+e.r).sort((a,b)=>dist(x,y,a.x,a.y)-dist(x,y,b.x,b.y))[0];
  if(enemy) damageEnemy(enemy,dmg,Math.random()<S.hero.crit);
}
function attack(){
  if(S.mode!=='play'||S.hero.atkCd>0) return;
  const h=S.hero, fam=legacyClassId(h.baseClass), d=faceVec(h.facing), atkScale=1/Math.max(.55,h.attackSpeedRate||1), baseRange=Math.max(.18,h.rangeRate||1), meleeRangeMul=1+Math.max(0,h.rchInvested||0)*.12;
  const rr=v=>Math.round(v*baseRange), rl=v=>v*baseRange;
  if(fam==='warrior' || fam==='brawler' || fam==='thief'){
    h.atkCd=(fam==='brawler'?.4:(fam==='thief'?.34:.56))*atkScale;
    const reach=Math.round((fam==='warrior'?28:fam==='brawler'?22:24)*meleeRangeMul);
    const radius=Math.round((fam==='warrior'?28:fam==='brawler'?24:22)*(1+Math.max(0,h.rchInvested||0)*.08));
    const dmg=Math.round(h.attack*(fam==='warrior'?1.1:fam==='brawler'?1.04:1.02));
    const x=h.x+d.x*reach, y=h.y+d.y*reach;
    S.effects.push({x,y,r:radius,time:.18,color:fam==='brawler'?'#fb7185':fam==='thief'?'#38bdf8':'#fca5a5'});
    hitNearestInCircle(x,y,radius,dmg);
  }else if(fam==='mage'){
    h.atkCd=.42*atkScale;
    spawnProjectile({team:'player',x:h.x,y:h.y,dir:h.facing,spd:400,r:9,dmg:Math.round(h.attack*.95+h.stats.int*2),color:'#60a5fa',life:rl(1.35)});
  }else if(fam==='healer1'){
    h.atkCd=.44*atkScale;
    spawnProjectile({team:'player',x:h.x,y:h.y,dir:h.facing,spd:380,r:8,dmg:Math.round(h.attack*.88+h.stats.int*1.6),color:'#fbbf24',life:rl(1.2)});
  }else if(fam==='thief'){

function tile(m,tx,ty){if(tx<0||ty<0||tx>=m.w||ty>=m.h)return'wall'; return m.tiles[ty][tx]}
function solidTile(t){return ['tree','wall','water','stoneWall','lava','house'].includes(t)}
function doorAt(m,tx,ty){return m.doors.find(d=>d.tx===tx&&d.ty===ty&&!d.opened)||null}
function solidAt(m,x,y){const tx=Math.floor(x/TILE), ty=Math.floor(y/TILE); if(doorAt(m,tx,ty)) return true; return solidTile(tile(m,tx,ty))}
function circleHit(m,x,y,r){
  const pts=[[x-r,y-r],[x+r,y-r],[x-r,y+r],[x+r,y+r],[x,y-r],[x,y+r],[x-r,y],[x+r,y]];
  return pts.some(([px,py])=>solidAt(m,px,py));
}
function getObjectBlockers(m){
  const blockers=[];
  const add=(kind,ref,x,y,r)=>blockers.push({kind,ref,x,y,r});
  if(S.hero&&S.hero.hp>0) add('hero',S.hero,S.hero.x,S.hero.y,S.hero.r);
  m.npcs.forEach(n=>{const p=npcPos(n); add('npc',n,p.x,p.y,18)});
  m.enemies.forEach(e=>{if(e.alive) add('enemy',e,e.x,e.y,e.r)});
  m.chests.forEach(c=>{if(!c.opened){const p=tileCenter(c.tx,c.ty); add('chest',c,p.x,p.y,16)}});
  m.healers.forEach(h=>{const p=tileCenter(h.tx,h.ty); add('healer',h,p.x,p.y,16)});
  m.signs.forEach(s=>{const p=tileCenter(s.tx,s.ty); add('sign',s,p.x,p.y,14)});
  m.doors.forEach(d=>{if(!d.opened){const p=tileCenter(d.tx,d.ty); add('door',d,p.x,p.y,20)}});
  return blockers;
}
function objectHit(m,x,y,r,ignoreRef){
  return getObjectBlockers(m).some(o=>o.ref!==ignoreRef&&dist(x,y,o.x,o.y)<r+o.r-2);
}
function circleBlocked(m,x,y,r,ignoreRef=null){
  return circleHit(m,x,y,r)||objectHit(m,x,y,r,ignoreRef);
}

function updatePlayer(dt){
  const h=S.hero; deriveHero();
  h.atkCd=Math.max(0,h.atkCd-dt); h.skillCd=Math.max(0,h.skillCd-dt); h.dashCd=Math.max(0,h.dashCd-dt); h.invuln=Math.max(0,h.invuln-dt); h.speedBuff=Math.max(0,h.speedBuff-dt); h.interactCd=Math.max(0,h.interactCd-dt);
  let dx=S.input.analog?S.input.ax:0, dy=S.input.analog?S.input.ay:0;
  if(!S.input.analog){
    if(S.input.up) dy-=1;
    if(S.input.down) dy+=1;
    if(S.input.left) dx-=1;
    if(S.input.right) dx+=1;
  }
  const mag=Math.hypot(dx,dy);
  if(mag>0.001){
    if(mag>1){ dx/=mag; dy/=mag; }
    h.facing=facingFromInput(dx,dy,h.facing);
  }
  const m=mapNow(), mv=h.speed*dt; let nx=h.x+dx*mv, ny=h.y; if(!circleBlocked(m,nx,ny,h.r,h)) h.x=nx; ny=h.y+dy*mv; if(!circleBlocked(m,h.x,ny,h.r,h)) h.y=ny;
  if(S.once.attack) attack(); if(S.once.skill) castSkill(0); if(S.once.skill2) castSkill(1); if(S.once.skill3) castSkill(2); if(S.once.dash) dash(); if(S.once.interact&&h.interactCd<=0){interact(); h.interactCd=.2} S.once={};
}

function updateEnemies(dt){
  mapNow().enemies.forEach(e=>{
    const t=Enemies[e.type];
    if(!e.alive){
      if(t.world||t.respawn){e.respawn=Math.max(0,(e.respawn||t.respawn)-dt); if(e.respawn===0){e.alive=true; e.hp=t.hp; e.maxHp=t.hp; e.x=e.homeX; e.y=e.homeY; if(t.world) showToast('월드보스가 다시 나타났습니다.')}} return;
    }
    e.cd=Math.max(0,e.cd-dt); const d=dist(e.x,e.y,S.hero.x,S.hero.y), m=mapNow();
    if(d<t.aggro){
      const dx=(S.hero.x-e.x)/Math.max(d,1), dy=(S.hero.y-e.y)/Math.max(d,1), sp=t.spd*dt;
      if(t.projectile&&d>120){
        const tx=e.x+dx*sp*.55, ty=e.y+dy*sp*.55; if(!circleBlocked(m,tx,ty,e.r,e)){e.x=tx; e.y=ty}
        if(e.cd<=0){ e.cd=t.world?1.25:1.65; const ang=Math.atan2(S.hero.y-e.y,S.hero.x-e.x); S.projectiles.push({team:'enemy',x:e.x,y:e.y,vx:Math.cos(ang)*(t.world?260:210),vy:Math.sin(ang)*(t.world?260:210),r:t.world?10:8,dmg:t.atk,color:t.world?'#38bdf8':'#f87171',life:3})}
      }else{
        const tx=e.x+dx*sp, ty=e.y+dy*sp; if(!circleBlocked(m,tx,e.y,e.r,e)) e.x=tx; if(!circleBlocked(m,e.x,ty,e.r,e)) e.y=ty;
        if(d<e.r+S.hero.r+6&&e.cd<=0){damageHero(t.atk); e.cd=t.world?1.0:.9}
      }
    }else{
      const hd=dist(e.x,e.y,e.homeX,e.homeY); if(hd>8){const dx=(e.homeX-e.x)/hd, dy=(e.homeY-e.y)/hd, sp=t.spd*.4*dt, tx=e.x+dx*sp, ty=e.y+dy*sp; if(!circleBlocked(m,tx,e.y,e.r,e)) e.x=tx; if(!circleBlocked(m,e.x,ty,e.r,e)) e.y=ty}
    }
  });
}
function updateProjectiles(dt){
  const m=mapNow();
  for(let i=S.projectiles.length-1;i>=0;i--){
    const p=S.projectiles[i]; p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; let rm=p.life<=0||circleHit(m,p.x,p.y,p.r);
    if(p.team==='player'&&!rm){
      mapNow().enemies.forEach(e=>{
        if(rm||!e.alive) return;
        if(dist(p.x,p.y,e.x,e.y)<=p.r+e.r){damageEnemy(e,p.dmg,Math.random()<S.hero.crit); if(p.explode) hitCircle(p.x,p.y,p.explode,Math.round(p.dmg*.7)); if(p.pierce>0)p.pierce--; else rm=true}
      });
    }else if(p.team==='enemy'&&!rm){
      if(dist(p.x,p.y,S.hero.x,S.hero.y)<=p.r+S.hero.r){damageHero(p.dmg); rm=true}
    }
    if(rm){ if(p.explode) S.effects.push({x:p.x,y:p.y,r:p.explode,time:.28,color:p.color}); S.projectiles.splice(i,1) }
  }
}

    <div class="hero-topline">
      <div class="hero-name">Lv.${S.hero.level} ${heroTitle()}</div>
      <div class="hero-meta"><span>${S.hero.gold} G</span></div>
    </div>
    <div class="hero-bars">
      <div class="hero-meter"><div class="meter-label"><span>HP</span><span>${Math.round(S.hero.hp)} / ${S.hero.maxHp}</span></div><div class="bar"><div class="fill hp" style="width:${S.hero.hp/S.hero.maxHp*100}%"></div></div></div>
      <div class="hero-meter"><div class="meter-label"><span>MP</span><span>${Math.round(S.hero.mp)} / ${S.hero.maxMp}</span></div><div class="bar"><div class="fill mp" style="width:${S.hero.mp/S.hero.maxMp*100}%"></div></div></div>
      <div class="hero-meter"><div class="meter-label"><span>XP</span><span>${Math.round(S.hero.xp)} / ${S.hero.xpNeed}</span></div><div class="bar"><div class="fill xp" style="width:${S.hero.xp/S.hero.xpNeed*100}%"></div></div></div>
    </div>
    <div class="hero-bottomline">
      <div class="hero-skillline">액티브 스킬: ${skillName}</div>
      <div class="hero-inline-menu" aria-label="메뉴">
        <button class="ctrl" type="button" data-menu-panel="bag">가방</button>
        <button class="ctrl" type="button" data-menu-panel="stats">스탯</button>
        <button class="ctrl" type="button" data-menu-panel="quest">퀘스트</button>
        <button class="ctrl" type="button" data-menu-panel="save">설정</button>
      </div>
    </div>
  </div>`;
  const q=currentQuest();
  if(q){
    const prog=Object.entries(q.meta.kills).map(([e,n])=>`${Enemies[e].name} ${q.state.kills[e]||0}/${n}`).join(' · ');
    questHud.innerHTML=`<div class="quest-plain">
      <div class="quest-name">${q.meta.name}</div>
      <div class="quest-body">${q.meta.objective}</div>
      <div class="quest-progress">${prog}</div>
      <div class="quest-zone">${mapNow().name}</div>
    </div>`;
  }else{
    questHud.innerHTML=`<div class="quest-plain done">
      <div class="quest-name">메인 퀘스트 완료</div>
      <div class="quest-body">남은 지역과 파밍은 계속 진행할 수 있습니다.</div>
      <div class="quest-zone">${mapNow().name}</div>
    </div>`;
  }
  syncHudClearance();
  updateSkillButtons();
  updateActionCooldowns();
}

function resize(){
  const dpr=Math.max(1,Math.min(devicePixelRatio||1,2)), r=cv.getBoundingClientRect();
  S.vw=r.width; S.vh=r.height; cv.width=Math.round(r.width*dpr); cv.height=Math.round(r.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
  syncHudClearance();
}
function camera(){
  const m=mapNow(), ww=m.w*TILE, wh=m.h*TILE;
  S.cam.x=clamp(S.hero.x-S.vw/2,0,Math.max(0,ww-S.vw)); S.cam.y=clamp(S.hero.y-S.vh/2,0,Math.max(0,wh-S.vh));
}
function scr(x,y){return {x:x-S.cam.x,y:y-S.cam.y}}
function roundRectPath(x,y,w,h,r){
  const rr=Math.max(0,Math.min(r,Math.min(w,h)/2));
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.arcTo(x+w,y,x+w,y+h,rr);
  ctx.arcTo(x+w,y+h,x,y+h,rr);
  ctx.arcTo(x,y+h,x,y,rr);
  ctx.arcTo(x,y,x+w,y,rr);
  ctx.closePath();
}
function enemyRankMeta(t){
  if(t.world) return {label:'월드보스', color:'#38bdf8', glow:'rgba(56,189,248,.30)'};
  if(t.boss) return {label:'보스', color:'#f97316', glow:'rgba(249,115,22,.24)'};
  if(t.elite) return {label:'정예', color:'#a855f7', glow:'rgba(168,85,247,.22)'};
  return {label:'일반', color:'#22c55e', glow:'rgba(34,197,94,.18)'};
}
function enemyDisplayLevel(t){ return t.level||1 }
function drawTile(t,x,y){
  if(t==='grass'){ctx.fillStyle='#166534';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(x+6,y+10,8,5);ctx.fillRect(x+24,y+27,6,6)}
  else if(t==='road'){ctx.fillStyle='#b08968';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(0,0,0,.07)';for(let i=0;i<4;i++)ctx.fillRect(x+4+i*9,y+6+(i%2)*9,4,3)}
  else if(t==='path'||t==='ashRoad'){ctx.fillStyle=t==='path'?'#9a7b5f':'#6b7280';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(x+8,y+8,10,5);ctx.fillRect(x+26,y+24,8,5)}
  else if(t==='plaza'){ctx.fillStyle='#94a3b8';ctx.fillRect(x,y,TILE,TILE);ctx.strokeStyle='rgba(15,23,42,.18)';ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1)}
  else if(t==='house'){ctx.fillStyle='#92400e';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#7c2d12';ctx.beginPath();ctx.moveTo(x,y+12);ctx.lineTo(x+TILE/2,y);ctx.lineTo(x+TILE,y+12);ctx.closePath();ctx.fill()}
  else if(t==='tree'){ctx.fillStyle='#14532d';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#22c55e';ctx.beginPath();ctx.arc(x+24,y+18,16,0,TAU);ctx.fill();ctx.fillStyle='#854d0e';ctx.fillRect(x+20,y+22,8,18)}
  else if(t==='water'){ctx.fillStyle='#2563eb';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.14)';ctx.beginPath();ctx.arc(x+12,y+14,5,0,TAU);ctx.arc(x+30,y+28,6,0,TAU);ctx.fill()}
  else if(t==='dungeon'||t==='boss'){ctx.fillStyle=t==='boss'?'#3f3f46':'#52525b';ctx.fillRect(x,y,TILE,TILE);ctx.strokeStyle='rgba(255,255,255,.05)';ctx.strokeRect(x+.5,y+.5,TILE-1,TILE-1)}
  else if(t==='wall'||t==='stoneWall'){ctx.fillStyle=t==='stoneWall'?'#475569':'#27272a';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x+6,y+6,TILE-12,5)}
  else if(t==='ash'){ctx.fillStyle='#374151';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.05)';ctx.fillRect(x+10,y+20,8,5)}
  else if(t==='lava'){ctx.fillStyle='#7c2d12';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#f97316';ctx.beginPath();ctx.arc(x+14,y+15,7,0,TAU);ctx.arc(x+32,y+29,8,0,TAU);ctx.fill()}
  else if(t==='crystal'){ctx.fillStyle='#1e3a8a';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#67e8f9';ctx.beginPath();ctx.moveTo(x+24,y+6);ctx.lineTo(x+34,y+20);ctx.lineTo(x+24,y+40);ctx.lineTo(x+14,y+20);ctx.closePath();ctx.fill()}
  else if(t==='stone'){ctx.fillStyle='#64748b';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='rgba(255,255,255,.06)';ctx.fillRect(x+8,y+10,10,10)}
  else{ctx.fillStyle='#111827';ctx.fillRect(x,y,TILE,TILE)}
}
function drawWorld(){
  const m=mapNow(), sx=Math.floor(S.cam.x/TILE), sy=Math.floor(S.cam.y/TILE), ex=Math.ceil((S.cam.x+S.vw)/TILE), ey=Math.ceil((S.cam.y+S.vh)/TILE);
  for(let ty=sy;ty<ey;ty++)for(let tx=sx;tx<ex;tx++) drawTile(tile(m,tx,ty), tx*TILE-S.cam.x, ty*TILE-S.cam.y);
  m.portals.forEach(p=>{const x=p.tx*TILE-S.cam.x, y=p.ty*TILE-S.cam.y; ctx.strokeStyle='rgba(34,211,238,.65)'; ctx.lineWidth=3; ctx.strokeRect(x+4,y+4,p.w*TILE-8,p.h*TILE-8)});
  m.signs.forEach(s=>{const p=scr(tileCenter(s.tx,s.ty).x,tileCenter(s.tx,s.ty).y); ctx.fillStyle='rgba(15,23,42,.82)'; ctx.fillRect(p.x-46,p.y-30,92,34); ctx.fillStyle='#e2e8f0'; ctx.font='12px sans-serif'; ctx.textAlign='center'; s.text.split('\n').forEach((line,i)=>ctx.fillText(line,p.x,p.y-12+i*12))});
  m.chests.forEach(c=>{const p=scr(tileCenter(c.tx,c.ty).x,tileCenter(c.tx,c.ty).y); ctx.fillStyle=c.opened?'#475569':'#f59e0b'; ctx.fillRect(p.x-14,p.y-10,28,20); ctx.fillStyle='#78350f'; ctx.fillRect(p.x-14,p.y-4,28,5)});
  m.doors.forEach(d=>{if(d.opened)return; const p=scr(tileCenter(d.tx,d.ty).x,tileCenter(d.tx,d.ty).y); ctx.fillStyle='#a16207'; ctx.fillRect(p.x-18,p.y-22,36,44); ctx.fillStyle='#fde68a'; ctx.fillRect(p.x+10,p.y,4,4)});
  m.healers.forEach(h=>{const p=scr(tileCenter(h.tx,h.ty).x,tileCenter(h.tx,h.ty).y); ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.arc(p.x,p.y,14,0,TAU); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.beginPath(); ctx.arc(p.x,p.y,6,0,TAU); ctx.fill()});
  m.npcs.forEach(n=>{const c=npcPos(n), p=scr(c.x,c.y); ctx.fillStyle=n.role==='merchant'?'#22c55e':n.role==='shrine'?'#a855f7':n.role==='healer'?'#38bdf8':'#f59e0b'; ctx.beginPath(); ctx.arc(p.x,p.y-10,10,0,TAU); ctx.fill(); ctx.fillStyle='#e5e7eb'; ctx.fillRect(p.x-10,p.y,20,16); ctx.fillStyle='rgba(2,6,23,.8)'; ctx.fillRect(p.x-28,p.y-30,56,12); ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText(n.name,p.x,p.y-20)});
}
function drawEnemies(){
  mapNow().enemies.forEach(e=>{
    if(!e.alive) return;
    const t=Enemies[e.type], p=scr(e.x,e.y), rank=enemyRankMeta(t), level=enemyDisplayLevel(t);
    ctx.fillStyle=t.color; ctx.beginPath(); ctx.arc(p.x,p.y,e.r,0,TAU); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.arc(p.x-e.r*.25,p.y-e.r*.25,e.r*.28,0,TAU); ctx.fill();

    const nameText=`Lv.${level} ${t.name}`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.font='700 11px sans-serif';
    const badgeW=Math.max(42,Math.ceil(ctx.measureText(rank.label).width+16));
    const badgeH=18;
    const plateW=Math.max(badgeW+26,Math.ceil(ctx.measureText(nameText).width+26));
    const plateH=22;
    const baseY=p.y-e.r-32;

    ctx.save();
    ctx.shadowColor=rank.glow;
    ctx.shadowBlur=t.world?18:(t.boss?14:10);
    ctx.fillStyle='rgba(2,6,23,.54)';
    roundRectPath(p.x-plateW/2,baseY-plateH/2,plateW,plateH,11);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,.10)';
    ctx.lineWidth=1;
    roundRectPath(p.x-plateW/2+.5,baseY-plateH/2+.5,plateW-1,plateH-1,10.5);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowColor=rank.glow;
    ctx.shadowBlur=t.world?18:10;
    ctx.fillStyle='rgba(6,11,21,.88)';
    roundRectPath(p.x-badgeW/2,baseY-plateH/2-badgeH+3,badgeW,badgeH,999);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=rank.color;
    ctx.lineWidth=1.2;
    roundRectPath(p.x-badgeW/2+.5,baseY-plateH/2-badgeH+3.5,badgeW-1,badgeH-1,999);
    ctx.stroke();
    ctx.fillStyle=rank.color;
    ctx.font='800 10px sans-serif';
    ctx.fillText(rank.label,p.x,baseY-plateH/2-badgeH/2+3);
    ctx.restore();

    ctx.fillStyle='#f8fafc';
    ctx.font=t.world?'800 12px sans-serif':'700 11px sans-serif';
    ctx.fillText(nameText,p.x,baseY+1);

    const w=Math.max(e.r*2+10,plateW-6), barY=p.y-e.r-12;
    ctx.fillStyle='rgba(2,6,23,.78)';
    roundRectPath(p.x-w/2,barY,w,8,999);
    ctx.fill();
    ctx.fillStyle=rank.color;
    roundRectPath(p.x-w/2+1,barY+1,Math.max(0,(w-2)*(e.hp/e.maxHp)),6,999);
    ctx.fill();
  });
}
function drawProjectiles(){S.projectiles.forEach(p=>{const s=scr(p.x,p.y); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(s.x,s.y,p.r,0,TAU); ctx.fill()})}
function drawHero(){
  const h=S.hero, p=scr(h.x,h.y); ctx.save(); if(h.invuln>0) ctx.globalAlpha=.55+Math.sin(Date.now()/35)*.2;
  const heroColor=(Classes[legacyClassId(h.baseClass)]||{}).color||'#22c55e';
  ctx.fillStyle=heroColor; ctx.beginPath(); ctx.arc(p.x,p.y-8,10,0,TAU); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.72)'; ctx.fillRect(p.x-10,p.y+2,20,18);
  const d=faceVec(h.facing); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.x,p.y+10); ctx.lineTo(p.x+d.x*14,p.y+10+d.y*14); ctx.stroke(); ctx.restore();
}
function drawFx(){
  S.effects.forEach(e=>{const p=scr(e.x,e.y); ctx.save(); ctx.globalAlpha=Math.max(0,e.time/.35); ctx.strokeStyle=e.color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(p.x,p.y,e.r*(1-e.time*.25),0,TAU); ctx.stroke(); ctx.restore()});
  S.particles.forEach(p=>{const s=scr(p.x,p.y); ctx.save(); ctx.globalAlpha=Math.min(1,p.time); ctx.fillStyle=p.color; ctx.font='bold 15px sans-serif'; ctx.textAlign='center'; ctx.fillText(p.text,s.x,s.y); ctx.restore()});
}
function drawOverlay(){
  ctx.save(); ctx.fillStyle='rgba(2,6,23,.72)'; ctx.fillRect(14,14,170,34); ctx.fillStyle='#f8fafc'; ctx.font='bold 18px sans-serif'; ctx.textAlign='left'; ctx.fillText(mapNow().name,26,36); ctx.restore();
  const b=mapNow().enemies.find(e=>e.type==='thunderDrake'); if(b&&!b.alive){ctx.save(); ctx.fillStyle='rgba(2,6,23,.74)'; ctx.fillRect(S.vw-230,14,216,58); ctx.fillStyle='#38bdf8'; ctx.font='bold 15px sans-serif'; ctx.fillText('월드보스 재등장',S.vw-216,36); ctx.fillStyle='#fff'; ctx.fillText(Math.floor((b.respawn||0)/60)+':'+String(Math.floor((b.respawn||0)%60)).padStart(2,'0'),S.vw-216,58); ctx.restore();}
}
function render(){
  resize(); ctx.clearRect(0,0,S.vw,S.vh); if(!S.hero){ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,S.vw,S.vh); return}
  camera();
  if(toast.classList.contains('show') && S.toastType==='skill') positionSkillToast();
  drawWorld(); drawEnemies(); drawProjectiles(); drawHero(); drawFx(); drawOverlay();
}

function loop(ts){
  if(!S.last) S.last=ts; const dt=Math.min(.033,(ts-S.last)/1000); S.last=ts; update(dt); render(); requestAnimationFrame(loop);
}

function key(key,on){
  const k=key.toLowerCase();
  if(['arrowup','w'].includes(k)){ S.input.up=on; S.input.analog=false; }
  if(['arrowdown','s'].includes(k)){ S.input.down=on; S.input.analog=false; }
  if(['arrowleft','a'].includes(k)){ S.input.left=on; S.input.analog=false; }
  if(['arrowright','d'].includes(k)){ S.input.right=on; S.input.analog=false; }
  if(on){
    if(k==='j') S.once.attack=1; if(k==='k') S.once.skill=1; if(k==='u') S.once.skill2=1; if(k==='o') S.once.skill3=1; if(k==='e'||k===' ') S.once.interact=1; if(k==='l'||k==='shift') S.once.dash=1;
    if(k==='i') openPanel('bag'); if(k==='c') openPanel('stats'); if(k==='q') openPanel('quest'); if(k==='p') openPanel('save');
    if(k==='escape'){ if(S.mode==='dialog') closeDialog(); else if(S.mode==='panel') closePanel(); }
  }
}
function bindHold(el,keyName,once){
  const on=e=>{e.preventDefault(); el.classList.add('on'); if(once) S.once[keyName]=1; else S.input[keyName]=1};
  const off=e=>{if(e)e.preventDefault(); el.classList.remove('on'); if(!once) S.input[keyName]=0};
  ['pointerdown','touchstart'].forEach(ev=>el.addEventListener(ev,on,{passive:false}));
  ['pointerup','pointerleave','pointercancel','touchend','touchcancel'].forEach(ev=>el.addEventListener(ev,off,{passive:false}));
}
function bindTap(el,fn){
  if(!el) return;
  const handler=e=>{
    if(e && e.cancelable) e.preventDefault();
    if(e && typeof e.stopPropagation==='function') e.stopPropagation();
    fn(e);
  };
  if(window.PointerEvent) el.addEventListener('pointerdown',handler,{passive:false});
  else {
    el.addEventListener('touchstart',handler,{passive:false});
    el.addEventListener('mousedown',handler);
  }
}
function handleHudMenuActivate(e){
  const btn=e.target.closest('[data-menu-panel]');
  if(!btn||!heroHud.contains(btn)) return;
  if(e.cancelable) e.preventDefault();
  if(typeof e.stopPropagation==='function') e.stopPropagation();
  openPanel(btn.dataset.menuPanel);
}
function initControls(){
  loadSettings();
  if(window.PointerEvent) heroHud.addEventListener('pointerdown',handleHudMenuActivate,{passive:false});
  else heroHud.addEventListener('touchstart',handleHudMenuActivate,{passive:false});
  document.querySelectorAll('[data-dir]').forEach(el=>bindHold(el,el.dataset.dir,false));
  initTouchPad();
  bindHold(document.getElementById('attackBtn'),'attack',true);
  bindHold(document.getElementById('skillBtn1'),'skill',true);
  bindHold(document.getElementById('skillBtn2'),'skill2',true);
  bindHold(document.getElementById('skillBtn3'),'skill3',true);
  bindHold(document.getElementById('interactBtn'),'interact',true);
  bindHold(document.getElementById('dashBtn'),'dash',true);
  bindTap(document.getElementById('bagBtn'),()=>openPanel('bag'));
  bindTap(document.getElementById('statsBtn'),()=>openPanel('stats'));
  bindTap(document.getElementById('questBtn'),()=>openPanel('quest'));
  bindTap(document.getElementById('saveBtn'),()=>openPanel('save'));
  bindTap(document.getElementById('newGameBtn'),newGame);
  bindTap(document.getElementById('continueBtn'),()=>{if(!safeGet(SAVE_KEY))showToast('저장 데이터가 없습니다.'); else loadFromTitle()});
  if(dialogCloseBtn) bindTap(dialogCloseBtn,closeDialog);
  panelOverlay.onclick=e=>{if(e.target===panelOverlay) closePanel()};
  dialogOverlay.onclick=e=>{if(e.target===dialogOverlay) closeDialog()};
  addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','a','s','d','W','A','S','D'].includes(e.key))e.preventDefault(); key(e.key,true)});
  addEventListener('keyup',e=>key(e.key,false));
}
function loadFromTitle(){
  try{
    const data=JSON.parse(safeGet(SAVE_KEY)); if(!data) return;
    S.hero=normalizeHeroState(data.hero); S.maps=data.maps; S.map=data.map; S.selected=S.hero.baseClass; S.classPaths[S.hero.baseClass]=S.hero.jobPath||0; S.projectiles=[]; S.effects=[]; S.particles=[]; deriveHero(); updateHud(); S.mode='play'; titleScreen.style.display='none'; document.body.classList.remove('title-active'); showToast('저장 데이터를 불러왔습니다.');
  }catch(e){showToast('저장 데이터를 불러오지 못했습니다.')}
}

buildClasses(); initControls(); updateHud(); requestAnimationFrame(loop);
})();
</script>
