
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>크림슨 월드 RPG</title>
<style>
:root{
  --bg:#060b15; --panel:#0f172a; --line:#334155; --text:#e5e7eb; --sub:#94a3b8;
  --safe-bottom:max(12px, env(safe-area-inset-bottom)); --safe-top:max(10px, env(safe-area-inset-top));
  --hud-clearance:92px;
  --shadow:0 16px 38px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; overflow:hidden; color:var(--text);
  background:radial-gradient(circle at top,#16264a 0%,#09111f 38%,#060b15 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
  user-select:none; -webkit-user-select:none; touch-action:none;
}
button{font:inherit}
#gameCanvas{position:fixed; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; touch-action:none}
.hud{
  position:fixed; z-index:5; left:10px; right:10px; top:var(--safe-top);
  display:flex; justify-content:space-between; gap:10px; pointer-events:none;
}
.box{
  background:rgba(15,23,42,.82); border:1px solid rgba(148,163,184,.18); border-radius:16px;
  box-shadow:var(--shadow); padding:10px 12px; backdrop-filter:blur(10px); pointer-events:auto;
}
#heroHud{min-width:min(340px, 62vw)}
#questHud{max-width:min(380px, 62vw)}
.bar{height:10px; background:#091120; border-radius:999px; overflow:hidden; margin:6px 0; border:1px solid rgba(148,163,184,.12)}
.fill{height:100%}
.hp{background:linear-gradient(90deg,#ef4444,#fb7185)}
.mp{background:linear-gradient(90deg,#2563eb,#38bdf8)}
.xp{background:linear-gradient(90deg,#eab308,#facc15)}
.row{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap}
.small{font-size:12px; color:var(--sub)}
.title{font-size:14px; font-weight:800}
.controls{
  position:fixed; left:0; right:0; bottom:0; z-index:6; padding:8px 10px calc(var(--safe-bottom) + 8px);
  background:linear-gradient(180deg,rgba(6,11,21,0),rgba(6,11,21,.88) 45%);
}
.controls-inner{
  max-width:1060px; margin:0 auto; display:grid; gap:12px;
  grid-template-columns:minmax(180px,1fr) minmax(200px,.9fr);
}
.card{
  background:rgba(15,23,42,.88); border:1px solid rgba(148,163,184,.18); border-radius:22px;
  box-shadow:var(--shadow); padding:12px; backdrop-filter:blur(10px);
}
.dpad{width:min(248px,100%); margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,68px); gap:8px}
.actions{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.menu{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:10px}
.ctrl{
  border:none; border-radius:18px; color:#fff; font-weight:800; cursor:pointer; touch-action:none;
  background:linear-gradient(180deg,#1e293b,#0f172a); box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 18px rgba(0,0,0,.28);
}
.ctrl:active,.ctrl.on{transform:translateY(1px) scale(.985); filter:brightness(1.08)}
.dpad .ctrl:active,.dpad .ctrl.on{transform:none!important; filter:none!important}
.dpad .ctrl{font-size:26px}
.actions .ctrl{min-height:74px; font-size:18px}
.actions .attack{background:linear-gradient(180deg,#7f1d1d,#450a0a)}
.actions .skill{background:linear-gradient(180deg,#312e81,#1e1b4b)}
.actions .interact{background:linear-gradient(180deg,#14532d,#052e16)}
.actions .dash{background:linear-gradient(180deg,#78350f,#451a03)}
.menu .ctrl{min-height:46px; font-size:14px; background:linear-gradient(180deg,#1f2937,#111827)}
.toast{
  position:fixed; left:50%; top:calc(var(--safe-top) + 150px); transform:translateX(-50%) translateY(-8px) scale(.97); z-index:20;
  min-width:240px; max-width:min(84vw,560px); padding:0; border-radius:22px; overflow:hidden;
  background:linear-gradient(180deg,rgba(8,15,30,.68),rgba(2,6,23,.68));
  border:1px solid rgba(148,163,184,.18); box-shadow:0 22px 42px rgba(2,6,23,.30),0 0 0 1px rgba(255,255,255,.04) inset;
  text-align:center; opacity:0; transition:opacity .14s ease, transform .16s ease, filter .14s ease; pointer-events:none; filter:saturate(.9);
}
.toast::before{
  content:''; position:absolute; inset:1px; border-radius:21px; pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0) 30%,rgba(255,255,255,.04) 100%);
}
.toast::after{
  content:''; position:absolute; left:-28%; top:-55%; width:56%; height:210%; pointer-events:none; opacity:0;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.18),rgba(255,255,255,0)); transform:rotate(18deg);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0) scale(1); filter:saturate(1)}
.toast.skill{
  border-color:rgba(167,139,250,.36);
  background:linear-gradient(180deg,rgba(34,22,70,.68),rgba(14,10,32,.68));
  box-shadow:0 24px 48px rgba(34,12,84,.26),0 0 0 1px rgba(196,181,253,.08) inset,0 0 28px rgba(129,140,248,.16);
}
.toast.skill::after{opacity:1; animation:toastSheen 1.4s ease forwards}
.toast.skill{
  left:0; top:0;
  min-width:0;
  max-width:min(72vw,520px);
  width:max-content;
  transform:none;
  transition:opacity .14s ease, filter .14s ease;
  will-change:transform,left,top,opacity;
  --skill-start-x:0px;
  --skill-end-x:0px;
}
.toast.skill.show{
  opacity:1;
  filter:saturate(1);
  animation:skillToastBoxSlide 1.7s cubic-bezier(.2,.72,.18,1) forwards;
}
.toast-inner{position:relative; z-index:1; padding:13px 18px 14px}
.toast-kicker{display:none; margin-bottom:4px; font-size:10px; font-weight:900; letter-spacing:.24em; color:#c4b5fd; text-transform:uppercase}
.toast-main{display:block; font-size:15px; font-weight:900; letter-spacing:-.02em; color:#f8fafc; text-shadow:0 2px 12px rgba(15,23,42,.26)}
.toast.skill .toast-kicker{display:none!important}
.toast.skill .toast-inner{padding:10px 16px 11px}
.toast.skill .toast-main{
  font-size:17px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  background:linear-gradient(180deg,#ffffff,#ddd6fe 55%,#bfdbfe); -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:none;
}
@keyframes skillToastBoxSlide{
  0%{opacity:0; transform:translate3d(var(--skill-start-x),0,0) scale(.98)}
  12%{opacity:1; transform:translate3d(var(--skill-start-x),0,0) scale(1)}
  36%{opacity:1; transform:translate3d(0,0,0) scale(1)}
  58%{opacity:1; transform:translate3d(0,0,0) scale(1)}
  100%{opacity:0; transform:translate3d(var(--skill-end-x),0,0) scale(.98)}
}
@keyframes toastSheen{
  0%{transform:translateX(-140%) rotate(18deg)}
  100%{transform:translateX(300%) rotate(18deg)}
}
.overlay{
  position:fixed; inset:0; z-index:30; background:rgba(2,6,23,.64); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center; padding:16px;
}
.overlay.show{display:flex}
#panelOverlay{
  z-index:60;
}
#panelOverlay .panel{
  margin-top:0!important;
}
.panel{

  width:min(780px,100%); max-height:min(84vh,900px); overflow:auto; padding:18px;
  background:linear-gradient(180deg,#111827,#0f172a); border:1px solid rgba(148,163,184,.2);
  border-radius:24px; box-shadow:var(--shadow);
}
.panel h2,.dialog h2{margin:0 0 8px}
.list{display:grid; gap:10px}
.item{
  background:#0a1220; border:1px solid rgba(148,163,184,.14); border-radius:16px; padding:12px;
}
.grid2{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px}
.stats{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px}
.stat{background:#0a1220; border:1px solid rgba(148,163,184,.14); border-radius:14px; padding:10px 12px}
.panel[data-panel="bag"],
.panel[data-panel="quest"],
.panel[data-panel="save"],
.panel[data-panel="stats"],
.panel[data-panel="skills"]{
  background:rgba(9,14,27,.14)!important;
  border:1px solid rgba(148,163,184,.10)!important;
  box-shadow:none!important;
  backdrop-filter:blur(10px);
}
.panel[data-panel="stats"],
.panel[data-panel="skills"]{
  width:min(640px,100%);
}
.panel[data-panel="stats"] h2,
.panel[data-panel="stats"] > p{display:none}
.stats-shell{display:grid; gap:6px}
.stats-headerbar,
.stats-hero,
.stats-section{
  background:#0a1220;
  border:1px solid rgba(148,163,184,.14);
  border-radius:16px;
  box-shadow:none;
  backdrop-filter:none;
}
.stats-headerbar{
  position:relative;
  display:flex; justify-content:space-between; align-items:center; gap:6px; flex-wrap:wrap;
  padding:7px 8px 7px 9px;
}
.stats-headerbar::before,
.stats-section::before{display:none}
.stats-header-main{display:grid; gap:2px; min-width:0; padding-left:5px}
.stats-header-main strong{font-size:16px; color:#f8fafc; letter-spacing:-.02em; line-height:1.02}
.stats-roadmap{font-size:9px; color:#cbd5e1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.stats-points{
  display:inline-flex; align-items:center; gap:5px; padding:3px 7px; border-radius:999px;
  background:#172554; border:1px solid rgba(96,165,250,.20); color:#bfdbfe; font-size:9px;
}
.stats-points .value{font-size:12px; font-weight:900; color:#fff}
.stats-panel{display:grid; gap:6px}
.stats-hero{
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px;
  padding:4px;
}
.stats-hero .stat,
.stats-grid .stat,
.stats-jobbox{
  background:linear-gradient(180deg,#101827,#0a1220);
  border:1px solid rgba(148,163,184,.14);
  border-radius:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
}
.stats-hero .stat{
  padding:5px 4px;
}
.stats-hero .stat strong{display:block; font-size:8px; color:#93c5fd; margin-bottom:1px}
.stats-hero .stat .value{font-size:11px; font-weight:900; color:#f8fafc; line-height:1.04}
.stats-section{
  position:relative;
  display:grid; gap:4px; padding:6px 6px 6px 7px;
}
.stats-section-title{display:flex; justify-content:space-between; align-items:center; gap:4px; flex-wrap:wrap; padding-left:2px}
.stats-section-title strong{font-size:10px; color:#f8fafc}
.stats-note{display:none}
.stats-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
.stats-grid .stat,
.stats-jobbox{
  padding:5px 4px;
}
.stats-grid .stat strong{display:block; margin-bottom:1px; color:#93c5fd; font-size:8px}
.stats-grid .stat .value{font-size:10px; font-weight:900; color:#f8fafc; line-height:1.02}
.stats-grid .stat .subvalue{display:none}
.stat-attr{display:grid; gap:3px}
.stat-attr-top{display:flex; justify-content:space-between; align-items:center; gap:4px}
.stat-attr .value{font-size:11px}
.stat-attr .btn{
  width:100%; padding:4px 3px; border-radius:9px; font-size:8px;
}
.stats-jobbox{display:grid; gap:4px}
.stats-jobline{display:flex; justify-content:space-between; gap:6px; flex-wrap:wrap}
.stats-jobline strong{font-size:8px; color:#93c5fd}
.stats-jobline span{font-size:8px; color:#e5e7eb; text-align:right; line-height:1.15}
.stats-jobbox .buttons{margin-top:0}
@media (max-width:560px){
  .class-grid{grid-template-columns:1fr}
}
@media (max-width:680px){
  #panelOverlay{padding:10px}
  .panel[data-panel="stats"],
  .panel[data-panel="skills"]{
    width:min(100%, 390px); max-height:calc(100svh - 20px); padding:7px; overflow:hidden;
    background:rgba(9,14,27,.12)!important;
    border:1px solid rgba(148,163,184,.08)!important;
    box-shadow:none!important;
    backdrop-filter:blur(12px);
  }
  .stats-shell{gap:5px}
  .stats-headerbar{padding:6px 7px 6px 8px; gap:5px}
  .stats-headerbar::before,
  .stats-section::before{top:8px; bottom:8px; width:2px}
  .stats-header-main{padding-left:4px}
  .stats-header-main strong{font-size:13px}
  .stats-roadmap{font-size:8px}
  .stats-points{padding:3px 5px; font-size:8px}
  .stats-points .value{font-size:11px}
  .stats-panel{gap:5px}
  .stats-hero{grid-template-columns:repeat(4,minmax(0,1fr)); gap:4px; padding:4px}
  .stats-hero .stat{padding:4px}
  .stats-hero .stat strong{font-size:7px; margin-bottom:1px}
  .stats-hero .stat .value{font-size:10px}
  .stats-section{gap:4px; padding:5px}
  .stats-section-title{gap:4px; padding-left:2px}
  .stats-section-title strong{font-size:9px}
  .stats-note{display:none}
  .stats-combat-grid{grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
  .stats-attr-grid{grid-template-columns:repeat(3,minmax(0,1fr)); gap:4px}
  .stats-grid .stat,.stats-jobbox{padding:4px}
  .stats-grid .stat strong{font-size:7px; margin-bottom:1px}
  .stats-grid .stat .value{font-size:10px}
  .stats-grid .stat .subvalue{display:none}
  .stat-attr{grid-template-columns:minmax(0,1fr); gap:3px; align-items:stretch}
  .stat-attr-top{align-items:center; min-width:0}
  .stat-attr .value{font-size:10px}
  .stat-attr .btn{width:100%; min-width:0; padding:4px 2px; font-size:8px; white-space:nowrap}
  .stats-jobline strong{font-size:7px}
  .stats-jobline span{font-size:8px; line-height:1.15}
  .panel[data-panel="stats"] .buttons{margin-top:4px; gap:4px}
  .panel[data-panel="stats"] .btn{padding:5px 6px; border-radius:9px; font-size:9px}
}
@media (max-width:400px){
  .panel[data-panel="bag"] .item{padding:6px 7px}
  .panel[data-panel="bag"] .equip-grid{gap:4px}
  .panel[data-panel="bag"] .equip-slot{padding:6px 5px}
  .panel[data-panel="bag"] .equip-slot strong{font-size:8px}
  .panel[data-panel="bag"] .equip-slot .small{font-size:8px}
  .inventory-grid{grid-template-columns:repeat(5,minmax(0,1fr)); gap:4px}
  .inventory-slot{min-height:56px; padding:5px 3px; gap:3px; border-radius:11px}
  .inventory-type{min-width:22px; height:15px; font-size:6px}
  .inventory-qty{font-size:7px}
  .inventory-name{font-size:7px; line-height:1.05}

  .panel[data-panel="stats"]{padding:6px}
  .stats-headerbar{padding:5px 6px 5px 7px}
  .stats-header-main strong{font-size:12px}
  .stats-hero{gap:3px; padding:3px}
  .stats-hero .stat{padding:3px}
  .stats-hero .stat .value{font-size:9px}
  .stats-combat-grid,.stats-attr-grid{gap:3px}
  .stats-grid .stat,.stats-jobbox{padding:3px}
  .stats-grid .stat strong{font-size:6px}
  .stats-grid .stat .value{font-size:9px}
  .stat-attr .value{font-size:9px}
  .stat-attr .btn{min-width:0; padding:3px 2px; font-size:7px}
}
.btn{
  border:none; border-radius:14px; padding:11px 14px; cursor:pointer; color:#fff; font-weight:800;
  background:linear-gradient(180deg,#0ea5e9,#0284c7)
}
.btn.secondary{background:linear-gradient(180deg,#1f2937,#111827); border:1px solid rgba(148,163,184,.18)}
.btn.good{background:linear-gradient(180deg,#22c55e,#16a34a)}
.btn.warn{background:linear-gradient(180deg,#f59e0b,#d97706)}
.buttons{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px}
.dialog{
  width:min(720px,100%); padding:18px; background:rgba(15,23,42,.96);
  border:1px solid rgba(148,163,184,.2); border-radius:24px; box-shadow:var(--shadow)
}
body.title-active{overflow:auto; touch-action:pan-y pinch-zoom}
#titleScreen{
  position:fixed; inset:0; z-index:40; display:flex; align-items:flex-start; justify-content:center; padding:16px; overflow-y:auto;
  -webkit-overflow-scrolling:touch; touch-action:pan-y pinch-zoom; overscroll-behavior:contain;
  background:radial-gradient(circle at top,#1f3c7a 0%,#0f172a 38%,#060b15 100%)
}
.title-card{
  width:min(860px,100%); max-height:calc(100svh - 32px); overflow-y:auto; padding:18px; background:rgba(15,23,42,.9); border:1px solid rgba(148,163,184,.2);
  border-radius:24px; box-shadow:var(--shadow); backdrop-filter:blur(10px); margin:auto 0
}
.big{font-size:34px; font-weight:900; letter-spacing:-.02em; margin:0 0 6px}
.class-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px}
.class-card{cursor:pointer; transition:.18s ease; padding:10px 10px 9px!important; border-radius:16px; min-height:0}
.class-card .tag{padding:3px 6px; font-size:10px; margin:0 3px 3px 0}
.class-card.selected,.class-card:hover{
  transform:translateY(-2px); border-color:rgba(34,211,238,.72); box-shadow:0 0 0 3px rgba(34,211,238,.14)
}
.title-setup{display:grid; gap:10px; margin-top:14px; padding:12px; border-radius:18px; background:rgba(2,6,23,.28); border:1px solid rgba(148,163,184,.16)}
.title-setup-row{display:grid; gap:8px}
.title-setup-label{font-size:12px; font-weight:800; color:#cbd5e1}
.title-setup-buttons{display:flex; flex-wrap:wrap; gap:8px}
.title-setup-btn{min-height:40px; padding:8px 12px; border-radius:14px; border:1px solid rgba(255,255,255,.08); background:linear-gradient(180deg,rgba(15,23,42,.46),rgba(15,23,42,.22)); color:#fff; font-weight:800; cursor:pointer}
.title-setup-btn.active{border-color:rgba(34,211,238,.72); box-shadow:0 0 0 2px rgba(34,211,238,.16), inset 0 1px 0 rgba(255,255,255,.08)}
#titleSetupHint{font-size:12px; color:#93c5fd; line-height:1.45}
.tag{display:inline-flex; padding:5px 9px; border-radius:999px; background:#172554; color:#bfdbfe; font-size:12px; margin:0 4px 6px 0}
#hint{
  position:fixed; right:12px; bottom:calc(var(--safe-bottom) + 150px); z-index:5; max-width:min(340px,84vw);
  background:rgba(15,23,42,.82); border:1px solid rgba(148,163,184,.16); border-radius:16px;
  padding:10px 12px; box-shadow:var(--shadow); font-size:13px; color:#dbeafe;
}
@media (max-width:900px){
  .hud{flex-direction:column}
  #heroHud,#questHud{max-width:none; min-width:0}
  .class-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .grid2,.stats{grid-template-columns:1fr}
  .big{font-size:29px}
  .class-card{padding:9px 9px 8px!important}
  .title-setup{padding:10px}
}
@media (max-width:680px){
  .controls-inner{grid-template-columns:1fr; gap:10px}
  .dpad{grid-template-rows:repeat(3,60px); width:min(228px,100%)}
  .actions .ctrl{min-height:68px; font-size:17px}
  #hint{left:10px; right:10px; bottom:calc(var(--safe-bottom) + 228px); max-width:none}
}

/* ==== UI overhaul ==== */
#hint{display:none!important}
.hud{
  left:8px; right:8px; top:calc(var(--safe-top) + 4px);
  display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; align-items:start;
}
#heroHud.box{
  min-width:0; width:auto; max-width:min(920px, calc(100vw - 120px));
  padding:8px 12px; border-radius:18px;
  background:linear-gradient(180deg,rgba(2,6,23,.72),rgba(15,23,42,.42));
  border:1px solid rgba(148,163,184,.12);
  box-shadow:0 10px 22px rgba(0,0,0,.16);
}
#questHud.box{
  grid-column:1;
  justify-self:start;
  padding:0; max-width:min(360px,42vw);
  background:none; border:none; box-shadow:none; backdrop-filter:none;
  color:#f8fafc; text-shadow:0 2px 12px rgba(2,6,23,.8);
}
.hero-strip{display:flex; flex-direction:column; gap:8px}
.hero-topline{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap}
.hero-name{display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:15px; font-weight:900; letter-spacing:-.02em}
.hero-title-text{display:inline-flex; align-items:center}
.hero-pk-toggle{
  min-height:24px;
  padding:4px 10px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  font:inherit;
  font-size:11px;
  font-weight:900;
  letter-spacing:-.01em;
  color:#f8fafc;
  background:linear-gradient(180deg,rgba(15,23,42,.48),rgba(15,23,42,.22));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), inset 0 1px 0 rgba(255,255,255,.05), 0 4px 10px rgba(0,0,0,.12);
}
.hero-pk-toggle.is-pk{
  background:linear-gradient(180deg,rgba(153,27,27,.84),rgba(69,10,10,.34));
  box-shadow:inset 0 0 0 1px rgba(252,165,165,.16), inset 0 1px 0 rgba(255,255,255,.06), 0 4px 10px rgba(127,29,29,.16);
}
.hero-pk-toggle.is-peace{

  .pad-card{

  .menu{gap:6px!important; margin-top:7px!important}

<script>
(()=>{
const TILE=48, TAU=Math.PI*2, SAVE_KEY='crimson_rpg_save_v1', SETTINGS_KEY='crimson_rpg_settings_v1', NPC_LLM_KEY='crimson_rpg_npc_llm_v1';

function npcLlmSchemaPrompt(){

function actorMemoryDigest(a){

}

}

function actorBaselineHeroRelationship(a){
  switch(actorRoleKey(a)){

    case 'guide': return .2;

    case 'piglet': return -.04;

    default: return .04;
  }

function actorSeedRelationship(a,other,value=0){
  if(!a||!other) return 0;
  if(!a.relations || typeof a.relations!=='object') a.relations={};
  const key=actorMemoryKey(other);
  if(!(key in a.relations)) a.relations[key]=clamp(value,-1,1);
  return a.relations[key];
}
function actorEnsureRelationalProfile(a,m=mapNow()){
  if(!a) return a;
  if(!a.relations || typeof a.relations!=='object') a.relations={};
  if(S.hero) actorSeedRelationship(a,S.hero,actorBaselineHeroRelationship(a));
  const now=(performance.now?performance.now():Date.now());
  if((a.relProfileStamp||0)>now-9000) return a;
  a.relProfileStamp=now;
  const others=[...(m?.npcs||[]), ...(m?.animals||[])];
  for(const other of others){
    if(!other || other===a || !actorAlive(other)) continue;
    const key=actorMemoryKey(other);
    if(key in a.relations) continue;
    let seeded=null;
    if(a.faction && other.faction && a.faction===other.faction) seeded=.18 + ((a.role==='guard'||other.role==='guard')?.05:0);

    else if(a.kind==='npc' && other.kind==='animal' && other.species==='dog') seeded=.14;

    else if(a.role==='merchant' && other.role==='guard') seeded=.06;

function actorRelationshipDigest(a,m=mapNow(),target=null){

function openNpcDialog(n,title,text,buttons=[{label:'확인',fn:closeDialog}],topic='general',ctx={}){

  let mergedCtx=ctx||{};
  let displayText=baseText;
  if(n && actorAlive(n)){
    actorEnsureRelationalProfile(n,mapNow());
    actorRegisterFriendlyTalk(n);
    const rel=actorRelationshipDigest(n,mapNow(),S.hero);
    mergedCtx={...(ctx||{}),relationships:rel};
    const fallbackLine=actorDialogFallbackLine(n,topic,mergedCtx,baseText);
    if(fallbackLine) displayText=baseText ? (baseText + '\n\n' + fallbackLine) : fallbackLine;
  }
  openDialog(title,displayText,buttons);
  if(!n || !actorAlive(n)) return;
  if(!npcLlmEnabled()) return;
  const seq=(n.dialogSeq||0)+1;
  n.dialogSeq=seq;
  requestActorLlmDialogue(n,topic,mergedCtx,baseText).then(result=>{
    if(!result || n.dialogSeq!==seq) return;
    if(S.mode!=='dialog') return;
    if(dialogTitle.textContent!==String(title)) return;
    dialogText.textContent=baseText + '\n\n' + result.line;
    actorSayThought(n,result.line,result.mood||'neutral',2.05,`npc-talk:${n.id||n.name||'npc'}:${seq}`);
  }).catch(()=>{});
}

function actorFallbackCombatPlan(a,target,m,dd=0,info=null){
  if(!a || !target) return null;
  const role=actorRoleKey(a);
  const rel=target===S.hero ? actorGetRelationship(a,S.hero) : actorGetRelationship(a,target);
  const hpRatio=(a.hp||0)/Math.max(1,a.maxHp||1);
  const targetPower=actorPowerScore(target);
  const selfPower=actorPowerScore(a);
  const pressured=targetPower>selfPower*1.18;
  let style='hold', rangeBias=0, strafeDir=0, commit=.56, reason='각을 본다';
  if(role==='guard'){
    if(target===S.hero){
      if(hpRatio<.34){ style='flee'; commit=.28; reason='지원이 필요하다'; }
      else if(dd>(a.attackRange||18)+(info?.r||16)+18){ style='rush'; commit=.82; reason='거리를 좁힌다'; }
      else { style='hold'; commit=.88; reason='정면 제압'; }
      rangeBias=-10;
      strafeDir=0;
    }else{
      style=dd>(a.attackRange||18)+(info?.r||16)+14 ? 'assist' : 'hold';
      commit=.72;
      reason='라인 유지';
    }
  }else if(role==='hunter'){
    style = pressured || hpRatio<.42 ? 'kite' : 'flank';
    rangeBias=10;
    strafeDir=Math.random()<.5?-1:1;
    commit=hpRatio<.42?.44:.66;
    reason=style==='kite'?'거리 사수':'측면 압박';
  }else if(role==='healer'){
    style = hpRatio<.52 ? 'flee' : 'assist';
    rangeBias=8;
    strafeDir=0;
    commit=hpRatio<.52?.28:.4;
    reason=style==='flee'?'안전 우선':'지원 우선';
  }else if(role==='blacksmith'){
    style = dd>(a.attackRange||18)+(info?.r||16)+10 ? 'rush' : 'hold';
    rangeBias=-6;
    commit=.78;
    reason=style==='rush'?'강하게 압박':'가까이 묶는다';
  }else if(role==='raider'){
    style = hpRatio<.38 ? 'flee' : 'flank';
    rangeBias=2;
    strafeDir=Math.random()<.5?-1:1;
    commit=hpRatio<.38?.3:.62;
    reason=style==='flee'?'틈을 다시 본다':'빈틈 추적';
  }else if(role==='merchant' || role==='villager' || role==='guide'){
    style = hpRatio<.66 || pressured ? 'flee' : 'hold';
    rangeBias=style==='flee'?12:4;
    commit=style==='flee'?.22:.36;
    reason=style==='flee'?'몸부터 뺀다':'거리 유지';
  }else if(role==='dog'){
    style = rel>.24 ? 'assist' : 'flank';
    rangeBias=0;
    strafeDir=style==='flank' ? (Math.random()<.5?-1:1) : 0;
    commit=.64;
    reason=style==='assist'?'곁을 지킨다':'짧게 물고 빠진다';
  }else if(role==='chicken' || role==='piglet' || role==='bigPig'){
    style='flee';
    rangeBias=18;
    commit=.1;
    reason='도망쳐야 한다';
  }
  if(target===S.hero && rel<=-.42 && role!=='healer' && role!=='villager' && role!=='merchant' && role!=='guide' && role!=='chicken'){
    commit=Math.max(commit,.78);
  }
  return {style,rangeBias,strafeDir,commit,reason,targetKey:actorCombatTargetKey(target),at:Date.now(),local:true};
}
function actorHandleGuardCombat(a,target,info,m,dt){
  if(!a || actorRoleKey(a)!=='guard' || !target || !info || !m) return false;
  const GUARD_FIXED_CHASE_LIMIT=232;
  const GUARD_FIXED_ATTACK_REACH=42;
  const GUARD_FIXED_HOLD_RADIUS=18;
  const GUARD_FIXED_REPATH_RADIUS=40;
  const GUARD_FIXED_ATTACK_CD=.68;
  const dd=dist(a.x,a.y,info.x,info.y);
  const homeTargetDist=dist(a.homeX||a.x,a.homeY||a.y,info.x,info.y);
  const hpRatio=(a.hp||0)/Math.max(1,a.maxHp||1);
  const rel=target===S.hero ? actorGetRelationship(a,S.hero) : actorGetRelationship(a,target);
  a.aiMode='combat';
  a.sidestepDir=0;
  a.sidestepTime=0;
  if(homeTargetDist>GUARD_FIXED_CHASE_LIMIT){
    clearActorTarget(a);
    a.aggroLock=0;
    actorCommitIntent(a,'return',a.homeX,a.homeY,1.6,{minTime:.7,moveBurst:actorNaturalMoveBurst(a,'wander')*.78});
    syncActorTile(a);
    return true;
  }
  if(actorShouldFlee(a,target) || hpRatio<.24){
    if((a.decisionCd||0)<=0 || dd<GUARD_FIXED_REPATH_RADIUS){
      chooseActorRetreatPoint(a,info,m);
      a.decisionCd=.24+Math.random()*.32;
    }
    moveActorToward(a,a.wanderX||a.homeX,a.wanderY||a.homeY,(a.speed||60)*1.08,m,dt,a);
    syncActorTile(a);
    return true;
  }
  a.facing=Math.atan2(info.y-a.y,info.x-a.x);
  if(dd<=GUARD_FIXED_ATTACK_REACH){
    const strikeZone=actorFrontStrikeZone(a,target);
    if(a.cd<=0){
      a.cd=GUARD_FIXED_ATTACK_CD;
      const crit=Math.random()<clamp(.05+(a.temper||.16)*.22 + (rel<=-.32?.04:0),0,.26);
      if(actorFrontStrikeHits(a,target,strikeZone)){
        if(target===S.hero) damageHero(a.attack);
        else if(target?.type && Enemies[target.type]) damageEnemy(target,a.attack,crit,a);
        else damageActor(target,a.attack,crit,a);
      }
      S.effects.push({x:strikeZone.x,y:strikeZone.y,r:strikeZone.r+6,time:.12,color:a.color||'#60a5fa'});
    }
    if(dd>GUARD_FIXED_HOLD_RADIUS){
      moveActorToward(a,info.x,info.y,(a.speed||60)*(target===S.hero?1.12:1.06),m,dt,a);
    }
  }else{
    moveActorToward(a,info.x,info.y,(a.speed||60)*(target===S.hero?1.12:1.04),m,dt,a);
  }
  syncActorTile(a);
  return true;
}

function actorCrimeWitnessRadius(a){
  const role=actorRoleKey(a);
  if(role==='guard') return 192;
  if(role==='hunter' || role==='raider') return 176;
  if(role==='dog') return 164;
  if(a.kind==='animal') return 132;
  if(role==='guide' || role==='merchant' || role==='healer') return 156;
  return 148;
}
function actorCrimeSeverity(attacker,victim,dmg=0,crit=false,defensive=false){
  let severity=.82;
  if(victim?.kind==='npc') severity += .9;
  else if(victim?.kind==='animal') severity += .45;
  else if(victim?.type && Enemies[victim.type]) severity += .3;
  severity += Math.min(1.5, Math.max(0,Number(dmg)||0)/22);
  if(crit) severity += .35;
  if(victim && Number(victim.hp)<=0) severity += 1.2;
  if(attacker===S.hero) severity += .28;
  if(defensive) severity *= .6;
  return clamp(severity,.35,4.8);
}
function actorCrimeSuspectVisible(a,crime){
  if(!a || !crime || !crime.attacker || !actorAlive(a)) return false;
  const suspect=crime.attacker;
  if(suspect===S.hero && (!S.hero || S.hero.hp<=0)) return false;
  if(suspect!==S.hero && !actorAlive(suspect)) return false;
  return dist(a.x,a.y,suspect.x,suspect.y) <= actorCrimeWitnessRadius(a) + (crime.severity||1)*18;
}
function actorWitnessCrime(a,crime,m){
  if(!a || !crime || !m || !actorAlive(a) || a===crime.attacker || a===crime.victim) return false;
  const focusX=crime.x ?? crime.attacker?.x ?? a.x;
  const focusY=crime.y ?? crime.attacker?.y ?? a.y;
  const d=dist(a.x,a.y,focusX,focusY);
  const witnessLimit=actorCrimeWitnessRadius(a) + (crime.severity||1)*12;
  if(d>witnessLimit) return false;
  a.lastWitnessCrimeId=crime.id;
  a.lastWitnessCrimeAt=crime.stamp;
  a.lastWitnessCrimeMap=crime.mapId;
  const penalty=Math.min(.34,.08 + (crime.severity||1)*.06) * (crime.defensive?.58:1);
  actorRememberEvent(a,'crime_seen',{crimeId:crime.id,suspect:actorMemoryKey(crime.attacker),victim:actorMemoryKey(crime.victim),severity:crime.severity,defensive:!!crime.defensive},Math.min(.98,.4+(crime.severity||1)*.15));
  if(crime.attacker===S.hero) actorShiftRelationship(a,S.hero,-penalty,'witnessed public violence');
  const role=actorRoleKey(a);
  if(role==='guard' || role==='hunter' || role==='raider'){
    setActorTarget(a,crime.attacker);
    a.aiMode=role==='guard' ? 'intercept' : 'assist';
    a.aggroLock=Math.max(a.aggroLock||0, role==='guard' ? 14 : 9);
    if(crime.attacker===S.hero) a.hostileToHero=true;
    actorSayThought(a,role==='guard'?'거기 서라. 난동은 여기까지다.':'저자를 막아야 한다.','combat',2.2,`crime:${role}:${crime.id}`);
    return true;
  }
  if(role==='blacksmith' && (crime.severity||1)>=1.6 && actorCrimeSuspectVisible(a,crime)){
    setActorTarget(a,crime.attacker);
    a.aiMode='assist';
    a.aggroLock=Math.max(a.aggroLock||0,8.5);
    if(crime.attacker===S.hero) a.hostileToHero=true;
    actorSayThought(a,'광장에서 난동은 못 본 척 안 한다.','combat',2.1,`crime:blacksmith:${crime.id}`);
    return true;
  }
  if(role==='dog'){
    if((crime.severity||1)>1.15 && actorCrimeSuspectVisible(a,crime)){
      setActorTarget(a,crime.attacker);
      a.aiMode='assist';

    chooseActorRetreatPoint(a,crime.attacker,m);
    actorSayThought(a,'크르릉… 위험한 냄새야!','alert',1.8,`crime:dog-alert:${crime.id}`);
    return true;
  }
  if(a.kind==='animal'){
    a.fearTime=Math.max(a.fearTime||0,1.6 + (crime.severity||1)*.45);
    chooseActorRetreatPoint(a,crime.attacker,m);
    actorSayThought(a,actorThoughtLine(a,'flee',{hpRatio:(a.hp||0)/Math.max(1,a.maxHp||1)}),'flee',1.8,`crime:flee:${crime.id}`);

  }
  const guards=(m.npcs||[]).filter(other=>other!==a&&actorAlive(other)&&actorRoleKey(other)==='guard');

    a.reportCrimeId=crime.id;
    actorSayThought(a,role==='healer'?'경비병! 다친 사람 먼저 봐야 해요!':'경비병! 난동이다!','alert',2.2,`crime:report:${crime.id}`);

function actorRegisterPublicCrime(attacker,victim,m,dmg=0,crit=false){
  if(attacker!==S.hero || !victim || !m) return null;
  const state=actorMapCrimeState(m.id);
  const stamp=actorCrimeNow();
  const defensive=!!(victim && (victim.hostileToHero || victim.targetRef===S.hero || resolveActorTarget(victim)===S.hero));
  const severity=actorCrimeSeverity(attacker,victim,dmg,crit,defensive);
  const victimKey=actorMemoryKey(victim);
  if(state.lastCrime && state.lastCrime.attacker===attacker && actorMemoryKey(state.lastCrime.victim)===victimKey && (stamp-(state.lastCrimeAt||0))<850){
    state.heat=clamp((state.heat||0)+severity*.14,0,6);
    state.lastCrime.stamp=stamp;
    state.lastCrimeAt=stamp;
    return state.lastCrime;
  }
  const crime={
    id:`${m.id}:${Math.floor(stamp)}:${Math.floor(Math.random()*9999)}`,
    mapId:m.id,
    attacker,
    victim,
    x:((attacker.x||0)+(victim.x||0))*.5,
    y:((attacker.y||0)+(victim.y||0))*.5,
    severity,
    defensive,
    stamp
  };
  state.heat=clamp((state.heat||0)+severity*.62,0,6);
  state.lastCrime=crime;
  state.lastCrimeAt=stamp;
  state.reportCount=(state.reportCount||0)+1;
  for(const other of [...(m.npcs||[]), ...(m.animals||[])]) actorWitnessCrime(other,crime,m);
  return crime;
}
function actorTickCrimeState(dt,m){
  if(!m) return actorMapCrimeState('world');
  const state=actorMapCrimeState(m.id);
  const now=actorCrimeNow();
  const recent=(now-(state.lastCrimeAt||0))<12000;
  state.heat=Math.max(0,(state.heat||0)-dt*(recent?.042:.09));
  if(state.lastCrime && (now-(state.lastCrime.stamp||0))>18000) state.lastCrime=null;
  return state;
}
function actorReactToCrime(a,m){
  if(!a || !m || !actorAlive(a)) return false;
  const state=actorMapCrimeState(m.id);
  const crime=state.lastCrime;
  if(!crime || crime.attacker!==S.hero || !S.hero || S.hero.hp<=0) return false;
  const now=actorCrimeNow();
  const recent=(now-(crime.stamp||0))<(15000 + Math.min(12000,(state.heat||0)*1500));
  if(!recent) return false;
  const role=actorRoleKey(a);
  const saw=(a.lastWitnessCrimeId===crime.id) && ((now-(a.lastWitnessCrimeAt||0))<18000);
  const suspectVisible=actorCrimeSuspectVisible(a,crime);
  if(!saw && !suspectVisible && (state.heat||0)<1.2) return false;
  if(role==='guard'){
    if(suspectVisible || saw){
      setActorTarget(a,S.hero);
      a.aiMode='intercept';
      a.hostileToHero=true;
      a.aggroLock=Math.max(a.aggroLock||0,12 + (state.heat||0)*.8);
      actorSayThought(a,(state.heat||0)>2.4?'무기 내려! 포위한다!':'거기 멈춰!','combat',2.0,`crime-guard-react:${crime.id}`);
      return true;
    }
    actorCommitIntent(a,'investigate',crime.x+rand(-18,18),crime.y+rand(-18,18),2.6,{minTime:1.1,moveBurst:actorNaturalMoveBurst(a,'patrol')*.96,clearIdle:true});
    actorSayThought(a,'현장 확인한다. 비켜라.','alert',1.8,`crime-guard-scene:${crime.id}`);
    return true;
  }
  if((role==='hunter' || role==='raider') && ((state.heat||0)>1.55 || saw)){
    if(suspectVisible){
      setActorTarget(a,S.hero);
      a.aiMode='assist';
      a.hostileToHero=true;
      actorSayThought(a,role==='hunter'?'도주로부터 막는다.':'도망칠 틈 안 준다.','combat',1.9,`crime-support:${crime.id}`);
      return true;
    }
    actorCommitIntent(a,'investigate',crime.x+rand(-20,20),crime.y+rand(-20,20),2.4,{minTime:1.0,moveBurst:actorNaturalMoveBurst(a,'investigate')*.94,clearIdle:true});
    actorSayThought(a,'소란이 난 자리부터 확인한다.','alert',1.8,`crime-probe:${crime.id}`);
    return true;
  }
  if(role==='blacksmith' && (state.heat||0)>2.25 && suspectVisible){
    setActorTarget(a,S.hero);
    a.aiMode='assist';
    a.hostileToHero=true;
    actorSayThought(a,'대장간 앞 난동은 내가 막는다.','combat',1.9,`crime-blacksmith-react:${crime.id}`);
    return true;
  }
  if(a.kind==='animal'){
    if(role==='dog' && suspectVisible && (state.heat||0)>1.3){
      setActorTarget(a,S.hero);
      a.aiMode='assist';
      a.hostileToHero=true;
      actorSayThought(a,'멍! 멍!','combat',1.4,`crime-dog-react:${crime.id}`);
      return true;
    }
    if(saw || suspectVisible){
      chooseActorRetreatPoint(a,S.hero,m);
      actorSayThought(a,actorThoughtLine(a,'flee',{hpRatio:(a.hp||0)/Math.max(1,a.maxHp||1)}),'flee',1.6,`crime-animal-react:${crime.id}`);
      return true;
    }
    return false;
  }
  if(saw || suspectVisible){
    const guards=(m.npcs||[]).filter(other=>other!==a&&actorAlive(other)&&actorRoleKey(other)==='guard');
    guards.sort((aa,bb)=>dist(a.x,a.y,aa.x,aa.y)-dist(a.x,a.y,bb.x,bb.y));
    if(guards.length && dist(a.x,a.y,guards[0].x,guards[0].y)>52){
      const g=guards[0];
      actorCommitIntent(a,'report',g.x+rand(-22,22),g.y+rand(-22,22),2.6,{minTime:1.0,moveBurst:actorNaturalMoveBurst(a,'investigate')*.9,clearIdle:true});
      actorSayThought(a,role==='healer'?'경비병! 부상자가 생길 수도 있어요!':'경비병 쪽으로 붙자!','alert',1.8,`crime-civil-report:${crime.id}`);
      return true;
    }
    chooseActorRetreatPoint(a,S.hero,m);
    actorSayThought(a,role==='merchant'?'장사보다 목숨이 먼저야!':'일단 안전한 데로 빠져!','flee',1.8,`crime-civil-flee:${crime.id}`);
    return true;
  }
  return false;
}

async function requestActorLlmPlan(a,m,snap){
  const cfg=npcLlmConfig();
  if(!npcLlmEnabled() || !a || !m) return null;
  a.llmBusy=true;
  NPC_LLM_RUNTIME.inFlight++;
  NPC_LLM_RUNTIME.lastCall=Date.now();
  try{
    const locale=actorLocaleDescriptor(a,m);
    const body={
      model:cfg.model,
      temperature:clamp(Number(cfg.temperature)||.7,0,1.2),
      max_tokens:Math.max(120, Number(cfg.maxTokens)||180),
      messages:[
        {role:'system',content:['You are controlling one RPG NPC. Choose one high-level intention for the next 2~4 seconds.',actorRoleDirective(a,'plan'),actorRelationshipDirective(a,m),npcLlmSchemaPrompt()].join(' ')},
        {role:'user',content:JSON.stringify({
          actor:{name:a.name,kind:a.kind,role:a.role||'',species:a.species||'',hp:Math.round(a.hp||0),maxHp:Math.round(a.maxHp||1),energy:Math.round((a.energy||0)*100)/100,socialDrive:Math.round((a.socialDrive||0)*100)/100,curiosityDrive:Math.round((a.curiosityDrive||0)*100)/100,dutyDrive:Math.round((a.dutyDrive||0)*100)/100,valence:Math.round((a.valence||0)*100)/100,arousal:Math.round((a.arousal||0)*100)/100,dominance:Math.round((a.dominance||0)*100)/100},
          world:{map:m.id,homeDist:Math.round(snap.homeDist||0),friendlyNear:snap.friendlyNear||0,socialNear:snap.socialNear||0,threatNear:snap.threatNear||0,nearHealer:!!snap.nearHealer,localeTags:locale.tags||[]},
          memory:actorMemoryDigest(a),
          relationships:actorRelationshipDigest(a,m),
          rolePrompt:actorRoleDirective(a,'plan'),
          relationPrompt:actorRelationshipDirective(a,m),
          instruction:'Pick one intention that feels natural, role-consistent, relationship-aware, not random, and keeps continuity with memory and local context.'
        })}
      ]
    };
    const res=await fetch(cfg.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},body:JSON.stringify(body)});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const content=(data&&data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'';
    const raw=String(content||'').trim().replace(/^```json\s*/,'').replace(/^```/,'').replace(/```$/,'').trim();
    const parsed=JSON.parse(raw);
    const plan={
      type:['rest','social','duty','explore','return','escort','investigate'].includes(parsed.type)?parsed.type:'explore',
      mode:['observe','loiter','social','patrol','explore','forage','return','escort','investigate'].includes(parsed.mode)?parsed.mode:'explore',
      mood:['neutral','alert','social','rest','flee','combat'].includes(parsed.mood)?parsed.mood:'neutral',
      reason:String(parsed.reason||'주변 상황을 보고 움직여 보자.').slice(0,28),
      prefers:Array.isArray(parsed.prefers)?parsed.prefers.filter(v=>typeof v==='string').slice(0,3):[]
    };
    a.llmPlan=plan;
    a.llmPlanAt=Date.now();
    a.llmNote=plan.reason||'';
    a.llmCooldown=2.4+Math.random()*4.6;
    return plan;
  }catch(err){
    NPC_LLM_RUNTIME.lastError=String(err&&err.message||err||'llm error');
    a.llmCooldown=6+Math.random()*8;
    a.llmNote='';
    return null;
  }finally{
    a.llmBusy=false;
    NPC_LLM_RUNTIME.inFlight=Math.max(0,NPC_LLM_RUNTIME.inFlight-1);
  }
}
function actorShouldUseLlm(a,m,snap){
  if(!npcLlmEnabled() || !a || !m || !snap) return false;
  if(a.llmBusy || (a.llmCooldown||0)>0 || NPC_LLM_RUNTIME.inFlight>=NPC_LLM_RUNTIME.maxConcurrent) return false;
  if(resolveActorTarget(a) || (a.aggroLock||0)>0 || (a.fearTime||0)>0) return false;
  if(dist(a.x,a.y,S.hero?.x||-9999,S.hero?.y||-9999)>220) return false;
  return (a.kind==='npc' || (a.kind==='animal' && a.species==='dog')) && ((a.goalTime||0)>1.2 || snap.threatNear>0 || snap.socialNear>0);
}
function actorQueueLlmPlan(a,m,snap){
  if(!actorShouldUseLlm(a,m,snap)) return false;
  requestActorLlmPlan(a,m,snap);
  return true;
}
function actorReadLlmPlan(a){
  if(!a||!a.llmPlan) return null;
  if((Date.now()-(a.llmPlanAt||0))>12000){ a.llmPlan=null; return null; }
  const plan={...a.llmPlan};
  a.llmPlan=null;
  return plan;
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

function randInt(a,b){return Math.floor(rand(a,b+1))}
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by)}

}

function branchData(baseClass,idx=0){
  const c=Classes[legacyClassId(baseClass)];
  if(!c||!c.branches||!c.branches.length) return null;
  return c.branches[clamp(idx,0,c.branches.length-1)] || c.branches[0];
}
function selectedPath(baseClass){
  const id=legacyClassId(baseClass);
  if(S.hero && legacyClassId(S.hero.baseClass)===id && typeof S.hero.jobPath==='number') return clamp(S.hero.jobPath,0,1);
  if(S.classPaths && typeof S.classPaths[id]==='number') return clamp(S.classPaths[id],0,1);
  return 0;
}

  if(tier>=3) return b?.tier3 || b?.tier2 || c.name;
  if(tier>=2) return b?.tier2 || c.name;

}

function actorCanDamageTarget(attacker,target){
  if(!attacker || !target || attacker===target) return false;
  if(target===S.hero) return !!attacker.hostileToHero || resolveActorTarget(attacker)===S.hero || attacker.lastAttacker===S.hero || attacker.lastHitBy===S.hero;
  if(target.type && Enemies[target.type]) return true;
  if(!actorAlive(target)) return false;
  if(resolveActorTarget(attacker)===target || attacker.lastAttacker===target || attacker.lastHitBy===target) return true;
  if(resolveActorTarget(target)===attacker || target.lastAttacker===attacker || target.lastHitBy===attacker) return true;
  return !actorFriendlyWith(attacker,target);
}
function actorFrontStrikeZone(attacker,target=null){
  if(!attacker) return {x:0,y:0,r:0,facing:0,arc:Math.PI*.82};
  const info=target?actorTargetPos(target):null;
  const facing=Number.isFinite(attacker.facing)
    ? attacker.facing
    : (info ? Math.atan2(info.y-attacker.y,info.x-attacker.x) : 0);
  const bodyR=attacker.r||14;
  const range=Math.max(16,attacker.attackRange||18);
  const reach=Math.max(bodyR+8, Math.min(range+bodyR*.34, bodyR + range*.72 + 6));
  const radius=Math.max(bodyR*.72+7, Math.min(48, range*.68 + bodyR*.38 + 8));
  return {
    x:attacker.x + Math.cos(facing)*reach,
    y:attacker.y + Math.sin(facing)*reach,
    r:radius,
    facing,
    arc:Math.PI*.82
  };
}
function actorFrontStrikeHits(attacker,target,zone=null){
  if(!attacker || !target) return false;
  const info=actorTargetPos(target);
  if(!info) return false;
  const z=zone||actorFrontStrikeZone(attacker,target);
  const targetAng=Math.atan2(info.y-attacker.y,info.x-attacker.x);
  if(Math.abs(normalizeAngle(targetAng-z.facing))>z.arc*.5) return false;
  return dist(z.x,z.y,info.x,info.y)<=z.r+(info.r||target.r||14);
}

function stageUniqueSkills(branch){
  const t1=(branch?.skills?.[0]||[]).slice(0,1);

  const t2=t2Raw.filter(name=>!t1.includes(name)).slice(0,2);

function buildSkillStageCards(tab='active'){
  if(!S.hero) return [];
  const hero=S.hero;
  const pathIdx=typeof hero.jobPath==='number' ? clamp(hero.jobPath,0,1) : selectedPath(hero.baseClass);
  const branch=branchData(hero.baseClass, pathIdx);
  const activeData=stageUniqueSkills(branch);
  const passiveData=passiveSkillData(hero);
  const layout=[{tier:1,index:0},{tier:3,index:0},{tier:2,index:0},{tier:3,index:1},{tier:2,index:1},{tier:3,index:2}];
  return layout.map(cell=>{
    const tier=cell.tier;
    const stageUnlocked=(hero.jobTier||1)>=tier;
    if(tab==='passive'){
      const slotData=(passiveData[tier]||[])[cell.index]||null;
      const hasData=!!slotData?.name;
      return {
        tab, tier,
        unlocked:stageUnlocked && hasData,
        name:hasData ? slotData.name : '추가 예정',
        state:stageUnlocked ? (hasData ? '적용 중' : '추가 예정') : `${tier}차 전직 후 해금`,
        detail:hasData ? slotData.detail : `${tier}차 패시브 슬롯입니다.`,
        extra:'지속 효과'
      };
    }
    const arr=activeData[tier]||[];
    const name=arr[cell.index]||'';
    const hasData=!!name;
    const detail=hasData ? describeSkillSlot(hero, Math.min(cell.index,2)) : `${tier}차 액티브 슬롯입니다.`;
    let extra='';
    if(hasData && stageUnlocked){
      const idx=Math.min(cell.index,2);
      const max=(hero.skillCdMaxs||[])[idx]||0;
      extra=max>0 ? `재사용 대기시간 ${max.toFixed(1)}초` : '재사용 정보 준비 중';
    }else if(hasData){
      extra=`${tier}차 전직 시 사용 가능`;
    }else{
      extra='추가 예정 슬롯';
    }
    return {
      tab, tier,
      unlocked:stageUnlocked && hasData,
      name:hasData ? name : '추가 예정',
      state:stageUnlocked ? (hasData ? '사용 가능' : '추가 예정') : `${tier}차 전직 후 해금`,
      detail,
      extra
    };
  });
}

function cooldownProgress(remaining,total){
  if(!(remaining>0)) return 1;
  if(!(total>0)) return 0;
  return clamp(1-(remaining/total),0,1);
}
function formatCooldownTime(sec){
  if(!(sec>0)) return '';
  return `${sec.toFixed(1)}s`;
}
function applyCooldownState(btn,remaining,total){
  if(!btn) return;
  const active=remaining>0 && total>0 && !btn.disabled && !btn.classList.contains('empty-slot');
  const progress=active?cooldownProgress(remaining,total):1;
  btn.style.setProperty('--cooldown-progress', String(progress));
  btn.classList.toggle('is-cooling', !!active);
  btn.setAttribute('aria-busy', active?'true':'false');
  const cdEl=btn.querySelector('.ctrl-cd');
  if(cdEl) cdEl.textContent=active ? formatCooldownTime(remaining) : '';
}

  applyCooldownState(dashBtn,S.hero.dashCd,S.hero.dashCdMax||0);
  const cds=Array.isArray(S.hero.skillCds)?S.hero.skillCds:[0,0,0];
  const maxs=Array.isArray(S.hero.skillCdMaxs)?S.hero.skillCdMaxs:[0,0,0];

}
function normalizeSkillCooldowns(hero){
  if(!hero) return hero;
  const oldCd=typeof hero.skillCd==='number' ? hero.skillCd : 0;
  const oldCdMax=typeof hero.skillCdMax==='number' ? hero.skillCdMax : 0;
  const cds=Array.isArray(hero.skillCds)?hero.skillCds.slice(0,3):[0,0,0];
  const maxs=Array.isArray(hero.skillCdMaxs)?hero.skillCdMaxs.slice(0,3):[0,0,0];
  while(cds.length<3) cds.push(0);
  while(maxs.length<3) maxs.push(0);
  for(let i=0;i<3;i++){
    cds[i]=Math.max(0, Number(cds[i])||0);
    maxs[i]=Math.max(0, Number(maxs[i])||0);
  }
  if(!Array.isArray(hero.skillCds) && oldCd>0) cds[0]=Math.max(cds[0], oldCd);
  if(!Array.isArray(hero.skillCdMaxs) && oldCdMax>0) maxs[0]=Math.max(maxs[0], oldCdMax);
  hero.skillCds=cds;
  hero.skillCdMaxs=maxs;
  delete hero.skillCd;
  delete hero.skillCdMax;
  return hero;
}
function skillCooldownAt(hero,slot){
  normalizeSkillCooldowns(hero);
  return hero&&hero.skillCds ? hero.skillCds[slot]||0 : 0;
}
function setSkillCooldown(hero,slot,seconds){
  normalizeSkillCooldowns(hero);
  const value=Math.max(0, Number(seconds)||0);
  hero.skillCds[slot]=value;
  hero.skillCdMaxs[slot]=value;
  return value;
}
function tickSkillCooldowns(hero,dt){
  normalizeSkillCooldowns(hero);
  for(let i=0;i<hero.skillCds.length;i++) hero.skillCds[i]=Math.max(0,(hero.skillCds[i]||0)-dt);
}

function normalizeHeroStatusState(hero){
  if(!hero) return hero;
  const timedKeys=['invuln','speedBuff','slowTime','fearTime','poisonTime','burnTime','freezeTime','stunTime','silenceTime','bleedTime','curseTime','dotTick','trainingDebuffToastCd'];
  timedKeys.forEach(key=>hero[key]=Math.max(0, Number(hero[key])||0));
  hero.buffs=Array.isArray(hero.buffs)?hero.buffs:[];
  hero.debuffs=Array.isArray(hero.debuffs)?hero.debuffs:[];
  return hero;
}
function clearHeroDebuffs(hero){
  if(!hero) return hero;
  normalizeHeroStatusState(hero);
  ['slowTime','fearTime','poisonTime','burnTime','freezeTime','stunTime','silenceTime','bleedTime','curseTime'].forEach(key=>hero[key]=0);
  hero.debuffs=[];
  hero.dotTick=0;
  hero.trainingDebuffToastCd=0;
  return hero;
}
function isHeroHardLocked(hero){
  if(!hero) return false;
  return (hero.freezeTime||0)>0 || (hero.stunTime||0)>0;
}
function syncHeroDebuffArray(hero){
  if(!hero) return;
  const mapping=[
    ['slowTime','↓','둔화'],
    ['fearTime','!','공포'],
    ['poisonTime','☣','중독'],
    ['burnTime','🔥','화상'],
    ['freezeTime','❄','빙결'],
    ['stunTime','✹','기절'],
    ['silenceTime','⦻','침묵'],
    ['bleedTime','🩸','출혈'],
    ['curseTime','☾','저주']
  ];
  hero.debuffs=mapping
    .map(([key,icon,label])=>{
      const time=Math.max(0, Number(hero[key])||0);
      if(time<=0) return null;
      return {key,icon,label,time,tone:'debuff'};
    })
    .filter(Boolean);
}
function tickHeroStatusEffects(hero,dt){
  if(!hero) return;
  normalizeHeroStatusState(hero);
  const keys=['invuln','speedBuff','slowTime','fearTime','poisonTime','burnTime','freezeTime','stunTime','silenceTime','bleedTime','curseTime','trainingDebuffToastCd'];
  keys.forEach(key=>hero[key]=Math.max(0,(Number(hero[key])||0)-dt));
  if(Array.isArray(hero.buffs)){
    hero.buffs=hero.buffs.map(buff=>buff?Object.assign({},buff,{time:Math.max(0, Number(buff.time ?? buff.duration ?? buff.left ?? 0)-dt)}):null).filter(buff=>buff && (Number(buff.time)||0)>0);
  }else hero.buffs=[];
  let dotDamage=0;
  if((hero.poisonTime||0)>0) dotDamage+=Math.max(1, Math.round(hero.maxHp*0.010));
  if((hero.burnTime||0)>0) dotDamage+=Math.max(1, Math.round(hero.maxHp*0.012));
  if((hero.bleedTime||0)>0) dotDamage+=Math.max(1, Math.round(hero.maxHp*0.009));
  hero.dotTick=Math.max(0,(hero.dotTick||0)-dt);
  if(dotDamage>0){
    if((hero.dotTick||0)<=0){
      hero.dotTick=.65;
      hero.hp=Math.max(1, hero.hp-dotDamage);
      S.particles.push({x:hero.x,y:hero.y-22,text:`-${dotDamage}`,color:'#fca5a5',time:.7});
    }
  }else{
    hero.dotTick=0;
  }
  syncHeroDebuffArray(hero);
}
function isLeftmostTrainingDummy(enemy){
  if(!enemy||!S.maps) return false;
  const map=mapNow && typeof mapNow==='function' ? mapNow() : null;
  const enemies=Array.isArray(map?.enemies)?map.enemies:[];
  const dummies=enemies.filter(v=>v && v.alive!==false && Enemies[v.type] && Enemies[v.type].dummy);
  if(!dummies.length) return false;
  const minX=Math.min(...dummies.map(v=>Number(v.homeX ?? v.x) || 0));
  return Math.abs((Number(enemy.homeX ?? enemy.x) || 0)-minX) < 1;
}

function normalizeHeroState(hero){
  if(!hero) return hero;
  hero.baseClass=legacyClassId(hero.baseClass||'warrior');
  hero.jobTier=clamp(hero.jobTier||1,1,3);
  hero.jobPath=typeof hero.jobPath==='number'?clamp(hero.jobPath,0,1):(hero.jobTier>1?selectedPath(hero.baseClass):null);
  if(typeof hero.jobPath==='number') S.classPaths[hero.baseClass]=hero.jobPath;
  const base=Classes[hero.baseClass];
  hero.stats=Object.assign({}, deep((base&&base.stats)||{str:5,vit:5,int:5,agi:5,mnd:5,luk:5}), hero.stats||{});
  const legacyRch=Number((hero.stats&&hero.stats.rch) ?? legacyBaseRchFor(hero.baseClass));
  const legacyBaseRch=legacyBaseRchFor(hero.baseClass);
  if(!hero.balancePatchV4){
    const refunded=Math.max(0, legacyRch-legacyBaseRch);
    if(refunded>0) hero.statPoints=(hero.statPoints||0)+refunded;
    hero.balancePatchV4=true;
  }
  delete hero.stats.rch;
  hero.quests=hero.quests||{};
  hero.quests.training=hero.quests.training||{state:'active',kills:{}};
  hero.quests.cave=hero.quests.cave||{state:'locked',kills:{}};
  hero.quests.dragon=hero.quests.dragon||{state:'locked',kills:{}};
  hero.equip=hero.equip||{weapon:null,armor:null,accessory:null};
  hero.inv=Array.isArray(hero.inv)?hero.inv:[];
  hero.atkCdMax=hero.atkCdMax||0;
  hero.dashCdMax=hero.dashCdMax||0;
  hero.invuln=Math.max(0,hero.invuln||0);
  hero.speedBuff=Math.max(0,hero.speedBuff||0);
  hero.actionLock=Math.max(0,hero.actionLock||0);
  normalizeHeroStatusState(hero);
  normalizeSkillCooldowns(hero);
  hero.pkMode=hero.pkMode==='pk' ? 'pk' : 'peace';
  hero.facing=angleFromFacing(hero.facing, Math.PI/2);
  return hero;
}

function positionSkillToast(){
  if(!S.hero||!S.vw||!S.vh) return;
  const rect=toast.getBoundingClientRect();
  const width=Math.max(88, Math.ceil(rect.width||toast.offsetWidth||0));
  const height=Math.max(40, Math.ceil(rect.height||toast.offsetHeight||0));
  const pad=12;
  const sx=S.hero.x-S.cam.x;
  const sy=S.hero.y-S.cam.y;
  let left=sx-width/2;
  let top=sy+32;
  left=clamp(left,pad,Math.max(pad,S.vw-width-pad));
  top=clamp(top,pad,Math.max(pad,S.vh-height-pad));
  const startX=Math.max(0, Math.ceil(S.vw-left+width+pad));
  const endX=-Math.max(0, Math.ceil(left+width+pad));
  toast.style.left=`${left}px`;
  toast.style.top=`${top}px`;
  toast.style.setProperty('--skill-start-x', `${startX}px`);
  toast.style.setProperty('--skill-end-x', `${endX}px`);
}
function showToast(t,type='default',kicker=''){
  const main=toast.querySelector('.toast-main');
  const sub=toast.querySelector('.toast-kicker');
  if(main) main.textContent=t||'';
  if(sub) sub.textContent=type==='skill' ? '' : (kicker||'');
  toast.classList.remove('show','skill');
  toast.style.animation='none';
  if(type==='skill'){
    toast.classList.add('skill');
    positionSkillToast();
  }else{
    toast.style.left='';
    toast.style.top='';
    toast.style.removeProperty('--skill-start-x');
    toast.style.removeProperty('--skill-end-x');
  }
  void toast.offsetWidth;
  toast.style.animation='';
  if(type==='skill') positionSkillToast();

function setMoveInput(up,down,left,right){
  S.input.up=up?1:0; S.input.down=down?1:0; S.input.left=left?1:0; S.input.right=right?1:0;
  S.input.ax=(S.input.right?1:0)-(S.input.left?1:0);
  S.input.ay=(S.input.down?1:0)-(S.input.up?1:0);
  S.input.analog=false;
}
function setMoveVector(x,y){
  const len=Math.hypot(x,y);
  if(len<0.001){
    S.input.ax=0; S.input.ay=0; S.input.analog=false;
    S.input.up=0; S.input.down=0; S.input.left=0; S.input.right=0;
    return;
  }
  const scale=len>1?1/len:1;
  const nx=x*scale, ny=y*scale;
  S.input.ax=nx; S.input.ay=ny; S.input.analog=true;
  S.input.up=ny<-0.18?1:0; S.input.down=ny>0.18?1:0;
  S.input.left=nx<-0.18?1:0; S.input.right=nx>0.18?1:0;
}
function isTouchPadMode(){
  return window.matchMedia('(max-width: 680px)').matches || (navigator.maxTouchPoints||0)>0;
}
function hidePad(){
  if(padCard){
    padCard.classList.remove('show');
    padCard.style.setProperty('--stick-x','0px');
    padCard.style.setProperty('--stick-y','0px');
  }
  S.padTouch.active=false; S.padTouch.id=null;
  setMoveInput(0,0,0,0);
}
function positionPad(clientX,clientY){
  if(!padCard) return;
  const sens=clamp(S.settings.controlSensitivity||.72,.4,1);
  const size=Math.min(window.innerWidth*(0.26+sens*0.12),86+sens*64);
  const half=size/2, margin=14;
  const x=clamp(clientX, half+margin, window.innerWidth-half-margin);
  const y=clamp(clientY, half+margin, window.innerHeight-half-margin);
  padCard.style.setProperty('--pad-x', x+'px');
  padCard.style.setProperty('--pad-y', y+'px');
  padCard.classList.add('show');
}
function updatePadFromPoint(clientX,clientY){
  if(!padCard) return;
  const rect=padCard.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const rawX=clientX-cx, rawY=clientY-cy;
  const sens=clamp(S.settings.controlSensitivity||.72,.4,1);
  const maxR=Math.min(rect.width,rect.height)*0.5;
  const dead=maxR*(0.2-(sens*.04));
  const distLen=Math.hypot(rawX,rawY);
  if(distLen<=dead){
    padCard.style.setProperty('--stick-x','0px');
    padCard.style.setProperty('--stick-y','0px');
    setMoveVector(0,0);
    return;
  }
  const travel=Math.max(1,maxR*(0.44+sens*0.22));
  const active=Math.min(travel, Math.max(0, distLen-dead));
  const nx=distLen?rawX/distLen:0, ny=distLen?rawY/distLen:0;
  const px=nx*active, py=ny*active;
  const normalized=clamp(active/travel,0,1);
  const curved=Math.pow(normalized,1.4+(1-sens)*0.9);
  padCard.style.setProperty('--stick-x', px+'px');
  padCard.style.setProperty('--stick-y', py+'px');
  setMoveVector(nx*curved, ny*curved);
}
function initTouchPad(){
  if(!padCard) return;
  hidePad();
  const point=e=>{
    if(e.touches && e.touches.length) return e.touches[0];
    if(e.changedTouches && e.changedTouches.length) return e.changedTouches[0];
    return e;
  };
  const canUse=()=> (
    S.mode==='play' &&
    isTouchPadMode() &&
    (!titleScreen || getComputedStyle(titleScreen).display==='none') &&
    !panelOverlay.classList.contains('show') &&
    !dialogOverlay.classList.contains('show')
  );
  const start=e=>{
    if(!canUse()) return;
    const p=point(e);
    if(e.cancelable) e.preventDefault();
    S.padTouch.active=true;
    S.padTouch.id=e.pointerId ?? p.identifier ?? null;
    padCard.classList.add('show');
    updatePadFromPoint(p.clientX,p.clientY);
  };
  const move=e=>{
    if(!S.padTouch.active) return;
    const p=point(e);
    const currentId=e.pointerId ?? p.identifier ?? null;
    if(S.padTouch.id!==null && currentId!==null && currentId!==S.padTouch.id) return;
    if(e.cancelable) e.preventDefault();
    updatePadFromPoint(p.clientX,p.clientY);
  };
  const end=e=>{
    if(!S.padTouch.active) return;
    const p=point(e);
    const currentId=e.pointerId ?? p.identifier ?? null;
    if(S.padTouch.id!==null && currentId!==null && currentId!==S.padTouch.id) return;
    if(e.cancelable) e.preventDefault();
    hidePad();
  };

  if(window.PointerEvent){
    padCard.addEventListener('pointerdown',start,{passive:false});
    addEventListener('pointermove',move,{passive:false});
    addEventListener('pointerup',end,{passive:false});
    addEventListener('pointercancel',end,{passive:false});
  }else{
    padCard.addEventListener('touchstart',start,{passive:false});
    addEventListener('touchmove',move,{passive:false});
    addEventListener('touchend',end,{passive:false});
    addEventListener('touchcancel',end,{passive:false});
  }
  addEventListener('resize',hidePad);
}

function enemyAccuracyFloor(enemy){
  const t=Enemies[enemy?.type]||{};
  if(t.dummy||t.invincible||t.rank==='training') return 1;
  if(t.world) return 0.84;
  if(t.boss) return 0.85;
  if(t.elite) return 0.88;
  return 0.90;
}
function enemyAccuracyPenalty(enemy){
  const t=Enemies[enemy?.type]||{};
  if(t.dummy||t.invincible||t.rank==='training') return 0;
  let penalty=0;
  if(t.world) penalty+=9;
  else if(t.boss) penalty+=7;
  else if(t.elite) penalty+=3;
  penalty+=Math.max(0,((t.spd||0)-80)/18);
  return penalty;
}
function playerHitChance(enemy){
  const baseAccuracy=Number(S.hero?.accuracy)||95;
  const floor=enemyAccuracyFloor(enemy);
  return clamp((baseAccuracy-enemyAccuracyPenalty(enemy))/100, floor, 1);
}
function deriveHero(){
  const h=S.hero, st=h.stats, fam=legacyClassId(h.baseClass), profile=combatProfile(fam), tuning=classCombatTuning(fam);
  normalizeHeroStatusState(h);
  let b={atk:0,def:0,hp:0,mp:0,str:0,vit:0,int:0,agi:0,mnd:0,luk:0,crit:0};
  Object.values(h.equip).forEach(id=>{
    const it=Items[id]; if(!it) return;
    b.atk+=(it.atk||0); b.def+=(it.def||0); b.hp+=(it.hp||0); b.mp+=(it.mp||0);
    b.str+=(it.str||0); b.vit+=(it.vit||0); b.int+=(it.int||0); b.agi+=(it.agi||0); b.mnd+=(it.mnd||0); b.luk+=(it.luk||0); b.crit+=(it.crit||0);
  });
  const STR=st.str+b.str, VIT=st.vit+b.vit, INT=st.int+b.int, AGI=st.agi+b.agi, MND=st.mnd+b.mnd, LUK=st.luk+b.luk;
  h.maxHp=Math.round(110+h.level*18+VIT*12+STR*2+b.hp);
  h.maxMp=Math.round(28+h.level*8+INT*8+MND*10+b.mp);
  h.attack=Math.round(
    tuning.attack.base+
    h.level*tuning.attack.level+
    STR*tuning.attack.str+
    VIT*tuning.attack.vit+
    INT*tuning.attack.int+
    AGI*tuning.attack.agi+
    MND*tuning.attack.mnd+
    LUK*tuning.attack.luk+
    b.atk
  );
  h.defense=Math.round(3+h.level*1.4+VIT*1.5+b.def);
  h.speed=Math.round(tuning.move.base+AGI*tuning.move.agi+(h.speedBuff>0?34:0));
  if((h.curseTime||0)>0){
    h.attack=Math.round(h.attack*0.72);
    h.defense=Math.round(h.defense*0.74);
  }
  if((h.slowTime||0)>0) h.speed=Math.round(h.speed*0.55);
  if((h.freezeTime||0)>0) h.speed=0;
  h.crit=clamp(.05+LUK*.006+b.crit,0,.82);
  h.attackSpeedRate=clamp(
    profile.attackSpeedBase+
    AGI*tuning.attackSpeed.agi+
    STR*tuning.attackSpeed.str+
    INT*tuning.attackSpeed.int+
    MND*tuning.attackSpeed.mnd+
    LUK*tuning.attackSpeed.luk,
    profile.attackSpeedBase,
    profile.attackSpeedCap
  );
  h.attackSpeed=Math.round(h.attackSpeedRate*100);
  h.accuracy=clamp(Math.round(
    tuning.accuracy.base+
    AGI*tuning.accuracy.agi+
    STR*tuning.accuracy.str+
    INT*tuning.accuracy.int+
    MND*tuning.accuracy.mnd+
    LUK*tuning.accuracy.luk
  ),84,100);
  if((h.curseTime||0)>0) h.accuracy=Math.max(60,h.accuracy-14);
  const levelBonus=Math.max(0,h.level-1);
  const displaySteps=profile.melee?Math.floor(levelBonus/3):Math.floor(levelBonus/2);
  if(profile.melee){
    h.attackRange=Math.round(clamp(profile.rangeDisplayBase+displaySteps*profile.rangeDisplayStep,profile.rangeDisplayBase,220));
    h.rangeRate=clamp(profile.rangeRateBase+displaySteps*profile.rangeRateStep,profile.rangeRateBase,1.48);
    h.meleeReachMul=1+levelBonus*(profile.meleeReachPerLevel||0.04);
    h.meleeRadiusMul=1+levelBonus*(profile.meleeRadiusPerLevel||0.05);
  }else{
    h.attackRange=Math.round(clamp(profile.rangeDisplayBase+displaySteps*profile.rangeDisplayStep,profile.rangeDisplayBase,340));
    h.rangeRate=clamp(profile.rangeRateBase+displaySteps*profile.rangeRateStep,profile.rangeRateBase,2.45);
    h.meleeReachMul=1;
    h.meleeRadiusMul=1;
  }
  h.evasion=clamp(.02+AGI*.007+LUK*.002,0,.42);
  if((h.curseTime||0)>0) h.evasion*=0.58;
  h.evasionRate=Math.round(h.evasion*100);
  h.critDamage=Math.round(150 + LUK*0.35 + (fam==='thief'?10:fam==='archer'?5:0));
  h.statusPower=Math.round((INT*0.18 + MND*0.22 + LUK*0.04 + (fam==='shaman'?8:fam==='healer1'?7:fam==='mage'?5:0))*10)/10;
  h.statusResist=Math.round((VIT*0.18 + MND*0.22 + LUK*0.03 + (fam==='warrior'?6:fam==='brawler'?4:fam==='healer1'?5:0))*10)/10;
  h.rangeGrowthBonus=displaySteps;
  h.hp=clamp(h.hp,0,h.maxHp); h.mp=clamp(h.mp,0,h.maxMp);
}
function xpNeed(lv){return Math.round(90+lv*lv*24)}
function addXp(n){
  const h=S.hero; h.xp+=n; let up=0;
  while(h.xp>=h.xpNeed){h.xp-=h.xpNeed; h.level++; h.xpNeed=xpNeed(h.level); h.statPoints+=3; up++}
  deriveHero();
  if(up){h.hp=h.maxHp; h.mp=h.maxMp; showToast(`레벨 업! Lv.${h.level} / 스탯 포인트 +${up*3}`); if(h.level>=5&&h.jobTier===1)setHint('레벨 5 달성! 성소에서 전직할 수 있습니다.')}
}

function itemCount(id){const e=S.hero.inv.find(v=>v.id===id); return e?e.qty:0}
function hasItem(id){return itemCount(id)>0}
function addItem(id,qty=1){
  const item=Items[id]; if(!item) return;
  const stack=item.type==='consumable'||item.type==='key';
  const e=S.hero.inv.find(v=>v.id===id);
  if(stack){ if(e)e.qty+=qty; else S.hero.inv.push({id,qty}); }
  else { for(let i=0;i<qty;i++) S.hero.inv.push({id,qty:1}) }
}
function removeItem(id,qty=1){
  const i=S.hero.inv.findIndex(v=>v.id===id); if(i<0) return false;
  S.hero.inv[i].qty-=qty; if(S.hero.inv[i].qty<=0) S.hero.inv.splice(i,1); return true;
}
function equipStarter(){ const st=Classes[S.selected].starter; S.hero.equip.weapon=st; removeItem(st,1); deriveHero() }
function applyStartSelection(hero){
  if(!hero) return hero;
  const tier=clamp(Number(S.startTier)||1,1,3);
  const path=selectedPath(hero.baseClass);
  hero.jobPath=path;
  hero.jobTier=tier;
  hero.level=Math.max(hero.level,tier>=3?10:tier>=2?5:1);
  hero.xp=0;
  hero.xpNeed=xpNeed(hero.level);
  const reward2=weaponRewardFor(hero.baseClass,2);
  const reward3=weaponRewardFor(hero.baseClass,3);
  if(tier>=2 && reward2){ addItem(reward2,1); hero.equip.weapon=reward2; }
  if(tier>=3 && reward3){ addItem(reward3,1); hero.equip.weapon=reward3; }
  normalizeSkillCooldowns(hero);
  deriveHero();
  hero.hp=hero.maxHp;
  hero.mp=hero.maxMp;
  return hero;
}

function weaponRewardFor(baseClass,tier){
  const map={
    warrior:{2:'knightBlade',3:'paladinBlade'}, mage:{2:'sageStaff',3:'archmageStaff'}, archer:{2:'rangerBow',3:'tempestBow'}, thief:{2:'thiefDaggers',3:'shadowKunai'},
    healer1:{2:'saintMace',3:'holyStaff'}, brawler:{2:'qiGauntlet',3:'dragonKnuckle'}, shaman:{2:'spiritBell',3:'mythTotem'}
  };
  return map[legacyClassId(baseClass)]?.[tier] || null;
}
function equipItem(id){
  const it=Items[id]; if(!it) return;
  if(!['weapon','armor','accessory'].includes(it.type)) return;
  if(it.classes && !it.classes.includes(S.hero.baseClass)) return showToast('현재 직업으로 착용할 수 없습니다.');
  if(it.tier && S.hero.jobTier<it.tier) return showToast('전직 후 사용 가능합니다.');
  const slot=it.type, prev=S.hero.equip[slot];
  S.hero.equip[slot]=id; removeItem(id,1); if(prev)addItem(prev,1); deriveHero(); S.bagDescItem=`equip:${slot}`; showToast(it.name+' 장착'); renderPanel();
}
function unequipItem(slot){
  const id=S.hero.equip?.[slot];
  if(!id||!Items[id]) return;
  S.hero.equip[slot]=null; addItem(id,1); deriveHero(); S.bagDescItem=id; showToast(Items[id].name+' 해제'); renderPanel();
}
function useItem(id){
  const it=Items[id]; if(!it) return;
  if(it.hp){ if(S.hero.hp>=S.hero.maxHp) return showToast('HP가 이미 가득합니다.'); S.hero.hp=clamp(S.hero.hp+it.hp,0,S.hero.maxHp) }
  if(it.mp){ if(S.hero.mp>=S.hero.maxMp) return showToast('MP가 이미 가득합니다.'); S.hero.mp=clamp(S.hero.mp+it.mp,0,S.hero.maxMp) }
  if(it.field){
    const es=mapNow().enemies.filter(e=>e.alive&&dist(e.x,e.y,S.hero.x,S.hero.y)<130);
    if(!es.length) return showToast('주변에 적이 없습니다.');
    es.forEach(e=>damageEnemy(e,it.field,false));
  }
  removeItem(id,1);
  if(!S.hero.inv.some(e=>e.id===id)) S.bagDescItem=null;
  showToast(it.name+' 사용'); renderPanel();
}

function townRaidCooldown(reset=false){
  return reset ? rand(150,220) : rand(38,72);
}
function makeTownRaidState(reset=false){
  return {active:false,cooldown:townRaidCooldown(!!reset),bossId:null,pulse:0,lastResult:'',lastResultTime:0};
}
function ensureTownRaidState(){
  if(!S.townRaid || typeof S.townRaid!=='object') S.townRaid=makeTownRaidState();
  S.townRaid.lastResultTime=Math.max(0,Number(S.townRaid.lastResultTime)||0);
  return S.townRaid;
}
function townRaidBoss(m=S.maps?.town){
  return (m?.enemies||[]).find(e=>e&&(e.raidBoss || e.type==='colossusRaider'))||null;
}
function townRaidActive(m=S.maps?.town){
  const raid=ensureTownRaidState();
  const boss=townRaidBoss(m);
  return !!raid.active && !!boss && !!boss.alive;
}
function prepareTownRaidDefender(a){
  if(!a) return;
  if(!Number.isFinite(a.raidHomeLimitSaved)) a.raidHomeLimitSaved=Number(a.homeLimit)||0;
  if(!Number.isFinite(a.raidLeashSaved)) a.raidLeashSaved=Number(a.leash)||0;
  if(!a.raidTalkableSavedSet){
    a.raidTalkableSaved=a.talkable;
    a.raidTalkableSavedSet=true;
  }
  a.talkable=false;
  a.homeLimit=Math.max(Number(a.homeLimit)||0,1200);
  a.leash=Math.max(Number(a.leash)||0,1280);
  a.wanderRadius=Math.max(Number(a.wanderRadius)||0,420);
  a.alertTime=Math.max(a.alertTime||0,2.4);
}
function restoreTownRaidDefender(a){
  if(!a) return;
  if(Number.isFinite(a.raidHomeLimitSaved)) a.homeLimit=a.raidHomeLimitSaved;
  if(Number.isFinite(a.raidLeashSaved)) a.leash=a.raidLeashSaved;
  if(a.raidTalkableSavedSet){
    a.talkable=a.raidTalkableSaved;
    delete a.raidTalkableSaved;
    delete a.raidTalkableSavedSet;
  }
  delete a.raidHomeLimitSaved;
  delete a.raidLeashSaved;
  delete a.raidCalloutId;
  clearActorTarget(a);
  a.aggroLock=0;
  actorClearIntent(a);
  a.aiMode=(a.kind==='animal'?(a.species==='chicken'?'graze':'wander'):(['guard','hunter','raider'].includes(a.role||'')?'patrol':'wander'));
}
function townRaidThoughtLine(a){
  const role=actorRoleKey(a);
  if(role==='guard') return '경보! 방어선을 세운다!';
  if(role==='blacksmith') return '광장 안쪽으론 못 들인다!';
  if(role==='merchant') return '물건보다 마을이 먼저다!';
  if(role==='healer') return '부상자는 뒤로, 내가 막겠습니다!';
  if(role==='guide') return '다들 광장으로 모여요!';
  if(role==='villager') return '다 같이 밀어내자!';
  return '침입자를 막아라!';
}
function commandTownRaidDefenders(m,boss){
  if(!m||!boss||!boss.alive) return;
  for(const a of m.npcs||[]){
    if(!actorAlive(a)) continue;
    prepareTownRaidDefender(a);
    setActorTarget(a,boss);
    a.aggroLock=Math.max(a.aggroLock||0,5.8);
    a.decisionCd=0;
    a.aiMode=actorRoleKey(a)==='guard'?'intercept':'raid';
    if(a.raidCalloutId!==boss.id){
      actorSayThought(a,townRaidThoughtLine(a),'combat',2.1,`town-raid:${boss.id}:${a.id}`);
      a.raidCalloutId=boss.id;
    }
  }
}
function startTownRaid(){
  const raid=ensureTownRaidState();
  const town=S.maps?.town;
  if(!town || townRaidActive(town)) return false;
  let boss=townRaidBoss(town);
  const spawn=tileCenter(29,12);
  if(!boss){
    boss=newEnemy('colossusRaider',29,12);
    town.enemies.push(boss);
  }
  boss.type='colossusRaider';
  boss.raidBoss=true;
  boss.alive=true;
  boss.hp=Enemies.colossusRaider.hp;
  boss.maxHp=Enemies.colossusRaider.hp;
  boss.r=Enemies.colossusRaider.r;
  boss.x=spawn.x;
  boss.y=spawn.y;
  boss.homeX=spawn.x;
  boss.homeY=spawn.y;
  boss.respawn=0;
  boss.cd=0;
  boss.aggroLock=12;
  boss.fearTime=0;
  boss.fearTurnCd=0;
  boss.regenPulse=0;
  const safePoint=findNearestOpenPoint(town,boss.x,boss.y,boss.r,boss,24);
  if(safePoint){ boss.x=safePoint.x; boss.y=safePoint.y; boss.homeX=safePoint.x; boss.homeY=safePoint.y; }
  raid.active=true;
  raid.bossId=boss.id;
  raid.pulse=.08;
  raid.lastResult='';
  raid.lastResultTime=0;
  commandTownRaidDefenders(town,boss);
  showToast('경보! 거대 보스가 마을을 습격했습니다!');
  if(S.map==='town') S.particles.push({x:boss.x,y:boss.y-48,text:'보스 침입!',color:'#fca5a5',time:1.2});
  return true;
}
function resolveTownRaidVictory(boss=null){
  const raid=ensureTownRaidState();
  const town=S.maps?.town;
  if(!town) return;
  const raidBossRef=boss||townRaidBoss(town);
  if(raidBossRef){
    raidBossRef.alive=false;
    raidBossRef.hp=0;
    raidBossRef.aggroLock=0;
    raidBossRef.respawn=0;
  }
  for(const a of town.npcs||[]) restoreTownRaidDefender(a);
  raid.active=false;
  raid.bossId=null;
  raid.pulse=0;
  raid.cooldown=townRaidCooldown(true);
  raid.lastResult='defended';
  raid.lastResultTime=8;
  showToast('마을 NPC들이 힘을 합쳐 침입 보스를 물리쳤습니다!');
}
function updateTownRaid(dt){
  const raid=ensureTownRaidState();
  const town=S.maps?.town;
  if(!town || !S.hero || S.mode!=='play') return;
  raid.lastResultTime=Math.max(0,(raid.lastResultTime||0)-dt);
  const boss=townRaidBoss(town);
  if(raid.active){
    if(!boss || !boss.alive){
      resolveTownRaidVictory(boss||null);
      return;
    }
    raid.pulse=Math.max(0,(raid.pulse||0)-dt);
    if((raid.pulse||0)<=0){
      raid.pulse=.42;
      commandTownRaidDefenders(town,boss);
    }
    return;
  }
  if(S.map!=='town') return;
  raid.cooldown=Math.max(0,(raid.cooldown||townRaidCooldown())-dt);
  if(raid.cooldown<=0) startTownRaid();
}
function enemyChosenTarget(e,m){
  if(!(e&&m)) return S.hero;
  if(e.raidBoss && m.id==='town'){
    const candidates=[];
    if(S.hero && S.hero.hp>0 && S.map==='town') candidates.push(S.hero);
    for(const npc of m.npcs||[]) if(actorAlive(npc)) candidates.push(npc);
    let best=null, bestScore=Infinity;
    for(const target of candidates){
      const info=actorTargetPos(target);
      if(!info) continue;
      let score=dist(e.x,e.y,info.x,info.y);
      if(target!==S.hero) score-=20;
      if(target?.role==='guard') score-=14;
      if((target?.hp||0)<(target?.maxHp||1)*.52) score+=18;
      if(score<bestScore){ bestScore=score; best=target; }
    }
    return best||S.hero;
  }
  return S.hero;
}

function nearestObj(){

  const checkAt=(kind,obj,x,y,limit)=>{const d=dist(S.hero.x,S.hero.y,x,y); if(d<limit&&d<bestD){best={kind,obj}; bestD=d}};
  livingNpcs(m).forEach(n=>{ if(!n.talkable) return; const p=npcPos(n); if(p) checkAt('npc',n,p.x,p.y,72); });
  m.chests.forEach(c=>!c.opened&&checkAt('chest',c,tileCenter(c.tx,c.ty).x,tileCenter(c.tx,c.ty).y,60));
  m.healers.forEach(h=>checkAt('healer',h,tileCenter(h.tx,h.ty).x,tileCenter(h.tx,h.ty).y,64));
  m.doors.forEach(d=>!d.opened&&checkAt('door',d,tileCenter(d.tx,d.ty).x,tileCenter(d.tx,d.ty).y,64));
  m.signs.forEach(s=>checkAt('sign',s,tileCenter(s.tx,s.ty).x,tileCenter(s.tx,s.ty).y,66));
  m.portals.forEach(p=>checkAt('portal',p,tileCenter(p.tx,p.ty).x,tileCenter(p.tx,p.ty).y,60));
  return best;
}

function findNearestOpenPoint(m,x,y,r,ignoreRef=null,maxRings=12){
  const baseTx=Math.floor(x/TILE), baseTy=Math.floor(y/TILE);
  let best=null;
  const test=(tx,ty)=>{
    const cx=(tx+0.5)*TILE, cy=(ty+0.5)*TILE;
    if(circleBlocked(m,cx,cy,r,ignoreRef)) return;
    const d=dist(x,y,cx,cy);
    const openBonus=actorOpenAreaScore({r:r},m,cx,cy);
    const score=d - openBonus*6;
    if(!best || score<best.score) best={x:cx,y:cy,score};
  };
  for(let ring=0; ring<=maxRings; ring++){
    for(let ox=-ring; ox<=ring; ox++){
      test(baseTx+ox,baseTy-ring);
      test(baseTx+ox,baseTy+ring);
    }
    for(let oy=-ring+1; oy<=ring-1; oy++){
      test(baseTx-ring,baseTy+oy);
      test(baseTx+ring,baseTy+oy);
    }
    if(best) break;
  }
  return best;
}
function rescueActorPosition(a,m,force=false){
  if(!a||!m) return false;
  const terrainBad=circleHit(m,a.x,a.y,Math.max(5,(a.r||14)-2));
  const congestionBad=!terrainBad && (force || (a.stuckTime||0)>1.1) && circleBlocked(m,a.x,a.y,a.r,a);
  if(!terrainBad && !congestionBad && !force) return false;
  const probes=[
    [a.x,a.y],
    [a.homeX||a.x,a.homeY||a.y],
    [a.wanderX||a.x,a.wanderY||a.y],
    [a.homeX||a.x,(a.homeY||a.y)-TILE],
    [(a.homeX||a.x)+TILE,a.homeY||a.y],
    [(a.homeX||a.x)-TILE,a.homeY||a.y],
    [a.homeX||a.x,(a.homeY||a.y)+TILE]
  ];
  let found=null;
  for(const [px,py] of probes){
    found=findNearestOpenPoint(m,px,py,a.r||14,a,18);
    if(found) break;
  }
  if(!found) return false;
  a.x=found.x; a.y=found.y;
  syncActorTile(a);
  a.wanderX=found.x; a.wanderY=found.y;
  a.idleFor=Math.max(a.idleFor||0,.22);
  a.stuckTime=0;
  return true;
}
function resolveActorTarget(a){
  if(!a||!a.targetRef) return null;

  if(a.targetRef.type && Enemies[a.targetRef.type]) return a.targetRef.alive ? a.targetRef : null;

function alertNearbyActorAllies(victim,attacker){

    if(!sameFaction) return;

    actorRememberEvent(a,'ally_hurt',{victim:actorMemoryKey(victim),attacker:actorMemoryKey(attacker)},.82);
    actorShiftRelationship(a,victim,.08,'ally under attack');

    if(attacker===S.hero) a.hostileToHero=true;

function actorRewardGold(actor){

}
function damageActor(target,n,crit=false,attacker=null){
  if(!actorAlive(target)) return {hit:false};
  const hitRate=clamp(.9 + ((attacker===S.hero?S.hero.hitRate||0:0)*.02) - (target.kind==='animal'?.02:.06),.72,.98);
  if(Math.random()>hitRate){
    S.particles.push({x:target.x,y:target.y-16,text:'빗나감',color:'#93c5fd',time:.68});
    return {hit:false,miss:true};
  }
  const base=Math.max(1,Math.round(n-(target.defense||0)));
  const dmg=crit?Math.round(base*1.5):base;
  target.hp-=dmg;
  target.lastHitBy=attacker||null;
  target.lastAttacker=attacker||null;
  target.aggroLock=Math.max(target.aggroLock||0,attacker===S.hero?rand(10,15):7);
  if(attacker===S.hero){
    target.hostileToHero=true;
    setActorTarget(target,S.hero);
    const targetRole=actorRoleKey(target);
    if(targetRole==='guard'){
      target.aiMode='intercept';
      target.aggroLock=Math.max(target.aggroLock||0,18);
      target.heroAggroTimeout=Math.max(target.heroAggroTimeout||0,22);
      target.sidestepDir=0;
      target.sidestepTime=0;
    }else if(targetRole==='elder'){
      target.aiMode='combat';
      target.aggroLock=Math.max(target.aggroLock||0,16);
      target.heroAggroTimeout=Math.max(target.heroAggroTimeout||0,20);
      target.aggression=Math.max(target.aggression||0,.72);
      target.bravery=Math.max(target.bravery||0,.78);
      target.preferredRange=Math.min(target.preferredRange||26,20);
    }
    if(target.kind==='npc'){
      const activeMap=mapNow();
      if(activeMap && Array.isArray(activeMap.npcs)){
        for(const guard of activeMap.npcs){
          if(!guard || guard===target || !actorAlive(guard) || actorRoleKey(guard)!=='guard') continue;
          if(dist(guard.x,guard.y,target.x,target.y)>240) continue;
          setActorTarget(guard,S.hero);
          guard.hostileToHero=true;
          guard.aiMode='intercept';
          guard.aggroLock=Math.max(guard.aggroLock||0,18);
          guard.heroAggroTimeout=Math.max(guard.heroAggroTimeout||0,22);
          guard.sidestepDir=0;
          guard.sidestepTime=0;
        }
      }
    }
  }
  else if(attacker && attacker!==target) setActorTarget(target,attacker);
  S.particles.push({x:target.x,y:target.y-18,text:(crit?'치명! ':'')+dmg,color:crit?'#f59e0b':'#fff',time:.82});
  S.effects.push({x:target.x,y:target.y,r:target.r+8,time:.16,color:target.color||'#f59e0b'});
  actorRememberEvent(target,'threat',{attacker:actorMemoryKey(attacker),damage:dmg,crit:!!crit},Math.min(.98,.58+dmg/80));
  if(attacker && attacker!==target){
    actorRememberEvent(attacker,'attack',{target:actorMemoryKey(target),damage:dmg,crit:!!crit},Math.min(.92,.46+dmg/100));
    actorShiftRelationship(target,attacker,-.24-(crit?.12:0),'received damage');
  }
  if(attacker) alertNearbyActorAllies(target,attacker);
  if(attacker===S.hero) actorRegisterPublicCrime(attacker,target,mapNow(),dmg,crit);
  const bleedThreshold=Math.max(1,Math.ceil((target.maxHp||1)*0.10));
  if(target.kind==='npc' && target.hp<=bleedThreshold && target.hp>0 && !target.bleedOut && Math.random()<.42){
    target.hp=Math.max(1,target.hp);
    target.bleedOut=true;
    target.bleedOutTick=Math.min(target.bleedOutTick||0,.18);
    target.bleedSpillCd=0;
    return {hit:true,dmg,crit:!!crit,bleeding:true};
  }
  if(target.hp<=0){
    target.hp=0;
    target.alive=false;
    target.respawn=target.respawnMax||60;
    resetActorCombatState(target);
    spawnDeathCorpsePieces(target.x,target.y,target.r||14,target.bodyColor||'#e5e7eb',target.color||'#f59e0b',target.kind==='animal'?'rgba(255,248,220,.92)':'rgba(255,224,178,.92)',target.kind==='animal');
    spawnRedSpill(target.x,target.y,target.r||14,target.kind==='animal'?'rgba(153,27,27,.76)':'rgba(185,28,28,.84)');
    S.effects.push({x:target.x,y:target.y,r:(target.r||14)+16,time:.28,color:target.color||'#f59e0b'});
    if(attacker===S.hero){
      const gold=actorRewardGold(target);
      if(gold) S.hero.gold+=gold;
      if(target.rewardXp) addXp(target.rewardXp);
      if(target.kind==='animal' && target.species==='dog' && Math.random()<.18) addItem('potion',1);
      if(target.kind==='npc' && Math.random()<.12) addItem('ether',1);
    }
    return {hit:true,dmg,crit:!!crit,killed:true};
  }
  return {hit:true,dmg,crit:!!crit};
}

function proximityBonus(x,y,targets,inner=18,outer=120,weight=1){

    if(d>outer) continue;

}

function actorLocalAvoidance(a,m,ignoreRef=null){

    if(o.ref===a || o.ref===ignoreRef || o.ref===a.targetRef) continue;
    if(shouldIgnoreActorBlocking(a,o.ref,o.kind)) continue;
    if(o.ref===S.hero && !heroRelevant) continue;
    const d=dist(a.x,a.y,o.x,o.y);
    const living=o.kind==='npc' || o.kind==='animal' || o.kind==='hero';
    if(living && isSoftPassActor(a) && isSoftPassActor(o.ref)) continue;
    const friendly=living && o.ref!==S.hero && actorFriendlyWith(a,o.ref);
    const extra=living ? (friendly ? (m.id==='town'?18:12) : (m.id==='town'?12:9)) : 10;
    const min=a.r+o.r+extra;
    if(d<=0.01 || d>=min) continue;
    let push=1-(d/min);
    if(friendly) push*=1.35;

    ay += ((a.y-o.y)/d)*push;

function moveActorToward(a,tx,ty,spd,m,dt,ignoreRef=null){

  const avoid=actorLocalAvoidance(a,m,ignoreRef||a);
  dx += avoid.x*1.15;
  dy += avoid.y*1.15;
  const steerLen=Math.hypot(dx,dy)||1;
  dx/=steerLen; dy/=steerLen;
  const step=Math.min(dd,spd*dt);
  const nx=a.x+dx*step, ny=a.y+dy*step;
  const prevX=a.x, prevY=a.y;
  if(!circleBlocked(m,nx,a.y,a.r,ignoreRef||a)) a.x=nx;
  else if(!circleBlocked(m,a.x,a.y+dy*step*.45,a.r,ignoreRef||a)) a.y+=dy*step*.45;
  if(!circleBlocked(m,a.x,ny,a.r,ignoreRef||a)) a.y=ny;
  else if(!circleBlocked(m,a.x+dx*step*.45,a.y,a.r,ignoreRef||a)) a.x+=dx*step*.45;
  const moved=Math.hypot(a.x-prevX,a.y-prevY);
  if(moved>0.03){
    a.facing=Math.atan2(dy,dx);
    a.walkCycle=(a.walkCycle||0)+dt*Math.max(7,Math.min(12,(spd||60)/10));

  }
