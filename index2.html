function drawInlineNameDebuffs(centerX,y,nameText,debuffs=[],opts={}){
  const nameFont=opts.nameFont||'700 11px sans-serif';
  const tagFont=opts.tagFont||'800 8px sans-serif';
  const nameColor=opts.nameColor||'#f8fafc';
  const shadowColor=opts.shadowColor||'rgba(2,6,23,.92)';
  const nameGap=debuffs.length ? (opts.nameGap||7) : 0;
  const tagPadX=opts.tagPadX||6;
  const tagGap=opts.tagGap||4;
  const tagH=opts.tagH||12;
  ctx.save();
  ctx.textBaseline='middle';
  ctx.textAlign='left';
  ctx.font=nameFont;
  const nameW=ctx.measureText(nameText).width;
  ctx.font=tagFont;
  const tagWidths=debuffs.map(d=>Math.max(24,Math.ceil(ctx.measureText(d.label).width+tagPadX*2)));
  const tagsW=tagWidths.reduce((sum,w)=>sum+w,0) + Math.max(0,tagWidths.length-1)*tagGap;
  const totalW=nameW + nameGap + tagsW;
  const leftX=centerX-totalW/2;
  ctx.font=nameFont;
  ctx.fillStyle=nameColor;
  ctx.shadowColor=shadowColor;
  ctx.shadowBlur=6;
  ctx.shadowOffsetX=0;
  ctx.shadowOffsetY=1;
  ctx.fillText(nameText,leftX,y);
  ctx.shadowBlur=0;
  ctx.shadowOffsetY=0;
  if(debuffs.length){
    ctx.font=tagFont;
    let x=leftX+nameW+nameGap;
    debuffs.forEach((debuff,idx)=>{
      const w=tagWidths[idx];
      ctx.fillStyle=debuff.fill;
      roundRectPath(x,y-tagH/2,w,tagH,999); ctx.fill();
      ctx.strokeStyle=debuff.stroke;
      ctx.lineWidth=1;
      roundRectPath(x+.5,y-tagH/2+.5,Math.max(0,w-1),Math.max(0,tagH-1),999); ctx.stroke();
      ctx.fillStyle=debuff.text;
      ctx.fillText(debuff.label,x+tagPadX,y+.5);
      x+=w+tagGap;
    });
  }
  ctx.restore();
  return {nameW,tagsW,totalW};
}
function trimThoughtLines(text){
  const raw=String(text||'').trim();
  if(!raw) return [];
  const chars=[...raw];
  if(chars.length<=14) return [raw];
  const lines=[];
  let rest=chars;
  while(rest.length && lines.length<2){
    const take=Math.min(lines.length===0?14:12,rest.length);
    const chunk=rest.slice(0,take).join('');
    rest=rest.slice(take);
    lines.push(chunk + (lines.length===1 && rest.length ? '…' : ''));
  }
  return lines;
}
function actorThoughtPalette(mood='neutral'){
  switch(mood){
    case 'combat': return {fill:'rgba(127,29,29,.92)',stroke:'rgba(252,165,165,.62)',text:'#fee2e2'};
    case 'alert': return {fill:'rgba(30,41,59,.94)',stroke:'rgba(125,211,252,.56)',text:'#e0f2fe'};
    case 'flee': return {fill:'rgba(88,28,135,.92)',stroke:'rgba(216,180,254,.58)',text:'#f3e8ff'};
    case 'social': return {fill:'rgba(21,128,61,.92)',stroke:'rgba(134,239,172,.56)',text:'#dcfce7'};
    case 'rest': return {fill:'rgba(15,23,42,.92)',stroke:'rgba(226,232,240,.42)',text:'#f8fafc'};
    default: return {fill:'rgba(15,23,42,.9)',stroke:'rgba(148,163,184,.44)',text:'#f8fafc'};
  }
}
function drawActorThoughtBubble(centerX,bottomY,text,mood='neutral',time=0,pop=0){
  if(!text || time<=0) return;
  const lines=trimThoughtLines(text);
  if(!lines.length) return;
  const life=clamp(time/2.25,0,1);
  const alpha=clamp(Math.min(1,time/.18)*Math.min(1,life+.18),0,1);
  const palette=actorThoughtPalette(mood);
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.font='800 10px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const lineH=11;
  const padX=10, padY=7, tailH=7, radius=13;
  const maxW=Math.max(...lines.map(line=>ctx.measureText(line).width));
  const bubbleW=Math.max(48,Math.ceil(maxW + padX*2));
  const bubbleH=Math.max(24,Math.ceil(lines.length*lineH + padY*2));
  const rise=(1-life)*8 + pop*8;
  const x=centerX-bubbleW/2;
  const y=bottomY-bubbleH-tailH-rise;
  ctx.fillStyle=palette.fill;
  ctx.strokeStyle=palette.stroke;
  ctx.lineWidth=1;
  roundRectPath(x,y,bubbleW,bubbleH,radius); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(centerX-7,bottomY-tailH-rise);
  ctx.lineTo(centerX,bottomY-rise);
  ctx.lineTo(centerX+8,bottomY-tailH-rise);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle=palette.text;
  lines.forEach((line,idx)=>ctx.fillText(line,centerX,y+padY+lineH*(idx+.5)+(lines.length===1?1:0)));
  ctx.restore();
}

    ...branches.map((b,idx)=>({label:`${b.tier2} · ${b.tier3}`,fn:()=>{closeDialog(); advanceJob(idx)}})),
    {label:'나중에',fn:closeDialog,cls:'secondary'}
  ]);
}

function advanceJob(pathOverride){
  const reward=(tier)=>weaponRewardFor(S.hero.baseClass,tier);
  if(S.hero.jobTier===1){
    if(S.hero.level<5) return showToast('레벨 5 이상이어야 합니다.');
    if(S.hero.quests.cave.state!=='turnedIn') return showToast('어둠 동굴 퀘스트를 완료해야 합니다.');
    const chosenPath=typeof pathOverride==='number'?clamp(pathOverride,0,1):(hasChosenJobPath()?S.hero.jobPath:null);
    if(typeof chosenPath!=='number') return chooseAdvancePath();
    S.hero.jobPath=chosenPath;
    S.classPaths[S.hero.baseClass]=chosenPath;
    S.hero.jobTier=2;
    const rewardId=reward(2); if(rewardId) addItem(rewardId,1);
    deriveHero(); updateSkillButtons(); updateHud(); renderPanel();
    showToast(tierName(S.hero.baseClass,2,chosenPath)+' 전직 완료!');
    return;
  }
  if(S.hero.jobTier===2){
    if(S.hero.level<10) return showToast('레벨 10 이상이어야 합니다.');
    if(S.hero.quests.dragon.state!=='turnedIn') return showToast('썬더 드레이크 퀘스트를 완료해야 합니다.');
    S.hero.jobTier=3;
    const rewardId=reward(3); if(rewardId) addItem(rewardId,1);
    deriveHero(); updateSkillButtons(); updateHud(); renderPanel();
    showToast(tierName(S.hero.baseClass,3,selectedPath(S.hero.baseClass))+' 전직 완료!');
    return;
  }
  showToast('이미 최종 전직을 마쳤습니다.');
}

function openDialog(title,text,buttons=[{label:'확인',fn:closeDialog}]){
  S.mode='dialog'; dialogTitle.textContent=title; dialogText.textContent=text; dialogButtons.innerHTML='';
  buttons.forEach(b=>{
    const el=document.createElement('button');
    el.className='btn'+(b.cls?' '+b.cls:'');
    el.textContent=b.label;
    bindTap(el,()=>{ if(typeof b.fn==='function') b.fn(); });
    dialogButtons.appendChild(el);
  });
  dialogOverlay.classList.add('show');
}
function closeDialog(){
  dialogOverlay.classList.remove('show');
  if(panelOverlay?.classList.contains('show') && S.panel) S.mode='panel';
  else if(S.mode==='dialog') S.mode='play';
  if(S.hero) S.hero.interactCd=Math.max(S.hero.interactCd||0,.24);
  S.once.interact=0;
}
function openPanel(type){
  S.mode='panel';
  S.panel=type;
  if(type==='bag') ensureBagSelection();
  renderPanel();
  panelOverlay.classList.add('show');
  syncHudClearance();
}
function closePanel(){panelOverlay.classList.remove('show'); delete panelBox.dataset.panel; S.panel=null; S.mode='play'; syncHudClearance()}
function shopItems(type){return type==='shop2'?['megaPotion','bomb','knightBlade','sageStaff','rangerBow','thiefDaggers','saintMace','qiGauntlet','spiritBell','ironArmor','archRobe','windCloak','holyVestment','fighterWrap','spiritMantle','guardianRing']:['potion','ether','leatherArmor','mageRobe','rogueVest','priestRobe','wolfCharm']}
function buyItem(id){
  const it=Items[id]; if(!it) return;
  if(S.hero.gold<(it.price||0)) return showToast('골드가 부족합니다.');
  if(it.classes&&!it.classes.includes(S.hero.baseClass)) return showToast('현재 직업에 맞지 않습니다.');
  if(it.tier&&S.hero.jobTier<it.tier) return showToast('전직 후 구매 가능합니다.');
  S.hero.gold-=it.price||0; addItem(id,1); showToast(it.name+' 구매'); renderPanel();
}
function buildPanelShell(title, desc, body, shellClass='', actions=''){
  const descRow=(desc||actions)
    ? `<div class="panel-desc-row">${desc?`<div class="panel-desc panel-desc-text">${desc}</div>`:''}${actions?`<div class="panel-header-actions">${actions}</div>`:''}</div>`
    : '';
  return `<div class="panel-shell ${shellClass}">
    <div class="panel-header">
      <div class="panel-header-main">
        <strong>${title}</strong>
        ${descRow}
      </div>
      <button class="btn secondary sheet-close" data-close>닫기</button>
    </div>
    <div class="panel-scroll">${body}</div>
  </div>`;
}

function ensureBagSelection(){
  if(!S.hero) return;
  const validInventory=typeof S.bagDescItem==='string' && S.hero.inv?.some(e=>e.id===S.bagDescItem);
  const validEquip=typeof S.bagDescItem==='string' && S.bagDescItem.startsWith('equip:') && !!S.hero.equip?.[S.bagDescItem.split(':')[1]];
  if(validInventory||validEquip) return;
  if(S.hero.inv?.length){
    S.bagDescItem=S.hero.inv[0].id;
    return;
  }
  const equipSlot=['weapon','armor','accessory'].find(slot=>S.hero.equip?.[slot]);
  S.bagDescItem=equipSlot?`equip:${equipSlot}`:null;
}

function getBagSelection(){
  if(!S.hero) return null;
  if(typeof S.bagDescItem==='string' && S.bagDescItem.startsWith('equip:')){
    const slot=S.bagDescItem.split(':')[1];
    const id=S.hero.equip?.[slot];
    const item=id?Items[id]:null;
    return item?{id,item,slot,location:'equip'}:null;
  }
  const entry=S.hero.inv?.find(e=>e.id===S.bagDescItem);
  const item=entry?Items[entry.id]:null;
  return item?{id:entry.id,item,slot:item.type,location:'inventory'}:null;
}
function ensureBagUiState(){
  if(!['all','consumable','equip','material'].includes(S.bagFilter)) S.bagFilter='all';
  if(!['default','name','qty','type'].includes(S.bagSort)) S.bagSort='default';
}
function bagItemTypeLabel(itType){
  return ({consumable:'소모',weapon:'무기',armor:'방어',accessory:'장신',key:'재료'})[itType]||'기타';
}
function bagCapacityInfo(){
  const used=S.hero?.inv?.length||0;
  const capacity=Math.max(50, Math.ceil(Math.max(used+8,50)/10)*10);
  return {used,capacity,free:Math.max(0,capacity-used)};
}
function bagFilterMatch(item){
  if(!item) return false;
  switch(S.bagFilter){
    case 'consumable': return item.type==='consumable';
    case 'equip': return ['weapon','armor','accessory'].includes(item.type);
    case 'material': return !['consumable','weapon','armor','accessory'].includes(item.type);
    default: return true;
  }
}
function bagSortEntries(entries){
  const decorated=entries.map((entry,idx)=>({entry,idx,item:Items[entry.id]}));
  decorated.sort((a,b)=>{
    if(S.bagSort==='name') return String(a.item?.name||'').localeCompare(String(b.item?.name||''),'ko');
    if(S.bagSort==='qty') return (b.entry.qty||1)-(a.entry.qty||1) || a.idx-b.idx;
    if(S.bagSort==='type') return String(a.item?.type||'').localeCompare(String(b.item?.type||''),'ko') || String(a.item?.name||'').localeCompare(String(b.item?.name||''),'ko');
    return a.idx-b.idx;
  });
  return decorated.map(v=>v.entry);
}
function bagSlotLabel(slot){
  return ({weapon:'무기',armor:'방어구',accessory:'장신구'})[slot]||slot;
}
function bagActionLabel(item,location='inventory'){
  if(!item) return '';
  if(item.type==='consumable') return '사용';
  if(['weapon','armor','accessory'].includes(item.type)) return location==='equip'?'해제':'장착';
  return '';
}
function bagSelectionSummary(selected){
  if(!selected || !selected.item) return '카드를 누르면 상세 팝업이 열립니다.';
  if(selected.location==='equip') return `${bagSlotLabel(selected.slot)} 장착 중`;
  return `${bagItemTypeLabel(selected.item.type)} · 수량 ${selected.entry?.qty||1}`;
}
function openBagDetailDialog(selection){
  const selected=selection||getBagSelection();
  if(!selected) return;
  const item=selected.item;
  if(!item) return;
  const lines=[];
  lines.push(selected.location==='equip' ? `${bagSlotLabel(selected.slot)} 슬롯에 장착 중` : `${bagItemTypeLabel(item.type)} · 수량 ${selected.entry?.qty||1}`);
  if(item.desc) lines.push('', item.desc);
  if(['weapon','armor','accessory'].includes(item.type)){
    const stats=[];
    if(item.atk) stats.push(`공격 +${item.atk}`);
    if(item.def) stats.push(`방어 +${item.def}`);
    if(item.hp) stats.push(`HP +${item.hp}`);
    if(item.mp) stats.push(`MP +${item.mp}`);
    if(item.spd) stats.push(`이속 +${item.spd}`);
    if(item.speed) stats.push(`속도 +${item.speed}`);
    if(item.crit) stats.push(`치명 ${item.crit}%`);
    if(item.critDamage) stats.push(`치피 ${item.critDamage}%`);
    if(item.statusPower) stats.push(`상태이상 성공 +${item.statusPower}%`);
    if(item.statusResist) stats.push(`상태이상 저항 +${item.statusResist}%`);
    if(stats.length) lines.push('', `효과: ${stats.join(' · ')}`);
  }
  const buttons=[];
  if(selected.location==='equip'){
    buttons.push({label:'해제',fn:()=>{ closeDialog(); unequipItem(selected.slot); if(S.panel==='bag') renderPanel(); }});
  }else if(item.type==='consumable'){
    buttons.push({label:'사용',fn:()=>{ closeDialog(); useItem(selected.entry.id); if(S.panel==='bag') renderPanel(); }});
  }else if(['weapon','armor','accessory'].includes(item.type)){
    buttons.push({label:'장착',fn:()=>{ closeDialog(); equipItem(selected.entry.id); if(S.panel==='bag') renderPanel(); }});
  }
  buttons.push({label:'닫기',fn:closeDialog,cls:'secondary'});
  openDialog(item.name, lines.join('\n'), buttons);
}
function getBagPanelDescText(){
  const selected=getBagSelection();
  return selected?`${selected.item.name} 선택됨`:'장비와 소지품을 한 화면에서 빠르게 관리할 수 있습니다.';
}
function getBagPanelActions(){
  return [
    ['all','전체'],
    ['consumable','소모'],
    ['equip','장비'],
    ['material','재료']
  ].map(([key,label])=>`<button class="btn secondary skill-tab bag-head-tab ${S.bagFilter===key?'active':''}" type="button" data-bag-filter="${key}">${label}</button>`).join('');
}
function updateBagPanelDesc(){
  const descEl=panelBox.querySelector('.panel-desc-text')||panelBox.querySelector('.panel-desc');
  if(descEl) descEl.textContent=getBagPanelDescText();
  panelBox.querySelectorAll('.inventory-slot[data-item]').forEach(slot=>{
    slot.classList.toggle('selected', slot.dataset.item===S.bagDescItem);
  });
  panelBox.querySelectorAll('.equip-slot[data-equip-slot]').forEach(slot=>{
    slot.classList.toggle('selected', `equip:${slot.dataset.equipSlot}`===S.bagDescItem);
  });
  const selected=getBagSelection();
  const info=bagCapacityInfo();
  panelBox.querySelectorAll('.bag-capacity-text').forEach(el=>{
    el.textContent=`슬롯 사용 ${info.used}/${info.capacity} · 여유 ${info.free}`;
  });
  const selTitle=panelBox.querySelector('.bag-selection-title');
  if(selTitle) selTitle.textContent=selected?selected.item.name:'선택 없음';
  const selBody=panelBox.querySelector('.bag-selection-body');
  if(selBody) selBody.textContent=bagSelectionSummary(selected);
  panelBox.querySelectorAll('[data-use]').forEach(useBtn=>bindTap(useBtn,()=>{S.bagDescItem=useBtn.dataset.use; useItem(useBtn.dataset.use);}));
  panelBox.querySelectorAll('[data-equip]').forEach(equipBtn=>bindTap(equipBtn,()=>{S.bagDescItem=equipBtn.dataset.equip; equipItem(equipBtn.dataset.equip);}));
  panelBox.querySelectorAll('[data-unequip]').forEach(unequipBtn=>bindTap(unequipBtn,()=>{unequipItem(unequipBtn.dataset.unequip);}));
}

function normalizeAngle(a){

  if(out>Math.PI) out-=Math.PI*2;

}

}

function facingFromInput(dx,dy,prev=Math.PI/2){

}

      const anchor=arrowEmbedTargetPos(a.target,a.kind);

      y=(anchor?.y ?? a.anchorY ?? a.y ?? 0)+(a.offsetY||0);
    }
    const s=scr(x,y);
    const fade=Math.min(1,Math.max(0,a.time/Math.max(.001,a.maxTime||5)));
    const alpha=fade<.16 ? fade/.16 : 1;
    const r=Math.max(5,(a.r||8)*0.78);
    ctx.save();
    ctx.globalAlpha=.92*alpha;
    ctx.translate(s.x,s.y);
    ctx.rotate(a.angle||0);
    ctx.shadowColor='rgba(15,23,42,.22)';
    ctx.shadowBlur=4;
    ctx.strokeStyle=a.shaftColor||'#d6b37b';
    ctx.lineWidth=Math.max(.85,r*.13);
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-r*1.26,0);
    ctx.lineTo(r*.58,0);
    ctx.stroke();
    ctx.fillStyle=a.headColor||'#e5e7eb';
    ctx.beginPath();
    ctx.moveTo(r*.86,0);
    ctx.lineTo(r*.36,-r*.24);
    ctx.lineTo(r*.36,r*.24);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle=a.featherColor||a.color||'#86efac';
    [1,-1].forEach(sy=>{
      ctx.beginPath();
      ctx.ellipse(-r*1.48,sy*r*.14,r*.24,r*.11,-sy*.55,0,Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  });
}

  playerCombatTargetsInCircle(x,y,r).forEach(target=>{

function tile(m,tx,ty){if(tx<0||ty<0||tx>=m.w||ty>=m.h)return'wall'; return m.tiles[ty][tx]}

const SOFT_CHARACTER_COLLISION_SCALE=.86;
function characterCollisionScale(ref){

function effectiveCollisionRadius(r,ref=null){

}

function getObjectBlockers(m){
  const blockers=[];
  const add=(kind,ref,x,y,r)=>blockers.push({kind,ref,x,y,r});
  if(S.hero&&S.hero.hp>0) add('hero',S.hero,S.hero.x,S.hero.y,effectiveCollisionRadius(S.hero.r,S.hero));
  (m.npcs||[]).forEach(n=>{ if(!actorAlive(n)) return; const p=npcPos(n); add('npc',n,p.x,p.y,effectiveCollisionRadius(n.r||18,n)); });
  (m.animals||[]).forEach(a=>{ if(!actorAlive(a)) return; add('animal',a,a.x,a.y,effectiveCollisionRadius(a.r||13,a)); });
  m.enemies.forEach(e=>{if(e.alive) add('enemy',e,e.x,e.y,e.r)});
  m.chests.forEach(c=>{if(!c.opened){const p=tileCenter(c.tx,c.ty); add('chest',c,p.x,p.y,16)}});
  m.healers.forEach(h=>{const p=tileCenter(h.tx,h.ty); add('healer',h,p.x,p.y,16)});
  m.signs.forEach(s=>{const p=tileCenter(s.tx,s.ty); add('sign',s,p.x,p.y,14)});
  m.doors.forEach(d=>{if(!d.opened){const p=tileCenter(d.tx,d.ty); add('door',d,p.x,p.y,20)}});
  return blockers;
}

function isSoftPassActor(ref){

function shouldIgnoreActorBlocking(actor,otherRef,otherKind=null){

function objectHit(m,x,y,r,ignoreRef){
  const bodyR=effectiveCollisionRadius(r,ignoreRef);
  return getObjectBlockers(m).some(o=>o.ref!==ignoreRef && !shouldIgnoreActorBlocking(ignoreRef,o.ref,o.kind) && dist(x,y,o.x,o.y)<bodyR+o.r-2);

  }

    dx=clamp(-dx + panicWave,-1,1);
    dy=clamp(-dy - panicWave,-1,1);
  }
  const mag=Math.hypot(dx,dy);
  if(mag>0.001){

  }
  if(S.once.attack) attack();
  if(S.once.skill) castSkill(0);
  if(S.once.skill2) castSkill(1);
  if(S.once.skill3) castSkill(2);

        const safePoint=findNearestOpenPoint(m,e.x,e.y,e.r,e,18);

function updateProjectiles(dt){
  const m=mapNow();
  for(let i=S.projectiles.length-1;i>=0;i--){
    const p=S.projectiles[i];
    let collisionInfo=null;
    if(p.homing>0){
      const speed=Math.hypot(p.vx,p.vy)||Math.max(1,p.homing);
      const target=p.team==='player' ? nearestPlayerHomingTarget(p.x,p.y,Math.max(220,p.homing)) : S.hero;
      if(target && (p.team!=='player' || target.alive || actorAlive(target))){
        const desired=Math.atan2(target.y-p.y,target.x-p.x);
        let ang=Math.atan2(p.vy,p.vx);
        const maxTurn=(p.turnRate||6)*dt;
        const diff=normalizeAngle(desired-ang);
        ang+=clamp(diff,-maxTurn,maxTurn);
        p.vx=Math.cos(ang)*speed;
        p.vy=Math.sin(ang)*speed;
      }
    }
    p.life-=dt;
    p.age=(p.age||0)+dt;
    if(p.type==='soulBolt'){
      const baseSpeed=Math.hypot(p.baseVx||p.vx,p.baseVy||p.vy)||1;
      const dirX=(p.baseVx||p.vx)/baseSpeed;
      const dirY=(p.baseVy||p.vy)/baseSpeed;
      p.baseX=(p.baseX??p.x)+dirX*baseSpeed*dt;
      p.baseY=(p.baseY??p.y)+dirY*baseSpeed*dt;
      const offset=Math.sin((p.age||0)*(p.waveFreq||16)+(p.wavePhase||0))*(p.waveAmp||0);
      const px=-dirY, py=dirX;
      const nextX=p.baseX+px*offset;
      const nextY=p.baseY+py*offset;
      p.vx=(nextX-p.x)/Math.max(dt,.0001);
      p.vy=(nextY-p.y)/Math.max(dt,.0001);
      p.x=nextX; p.y=nextY;
      p.history=Array.isArray(p.history)?p.history:[];
      p.history.unshift({x:p.x,y:p.y});
      if(p.history.length>10) p.history.length=10;
    }else{
      p.x+=p.vx*dt; p.y+=p.vy*dt;
    }
    let rm=p.life<=0;
    if(rm) collisionInfo={kind:'expire'};
    if(!rm && projectileCircleHit(m,p.x,p.y,p.r,p)){
      rm=true;
      collisionInfo={kind:'terrain'};
    }
    
if(p.team==='player'&&!rm){
      mapNow().enemies.forEach(e=>{
        if(rm||!e.alive) return;
        p.hitIds=Array.isArray(p.hitIds)?p.hitIds:[];
        if(p.hitIds.includes(e.id)) return;
        if(dist(p.x,p.y,e.x,e.y)<=p.r+e.r){
          p.hitIds.push(e.id);
          const result=damageEnemy(e,p.dmg,Math.random()<S.hero.crit);
          collisionInfo={kind:'enemy',target:e};
          if(result?.hit && p.type==='soulBolt'){
            spawnHitSpark(e,{
              type:'fearBurst',
              scale:PRIEST_HIT_SPARK_SCALE*(2/3),
              time:.26,
              maxTime:.26,
              color:'#ddd6fe',
              glow:'rgba(167,139,250,.36)',
              smoke:'rgba(15,23,42,.42)',
              lightFx:true,
              lightColor:'rgba(255,255,255,.96)',
              lightGlow:'rgba(196,181,253,.58)',
              lightRadius:1.16,
              sourceX:p.x,
              sourceY:p.y
            });
          }
          if(result?.hit && p.fear>0&&e.alive) applyFear(e,p.fear);
          if(result?.hit && p.explode){
            const explodeOpts=p.explodeHitSpark?{hitSpark:p.explodeHitSpark}:{};
            hitCircle(p.x,p.y,p.explode,Math.round(p.dmg*.7),explodeOpts);
          }
          if(p.type==='bowArrow' && p.stickToObjects){
            rm=true;
          }else if(p.pierce>0) p.pierce--; else rm=true;
        }
      });
      combatActors().forEach(a=>{
        if(rm||!actorAlive(a)||!heroCanAttackTarget(a)||heroProjectilePassesThroughActor(p,a)) return;
        p.hitIds=Array.isArray(p.hitIds)?p.hitIds:[];
        if(p.hitIds.includes(a.id)) return;
        if(dist(p.x,p.y,a.x,a.y)<=p.r+a.r){
          p.hitIds.push(a.id);
          const result=damageActor(a,p.dmg,Math.random()<S.hero.crit,S.hero);
          collisionInfo={kind:a.kind,target:a};
          if(result?.hit && p.type==='soulBolt'){
            spawnHitSpark(a,{
              type:'fearBurst',
              scale:PRIEST_HIT_SPARK_SCALE*(2/3),
              time:.26,
              maxTime:.26,
              color:'#ddd6fe',
              glow:'rgba(167,139,250,.36)',
              smoke:'rgba(15,23,42,.42)',
              lightFx:true,
              lightColor:'rgba(255,255,255,.96)',
              lightGlow:'rgba(196,181,253,.58)',
              lightRadius:1.16,
              sourceX:p.x,
              sourceY:p.y
            });
          }
          if(result?.hit && p.fear>0 && actorAlive(a)) applyFearActor(a,S.hero,p.fear);
          if(result?.hit && p.explode){
            const explodeOpts=p.explodeHitSpark?{hitSpark:p.explodeHitSpark}:{};
            hitCircle(p.x,p.y,p.explode,Math.round(p.dmg*.7),explodeOpts);
          }
          if(p.type==='bowArrow' && p.stickToObjects){
            rm=true;
          }else if(p.pierce>0) p.pierce--; else rm=true;
        }
      });
      if(!rm && p.type==='bowArrow' && p.stickToObjects){
        const blockers=getObjectBlockers(m).filter(o=>o.kind!=='hero'&&o.kind!=='enemy'&&!heroProjectilePassesThroughActor(p,o.ref));
        const obj=blockers.find(o=>dist(p.x,p.y,o.x,o.y)<=p.r+o.r-2);
        if(obj){
          rm=true;
          collisionInfo={kind:obj.kind,target:obj.ref};
        }
      }
    }else if(p.team==='enemy'&&!rm){
      if(p.fromRaidBoss){
        let directHit=false;
        for(const a of livingNpcs(mapNow())){
          if(!actorAlive(a)) continue;
          if(dist(p.x,p.y,a.x,a.y)<=p.r+a.r){
            directHit=true;
            collisionInfo={kind:a.kind,target:a};
            break;
          }
        }
        if(!directHit && dist(p.x,p.y,S.hero.x,S.hero.y)<=p.r+S.hero.r){
          directHit=true;
          collisionInfo={kind:'hero'};
        }
        if(directHit){
          damageRaidBossArea(p.owner||null,p.x,p.y,Math.max(p.raidSplash||0,p.r+42),p.dmg,{color:'rgba(254,202,202,.84)',text:'폭쇄!',particleTime:.56,time:.24});
          rm=true;
        }
      }
      if(!rm && dist(p.x,p.y,S.hero.x,S.hero.y)<=p.r+S.hero.r){damageHero(p.dmg); rm=true; collisionInfo={kind:'hero'}}
    }
    if(rm){
      if(p.team==='enemy' && p.fromRaidBoss && (p.raidSplash||0)>0 && collisionInfo && (collisionInfo.kind==='terrain' || collisionInfo.kind==='expire')){
        damageRaidBossArea(p.owner||null,p.x,p.y,p.raidSplash,p.dmg,{color:'rgba(254,202,202,.82)',text:'폭쇄!',particleTime:.56,time:.24});
      }
      if(p.type==='bowArrow' && p.stickToObjects && collisionInfo && collisionInfo.kind!=='expire'){
        if(collisionInfo.kind==='enemy' && collisionInfo.target) embedArrowInTarget(collisionInfo.target,p,'enemy');
        else if(collisionInfo.target && ['npc','animal','chest','healer','sign','door'].includes(collisionInfo.kind)) embedArrowInTarget(collisionInfo.target,p,collisionInfo.kind);
        else embedArrowAtPoint(p.x,p.y,p,collisionInfo.kind||'terrain');
      }else{
        spawnProjectileImpactFx(p);
        if(p.type==='holyBolt') S.effects.push({type:'holySpark',x:p.x,y:p.y,r:Math.max(24,p.r*PRIEST_PROJECTILE_HIT_RADIUS_MULT),time:.18,maxTime:.18,color:'#fef3c7',glow:'rgba(251,191,36,.4)'});
        if(p.type==='curseBolt') S.effects.push({type:'curseSigil',x:p.x,y:p.y,r:Math.max(24,p.r*PRIEST_PROJECTILE_HIT_RADIUS_MULT),time:.26,maxTime:.26,color:'#c4b5fd',glow:'rgba(139,92,246,.34)',smoke:'rgba(15,23,42,.46)'});
        if(p.type==='soulBolt') S.effects.push({type:'fearBurst',x:p.x,y:p.y,r:Math.max(24,p.r*PRIEST_PROJECTILE_HIT_RADIUS_MULT)*(2/3),time:.3,maxTime:.3,color:'#ddd6fe',glow:'rgba(167,139,250,.36)',smoke:'rgba(15,23,42,.42)',lightFx:true,lightColor:'rgba(255,255,255,.94)',lightGlow:'rgba(196,181,253,.56)',lightRadius:1.08});
      }
      if(p.explode) S.effects.push({x:p.x,y:p.y,r:p.explode,time:.28,color:p.color});
      S.projectiles.splice(i,1);
    }
  }
}
function updateFx(dt){
  for(let i=S.effects.length-1;i>=0;i--){S.effects[i].time-=dt; if(S.effects[i].time<=0) S.effects.splice(i,1)}
  S.corpsePieces=Array.isArray(S.corpsePieces)?S.corpsePieces:[];
  for(let i=S.corpsePieces.length-1;i>=0;i--){
    const d=S.corpsePieces[i];
    d.time-=dt;
    if(d.time<=0){ S.corpsePieces.splice(i,1); continue; }
    d.vy+=(d.gravity||260)*dt;
    const drag=Math.max(0,1-(d.drag||2.2)*dt);
    d.vx*=drag;
    d.spin*=Math.max(.18,1-dt*1.9);
    d.x+=d.vx*dt;
    d.y+=d.vy*dt;
    d.rot+=(d.spin||0)*dt;
    if(d.y>=d.settle){
      d.y=d.settle;
      if(Math.abs(d.vy)>18){
        d.vy=-Math.abs(d.vy)*(d.bounce||.16);
        d.vx*=.74;
      }else{
        d.vy=0;
        d.vx*=Math.max(0,1-dt*5.2);
      }
    }
  }
  updateEmbeddedArrows(dt);
  for(let i=S.particles.length-1;i>=0;i--){S.particles[i].time-=dt; S.particles[i].y-=dt*34; if(S.particles[i].time<=0) S.particles.splice(i,1)}
}

function formatHudStatusTime(sec){
  const value=Math.max(0, Number(sec)||0);
  if(value>=10) return `${Math.ceil(value)}초`;
  if(value>=1) return `${value.toFixed(1)}초`;
  return `${Math.max(.1, value).toFixed(1)}초`;
}
function heroStatusBadges(){
  const h=S.hero;
  if(!h) return [];
  const badges=[];
  const push=(kind, icon, label, time, tone='buff')=>{
    const sec=Math.max(0, Number(time)||0);
    if(sec<=0) return;
    badges.push({kind, icon, label, time:sec, tone});
  };
  push('invuln','✦','무적',h.invuln,'defense');
  push('speed','➜','가속',h.speedBuff,'buff');
  push('slow','↓','둔화',h.slowTime,'debuff');
  push('fear','!','공포',h.fearTime,'debuff');
  push('poison','☣','중독',h.poisonTime,'debuff');
  push('burn','🔥','화상',h.burnTime,'debuff');
  push('freeze','❄','빙결',h.freezeTime,'debuff');
  push('stun','✹','기절',h.stunTime,'debuff');
  push('silence','⦻','침묵',h.silenceTime,'debuff');
  push('bleed','🩸','출혈',h.bleedTime,'debuff');
  push('curse','☾','저주',h.curseTime,'debuff');
  if(Array.isArray(h.buffs)){
    h.buffs.forEach((buff,idx)=>{
      if(!buff) return;
      const remain=Math.max(0, Number(buff.time ?? buff.duration ?? buff.left ?? 0) || 0);
      if(remain<=0) return;
      badges.push({
        kind:`custom-buff-${idx}`,
        icon:buff.icon||'✦',
        label:buff.label||buff.name||'버프',
        time:remain,
        tone:buff.tone||'buff'
      });
    });
  }
  if(Array.isArray(h.debuffs)){
    h.debuffs.forEach((debuff,idx)=>{
      if(!debuff) return;
      const remain=Math.max(0, Number(debuff.time ?? debuff.duration ?? debuff.left ?? 0) || 0);
      if(remain<=0) return;
      badges.push({
        kind:`custom-debuff-${idx}`,
        icon:debuff.icon||'!',
        label:debuff.label||debuff.name||'디버프',
        time:remain,
        tone:debuff.tone||'debuff'
      });
    });
  }
  return badges.sort((a,b)=>a.time-b.time).slice(0,6);
}

function drawEnemies(){

    ctx.save();

    ctx.restore();

    drawInlineNameDebuffs(p.x,nameY,nameText,debuffs,{nameFont:t.world?'800 12px sans-serif':'700 11px sans-serif',tagFont:'800 8px sans-serif'});

    ctx.fill();
  });
}

function drawHumanoidFigure(x,y,opts={}){
  const scale=opts.scale||1;
  const headColor=opts.headColor||'#fde68a';
  const bodyColor=opts.bodyColor||'#e5e7eb';
  const accentColor=opts.accentColor||'#60a5fa';
  const facing=Number.isFinite(opts.facing)?opts.facing:Math.PI/2;
  const moving=!!opts.moving;
  const walkCycle=opts.walkCycle||0;
  const angry=!!opts.angry;
  const sad=!!opts.sad;
  const legSwing=(moving?Math.sin(walkCycle):0)*3.1*scale;
  const armSwing=(moving?Math.sin(walkCycle+Math.PI/2):0)*2.6*scale;
  const torsoTop=y-1*scale;
  const torsoW=18*scale;
  const torsoH=13*scale;
  const shoulderY=torsoTop+4.5*scale;
  const hipY=torsoTop+torsoH;
  const footY=y+18*scale;
  const headY=y-10*scale;
  const headR=8.4*scale;
  const face=faceVec(facing);
  const eyeWhite=angry?'rgba(255,244,244,.96)':(sad?'rgba(237,242,247,.96)':'rgba(255,255,255,.97)');
  const pupil=angry?'#7f1d1d':(sad?'#334155':'#111827');

  ctx.save();
  ctx.lineCap='round';
  ctx.lineJoin='round';

  ctx.strokeStyle='rgba(15,23,42,.54)';
  ctx.lineWidth=Math.max(2,2.1*scale);

  ctx.beginPath();
  ctx.moveTo(x-3.3*scale, hipY);
  ctx.lineTo(x-4.4*scale-legSwing, footY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+3.3*scale, hipY);
  ctx.lineTo(x+4.4*scale+legSwing, footY);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x-7.2*scale, shoulderY);
  ctx.lineTo(x-10.2*scale-armSwing*0.85, y+9.4*scale);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x+7.2*scale, shoulderY);
  ctx.lineTo(x+10.2*scale+armSwing*0.85, y+9.4*scale);
  ctx.stroke();

  ctx.fillStyle=bodyColor;
  roundRectPath(x-torsoW/2,torsoTop,torsoW,torsoH,5*scale);
  ctx.fill();

  ctx.fillStyle=accentColor;
  roundRectPath(x-3.4*scale,torsoTop+1.2*scale,6.8*scale,torsoH-3.2*scale,4*scale);
  ctx.fill();

  ctx.fillStyle=headColor;
  ctx.beginPath();
  ctx.arc(x,headY,headR,0,TAU);
  ctx.fill();

  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.beginPath();
  ctx.arc(x-headR*0.28,headY-headR*0.26,headR*0.28,0,TAU);
  ctx.fill();

  const eyeSpread=headR*0.44;
  const eyeY=headY+headR*0.04;
  const eyeRX=headR*0.18;
  const eyeRY=Math.max(1.15*scale, sad?headR*0.11:headR*0.145);
  const pupilShiftX=face.x*headR*0.11;
  const pupilShiftY=face.y*headR*0.10;
  [[x-eyeSpread,eyeY],[x+eyeSpread,eyeY]].forEach(([ex,ey])=>{
    ctx.fillStyle=eyeWhite;
    ctx.beginPath();
    ctx.ellipse(ex,ey,eyeRX,eyeRY,0,0,TAU);
    ctx.fill();
    ctx.fillStyle=pupil;
    ctx.beginPath();
    ctx.arc(ex+pupilShiftX,ey+pupilShiftY,Math.max(1.05*scale,headR*0.07),0,TAU);
    ctx.fill();
  });

  const browY=headY-headR*0.46;
  ctx.strokeStyle=angry?'rgba(127,29,29,.92)':(sad?'rgba(59,130,246,.9)':'rgba(120,53,15,.9)');
  ctx.lineWidth=Math.max(1.15,1.18*scale);
  ctx.beginPath();
  if(angry){
    ctx.moveTo(x-eyeSpread-eyeRX*1.25,browY-headR*0.08);
    ctx.lineTo(x-eyeSpread+eyeRX*1.15,browY+headR*0.05);
    ctx.moveTo(x+eyeSpread-eyeRX*1.15,browY+headR*0.05);
    ctx.lineTo(x+eyeSpread+eyeRX*1.25,browY-headR*0.08);
  }else if(sad){
    ctx.moveTo(x-eyeSpread-eyeRX*1.25,browY+headR*0.02);
    ctx.lineTo(x-eyeSpread+eyeRX*1.15,browY-headR*0.12);
    ctx.moveTo(x+eyeSpread-eyeRX*1.15,browY-headR*0.12);
    ctx.lineTo(x+eyeSpread+eyeRX*1.25,browY+headR*0.02);
  }else{
    ctx.moveTo(x-eyeSpread-eyeRX*1.2,browY-headR*0.02);
    ctx.lineTo(x-eyeSpread+eyeRX*1.1,browY-headR*0.02);
    ctx.moveTo(x+eyeSpread-eyeRX*1.1,browY-headR*0.02);
    ctx.lineTo(x+eyeSpread+eyeRX*1.2,browY-headR*0.02);
  }
  ctx.stroke();

  ctx.strokeStyle=sad?'rgba(71,85,105,.7)':'rgba(120,53,15,.72)';
  ctx.lineWidth=Math.max(1.0,1.02*scale);
  ctx.beginPath();
  ctx.moveTo(x-headR*0.34,angry?headY+headR*0.52:(sad?headY+headR*0.64:headY+headR*0.58));
  if(angry) ctx.quadraticCurveTo(x,headY+headR*0.45,x+headR*0.34,headY+headR*0.52);
  else if(sad) ctx.quadraticCurveTo(x,headY+headR*0.76,x+headR*0.34,headY+headR*0.64);
  else ctx.quadraticCurveTo(x,headY+headR*0.63,x+headR*0.34,headY+headR*0.58);
  ctx.stroke();
  ctx.restore();
}

function heroVisualMood(){
  const h=S.hero;
  const critical=Math.max(1,Math.ceil((h.maxHp||1)*0.05));
  const sad=((h.hp||0)>0 && (h.hp||0)<=critical) || (h.fearTime||0)>0 || (h.bleedTime||0)>0;
  const angry=!sad && (((h.atkCd||0)>0.05) || ((h.actionLock||0)>0.05) || ((h.invuln||0)>0.02 && ((h.dashCd||0)>0 || (h.atkCd||0)>0)));
  return {sad,angry};
}

function drawHero(){
  const h=S.hero, p=scr(h.x,h.y), heroMood=heroVisualMood();
  ctx.save();
  if(h.invuln>0) ctx.globalAlpha=.55+Math.sin(Date.now()/35)*.2;
  const heroColor=(Classes[legacyClassId(h.baseClass)]||{}).color||'#22c55e';
  drawHumanoidFigure(p.x,p.y,{
    headColor:'#fde68a',
    bodyColor:'rgba(255,255,255,.78)',
    accentColor:heroColor,
    facing:h.facing,
    walkCycle:h.walkCycle||0,
    moving:(h.walkCycle||0)>0 && ((S.input.up||S.input.down||S.input.left||S.input.right)|| (S.input.analog && Math.hypot(S.input.ax||0,S.input.ay||0)>0.12)),
    angry:heroMood.angry,
    sad:heroMood.sad
  });
  ctx.restore();
}
function drawGroundFx(){

    [[size*.54,-size*.28],[size*.74,-size*.06],[size*.7,size*.16]].forEach(([ox,oy])=>{
      ctx.beginPath();
      ctx.ellipse(ox,oy,size*.16,size*.1,0,0,TAU);
      ctx.fill();
    });
    ctx.restore();
  });
  S.effects.forEach(e=>{
    if(e.type!=='redSpill') return;
    const p=scr(e.x,e.y);
    ctx.save();
    const maxTime=e.maxTime||4.2;
    const progress=clamp(1-((e.time||0)/maxTime),0,1);
    const fade=1-clamp((progress-.8)/.2,0,1);

    (e.splash||[]).forEach(blob=>{
      ctx.save();
      ctx.translate(p.x+(blob.ox||0)*appear,p.y+(blob.oy||0)*appear);

      ctx.fillStyle=e.tone||'rgba(185,28,28,.84)';
      ctx.beginPath();
      ctx.ellipse(0,0,(blob.rx||8)*appear,(blob.ry||4)*appear,0,0,TAU);
      ctx.fill();
      ctx.restore();
    });
    ctx.restore();
  });
}
function drawFx(){

        });
        ctx.restore();

        ctx.save();
        ctx.globalAlpha=alpha*.82;
        ctx.fillStyle=e.accent||'#ffffff';
        ctx.beginPath();

        ctx.lineTo(-size*.36,0);

    }else if(e.type==='arcaneSpark'){

        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha=alpha*.7;
        ctx.strokeStyle=e.color||'#dbeafe';
        ctx.lineWidth=Math.max(1.4,size*.1);
        ctx.lineCap='round';
        ctx.beginPath();
        for(let i=0;i<4;i++){
          const ang=i*(TAU/4);
          const sx=Math.cos(ang)*size*.2;
          const sy=Math.sin(ang)*size*.2;
          const ex=Math.cos(ang)*size*.64;

          ctx.lineTo(ex,ey);
        }
        ctx.moveTo(-size*.34,-size*.34);
        ctx.lineTo(size*.34,size*.34);
        ctx.moveTo(-size*.34,size*.34);
        ctx.lineTo(size*.34,-size*.34);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha=alpha*.82;

        ctx.lineTo(-size*.34,0);
        ctx.lineTo(-size*.12,-size*.12);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        ctx.globalAlpha=alpha*.58;
        ctx.fillStyle=e.color||'#dbeafe';
        for(let i=0;i<3;i++){

        }
        ctx.restore();

function key(key,on){
  const k=key.toLowerCase();
  if(['arrowup','w'].includes(k)){ S.input.up=on; S.input.analog=false; }
  if(['arrowdown','s'].includes(k)){ S.input.down=on; S.input.analog=false; }
  if(['arrowleft','a'].includes(k)){ S.input.left=on; S.input.analog=false; }
  if(['arrowright','d'].includes(k)){ S.input.right=on; S.input.analog=false; }
  if(on){
    if(k==='j') S.once.attack=1; if(k==='k') S.once.skill=1; if(k==='u') S.once.skill2=1; if(k==='o') S.once.skill3=1; if(k==='e'||k===' ') S.once.interact=1; if(k==='l'||k==='shift') S.once.dash=1;
    if(k==='i') openPanel('bag'); if(k==='c') openPanel('stats'); if(k==='q') openPanel('quest'); if(k==='p') openPanel('save');
    if(k==='escape'){ if(S.mode==='dialog') closeDialog(); else if(S.mode==='panel') closePanel(); }
  }
}
function bindHold(el,keyName,once){
  const on=e=>{e.preventDefault(); el.classList.add('on'); if(once) S.once[keyName]=1; else S.input[keyName]=1};
  const off=e=>{if(e)e.preventDefault(); el.classList.remove('on'); if(!once) S.input[keyName]=0};
  ['pointerdown','touchstart'].forEach(ev=>el.addEventListener(ev,on,{passive:false}));
  ['pointerup','pointerleave','pointercancel','touchend','touchcancel'].forEach(ev=>el.addEventListener(ev,off,{passive:false}));
}
function bindTap(el,fn){
  if(!el) return;
  const handler=e=>{
    if(e && e.cancelable) e.preventDefault();
    if(e && typeof e.stopPropagation==='function') e.stopPropagation();
    fn(e);
  };
  if(window.PointerEvent) el.addEventListener('pointerdown',handler,{passive:false});
  else {
    el.addEventListener('touchstart',handler,{passive:false});
    el.addEventListener('mousedown',handler);
  }
}
function handleHudMenuActivate(e){
  if(!S.hero || !heroHud.contains(e.target)) return;
  const pkBtn=e.target.closest('[data-pk-toggle]');
  if(pkBtn && heroHud.contains(pkBtn)){
    if(e.cancelable) e.preventDefault();
    if(typeof e.stopPropagation==='function') e.stopPropagation();
    S.hero.pkMode=heroPkMode()==='pk' ? 'peace' : 'pk';
    updateHud();
    showToast(S.hero.pkMode==='pk' ? 'PK 모드: 모든 객체 공격 가능' : '평화 모드: 몬스터만 공격 가능');
    return;
  }
  const btn=e.target.closest('[data-menu-panel]');
  if(btn && heroHud.contains(btn)){
    if(e.cancelable) e.preventDefault();
    if(typeof e.stopPropagation==='function') e.stopPropagation();
    openPanel(btn.dataset.menuPanel);
    return;
  }
  if(e.cancelable) e.preventDefault();
  S.hudMenuOpen=!S.hudMenuOpen;
  heroHud.classList.toggle('menu-open', !!S.hudMenuOpen);
  syncHudClearance();
}

function __ensureExtendedHeroState(hero=S.hero){

  hero.quests=hero.quests||{};

  hero.storyFlags=hero.storyFlags||{};
  return hero;
}

function __ensureById(list,obj){
  const idx=list.findIndex(e=>e&&obj&&e.id===obj.id);
  if(idx===-1) list.push(obj);
  else Object.assign(list[idx], obj);
}
function __ensureNpc(map,npc){ map.npcs=map.npcs||[]; __ensureById(map.npcs,npc); }
function __ensureAnimal(map,animal){ map.animals=map.animals||[]; __ensureById(map.animals,animal); }
function __ensurePortal(map,portal){
  map.portals=map.portals||[];
  const idx=map.portals.findIndex(p=>(portal.id&&p.id===portal.id)||(!portal.id&&p.tx===portal.tx&&p.ty===portal.ty&&p.to===portal.to));
  if(idx===-1) map.portals.push(portal);
  else Object.assign(map.portals[idx], portal);
}
function __ensureSign(map,sign){
  map.signs=map.signs||[];
  const exists=map.signs.some(s=>(sign.id&&s.id===sign.id)||(!sign.id&&s.tx===sign.tx&&s.ty===sign.ty&&s.text===sign.text));
  if(!exists) map.signs.push(sign);
}

const __baseRenderPanel=renderPanel;
renderPanel=function(){
  if(S.panel==='shopCustom'){
    const shop=S.dynamicShop||{title:'상점',desc:'판매 품목이 없습니다.',items:[]};
    const items=(shop.items||[]).filter(id=>Items[id]).map(id=>{
      const it=Items[id], locked=it.tier&&S.hero.jobTier<it.tier;
      return `<div class="item"><div class="row"><strong>${it.name}</strong><span>${it.price||0} G</span></div><div class="small" style="margin:8px 0">${it.desc}</div><button class="btn ${locked?'secondary':''}" data-buy="${id}" ${locked?'disabled':''}>${locked?'전직 후 구매 가능':'구매'}</button></div>`;
    }).join('') || `<div class="item"><strong>판매 품목이 없습니다.</strong><div class="small" style="margin-top:8px">지금은 준비 중입니다.</div></div>`;
    panelBox.innerHTML=buildPanelShell(shop.title,`${shop.desc}<br/>보유 골드 ${S.hero.gold} G`,`<div class="list">${items}</div>`,'shop-shell');
    panelBox.querySelectorAll('[data-close]').forEach(b=>bindTap(b,closePanel));
    panelBox.querySelectorAll('[data-buy]').forEach(b=>bindTap(b,()=>buyItem(b.dataset.buy)));
    return;
  }
  return __baseRenderPanel();
};

function __questProgress(id){
  const meta=Quests[id], st=S.hero.quests[id];
  if(!meta||!st) return '';
  return Object.entries(meta.kills).map(([enemy,count])=>`${Enemies[enemy].name} ${st.kills[enemy]||0}/${count}`).join(', ');
}
function __randomLine(id,fallback){
  const pool=__NPC_LINES[id];
  if(!pool||!pool.length) return fallback;
  return pool[Math.floor(Math.random()*pool.length)] || fallback;
}
function __openQuestDialog(n,questId,cfg){
  __ensureExtendedHeroState(S.hero);
  const st=S.hero.quests[questId];
  const shopBtn=cfg.shopProfile ? {label:'상점 보기',fn:()=>{closeDialog(); __openCustomShop(cfg.shopProfile());}} : null;
  const extraButtons=shopBtn ? [shopBtn] : [];
  if(st.state==='ready'){
    claimQuest(questId);
    return openDialog(n.name,cfg.claimText,[...extraButtons,{label:'확인',fn:closeDialog},{label:'닫기',fn:closeDialog,cls:'secondary'}]);
  }
  if(st.state==='active') return openDialog(n.name,`${cfg.activeText}\n진행도: ${__questProgress(questId)}`,[...extraButtons,{label:'확인',fn:closeDialog},{label:'닫기',fn:closeDialog,cls:'secondary'}]);
  if(st.state==='turnedIn') return openDialog(n.name,cfg.doneText,[...extraButtons,{label:'확인',fn:closeDialog},{label:'닫기',fn:closeDialog,cls:'secondary'}]);
  if(!cfg.canStart()) return openDialog(n.name,cfg.lockedText,[...extraButtons,{label:'확인',fn:closeDialog},{label:'닫기',fn:closeDialog,cls:'secondary'}]);
  return openDialog(n.name,cfg.offerText,[
    {label:'의뢰 수락',fn:()=>{activateQuest(questId); closeDialog();}},
    ...extraButtons,
    {label:'나중에',fn:closeDialog,cls:'secondary'}
  ]);
}

function __tryPaidRest(cost,mode){
  if(S.hero.gold<cost) return showToast('골드가 부족합니다.');
  S.hero.gold-=cost;
  if(mode==='inn'){
    S.hero.hp=S.hero.maxHp; S.hero.mp=S.hero.maxMp; S.hero.speedBuff=Math.max(S.hero.speedBuff||0,140);
    saveGame();
    showToast('숙박으로 회복했습니다.');
  }else if(mode==='meal'){
    S.hero.hp=clamp(S.hero.hp+140,0,S.hero.maxHp);
    S.hero.mp=clamp(S.hero.mp+45,0,S.hero.maxMp);
    S.hero.speedBuff=Math.max(S.hero.speedBuff||0,90);
    showToast('따뜻한 식사로 기운을 회복했습니다.');
  }else if(mode==='blessing'){
    S.hero.hp=clamp(S.hero.hp+60,0,S.hero.maxHp);
    S.hero.mp=clamp(S.hero.mp+80,0,S.hero.maxMp);
    showToast('꽃향 축복으로 정신이 맑아졌습니다.');
  }
  deriveHero(); updateHud();
}

function __ensureDecor(map,decor){
  map.decor=map.decor||[];
  const exists=map.decor.some(d=>(decor.id&&d.id===decor.id)||(!decor.id&&d.type===decor.type&&d.tx===decor.tx&&d.ty===decor.ty));
  if(!exists) map.decor.push(decor);
}
function __rectFromDecor(d){
  const pad=d.pad??4;
  const x=d.tx*TILE-S.cam.x + (d.ox||0) + pad;
  const y=d.ty*TILE-S.cam.y + (d.oy||0) + pad;
  const w=(d.wTiles||1)*TILE - pad*2;
  const h=(d.hTiles||1)*TILE - pad*2;
  return {x,y,w,h};
}
function __drawDecorPiece(d){
  const r=__rectFromDecor(d);
  const rr=Math.min(12,r.w*.18,r.h*.18);
  if(d.type==='rug'){
    ctx.fillStyle=d.color||'rgba(190,24,93,.28)';
    roundRect(r.x,r.y,r.w,r.h,rr); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=2; ctx.stroke();
    return;
  }
  if(d.type==='counter'){
    ctx.fillStyle=d.color||'#7c4a1d'; roundRect(r.x,r.y,r.w,r.h,rr); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.10)'; ctx.fillRect(r.x+6,r.y+5,r.w-12,5);
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fillRect(r.x+10,r.y+r.h-10,r.w-20,6);
    return;
  }
  if(d.type==='table'){
    ctx.fillStyle=d.color||'#8b5a2b'; roundRect(r.x,r.y+6,r.w,r.h-10,rr); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fillRect(r.x+6,r.y+10,r.w-12,4);
    ctx.fillStyle='#5b3415'; ctx.fillRect(r.x+8,r.y+r.h-10,6,10); ctx.fillRect(r.x+r.w-14,r.y+r.h-10,6,10);
    return;
  }
  if(d.type==='stool'){
    ctx.fillStyle=d.color||'#8b5a2b'; ctx.beginPath(); ctx.arc(r.x+r.w/2,r.y+r.h/2,Math.min(r.w,r.h)*.32,0,TAU); ctx.fill();
    ctx.fillStyle='#5b3415'; ctx.fillRect(r.x+r.w/2-2,r.y+r.h/2,4,9);
    return;
  }
  if(d.type==='shelf'||d.type==='bookshelf'){
    ctx.fillStyle=d.color||'#5b3415'; roundRect(r.x,r.y,r.w,r.h,rr); ctx.fill();
    const lines=d.type==='bookshelf'?4:3;
    for(let i=1;i<lines;i++){ ctx.fillStyle='rgba(255,255,255,.10)'; ctx.fillRect(r.x+4,r.y+(r.h/lines)*i,r.w-8,3); }
    for(let i=0;i<6;i++){ ctx.fillStyle=['#f59e0b','#60a5fa','#f87171','#34d399','#fde68a','#c084fc'][i%6]; ctx.fillRect(r.x+6+i*8,r.y+8+(i%2)*10,5,10); }
    return;
  }
  if(d.type==='oven'){
    ctx.fillStyle='#475569'; roundRect(r.x,r.y,r.w,r.h,rr); ctx.fill();
    ctx.fillStyle='#0f172a'; roundRect(r.x+8,r.y+10,r.w-16,r.h-18,8); ctx.fill();
    ctx.fillStyle='#fb923c'; ctx.beginPath(); ctx.arc(r.x+r.w/2,r.y+r.h-14,7,0,TAU); ctx.fill();
    return;
  }

function __startFlowerDelivery(route){
  __ensureStage2State(S.hero);
  if(S.hero.storyFlags.flowerDeliveryDone) return showToast('이미 꽃배달 의뢰를 마쳤습니다.');
  S.hero.storyFlags.flowerRoute=route;
  S.hero.storyFlags.flowerDeliveryStarted=true;
  if(!hasItem('springBouquet')) addItem('springBouquet',1);
  closeDialog();
  showToast(route==='inn'?'여관으로 꽃배달 시작':'술집으로 꽃배달 시작');
}
function __deliverFlower(route){
  if(!hasItem('springBouquet')) return showToast('전달할 꽃다발이 없습니다.');
  removeItem('springBouquet',1);
  S.hero.storyFlags.flowerDeliveryDone=true;
  S.hero.storyFlags.flowerRouteDelivered=route;
  if(route==='inn') addItem('innBloomBrooch',1);
  else addItem('tavernSongCoaster',1);
  closeDialog();
  showToast(route==='inn'?'여관꽃 브로치 획득':'노래잔받침 획득');
}

    r:extra.r||base.r||15,
    aggro:Math.round(220 + level*5 + (extra.aggroBonus||0)),
    respawn:extra.respawn ?? (extra.boss?90:20),
    projectile:!!extra.projectile,
    world:false
  };
}

function __stage3SetTile(m,tx,ty,t){ if(m&&ty>=0&&ty<m.h&&tx>=0&&tx<m.w) m.tiles[ty][tx]=t; }
function __stage3PaintRect(m,x,y,w,h,t){ fillRect(m,x,y,w,h,t); }
function __stage3ClearInner(m,floor){
  for(let y=0;y<m.h;y++) for(let x=0;x<m.w;x++) m.tiles[y][x]=floor;
}
function __stage3EnsureChest(map,chest){
  map.chests=map.chests||[];
  const idx=map.chests.findIndex(c=>c.id===chest.id);
  if(idx===-1) map.chests.push(chest);
}
function __stage3EnsureEvent(map,event){
  map.events=map.events||[];
  const idx=map.events.findIndex(e=>e.id===event.id);
  if(idx===-1) map.events.push(event);
}
function __stage3CandidateCells(map){
  const cells=[];
  for(let ty=2; ty<map.h-2; ty++){
    for(let tx=2; tx<map.w-2; tx++){
      const t=tile(map,tx,ty);
      if(solidTile(t) || t==='water' || t==='lava') continue;
      let blocked=false;
      for(const p of map.portals||[]){ if(Math.abs(p.tx-tx)<=2 && Math.abs(p.ty-ty)<=2){ blocked=true; break; } }
      if(!blocked) cells.push({tx,ty});
    }
  }
  return cells;
}
function __stage3PickCells(map,count,seed){
  const cells=__stage3CandidateCells(map);
  const picks=[];
  if(!cells.length) return picks;
  const used=new Set();
  let cursor=(seed*53)%cells.length;
  for(let i=0;i<count;i++){
    let tries=0;
    while(tries<cells.length){
      const idx=(cursor + i*37 + tries*19) % cells.length;
      const cell=cells[idx];
      const key=`${cell.tx},${cell.ty}`;
      if(!used.has(key)){
        used.add(key);
        picks.push(cell);
        break;
      }
      tries++;
    }
  }
  return picks;
}

function __stage8QuestPerson(role,id,q){

    ? (q.giver||q.giverName||q.giverId||q.startNpc||q.startNpcId)
    : (q.receiver||q.receiverName||q.rewardNpc||q.rewardNpcId||q.turnIn||q.turnInId||q.completeNpc||q.completeNpcId||q.giver||q.giverId);
  if(typeof direct==='string' && direct.trim()) return __stage8NpcNames[direct]||direct;

  if(id==='dragon') return '사냥꾼';
  if(id==='jobTrial') return '성소 관리자';
  if(id==='guildSweep'||id==='scoutSweep'||id==='supplyEscort') return '길드 서기 펠릭스';
  if(id==='batFumes') return '제빵사 에린';
  if(id==='boneOre') return '대장장이 브람';
  if(/_(sweep|elite|purge|boss)$/.test(String(id||''))){
    const giver=q.giverId||q.receiverId;
    if(giver) return __stage8NpcNames[giver]||giver;

  return Object.values(Classes).filter(c=>c.id!=='adventurer').map(c=>({label:c.name,fn:()=>{closeDialog(); __stage8EquipChosenClass(c.id);}}));
}
const __stage8TalkNpcBase=talkNpc;
talkNpc=function(n){
  if(!n || !S.hero) return __stage8TalkNpcBase(n);
  if(n.role==='shrine' && S.hero.baseClass==='adventurer'){
    const trainingDone=S.hero.quests?.training?.state==='turnedIn';
    const trial=S.hero.quests?.jobTrial||{state:'locked',kills:{}};
    if(!trainingDone) return openNpcDialog(n,'성소 관리자','아직은 기초 수련부터 마치십시오. 장로의 인정을 받은 뒤에야 전직 시험을 시작할 수 있습니다.',[{label:'확인',fn:closeDialog}]);
    if(trial.state==='locked') return openNpcDialog(n,'성소 관리자','전직 시험을 시작하시겠습니까?\n초원 주변의 울프와 배트를 정리해 모험가의 기본을 증명해야 합니다.',[
      {label:'시험 수락',fn:()=>{activateQuest('jobTrial'); closeDialog();}},
      {label:'나중에',fn:closeDialog,cls:'secondary'}
    ]);
    if(trial.state==='active') return openNpcDialog(n,'성소 관리자',`전직 시험 진행 중입니다.\n진행도: ${__stage8QuestProgress('jobTrial',Quests.jobTrial,trial)}`,[{label:'확인',fn:closeDialog}]);
    if(trial.state==='ready'){
      claimQuest('jobTrial');
      return openNpcDialog(n,'성소 관리자','시험을 통과했습니다. 이제 원하는 직업을 선택하십시오.',[
        ...__stage8FirstJobButtons(),
        {label:'나중에',fn:closeDialog,cls:'secondary'}
      ]);
    }
    return openNpcDialog(n,'성소 관리자','이제 원하는 직업의 길을 선택할 수 있습니다.',[
      ...__stage8FirstJobButtons(),
      {label:'나중에',fn:closeDialog,cls:'secondary'}
    ]);
  }
  return __stage8TalkNpcBase(n);
};
__stage8SetupTitleMenu();
repairWorldState();

buildClasses(); initControls(); updateHud(); requestAnimationFrame(loop);
})();
</script>
